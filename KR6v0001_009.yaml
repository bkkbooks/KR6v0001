body:
  text: 九出尼張率父侍妓出家為尼其年父憂去職其父侍妓數十人善謳者有色貌邑子儀曹郎顧玩之求娉焉謳者不願遂出家為尼嘗因齋會張率宅玩之乃飛書言與張率姦南司以事奏聞高祖惜其才寢其奏然猶致世論焉梁書卷三十三張率傳皇太后出俗為尼延昌四年三月甲辰朔皇太后出俗為尼魏書卷九肅宗紀嬪葬以尼禮神龜元年太后出覲母武邑君時天文有變靈太后欲以后當禍是夜暴崩天下冤之喪還瑤光佛寺嬪葬皆以尼禮魏書卷十三皇后列傳一靈太后自落髮有蜜多道人能胡語肅宗置於左右胡太后慮其傳致消息三月三日於城南大巷中殺之乃武泰元年爾朱榮稱兵渡河太后盡召肅宗六宮皆令入道太后亦自落髮榮遣騎拘送太后及幼主於河陰太后對榮多所陳説榮拂衣而起太后及幼主並沉於河太后妹馮翊君收瘞於雙靈佛寺出帝時始葬以后禮而追加諡杜按北史本傳大同魏書卷十三宣武靈皇后胡氏傳高隆之寡姊為尼高隆之雖不涉學而欽尚文雅縉紳名流必存禮接寡姊為尼事之如母訓督諸子必先文義世甚以此稱之北齊書卷十八高隆之傳高隆之寡姊為尼高隆之雖不學涉而欽尚文雅搢紳名流必存禮接寡姊為尼事之如母訓督諸子必先文義世以此稱之北史卷五十四高隆子傳朱皇后出俗為尼宣帝朱皇后名滿月吳人也后本非良家子又年長於帝十餘歲疏賤無寵以靜帝故特尊崇之班亞楊皇后焉宣帝崩靜帝尊為帝太皇后隋開皇元年出俗為尼名法淨六年殂年四十以尼禮葬京城周書卷九皇后列傳一北周四后悉廢為比丘尼隋氏受命廢后為樂平公主餘四后悉廢為比丘尼隋書卷二十一天文志下楊氏為尼上令以犢車載阤夫妻將賜死於其家阤弟司勳侍中整詣闕求哀於是免阤死除名為民以其妻楊氏為尼隋書卷七十九外戚列傳南陽公主削髮為尼南陽公主尋竇請建德削髮為尼隋書卷八十南陽公主傳聲云度霍氏為尼以餘人代之帝與文帝幸姬霍氏淫通改姓徐氏龍駒勸長留宮內聲云度霍氏為尼以餘人代之南史卷五齊本紀下五沈皇后為尼後主沈皇后性端靜有識量寡嗜欲聰敏強記涉獵經史工書翰而身居儉約衣服無錦繡之飾左右近侍才百許人唯尋閲圖史及釋典為事嘗遇歲旱自暴而誦佛經應時雨降無子養孫姬子胤為己子數上書諫爭後主將廢之而立張貴妃會國亡不果乃與後主俱入長安及後主薨后自為哀辭文甚酸切隋煬帝每巡幸恆令從駕及煬帝被殺后自廣陵過江於毗陵天靜寺為尼名觀音貞觀初卒南史卷十二后妃後主沈皇后傳皇太后出俗為尼永平四年二月己亥尊胡充華為皇太妃三月甲長朔皇太后出俗為尼徙御金墉城北史卷四魏本紀四以尼禮葬高太后九月戊申皇太后高氏崩於瑤光寺冬十月丁卯以尼禮葬高太后於芒山北史卷四魏本紀四孝文幽皇后曾為尼文明太皇太后欲家世貴寵乃簡馮熙二女俱入掖庭時年十四其一早卒后有姿媚偏見愛幸未幾疾病太后乃遣還家為尼帝猶留念焉歲餘而太后崩帝服終頗存訪之又聞后素疹痊除遺閹官雙三念璽書勞問遂迎赴洛陽及至寵愛過本初當夕宮人稀復進見拜為左昭儀後立為皇后北史卷十三后妃傳上乙弗氏出家為尼時新都關中務欲東討蠕蠕寇邊未遑北伐故帝結婚以撫之於是更納悼后命后遜居別宮出家為尼悼后猶懷猜忌復徙后居秦州依子秦州刺史武都王帝雖限大計恩好不忘後密令養髮有追還之意然事祕禁外無知者六年春蠕蠕舉國度河前驅已過夏頗有言虜為悼后之故興此役帝曰豈有百萬之衆為一女子舉也雖然致此物論朕亦何顏以見將帥邪乃遣中常侍曹寵繼手敕令后自盡后奉敕揮淚謂寵曰願至尊享千萬歲天下康寧死無恨也因命武都王前與之決遺語皇太子辭皆淒愴因慟哭久之侍御咸垂涕失聲莫能仰視召僧設供令侍婢數十人出家手為落髮事畢乃入室引被自覆而崩年三十一鑿夢積崖為龕而葬神柩將入有二叢云先入龕中頃之一滅一出後號寂陵及文帝山陵畢手書云萬歲後欲令后配饗公卿乃議追諡曰文皇后附於太廟廢帝時合葬於永陵北史卷十三后妃傳上斛律氏為尼後主皇后斛律氏左丞相光之女也初為皇太子妃後主受禪立為皇后武平三年正月生女帝欲悅光詐稱生男為之大赦光誅后廢在別宮後令為尼齊滅嫁為開府元仁妻北史卷十四后妃傳下元氏為尼孝閔皇后元氏名胡摩魏文帝第五女也帝被廢后出俗為尼建德初武帝誅晉公護上帝尊號以后為孝閔皇后居崇義宮隋革命后出居里第大業十二年殂北史卷十四后妃傳下武皇后李氏出俗為尼武皇后李氏名娥姿楚人也於謹平江陵后家被籍沒至長安周文以后賜武帝後得親幸生宣帝宣帝崩靜帝尊為大帝太后隋開皇元年三月出俗為尼改名常悲八年殂以尼禮葬於京城南北史卷十四后妃傳下宣帝后朱氏出俗為尼宣帝后朱氏名滿月吳人也宣帝崩靜帝尊后為帝太后隋開皇元年二月出俗為尼改名法淨六年殂以尼禮葬於京城西宣帝后陳氏名月儀自云穎川人大將軍山提之第八女也帝崩后出俗為尼改名華光后永徽初終宣帝皇后元氏名樂尚河南洛陽人開府晟之第二女也帝崩后出家為尼改名華勝初后與陳皇后同時被選入宮俱拜為妃及升后又同日受册帝寵遇二后禮數均等年齒復同特相親愛及為尼後李朱及尉遲后並相繼殞歿而二后貞觀中尚存宣帝皇后尉遲氏名繁熾蜀公迥之孫女也大象二年三月立為天左大皇后帝崩后出俗為尼改名華道隋開皇十五年殂北史卷十四后妃傳下兵士配尼姑時從駕驍果數有逃散帝憂之以問裴矩矩曰今車駕留此已經二年驍果之徒盡無家口人無匹合則不能久安臣請聽兵士於此納室煬帝大喜曰公定多智此奇計也因令矩檢校為將士等娶妻矩召江都境內寡婦及未嫁女皆集宮監又召諸將帥及兵等恣其所取因聽自首先有姦通婦女及尼女官等並即配之北史卷三十八裴他傳宣武帝婕妤出家為比丘尼宣武崩後李彪女為比丘尼通習經義法座講説諸僧歎重之北史卷四十李彪傳高聰妓十餘人出家為尼高聰有妓十餘人有子無子皆注籍為妾以悅其情及病欲不適他人並令燒指吞炭出家為尼聰所作文筆二十卷北史卷四十高聰傳太原公主嘗作尼先是童謠曰白羊頭毣禿羖羊歷頭生角又曰羊羊吃野草不吃野草遠我道不遠打爾腦又曰阿嬤姑禍也道人姑夫死也羊為愔也角文為用刀道人謂廢帝小名太原公主嘗作尼故曰阿嬤姑愔子獻天和皆尚帝姑故曰道人姑夫云北史卷四十一楊播傳出宮人四百八十送兩街寺觀安置六月丁未朔辛酉出宮人四百八十送兩街寺觀安置舊唐書卷十七下文宗紀下韋妃削髮被尼服肅宗韋妃林甫羅織起柳績之獄堅連坐得罪兄弟並賜死太子懼上表自理言與妃情義不睦請離婚玄宗慰撫之聽離妃遂削髮被尼服居禁中佛舍西京失守妃亦陷賊舊唐書卷五十二后妃傳下女尼真如竇參乃再貶為歡州司馬男景伯配泉州女尼真如隸郴州其財物婢妾傳送京師舊唐書卷一百三十六竇參傳崔損姊為尼崔損身居宰相母野殯不言展墓不議遷祔姊為尼歿於近寺終喪不臨士君子罪之舊唐書卷一百三十六崔損傳榮氏至汴州為尼乾寧四年正月城中食竭朱瑄與妻榮氏出奔至中都為野人所害傳首汴州榮氏至汴州為尼舊唐書卷一百八十二朱瑄傳崔繪妻盧氏出家為尼崔繪妻盧氏幽州范陽人也為山東著姓繪早終盧既年少諸兄常欲嫁之盧輒稱病固辭盧亡姊之夫李思沖神龍初為工部侍郎又求續親盧謂左右曰吾自誓久已定矣乃夜中出自竇中奔歸崔氏髮面盡為糞穢所污宗族見者皆為之垂淚因出家為尼諸尼欽其操行皆尊事之開元中以老病而卒舊唐書卷一百九十三列女傳武后詔崔繪妻為浮屠尼以終崔繪妻盧者鸞台侍郎獻之女獻有美名繪喪盧年少家欲嫁之盧稱疾不許女兄適工部侍郎李思沖早亡思沖方顯重表求繼室詔許家內外姻皆然可思沖歸幣三百輿盧不可曰吾豈再辱於人乎寧沒身為婢是夕出自竇糞穢蔑面還崔舍斷髮自誓思沖以聞武后不奪也詔為浮屠尼以終新唐書卷二百五列女傳武則天才人太宗崩後削髮尼則天後年十四太宗聞其有色選為才人太宗崩后削髮為比丘尼居於感業寺高宗幸感業寺見而悅之復召入宮新唐書卷四則天皇后傳太宗崩武則天與嬪御皆為比丘尼武則天既見帝賜號武媚及帝崩與嬪御皆為比丘尼高宗為太子時入侍悅之新唐書卷七十六后妃傳上元載女少為尼元載女真一少為尼沒入掖庭德宗時始告以載死號踴投地左右呵止帝曰安有聞親喪責其哀殞乎命扶出新唐書卷一百四十五元載傳朱瑾妻為尼案五代會要太祖皇后張氏早崩又北夢瑣言云梁祖魏國夫人張氏碭山富室女父蕤曾為宋州刺史張氏賢明有禮朱溫雖虎狼其心亦所景伏初收袞鄆得朱瑾妻溫告之曰彼既無依寓於輜車張氏遣人召之瑾妻再拜張氏答拜泣下謂之曰袞鄆與司空同姓之國昆仲之間以小故尋戈至吾姒如此設不幸汴州失守妾亦似吾姒之今日也又泣下乃度為尼張恆給其費舊五代史卷十一后妃傳金華公主出家為尼開平四年夏太祖詔金華公主出家為尼居於宋州元靜寺蓋太祖推恩於羅氏令終其婦節也舊五代史卷十二列傳四金華公主出家為尼今考通鑒考異引梁功臣列傳云羅廷規尚安陽公主又尚金華公主薛史羅紹威傳亦載開平四年梁太祖詔金華公主出家為尼舊五代史卷十一后妃傳廣王之后與尼訟田梁史廣王全昱傳曰昱朴野常呼帝為三宮中博戲之事諱之及莊宗即位盡誅朱氏惟全昱先令終至道初知單州有稱廣王之后與尼訟田者豈以一言之善獨存其嗣耶舊五代卷十二宗室傳二女尼入宮閔帝即位加兼侍中既而帝子重吉出刺亳州女尼入宮帝方憂不測舊五代史卷四十六末帝紀上女尼惠明清泰元年六月甲申帝為故皇子亳州刺史重吉皇長女尼惠明大師幼澄舉哀行服群臣詣閣門奉慰舊五代卷四十六末帝紀上魏國夫人陳氏落髮為尼持經魏國夫人陳氏襄州人本昭宗之宮嬪也陳氏性既靜退不以寵侍自侈武皇常呼為阿女者及武皇大漸之際陳氏侍醫藥垂泣言妾為王執掃除之役十有四年矣王萬一不幸妾將何托既不能身以為殉願落髮為尼為王讀一藏佛經以報平昔武皇為之流涕及武皇薨陳氏果落髮持經法名智願後居於洛陽佛寺莊宗賜號建法大師天成中明宗幸其院改賜圓惠大師晉天福中卒於太原追諡光國大師塔以惠寂為名也舊五代史卷四十九后妃傳一莊宗劉后欲於太原造寺為尼案劉后傳永樂大典原闕考北夢瑣言云莊宗劉皇后魏州成安人家世寒微正位之後凡貢奉先入後宮惟寫佛經施尼師他無所賜先是莊宗自為俳優名曰李天下雜於塗粉優雜之間時為諸優朴抶摑搭竟為囂婦恩伶之傾玷有國者得不以為前鑒劉后以囊盛金合犀帶四欲於太原造寺為尼沿路復通皇弟存渥同簀而寢明宗聞其穢即令自殺舊五代史卷四十九后妃傳一莊宗劉后欲於太原造寺為尼唐莊宗崩皇后劉氏欲於太原造寺為尼及至太原乃削髮為尼唐莊宗遇弒後宮散走虢國夫人夏氏後嫁契丹突欲李贊華贊華性酷毒喜殺人婢妾微過常加刲灼夏氏懼求離婚乃削髮為尼以卒新五代史卷十四皇后劉氏傳夏氏為尼考北夢瑣言云莊宗皇帝嫡夫人韓氏後為淑妃伊氏為德妃夫人夏氏最承恩寵後嫁李贊華所謂東丹王既阿保機長子先歸朝後除滑州節度使性酷毒侍婢微過即以刀刲火灼夏氏少長宮掖不忍其凶求離婚歸河陽節度使夏魯奇家後為尼也舊五代史卷四十九后妃傳張格母落髮為尼張格字承之故宰相浚之子也浚為梁祖所忌潛遣人害於長水格易姓名流轉入蜀王建僭號以格為宰相格所生母當浚之遇害潛匿於民間落髮為尼流浪於函洛王建聞之潛使人迎之入蜀賜紫加號慈福大師舊五代史卷七十一列傳第二十三皇子重乂妻虢國夫人李氏落髮為尼天福四年閏七月庚午朔丁酉故皇子河南尹重乂妻虢國夫人李氏落髮為尼賜名悟因仍錫紫衣法號及夏臘二十舊五代史卷七十八高祖紀四壽王重乂李氏落髮為尼壽王重乂字宏理高祖第三子也天福中追封壽王妃李氏汾州刺史之女也重乂無子妃後落髮為尼開運中卒於京師舊五代史卷八十七宗室列傳二故皇子重乂英妻張氏落髮為尼天福四年十二丁酉朔己亥故皇子重乂英妻張氏落髮為尼賜名悟慎並夏臘二十舊五代史卷七十八高祖紀四皇甫遇妻宋國夫人請度為尼周廣順三年正月皇甫遇妻宋國夫人霍氏上言請度為尼周太祖許之仍賜紫衣號貞范大師法名惠圓又賜夏臘十舊五代史卷九十五列傳第十尼惠英惠燈等廣順元年十一月丁亥太祖詔唐朝五廟舊在至德宮安置應屬徽陵莊田園舍宜令新除右監門將軍李重玉為主其緣陵緣廟法物除合留外所有金銀器物充遷葬故淑妃王氏及許王從益外其餘並給與重玉及尼惠英惠燈惠能惠嚴等令重玉以時祀陵廟務在豐潔舊五代史卷一百一十二太祖紀三劉方遇使出家為尼之妻妹長髮為繼室案北夢瑣言云鎮州市民劉方遇家財數十萬方遇妻田氏蚤卒田之妹為尼常出入方遇家方遇使尼長髮為繼室舊五代史卷一百二十三李從敏傳案引朱瑾妻為尼郴王友裕攻徐州破朱瑾於石佛山梁太祖已破朱瑾納其妻以歸乃送瑾妻為尼新五代史卷十三元貞皇后張氏傳梁太祖昭儀陳氏為尼梁太祖嘗疾昭儀陳氏與尼數十人晝夜為佛法未嘗少懈開平三年度為尼居宋州佛寺新五代史卷十三昭儀陳氏梁末帝妃郭氏為尼梁亡唐莊宗入汴梁末帝次妃郭氏已而度為尼賜名誓正居於洛陽新五代史卷十三次妃郭氏傳願辭皇帝為比丘尼廢帝入立嘗置酒妃院明宗淑妃王氏妃舉酒曰願辭皇帝為比丘尼晉高祖立妃自請為尼不可乃遷於至德宮新五代史卷十五淑妃王氏傳何必妄毀形髮宣懿皇后符氏初適李守貞子崇訓其母以后夫家滅亡而獨脫死兵刃之間以為天幸欲使削髮為尼后不肯曰死生有命天也何必妄毀形髮為新五代史卷二十皇后符氏傳尼李靜善妄充宋公主又有開封尼李靜善者內人言其貌似柔福宋公主靜善即自稱柔福蘄州兵馬鈐轄韓世清送至行在遣內侍馮益等驗視遂封福國長公主適永州防禦使高世榮其後內人從顯仁太后歸言其妄送法寺治之內侍李𢜽自北還又言柔福在五國城適徐還而薨靜善遂伏誅柔福薨在紹興十一年從梓宮來者以其骨至葬之追封和國長公主宋史卷二百四十八公主傳趙普二女皆出尼為尼趙普二女皆笄趙普妻和氏言願為尼太宗再三諭之不能奪賜長女名志願號智果大師次女名志英號智圓大師宋史卷二百五十六趙普傳妖尼道安妖尼道安搆獄事連開封判官張去華敏中妻父也以故得請不預決讞既而法官皆貶猶以親纍落職出知廣州宋史卷二百八十二向敏中傳盧州妖尼道安未幾王禹稱判大理寺盧州妖尼道安誣訟徐鉉道安當反坐有詔勿治禹稱抗疏雪鉉請論道安罪坐貶商州團練副使歲餘移解州宋史卷二百九十三王禹稱傳盧州尼道安未幾有盧州尼道安訟弟婦不實府不為治械繫送本州弟婦即徐鉉妻之甥道安伐登聞鼓言鉉以尺牘求請張去華故不為治上怒去華坐削一任貶安州司馬宋史卷三百六張去華傳帝出胡貴嬪為尼賈似道大怒曰臣為大禮使陛下舉動不得預聞乞罷政即日出嘉會門帝留之不得乃罷顯祖涕泣出胡貴嬪為尼始還宋史卷四百七十四姦臣傳四有比丘尼三人出入宮中定哥自其夫時與家奴閻乞兒通嘗以衣服遺乞兒及為貴妃乞兒以妃家舊人給事本位定哥既怨海陵疏已欲復與乞兒通有比丘尼三人出入宮中定哥使比丘尼向乞兒索所遺衣服以調之乞兒識其意笑曰妃今日富貴忘我耶定哥欲以計納乞兒宮中恐閽者索之乃令侍兒以大篋盛褻衣其中遣人載之入宮閽者索之見篋中皆褻衣固已悔懼定哥使人詰責閽者曰我天子妃親體之衣爾故玩視何也我且奏之閽者惶恐曰死罪請後不敢定哥乃使人以篋盛乞兒載入宮中閽者果不敢復索乞兒入宮十餘日使衣婦人衣雜諸宮婢抵暮遣出貴哥以告海陵定哥縊死乞兒及比丘尼三人皆伏誅封貴哥莘國夫人金史卷六十三后妃傳上李皇后祝髮為比丘尼金舊俗婦女寡居宗族接續之后乃祝髮為比丘尼號通慧圓明大師賜紫衣歸遼陽營建清安禪寺別為尼院居之貞元三年世宗為東京留守正隆六年五月后卒世宗哀毀過禮以喪去官未幾起復為留守是歲十月后弟李石定策世宗即位於東京尊諡為貞懿皇后其寢園曰孝寧宮金史卷六十四后妃傳下
