body:
  text: 七教令沙門壞佛像以惡逆論開皇二十年十二月辛巳詔曰佛法深妙道教虛融咸降大慈濟度群品凡在含識皆蒙覆護所以雕鑄靈相圖寫真形率土瞻仰用申誠敬其五嶽四鎮節宣雲雨江河淮海浸潤區域並生養萬物利益兆人故建廟立祀以時恭敬敢有毀壞偷盜佛及天尊像嶽鎮海瀆神形者以不道論沙門壞佛像道士壞天尊者以惡逆論隋書卷二高祖紀下沙門壞佛像以惡逆論帝以年齡晚暮尤崇尚佛道又素信鬼神二十年詔沙門道士壞佛像天尊百姓壞嶽瀆神像皆以惡逆論隋書卷二十五刑法志賜死王誼於時上柱國元諧亦頗失意王誼數與相往來言論醜惡胡僧告之公卿奏誼大逆不道罪當死上見誼愴然曰朕與公舊為同學甚相憐憫將奈國法何於是下詔曰誼有周之世早豫人倫朕共游庠序遂相親好然性懷險薄巫覡盈門鬼言怪語稱神道聖朕受命之初深存誡約口云改悔心實不悛乃說四天王神道誼應受命書有誼讖天有誼星桃鹿二川岐州之下歲在辰巳興帝王之業密令卜問伺殿省之災又說其身是明王信用左道所在詿誤自言相表當王不疑此而赦之將或為亂禁暴除惡宜伏國刑上復令大理正趙綽謂誼曰時命如此將若之何於是賜死於家時年四十六隋書卷四十元諧傳上慰王誼而釋之時上柱國王誼有功於國與諧俱無任用每相往來胡僧告諧誼謀反上按其事無逆狀上慰諭而釋之隋書卷四十王誼傳高熲被斬獨孤皇后知熲不可奪陰欲去之初夫人卒后言於上曰高僕射老矣而喪夫人陛下何能不為之娶上以后言謂熲熲流涕謝曰臣今已老退朝之後唯齊居讀佛經而已雖陛下垂哀之深至於納室非臣所願上乃止頃之熲國令上熲陰事稱其子表仁謂熲曰司馬仲達初托疾不朝遂有天下公今遇此焉知非福於是上大怒囚熲於內史省而鞫之憲司復奏熲他事云沙門真覺嘗謂熲云明年國有大喪尼令暉復云十七十八年皇帝有大厄十九年不可過上聞而益怒顧謂群臣曰帝王豈可力求孔子以大聖之才作法垂世寧不欲大位邪天命不可耳熲與子言自比晉帝此何心乎有司請斬熲於是除名為民隋書卷四十一高熲傳煬帝命五郡沙門設佛供煬帝北巡至恆安見白骨被野以問侍臣侍臣曰往者韓洪與虜戰處也帝憫然傷之收葬骸骨命五郡沙門為設佛供拜洪隴西太守隋書卷五十二韓擒虎傳僧尼挾那左道者並皆禁絶太建十四年夏四月丙申立皇子永康公胤為皇太子賜天下為父後者爵一級王公以下繼帛各有差庚子詔鏤金銀薄庶物化生土木人彩華之屬及布帛短狹輕疏者並傷財廢業尤成蠹患又僧尼道士挾邪左道不依經律人間淫祀祅書諸珍怪事詳為條制並皆禁絶南史卷十陳本紀下第十詔禁屠殺含孕永年十一月甲申詔禁屠殺含孕以為永制己丑帝於式乾殿為諸僧朝臣講維摩詰經北史卷四魏本紀第四天保元年八月詔天保元年八月庚寅詔曰朕以虛薄嗣弘王業思所以讚揚盛績播之萬古雖史官執筆有聞無墜猶恐緒言遣美時或未書在位王公文武大小降及庶人爰至僧徒或親奉音旨或承傳旁說凡可載之文籍悉條封上北史卷七齊本紀中第七詔禁網捕鷹鷂天統五年春正月辛亥詔以金鳳等三台未入寺者施大興聖寺二月乙丑又詔禁網捕鷹鷂及畜養籠放之物夏四月甲子詔以并州尚書省為大基聖寺晉祠為大崇皇寺北史卷八齊本紀下第八辨釋三教先後佛教為後建德二年十二月癸巳集群官及沙門道士等帝升高座辨釋三教先後以儒教為先道教次之佛教為後北史卷十周本紀下第十頒舍利於諸州仁壽元年六月乙丑廢太學及州縣學唯留國子一學取正三品以上子七十二人充生頒舍利於諸州北史卷十一隋本紀上第十一違制之事悉宜停斷武德九年夏五月辛巳以京師寺觀不甚清淨詔曰釋伽闡教清淨為先遠離塵垢斷除貪欲所以弘宣勝業修植善根開導愚迷津梁品庶是以敷演經教檢約學徒調懺身心捨諸染著衣服飲食咸資四輩自覺王遷謝像法流行末代陵遲漸以虧濫乃有猥賤之侶規自尊高浮惰之人苟避徭役妄為剃度托號出家嗜欲無厭營求不息出入閭里周旋闤闠驅策田産聚積貨物耕織為生估販成業事同編戶跡等齊人進違戒律之文退無禮典之訓至乃親行劫掠躬自穿窬造作妖訛交通豪猾每罹憲綱自陷重刑黷亂真如傾毀妙法譬茲稂莠有積嘉苗類彼淤泥混夫清水又伽藍之地本曰淨居棲心之所理尚幽寂近代以來多立寺舍不求閒曠之境唯趨喧雜之方繕采崎嶇棟宇殊拓錯舛隱匿誘納奸邪或有接延廛邸鄰近屠酤埃塵滿室膻腥盈道徒長輕慢之心有虧崇敬之義且老氏垂化本貴沖虛養志無為遺情物外全真守一是謂玄門驅馳世務尤乖宗旨朕膺期馭宇興隆教法志思利益情在護持欲使玉石區分薰蕕有辨長存妙道永固福田正本澄源宜從沙汰諸僧尼道士女冠等有精勤練行守戒律者並令大寺觀居住給衣食勿令乏短其不能精進戒行有闕不堪供養者並令罷遣各還桑梓所司明為條式務依法教違制之事悉宜停斷京城留寺三所觀二所事竟不行舊唐書卷一高祖本紀令道士女冠僧尼等並盡禮致拜其父母顯慶二年六月己未朔皇子旭輪生乙丑初令道士女冠僧尼等並盡禮致拜其父母乙亥制蓬萊宮諸門殿亭等名舊唐書卷四高宗本紀上社稷陵寢寺宇等並依永淳已前故事神龍元年二月甲寅復國號依舊為唐社稷宗廟陵寢郊祀行軍旗幟服色天地日月寺宇台閣官名並依永淳已前故事舊唐書卷七中宗本紀改中興寺為龍興寺神龍三年二月庚寅改中興寺觀為龍興內外不得言中興舊唐書卷七中宗本紀天下濫度僧尼景龍元年天下濫度僧尼道士女冠並依舊舊唐書卷七睿宗本紀令道士女冠僧尼致拜父母開元二年春正月關中自去秋至於是月不雨人多饑乏遣使賑給制求直諫昌言弘益政理者名山大川並令祈祭丙寅紫微令姚崇上言請檢責天下僧尼以僞濫還俗者二萬餘人開元二年春正月閏月癸亥令道士女冠僧尼致拜父母舊唐書卷八玄宗本紀上詔綾錦花文不得用盤龍對鳳獅子萬字等大歷六年四月戊寅詔纂組文繡正害女紅今師旅未息黎元空虛豈可使淫巧之風有虧常制其綾錦花文所織盤龍對鳳麒麟獅子天馬辟邪孔雀仙鶴芝草萬字雙勝透背及大繝綿竭鑿六破已上並宜禁斷其長行高麗白錦大小花綾錦任依舊例織造有司明行曉諭舊唐書卷十一代宗紀詔自今更不得奏置寺觀及度人大歷十四年六月己亥朔詔自今更不得奏置寺觀及度人舊唐書卷十二德宗本紀上詔送岐州無憂王寺佛指骨岐州無憂王寺有佛指骨寸餘先是取來禁中供養乙亥詔送還本寺舊唐書卷十三德宗本紀命沙門道士文儒官討論三教貞元十二年四月庚辰上降誕日命沙門道士加文儒官討論三教上大悅舊唐書卷十三德宗本紀下詔僧尼道士全隸左右街功德使元和二年二月辛酉詔僧尼道士全隸左右街功德使自是祠部司封不復關奏舊唐書卷十四憲宗本紀上詔僧大通醫方不精穆宗詔曰山人柳泌輕懷左道上惑先朝固求牧人貴欲疑衆自知虛誕仍更遁逃僧大通醫方不精藥術皆妄既延禍釁俱是奸邪邦國固有常刑人神所宜共棄付京兆府決杖處死金吾將軍李道古貶循州司馬憲宗末年鋭於服餌皇甫鎛與李道古薦術人柳泌僧大通待詔翰林泌於台州為上鍊神丹上服之日加躁渴遽棄萬國舊唐書卷十六穆宗本紀詔五坊鷹隼並解放長慶二年十二月丁亥朔詔五坊鷹隼並解放獵具皆毀之舊唐書卷十六穆宗本紀憲宗朝有敕禁私度戒壇長慶四年十二月乙未徐泗王智興請置僧尼戒壇浙西觀察使李德裕奏狀論其奸幸時自憲宗朝有敕禁私度戒壇智興冒禁陳請蓋緣久不興置由是天下沙門奔走如不及智興邀其厚利由是致富時議醜之舊唐書卷十七上敬宗紀上盜銷錢為佛像者請以盜鑄錢論寶歷元年十月庚子朔河南尹王起奏盜銷錢為佛像者請以盜鑄錢論舊唐書卷十七上敬宗上唐武宗下敕毀佛寺等會昌五年夏四月敕祠部檢括天下寺及僧尼人數大凡寺四千六百蘭若四萬僧尼二十六萬五百秋七月庚子敕並省天下佛寺中書門下條疏聞奏據令式諸上州國忌日官吏行香於寺其上州望各留寺一所有列聖尊容便令移於寺內其下州寺並廢其上都東都兩街請留十寺寺僧十人敕曰上州合留寺工作精妙者留之如破落亦宜廢毀其合行香日官吏宜於道觀其上都下都每街留寺兩所寺留僧三十人上都左街留慈恩薦福右街留西明莊嚴中書又奏天下廢寺銅像鐘磬委鹽鐵使鑄錢其鐵像委本州鑄為農器金銀瑜石等像銷付度支衣冠士庶之家所有金銀銅鐵之像敕出後限一月納官如違委鹽鐵使依禁銅法處分其土木石等像合留寺內依舊又奏僧尼不合隸祠部請隸鴻臚寺其大秦穆護等祠釋教既已釐革邪法不可獨存其人並勒還俗遞歸本貫充稅戶如外國人送還本處收管八月制朕聞三代已前未嘗言佛漢魏之後像教浸興是由季時傳此異俗因緣染習蔓衍滋多以至於蠹耗國風而漸不覺誘惑人意而衆益迷洎於九州山原兩京城闕僧徒日廣佛寺日崇勞人力於土木之功奪人利於金寶之飾遺君親於師資之際違配偶於戒律之間壞法害人無逾此道且一夫不田有受其饑者一婦不蠶有受其寒者今天下僧尼不可勝數皆待農而食待蠶而衣寺宇招提莫知紀極皆云構藻飾僭擬宮居晉宋齊梁物力凋瘵風俗澆詐莫不由是而致也況我高祖太宗以武定禍亂以文理華夏執此二柄足以經邦豈可以區區西方之教與我抗衡哉貞觀開元亦嘗釐革劃除不盡流衍轉滋朕博覽前言旁求輿議弊之可革斷在不疑而中外誠臣協豫至意條疏至當宜在必行懲千古之蠹源成百王之典法濟人利衆豫何讓焉其天下所拆寺四千六百餘所還俗僧尼二十六萬五百人收充兩稅戶拆招提蘭若四萬餘所收膏腴上田數千萬頃收奴婢為兩稅戶十五萬人隸僧尼屬主客顯明外國之教勒大秦穆護祆三千餘人還俗不雜中華之風於戲前古未行似將有待及今盡去豈謂無時驅遊惰不業之徒已逾十萬廢丹雘無用之室何啻億千自此清淨訓人慕無為之理簡易齊政成一俗之功將使六合黔黎同歸皇化尚以革弊之始日用不知下制明廷宜體豫意舊唐書卷十八上武宗本紀唐武宗下敕會昌五年十月乙亥中書奏泛水縣武牢關是太宗擒王世充竇建德之地關城東峰有二聖塑容在一堂之內伏以山河如舊城壘猶存威靈皆盛於軒台風雲疑還於豐沛誠宜百代嚴奉萬邦式瞻西漢故事祖宗嘗行幸處皆令邦國立廟今緣定覺寺例合毀拆望取寺中大殿材木於東峰以造一殿四面置宮牆伏望名為昭武廟以昭聖祖武功之盛委懷孟節度使差判官一人勾當緣聖像年代已久望令李石於東都揀好畫手就增嚴飾初興功日望令東都差分司官一員薦告從之十一月甲辰敕悲田養病坊緣僧尼還俗無人主持恐殘疾無以取給兩京量給寺田賑濟諸州府七頃至十頃各於本管選耆壽一人勾當以充粥料舊唐書卷十八武宗本紀改寺名會昌五年留守李石因太微宮正殿圮陊以廢弘敬寺為太廟迎神主祔之又下百僚議皆言准故事無兩都俱置之禮唯禮部侍郎陳商議云周之文武有鎬洛二廟令兩都異廟可也然不宜置主於廟主宜依禮瘞於廟之北墉下事未行而武宗崩宣宗即位因詔有司迎太微宮寓主祔廢寺之新廟而知禮