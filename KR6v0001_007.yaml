夫李元龜奏請禁止天下僧尼典買院舍從之舊五代史卷八十四少帝紀第四詔廢無名額僧尼寺院五十八所廣順三年閏正月己酉開封府奏都城內録到無名額僧尼寺院五十八所詔廢之舊五代史卷一百一十二太祖紀第三詔限州郡寺數顯德二年五月甲戌詔曰釋氏貞宗聖人妙道助世勸善其利甚優前代以來纍有條貫近年已降頗紊規繩近覽諸州奏聞繼有緇徒犯法蓋無科禁遂至尤違私度僧尼日增猥雜創修寺院漸至繁多鄉村之中其弊轉甚漏綱背軍之輩苟剃削以逃刑行奸為盜之徒托住持而隱惡將隆教法須辨否臧宜舉舊章用革前弊諸道州府縣鎮村坊應有敕額寺院一切仍舊其無敕額者並仰停廢所有功德佛像及僧尼並騰並於合留寺院內安置天下諸縣城郭內若無敕額寺院祗於合停廢寺院內選功德屋宇最多者或寺院僧尼各留一所若無尼住祗留僧寺院一所諸軍鎮坊郭及二百戶已上者亦依諸縣例指揮如邊遠州郡無敕額寺院處於停廢寺院內僧尼各留兩所今後並不得創造寺院蘭若王公戚里諸道節刺已下今後不得奏請創造寺院及請開置戒壇男子女子如有志原出家者並取父母祖父母處分已孤者取同居伯叔兄處分侯聽許方得出家男年十五已上念得經文一百紙或讀得經文五百紙女年十三已上念得經文七十紙或讀得經文三百紙者經本府陳狀乞剃頭委録事參軍本判官試驗經文其未剃頭間須留髮髻如有私剃頭者卻勒還俗其本師主決重杖勒還俗仍配役三年兩京大名府京兆府青州各處置戒壇候受戒時兩京委祠部差官引試其大名府等三處祗委本判官録事參引試如有私受戒者其本人師主臨壇三綱知事僧尼並同私剃頭例科罪應合剃頭受戒人等逐處聞奏候敕下委祠部給付憑由方得剃頭受戒應男女有父母祖父母在別無兒息侍養不聽出家曾有罪犯遭官司刑責之人及棄背父母逃亡奴婢奸人細作惡逆徒黨山林亡命未獲賊徒負罪潛竄人等並不得出家剃頭如有寺院輒容受者其本人及師主三綱知事僧尼鄰房同住僧並仰收捉禁勘申奏取裁僧尼俗士自前多有捨身燒臂煉指釘截手足帶鈴掛燈諸般毀壞身體戲弄道具符禁左道妄稱變現還魂坐化聖水聖燈妖幻之類皆是聚衆眩惑流俗今後一切止絶如有此色人仰所在嚴斷遞配邊遠仍勒歸俗其所犯罪重者准格律處分每年造僧帳兩本其一本奏聞一本申祠部逐年四月十五日後勒諸縣取索管界寺院僧尼數目申州州司攢帳至五月終以前文帳到京僧尼籍帳內無名者並勒還俗其巡禮行腳出入往來一切取便是歲諸道供到帳籍所存寺院凡二千六百九十四所廢寺院凡三萬三百三十六僧尼係籍者六萬一千二百人舊五代史卷一百一十五世宗紀第二禁私度僧尼龍德元年三月丁亥朔禁私度僧尼新五代史卷三末帝本紀括西京寺觀太平興國四年五月優賞歸順將校盡括僧道隸西京寺觀官吏及高資戶授田河南宋史卷四太宗本紀一遣官謝天地宗廟寺觀嘉佑元年辛未司天監言自至和元年五月客星晨出東方守天關至是沒壬申遣官謝天地宗廟社稷寺觀諸祠宋史卷十二仁宗本紀四命宰臣祈福於宗廟寺觀嘉佑八年戊辰初御延和殿以疾未平命宰臣祈福於天地宗廟社稷及寺觀又禱于嶽瀆名山宋史卷十三英宗本紀佛改號大覺金仙僧為德士宣和元年春正月乙卯詔佛改號大覺金仙餘為仙人大士僧為德士易服飾稱姓氏寺為宮院為觀改女冠為女道尼為女德三月己未詔天下知宮觀道士與監司郡縣官以客禮相見宋史卷二十二徽宗本紀四詔德士並許入道學依道士法宣和元年五月丙午朔有物如龍形見京師民家丁未詔德士並許入道學依道士法宋史卷二十二徽宗本紀四復寺院額宣和二年六月丁亥復寺院額宋史卷二十二徽宗本紀四換給僧道度牒建炎四年正月己巳換給僧道度牒人輸錢十千宋史卷二十六高宗本紀三詔括寺觀田租建炎四年十一月詔諸路轉運司括借寺觀田租蘆場三年宋史卷二十六高宗本紀三賣度牒錢紹興元年三月庚子朔張浚進鬻田及賣度牒錢六十三萬緡助軍用宋史卷二十九高宗本紀六停給度僧牒紹興十二年五月丙午停給度僧牒宋史卷三十高宗本紀七命僧道納免丁錢紹興十五年正月辛未初命僧道納免丁錢宋史卷三十高宗本紀七減僧道免丁錢紹興二十九年九月丙申蠲中下戶所缺稅賦及江浙蝗潦州縣租丁酉減僧道免丁錢己亥蠲見監贓罰賞錢宋史卷三十一高宗本紀八鬻僧道度牒紹興三十一年二月乙丑復鬻僧道度牒宋史卷三十二高宗本紀九舉子不得以申韓佛書為學時科舉罷詞賦專用王安石經義且雜以釋氏之說凡士子自一語上非新義不得用學者至不誦正經唯竊安石之書以干進精熟者轉上第故科舉益弊公著始令禁主司不得出題老莊書舉子不得以申韓佛書為學經義參用古今諸儒說毋得專取王氏復賢良方正科宋史卷三百三十六呂公著傳求有名稱僧道加以恩命開運末契丹主兀欲立求有名稱僧道加以恩命惟憕隱不受宋史卷四百六十一方伎上蘇澄隱傳豫度牒告身浙西田畝有直千緡者似道均以四十緡買之數稍多豫銀絹又多豫度牒告身宋史卷四百七十四奸臣傳四無令佛寺徒費財用大定十四年四月乙丑上諭宰臣曰聞愚民祈福多建佛寺雖已條禁尚多犯者宜申約束無令徒費財用金史卷七世宗本紀中僧尼以後並聽拜父母明昌三年三月癸巳尚書省奏言事者謂釋道之流不拜父母親屬敗壞風俗莫此為甚禮官言唐開元二年敕云聞道士女冠僧尼不拜二親是為子而忘其生傲親而徇於末自今以後並聽拜父母其有喪紀輕重及尊屬禮數一准常儀臣等以為宜依典故行之制可金史卷九章宗本紀一敕長老大師大德不限年甲承安元年六月丁卯敕自今長老大師大德不限年甲長老大師許度弟子三人大德二人戒僧年四十以上者度一人其大定十五年附籍沙彌年六十以上並令受戒仍不許度弟子尼道士女冠亦如之御史大夫移剌仲方罷庚午幸環秀亭觀稼金史卷十章宗本紀二降僧道空名度牒承安二年四月甲子祈雨於社稷尚書省奏比歲北邊調度頗多請降僧道空名度牒紫褐師德號以助軍儲從之金史卷十章宗本紀二放僧道戒牒三千泰和二年十二月癸酉以皇子晬日放僧道戒牒三千金史卷十六宣宗本紀下賞募河西諸蕃部族寺僧元光元年二月乙酉陝西西路行省請以厚賞募河西諸蕃部族寺僧圖復大通城命行省樞密院籌之金史卷十六宣宗本紀下僧尼道女冠有師號許服花紗綾羅絲紬大定十三年太常寺擬士人及僧尼道女冠有師號並良閒官八品以上許服花紗綾羅絲紬金史卷四十三輿服志下釋道令十條泰和元年十二月所修律成名曰泰和律義自官品令職員令之下曰祠令四十八條雜令四十九條釋道令十條金史卷四十五刑志泰和六年寺觀則設綱首金史卷四十六食貨志一惟神佛像鍾等則存之大定十一年二月禁私鑄銅鏡舊有銅器悉送官給其直之半惟神佛像鍾磬鈸鈷腰束帶魚袋之屬則存之金史卷四十八食貨志三試僧尼道女冠三年一次掌凡禮樂祭祀燕享學校貢舉儀式制度符印表疏圖書冊命祥瑞天文漏刻國忌廟諱醫卜釋道四方使客諸國進貢犒勞張設之事凡試僧尼道女冠三年一次限度八十人差京府幕職或節鎮防禦佐二官二員僧官二人道官一人司吏一名從人各一人廚子二人把門官一名雜役三人僧童能讀法華心地觀金光明報恩華嚴等經共五部計八帙華嚴經分為四帙每帙取二卷卷舉四題讀百字為限尼童試經半部與僧童同道士女冠童行念道德救苦玉京山消災靈寶度人等經皆以誦成句依音釋為通中選者試官給據以名報有司凡僧尼官見管人及八十道士女冠及三十人者放度一名死者令監壇以度牒申部毀之金史卷五十五百官志一僧道官師德號度牒寺觀院額等並聽買之興定三年河南頗豐稔民間多積粟汝礪乃奏曰國家之務莫重於食乞於河南州府驗其物價低昂權宜立式凡內外四品以下雜正班散官及承蔭人免當儤使監官功酬或僧道官師德號度牒寺觀院額等並聽買之司縣官有能勸誘輸粟至三千石者將來注授升本榜首五千石以上遷官一階萬石以上升職一等並注見闕庶幾人知勸慕多所收穫上從之金史卷一百七高汝礪傳敕僧道也里可溫有家室不持戒律者占籍為民至元七年九月庚子敕僧道也里可溫有家室不持戒律者占籍為民十一月壬子河西諸郡諸王頓舍僧民協力供給元史卷七世祖本紀四詔諭歸附官吏士民軍匠僧道等各安己業至元十二年二月戊申詔諭江黃鄂嶽漢陽安慶等處歸附官吏士民軍匠僧道人等令農者就耒商者就塗士庶緇黃各安己業如或鎮守官吏妄有搔擾詣行中書省陳告元史卷八世祖本紀五名山大川寺觀廟宇不許拆毀至元十三年二月丁未詔諭臨安新附府州司縣官吏士民軍卒人等曰前代聖賢之後高尚儒醫僧道卜筮通曉天文歷數並山林隱逸名士仰所在官司具以名聞名山大川寺觀廟宇並前代名人遺跡不許拆毀鰥寡孤獨不能自存之人量加贍給元史卷九世祖本紀六禁西番僧持軍器至元十三年閏三月甲子禁西番僧持軍器元史卷九世祖本紀六敕西京搜索五臺僧匿逃奴至元十六年五月丙辰以五臺僧多匿逃奴及逋賦之民敕西京宣慰司按察司搜索之元史卷十世祖本紀七日本僧至元十六年八月戊子範文虎言臣奉詔征討日本比遣周福欒忠與日本僧繼詔往諭其國期以來年四月還報待其從否始宜進兵又請簡閲舊戰船以充用皆從之甲辰置大護國仁王寺總管府以散扎兒為達魯花赤李光祖為總管元史卷十世祖本紀七置五臺山建寺伐木至元二十年三月御史台臣言平灤造船五臺山造寺伐木及南城建新寺凡役四萬人乞罷之詔伐木建寺即罷之造船一事其與省臣議元史卷十二世祖本紀九江南營田提舉司掌僧寺資産至元二十七年戊午立江南營田提舉司秩從五品掌僧寺資産元史卷十六世祖本紀十三免征僧尼地租至元二十八年十二月己巳宣政院臣言宋全太后瀛國公母子以為僧尼有地三百六十頃乞如例免征其租從之元史卷十六世祖本紀十三帝師統領諸國僧尼釋教事至元二十八年十二月辛卯授吃剌思八斡節兒為帝師統領諸國僧尼釋教事元史卷十六世祖本紀十三僧官總統以下有妻者罷之至元三十年十月戊申僧官總統以下有妻者罷之元史卷十七世祖本紀十四僧道權勢之家私匿盜販至元三十一年五月戊寅禁諸司豪奪鹽船遞運官物僧道權勢之家私匿盜販元史卷十八成宗本紀一罷宣政院所刻河西藏經板至元三十一年十一月丁巳罷宣政院所刻河西藏經板元史卷十八成宗本紀一詔僧人犯奸盜詐僞聽有司專決大德二年三月戊子詔僧人犯奸盜詐僞聽有司專決輕者與僧官約斷約不至者罪之元史卷十九成宗本紀二罷江南諸路釋教總統所大德三年五月壬午五月壬午罷江南諸路釋教總統所元史卷二十成宗本紀三賜昭應宮興教寺地各百頃大德五年二月戊戌賜昭應宮興教寺地各百頃興教仍賜鈔萬五千錠上都乾元寺地九十頃鈔皆如興教之數萬安寺地六百頃鈔萬錠南寺地百二十頃鈔如萬安之數元史卷二十成宗本紀三詔僧官僧人犯罪御史台與內外宣政院同鞫大德六年正月庚戌詔自今僧官僧人犯罪御