見寵愛又與文惠太子同好釋氏甚相友悌子良敬信尤篤數於邸園營齊戒大集朝臣衆僧至賦食行水或躬親其事世頗以為失宰相體勸人為善未嘗厭倦以此終致盛名八年給三望車九年都下大水吳興偏劇子良開倉振救貧病不能立者於第北立廨收養給衣及藥武帝不豫詔子良甲仗入延昌殿侍醫藥子良啓進沙門於殿戶前誦經武帝為感夢見優曇鉢花子良案佛經宣旨使御府以銅為花插御床上角日夜在殿內太孫間日入參武帝暴漸內外惶懼百僚皆已變服物議疑立子良南史卷四十四齊武帝諸子竟陵文宣王子良傳周顒周顒音辭辨麗出言不窮宮商朱紫發口成句泛涉百家長於佛理著三宗論立空假名立不空假名設不空假名難空假名設空假名難不空假名假名空難二宗又立假名空西涼州智林道人遺顒書曰此義旨趣似非始開妙聲中絶六七十載貧道年二十時便得此義竊每歡喜無與共之年少見長安耆老多云關中高勝乃舊有此義當法集盛時能深得斯趣者本無多人過江東略是無一貧道捉麈尾來四十餘年東西講說謬重一時餘義頗見宗録唯有此塗白黑無一人得者為之發病非意此音猥來入耳始是真實行道第一功德其論見重如此每賓友會同顒虛席晤語辭韻如流聽者忘倦兼善老易與張融相遇輒以玄言相滯彌日不解清貧寡欲終日長蔬食雖有妻子獨處山舍衛將軍王儉謂顒曰卿山中何所食顒曰赤米白鹽緑葵紫蓼文惠太子問顒菜食何味最勝顒曰春初早韭秋末晚菘時何胤亦精信佛法無妻妾太子又問顒卿精進何如何胤顒曰三途八難共所未免然各有其纍太子曰所纍伊何封曰周妻何肉其言辭應變皆如此也胤兄點亦遁節清信顒與書勸今菜食曰丈人之所以未極遐蹈或在不近全菜邪脫灑離析之討鼎俎綱罟之興載之簡策其來實遠誰敢干議觀聖人之設膳修仍復為之品節蓋以茹毛飲血與生民共始縱而勿裁將無崖畔善為士者豈不以恕己為懷是以各靜封疆罔相陵軼況乃變之大者莫過死生生之所重無逾性命性命之於彼極切滋味之在我可賒而終身朝晡資之以永歲彼就冤殘莫能自列我業久長吁哉可畏且區區微卵脆薄易矜喘彼弱麑顧步宜愍觀其飲喙飛沈使人物憐悼況可心心撲褫加復恣忍吞嚼至乃野牧盛群閉豢重圈量肉揣毛以俟枝剝如土委地僉謂常理可為愴息事豈一途若云三世理誣則幸矣良快如使此道果然而受形未息則一往一來一生一死輪回是常事雜報如家人天如客遇客日鮮在家日多吾儕信業未足長免則傷心之慘行亦息念自及丈人於血氣之類雖無身踐至於晨鳧夜鯉不能不取備屠門財貝之一經盜手猶為廉士所棄生性之一啓鸞刀寧復慈心所忍騶虞雖饑非自死之草不食聞其風豈不使人多愧衆生之稟此形質以畜肌膋皆由其積壅癡迷沈流莫反報受穢濁歷苦酸長此甘與肥皆無明之報聚也何至復引此滋腴自污腸胃丈人得此有素聊復寸言發起耳南齊書卷四十一高逸周顒傳周顒宋明帝頗好玄理以周顒有辭義引入殿內親近宿直帝所為慘毒之事顒不敢顯諫輒誦經中因緣罪福事帝亦為之小止顒音辭辨麗長於佛理著三宗論言空假義西涼州智林道人遺顒書深相贊美言捉麈尾來四十餘載頗見宗録唯此途白黑無一人得者為之發病非意此音猥來入耳其論見重如此顒於鍾山西立隱舍休沐則歸之何胤亦精信佛法無妻太子又問顒卿精進何如何胤顒曰三途八難其所未免然各有纍太子曰纍伊何對曰周妻何肉其言辭應變如此南史卷三十四周朗傳附周顒傳僧紹與僧遠僧紹聞沙門釋僧遠風德往候定林寺太祖欲出寺見之僧遠問僧紹曰天子若來居士若為相對僧紹曰山藪之人政當鑿壞以遁若辭不獲命便當依戴公故事耳永明元年世祖敕召僧紹稱疾不肯見南齊書卷五十四高逸明僧紹傳何求之何求之仍住吳居波若寺足不逾戶人莫見其面明帝崩出奔國哀除為司空從事中郎不就乃除永嘉太守求時寄住南澗寺不肯詣台乞於寺拜受見許一夜忽乘小船逃歸吳隱虎丘山復除黃門郎不就杜按南史本傳文稍異意同故不録南齊書卷五十四高逸何求之傳劉虯劉虯精信釋氏衣粗布衣禮佛長齊注法華經自講佛義以江陵西沙洲去人遠乃徙居之建武二年詔征國子博士不就其冬虯病正晝有白雲徘徊檐戶之內又有香氣及磬聲其日卒年五十八南齊書卷五十四高逸劉虯傳劉虯劉虯精信釋氏衣粗布禮佛長齊注法華經自講佛義以江陵西沙洲去人遠乃徙居之建武二年詔征國子博士不就其冬虯病正晝有白雲徘徊檐戶之內又有香氣及磬聲其日卒年五十八虯子之遴之遴字思貞八歲能屬文虯曰此兒以文興吾宗常謂諸子曰若此之顏氏之遴得吾之文由是州里稱之時有沙門僧惠有異識每詣虯必呼之遴小字曰僧伽福德兒握手而進之南史卷五十劉虯傳劉之遴侯景初以蕭正德為帝劉之遴時落景所將使授璽紱之遴預知仍剃髮披法服乃免先是平昌伏挺出家之遴為詩嘲之曰傳聞伏不鬥化為支道林及之遴遇亂遂披染服時人笑之南史卷五十劉虯傳附劉之遴傳宗測宗測字敬微南陽人宋徵士炳孫也世居江陵測少靜退不樂人間測善畫自圖阮籍遇蘇門於行障上坐臥對之又畫永業佛影台皆為妙作頗好音律善易老續皇甫謐高士傳三卷又嘗游衡山七嶺著衡山廬山記南齊書卷五十四高逸宗測傳宗測宗測送弟喪還西仍留舊宅永業寺絶賓友唯與同志庾易劉虯宗人尚之等往來講說荊州刺史隨王子隆至鎮遣別駕宗欣口致勞問測笑曰貴賤理隔何以及此竟不答建武二年征為司徒主簿不就卒測善畫自圖阮籍遇蘇門於行鄣上坐臥對之又書永業佛影