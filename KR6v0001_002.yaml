貴不如持我首行免被奪取乃斬訓持首而行訓弟仲景再從弟戶部員外郎元皋皆伏法仇士良以宗密容李訓遣人縛入左軍責以不告之罪將殺之宗密怡然曰貧僧識訓年深亦知反叛然本師教法遇苦即救不愛身命死固甘心中尉魚弘志嘉之奏釋其罪舊唐書卷一百六十九李訓傳李訓與宗密李訓時時進賢才偉望以悅士心人皆惑之嘗建言天下浮屠避徭賦耗國衣食請行業不如令者還為民既執政自白罷因以市恩李訓既敗被緑衣詭言黜官走終南山依浮屠宗密宗密欲匿之其徒不可乃奔鳳翔為盩厔將所執械而東訓恐為宦人酷辱祈監者曰得我者有賞不如持首去乃斬之傳其首餘黨悉擒李訓死仇士良捕宗密將殺之怡然曰與訓游久浮屠法遇困則救死固其分乃釋之新唐書卷一百七十九李訓傳裴休裴休性寬惠為官不尚曒察而吏民畏服善為文長於書翰自成筆法家世奉佛休尤深於釋典太原鳳翔近名山多僧寺視事之隙游踐山林與義學僧講求佛理中年後不食葷血常齊戒屏嗜欲香爐貝典不離齊中詠歌贊唄以為法樂與尚書紇干臮皆以法號相字時人重其高潔而鄙其太過多以詞語嘲之休不以為忤舊唐書卷一百七十七裴休傳裴休裴休能文章書楷猶媚有體法為人溫藉進止雍閒宣宗嘗曰休真儒者然嗜浮屠法居常不御酒肉講求其說演繹附著數萬言習歌唄以為樂與紇干皋素善至為桑門號以相字當世嘲薄之而所好不衰新唐書卷一百八十二裴休傳惠范有胡僧惠范家富於財寶善事權貴太平公主與之私奏為聖善寺主加三品封公殖貨流於江劍公主懼玄宗英武乃連結將相專謀異計其時宰相七人五出公主門常元楷李慈掌禁兵常私謁公主先天二年七月玄宗在武德殿事漸危逼乃勒兵誅其黨竇懷貞蕭至忠岑羲等公主遽入山寺數日方出賜死於家公主諸子及黨與死者數十人籍其家財貨山積珍奇寶物侔於御府馬牧羊牧田園質庫數年征斂不盡惠范家産亦數十萬貫舊唐書卷一百八十三外戚武承嗣傳附太平公主傳惠范長安浮屠慧范畜資千萬諧結權近本善張易之及易之誅或言其豫謀者於是封上庸郡公月給奉稍主乳媼與通奏擢三品御史大夫御史魏傳光劾其奸贓四十萬請論死中宗欲赦之進曰刑賞國大事陛下賞已妄加矣又欲廢刑天下其謂何帝不得已削銀青階大夫薛謙光劾慧范不法不可貸太平公主為申理故謙光等反得罪新唐書卷八十三太平公主傳慧惠范桓彥范上書曰又道路籍籍皆云胡僧慧范托浮屠法詭惑后妃出入禁奧瀆撓朝政陛下嘗輕騎微服數幸其居上下汙慢君臣虧替臣謂興化致治以康父國家者繇進善而棄惡孔子曰執左道以亂政者殺假鬼神以危人者殺今慧范亂政危人者也不急誅且有變除惡務本願早裁之帝孱昏狃左右不能有所省納俄墨敕以方士鄭普思為祕書監葉靜能為國子祭酒彥范執不可帝曰要已用之不可止彥范曰陛下始復位制詔軍國皆用貞觀故事貞觀時以魏征虞世南顏師古為監以孔穎達為祭酒如普思等方伎猥下安足繼蹤前烈臣恐物議謂陛下官不擇才以天秩加私愛不從新唐書卷一百二十桓彥范傳惠范浮屠惠范倚太平公主協人子女崔隱甫劾狀反為所擠貶邛州司馬新唐書卷一百三十崔隱甫傳辨機會御史劾盜得浮屠辨機金寶神枕自言合浦公主所賜初浮屠廬主之封地會主與房遺愛獵見而悅之具帳其廬與之亂更以二女子從遺愛私餉億計至是浮屠殊死殺奴婢十餘主益望帝崩無哀容又浮屠智勖迎占禍福惠弘能視鬼道士李晃高醫皆私侍主新唐書卷八十三合浦公主傳薛懷義薛懷義者京兆戶縣人本姓馮名小寶以鬻台貨為業偉形神有膂力為市於洛陽得幸於千金公主侍兒公主知之入宮言曰小寶有非常材用可以近侍因得召見恩遇日深則天欲隱其跡便於出入禁中乃度為僧又以懷義非士族乃改姓薛令與太平公主壻薛紹合族令紹以季父事之自是與洛陽大德僧法明處一惠儼稜行感德感知靜軌宣政等在內道場念誦懷義出入乘廄馬中官侍從諸武朝貴匍匐禮謁人間呼為薛師垂拱初說則天於故洛陽城西修故白馬寺懷義自護作寺成自為寺主頗恃恩狂蹶其下犯法人不敢言右台御史馮思勖屢以法劾之懷義遇勖於途令從者毆之幾死又於建春門內敬愛寺別造殿宇改名佛授記寺垂拱四年拆乾元殿於其地造明堂懷義充使督作凡役數萬人曳一大木千人置號頭頭一闞千人齊和明堂大屋凡三層計高三百尺又於明堂北起天堂廣袤亞於明堂懷義以功拜左威衛大將軍封梁國公永昌中突厥默啜犯邊以懷義為清平道大總管率事擊之至單于台刻石紀功而還加輔大將軍進右衛大將軍改封鄂國公柱國賜帛二千段懷義與法明等造大雲經陳符命言則天是彌勒下生作閻浮提主唐氏合微故則天革命稱周懷義與法明等九人並封縣公賜物有差皆賜紫袈娑銀龜袋其僞大雲經頒於天下寺各藏一本令升高座講說則天將革命誅殺宗屬諸王唯千金公主以巧媚善進奉獨存抗疏請以則天為母因得曲加恩寵改邑號為延安大長公主加實封賜姓武氏以子克父娶魏王武承嗣女內門參問不限早晚見則盡歡長壽二年默啜復犯塞又以懷義為代北道行軍大總管以李多祚蘇宏暉為將未行改朔方道行軍大總管以內史李昭德為行軍長史鳳閣侍郎平章事蘇味道為行軍司馬契苾明曹仁師沙吒忠義等十八將軍以討之未行虜退乃止懷義後厭入宮中多居白馬寺刺血畫大像選有膂力白丁度為僧數滿千人侍御史周矩疑其奸奏請劾之不許固請之則天曰卿且退朕即令去矩至台薛師亦至乘馬踏階而下便坦腹於床矩召台吏將按之遽乘馬而去矩具以聞則天曰此道人風病不可苦問所度僧任卿勘當矩按之窮其狀以聞諸僧悉配遠州遷矩天官員外郎竟為薛師所構下獄免官後有御醫沈南璆得幸薛師恩漸衰恨怒頗甚證聖中乃焚明堂天堂並為灰燼則天愧而隱之又令懷義充使督作乃於明堂下置九州鼎鑄銅為十二屬形象置於本辰位皆高一丈懷義率人作號頭安置之其後益驕倨則天惡之令太平公主擇膂力婦人數十密防慮之人有發其陰謀者太平公主乳母張夫人令壯士縛而縊殺之以輦車載尸送白馬寺其侍者僧徒皆流竄遠惡處杜按新唐書不為薛懷義立傳舊唐書卷一百八十三外戚薛懷義傳薛懷義永昌元年五月己巳白馬寺僧薛懷義為新平道行軍大總管以擊突厥新唐書卷四則天皇后本紀薛懷義詔毀乾元殿為明堂以浮屠薛懷義為使督作懷義鄠人本馮氏名小寶偉岸淫毒佯狂洛陽市千金公主嬖之主上言小寶可入侍後召與私悅之欲掩跡得通籍出入使祝髮為浮屠拜白馬寺主詔與太平公主壻薛紹通昭穆紹父事之給廄馬中官為騶侍雖承嗣三思皆尊事惟謹至是護作士數萬巨木率一章千人乃能引又度明堂後為天堂鴻麗嚴奧次之堂成拜左威衛大將軍梁國公薛懷義寵稍衰而御醫沈南璆進懷義大望因火明堂太后羞之掩不發懷義愈很恣怏怏乃密詔太平公主擇健婦縛之殿中命建昌王武攸寧將作大匠宗晉卿率壯士擊殺之以畚車載尸還白馬寺懷義負幸昵氣蓋一時出百官上其從多犯法御史馮思勖劾其奸懷義怒遇諸道命左右歐之幾死弗敢言默啜犯塞拜新平伐逆朔方道大總管提十八將軍兵擊胡宰相李昭德蘇味道至為之長史司馬後厭入禁中陰募力少年千人為浮屠有逆謀侍御史周矩劾狀請治驗太后曰第出朕將使詣獄矩坐台少選懷義怒馬造廷直入坐大榻上矩召吏受辭懷義即乘馬去矩以聞太后曰是道人素狂不足治力少年聽窮劾矩悉投放醜裔懷義構矩俄免官自懷義死張易之昌宗得幸乃置控鶴府有監有丞及主簿録事等監三品以易之為之新唐書卷七十六后妃上則天皇后傳柳晟柳晟者肅宗皇后之甥涇師之亂從幸奉天晟密啓曰願受詔入京城遊說群賊冀其攜二德宗壯而許之晟與賊帥多有舊出入其門說誘之事泄為朱泚所擒械之於獄晟有力乃於獄中穿垣破械而遁落髮為僧間道歸行在遷將作少監杜按新唐書本傳落髮為僧作斷髮為浮屠間道歸行在作間歸奉天餘大同故不録舊唐書卷一百八十三外戚柳晟傳李源李源時年八歲為賊所俘轉徙流離凡七八年及史朝義走河北洛陽故吏有義源者贖之於民家代宗聞之授河南府參軍轉司農寺主簿以父李憕死禍難無心祿仕誓不婚妻不食酒肉洛陽之北惠林寺李憕之舊墅也源乃依寺僧寓居一室依僧齊戒人未嘗見其所習先穴地為墓預為終制時時偃仰於穴中長慶三年御史中丞李德裕表薦之曰處士李源即故禮部尚書東都留守贈司徒忠烈公李憕之少子天與忠孝嗣茲貞烈以父死國難哀纏終身自司農寺主簿絶心祿仕垂五十年暨於衰暮多依惠林佛寺本憕之墅也寺之正殿即憕之寢室源過殿必趨未嘗登踐隨僧一食已五十年其端心執孝無有不至抱此貞節棄於清朝臣竊為陛下惜之詔曰穆宗尋令中使賚手詔緋袍牙笏絹二百匹往洛陽惠林寺宣賜源受詔對中使苦陳疾甚年高不能趨拜附表謝恩其官告服色絹皆辭不受竟卒於寺杜按新唐書作李源依祠居閣戶日一食祠殿其先寢也每過心趨未始登階自營墓為終制時時偃臥埏中餘意大同故不贅録舊唐書卷一百八十七忠義李源傳王紹王紹宗少勤學遍覽經史尤工草隸家貧常傭力寫佛經以自給每月自支錢足即止雖高價盈倍亦即拒之寓居寺中以清淨自守垂三十年文明中徐敬業於揚州作亂聞其高行遣使征之紹宗稱疾固辭又令唐之奇親詣所居逼之竟不起舊唐書卷一百八十九儒學王紹宗傳楊炯楊炯俄遷詹事司直則天初坐從祖弟神讓犯逆左轉梓州司法參軍秩滿選授盈川令如意元年七月望日宮中出盂蘭盆分送佛寺則天御洛南門與百僚觀之炯獻盂蘭盆賦詞甚雅麗炯至官為政殘酷人吏動不如意輒榜殺之又所居府舍多進士亭台皆書榜額為之美名大為遠近所笑杜按新唐書本傳不記楊炯獻盂蘭盆賦等與佛教有關事舊唐書卷一百九十上文苑楊炯傳孫思邈孫思邈京兆華原人也七歲就學日誦千餘言弱冠善談莊老及百家之說兼好釋典上元元年辭疾請歸特賜良馬及鄱陽公主邑司以居焉當時知名之士宋令文孟詵盧照鄰等執師資之禮以事焉思邈嘗從幸九成宮照鄰留在其宅時庭前有病梨樹照鄰為之賦其序曰癸酉之歲余臥疾長安光德坊之官舍父老云是鄱陽公主邑司昔公主未嫁而卒故其邑廢時有孫思邈處士居之邈道合古今學殫數術高談正一則古之蒙莊子深入不二則今之維摩詰耳其推步甲乙度量乾坤則洛下閎安期先生之儔也孫思邈自注老子莊子撰千金方三十卷行於代又撰福祿論三卷攝生真録及枕中素書會三教論各一卷杜按新唐書本傳未有其兼好釋典及今之維摩詰耳等與佛教有關記載舊唐書卷一百九十一方伎孫思邈傳玄奘僧玄奘姓陳氏洛州偃師人大業末出家博涉經論嘗謂翻譯者多有訛謬故就西域廣求異本以參驗之貞觀初隨商人往游西域玄奘即辨博出群所在必為講釋論難蕃人遠近咸尊伏之在西域十七年經百餘國悉解其國之語仍采其山川謠俗土地所有撰西域記十二卷貞觀十九年歸至京師太宗見之大悅與之談論於是詔將梵本六百五十七部於弘福寺翻譯仍敕右僕射房玄齡太子左庶子許敬宗廣召碩學沙門五十餘人相助整比高宗在東宮為