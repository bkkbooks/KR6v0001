兄曜歷御史中丞彭城王義康驃騎長史卒官弘微哀戚過禮服雖除猶不啖魚肉沙門釋慧琳嘗與之食見其猶蔬素謂曰檀越素既多疾即吉猶未復膳若以無益傷生豈所望於得理弘微曰衣冠之變禮不可逾在心之哀實未能已遂廢食歔欷不自勝南史卷二十謝弘微傳僧達齊太祖駕幸莊嚴寺聽僧達道人講維摩坐遠不聞張緒言上難移緒乃遷僧達以近之南史卷二十一張裕傳附張緒傳劉義恭劉義恭就帝求一學義沙門會張敷赴假還江陵入辭文帝令以後車載沙門往謂曰道中可得言晤敷不奉詔曰臣性不耐雜上甚不悅南史卷三十二張邵傳附張敷傳張融張融建武四年病卒遺令建白旐無旒不設祭令人捉麈尾登屋復魂曰吾生平所善自當陵雲一笑三千買棺無制新衾左手執孝經老子右手執小品法華經妾二人哀事畢各遣還家曰吾生平之風調何至使婦人行哭失聲不須暫停閨閣南史卷三十二張邵傳附張融傳范泰范泰博覽篇籍好為文章愛獎後生孜孜無倦撰古今善言二十四篇及文集傳於世暮年事佛甚精於宅西立祇洹精舍南史卷三十三范泰傳釋寶志天監中有沙門釋寶志者嘗遇何敬容謂曰君後必貴然終是何敗何耳及敬容為相謂何姓當為其禍故抑沒宗族無仕進者至是竟為河東所敗中大同元年三月高祖幸同泰寺講金字三慧經敬容請預聽敕許之又有敕聽朔望問訊尋起為金紫光祿大夫未拜又加侍中何氏自晉司空充宋司空尚之世奉佛法並建立塔寺致敬容又舍宅東為伽藍趨勢者因助財造構敬容並不拒故此寺堂宇校飾頗為宏麗時輕薄者因呼之為衆造寺焉及敬容免職出宅止有常用器物及囊衣而已竟無餘財貨時亦以此稱之杜按南史本傳文稍異意同故不録梁書卷三十七何敬容傳釋寶志時有沙門釋寶志者不知何許人有於宋泰始中見之出入鍾山往來都邑年已五六十矣齊宋之交稍顯靈跡被發徒跣語默不倫或被錦袍飲啖同於凡俗恆以銅鏡剪刀鑷屬掛杖負之而趨或征索酒肴或纍日不食預言未兆識他心智一日中分身易所遠近敬赴所居噂𠴲齊武帝忿其惑衆收付建康獄旦日咸見遊行市里既而檢校猶在獄中其夜又語獄吏門外有兩輿食金鉢盛飯汝可取之果是文惠太子及竟陵王子良所供養縣令呂文顯以啓武帝帝乃迎入華林園少時忽重著三布帽變不知於何得之俄而武帝崩文惠太子豫章文獻王相繼薨齊亦於此季矣靈和寺沙門釋寶亮欲以納被遺之未及有言寶志忽來牽被而去蔡仲熊嘗問仕何所至了自不答直解杖頭左索繩擲與之莫之解仲熊至尚書左丞方知言驗永明中住東宮後堂從平旦門中出入末年忽云門上血污衣褰裳走過至鬱林見害果以犢車截尸出自此門舍故閹人徐龍駒宅而帝頸血流於門限焉梁武帝尤深敬事嘗門年祚遠近答曰元嘉元嘉帝欣然以為享祚倍宋文之年雖剃鬚髮而常冠帽下裙納袍故俗呼為志公好為讖記所謂志公符是也高麗聞之遣使繼綿帽供養天監十三年卒將死忽移寺金剛像出置戶外語人云菩薩當去旬日無疾而終先是琅邪王筠至莊嚴寺實志遇之與交言歡飲至亡敕命筠為碑蓋先覺也南史卷七十六隱逸下釋寶志傳蕭幾蕭幾字德玄齊曲江公遙欣子也釋褐著作佐郎廬陵王文學尚書殿中郎太子舍人掌管記遷庶子中書侍郎尚書左丞末年專尚釋教為新安太守郡多山水特其所好適性游履遂為之記梁書卷四十一蕭幾傳蕭幾蕭幾未年專尚釋教為新安太守郡多山水物其所好適性游履遂為之記南史卷四十一齊宗室蕭幾傳大球建平王大球字仁珽大寶元年封建平郡王邑二千戶性明慧夙成初侯景圍京城高祖素歸心釋教每發誓願恆云若有衆生應受諸苦悉衍身代當時大球年甫七歲聞而驚謂母曰官家尚爾兒安敢辭乃六時禮佛亦云凡有衆生應獲苦報悉大代受其早慧如此杜按南史本傳文稍略意同故不録梁書卷四十四建平王肖大球傳江紑江紑字含潔濟陽考城人也父蒨光祿大夫紑幼有孝性年十三父患眼紑侍疾將期月衣不解帶夜夢一僧云患眼者飲慧眼水必差及覺說之莫能解者紑第三叔祿與草堂寺智者法師善往訪之智者曰無量壽經云慧眼見真能渡彼岸蒨乃因智者啓捨同夏縣界牛屯里舍為寺乞賜嘉名敕答云純臣孝子往往感應晉世顏含遂見冥中送藥近見智者知卿第二息感夢云飲慧眼水慧眼則是五眼之一號若欲造寺可以慧眼為名及就創造泄故井井水清冽異於常泉依夢取水洗眼及煮藥稍覺有瘳因此遂差時人謂之孝感南康王為南徐州召為迎主簿紑性靜好老莊玄言尤善佛義不樂進仕及父卒紑廬於墓終日號慟不絶聲月餘卒杜按南史本傳文稍略意大同故不録梁書卷四十七孝行江紑傳江紑江紑字含潔幼有孝性年十三父蒨患眼侍疾將期月衣不解帶夜夢一僧云患眼者飲慧眼水必差及覺說之莫能解者紑第三叔祿與草堂寺智者法師善往訪之智者曰無量壽經云慧眼見真能度被岸倩乃因智者啓捨同夏縣界牛屯里舍為寺乞賜嘉名敕答云純臣孝子往往感應晉時顏含遂見冥中送藥又近見智者以卿第二息夢云飲慧眼水慧眼則五眼之一號可以慧眼為名及就創造泄故井井水清冽異於恆泉依夢取水洗眼及煮藥稍覺有瘳因此遂差時有謂之孝感南康王為徐州召為迎主簿紑性沈靜好莊老玄言尤善佛義不樂進仕及父卒紑廬於墓終日號慟不絶聲月餘乃卒南史卷三十六江夷傳附江紑傳江總及魏國通好敕以江總及徐陵攝官報聘總以疾不行侯景寇京都詔以總權兼太常卿守小廟台城陷總避難崎嶇纍年至會稽郡憩於龍華寺乃制修心賦略序時事其辭曰太清四年秋七月避地於會稽龍華寺此伽藍者余六世祖宋尚書右僕射州陵侯元嘉二十四年之所構也侯之王父晉護軍將彪昔蒞此邦卜居山陰都陽里貽厥子孫有終焉之志寺域則宅之舊基左江右湖面山背壑東西連跨南北紆縈聊與苦節名僧同銷日用曉修經戒夕覽圖書寢處風雲憑棲水月不意華戎莫辨朝市傾淪以此傷情情可知矣啜泣濡翰豈攄鬱結庶後生君子憫余此概焉奉盛德這鴻祀寓安禪之古寺實豫章之舊圃成黃金之勝地遂寂默之幽心若鏡中而遠尋面曾阜之超忽邇平湖之迥深山條偃蹇水葉侵淫掛猿朝落饑鼯夜吟果叢藥苑桃蹊橘林梢雲拂日結暗生陰保自然之雅趣鄙人間之荒雜望島嶼之邅回面江源之重沓泛流月之夜迥曳光煙之曉匝風引蜩而嘶噪雨鳴林而修颯鳥稍狎而知來雲無情而自合爾乃野開靈塔地築禪居喜園迢滯樂樹扶疏經行籍草宴坐臨渠持戒振錫度影甘蔬堅固之林可喻寂滅之場暫如異曲終而悲起非木落而悲始豈降志而辱身不露才而揚己鍾風雨之如晦倦雞鳴之聒耳幸避地而高棲憑調御之遺旨折四辨之微言悟三乘之妙理遣十纏之繫縛祛五惑之塵滓久遺榮於勢利庶忘纍於妻子感意氣於疇日寄知音於來祀何遠客之可悲知自憐其何已總嘗自敘其略曰弱歲歸心釋教年二十餘入鍾山就靈曜寺則法師受菩薩戒暮齒官陳與攝山布上人游款深悟苦空更復練戒運善於心行慈於物頗知自勵而不能蔬菲尚染塵勞以此負愧平生耳此總之自敘時人謂之實録陳書卷二十七江總傳劉霽劉霽字士烜平原人也母明氏寢疾霽年已五十衣不解帶者七旬誦觀世音經數至萬遍夜因感夢見一僧謂曰夫人算盡君精誠篤至當相為申延後六十餘日乃亡梁書卷四十七孝行劉霽傳劉霽劉霽母明氏寢疾霽年已五十衣不解帶者七旬誦觀世音經數萬遍夜中感夢見一僧謂曰夫人算盡君精誠篤志當相為申延後六十餘日乃亡霽廬於墓哀慟過禮常有雙白鶴循翔廬側處士阮孝緒致書抑譬焉霽思慕不已未終喪而卒著釋俗語八卷文集十卷南史卷四十九劉懷珍傳附劉霽傳劉協劉協字彥和東莞莒人協早孤篤志好學家貧不婚娶依沙門僧佑與之居處積十餘年遂博通經論因區別部類録而序之今定林寺經藏協所定也然協為文長於佛理京師寺塔及名僧碑志必請協制文有敕與慧震沙門於定林寺撰經證功畢遂啓求出家先燔鬢髮自誓敕許之乃於寺變服改名慧地未期而卒文集行於世梁書卷五十文學下劉協傳劉協劉協字彥和東莞莒人也父尚越騎校尉協早孤篤志好學家貧不婚娶依沙門僧佑居遂博通經論因區別部類録而序之定林寺經藏協所定也協為文長於佛理都下寺塔及名僧碑志必請協制文敕與慧震沙門於定林寺撰經證功畢遂求出家先燔鬚髮自誓敕許之乃變服改名慧地云南史卷七十二文學劉協傳劉杳劉杳治身清儉無所嗜好為性不自伐不論人短長及睹釋氏經教常行慈忍天監十七年自居母憂便長斷腥膻持齊蔬食及臨終遣命斂以法服載以露車還葬舊墓隨得一地容棺而已不得設靈筵祭醊其子遵行之杜按南史本傳無及睹釋氏經教常行慈忍等語餘略同故不録梁書卷五十文學下劉杳傳謝征謝征又為臨汝侯淵猷制放生文亦見賞於世杜按南史本傳文同故不録梁書卷五十文學下謝征傳伏挺伏挺後遂出仕尋除南台治書因事納賄當被推劾挺懼罪遂變服為道人久之藏匿後遇赦乃出天心寺會邵陵王為江州攜挺之鎮王好文義深被恩禮挺因此還俗杜按南史本傳同大同故不録梁書卷五十文學下伏挺傳任孝恭任孝恭字孝恭臨淮人也外祖丘它與高祖有舊高祖聞其有才學召入西省撰史初為奉朝請進直壽光省為司文侍郎俄兼中書通事舍人敕遣制建陵寺剎下銘孝恭少從蕭寺雲法師讀經論明佛理至是蔬食持戒信受甚篤而性頗自伐以才能尚人於時輩中多有忽略世以此少之梁書卷五十文學下任孝恭傳任孝恭敕遣任孝恭制建陵寺剎下銘又啓撰武帝集序文並富麗自是專掌公家筆翰孝恭為文敏速若不留思每奏稱善纍賜金帛少從蕭寺雲法師讀經論明佛理至是蔬食持戒信受甚篤而性頗自伐以才能尚人於流輩中多有忽略世以此少之南史卷七十二文學任孝恭傳何點何點字子晰廬江灊人也及長感家禍欲絶婚宦尚之強為之娶琅邪王氏禮畢將親迎點纍涕泣求執體志遂得罷司徒竟陵王子良欲就見之點時在法輪寺子良乃往請點角巾登席子良欣悅無已遺點嵇叔夜酒杯徐景山酒鐺點少時嘗患渴痢積歲不愈後在吳中石佛寺建講於講所晝寢夢一道人形貌非常授丸一掬夢中服之自此而差時人以為淳德所感點既老又娶魯國孔嗣女嗣亦隱者也點雖婚亦不與妻相見築別室以處之人莫諭其意也吳國張融少時免官而為詩有高尚之言點答詩曰昔聞東都日不在簡書前雖戲也而融久病之及點後婚融始為詩贈點曰惜哉何居士薄暮遘荒淫點亦病之而無以釋也梁書卷五十一處士何點傳何胤何胤字子季點之弟也年八歲居憂哀毀若成人既長好學師事沛國劉瓛受易及禮記毛詩又入鍾山定林寺聽內典其業皆通胤雖貴顯常懷止足聞謝朏罷吳興郡不還胤恐後之乃以拜表辭職不待報輒去明帝大怒使御史中丞袁昂奏收胤尋有詔許之胤以會稽山多靈異往游焉居若邪山雲門寺初胤二兄求點並棲遁求先卒至是胤又隱世號點為大山胤為小山亦曰東山胤年登祖壽乃移還吳作別山詩一首言甚淒愴至吳居虎丘西寺講經論學徒復隨之東境守宰經途者莫不畢至胤常禁殺有虞人逐鹿鹿徑來趨胤伏而不動又有異鳥如鶴紅色集講堂馴狎如家禽焉初開善寺藏法師與胤遇於秦望後還都卒於鍾山其死日胤在般若寺見一僧授胤香爐奩並函書云呈何居士言訖失所在胤開函乃是大莊嚴論世中未有又於寺內立明珠柱乃七日七夜放光太守何遠以狀啓昭明太子欽其德遣舍人何思澄致手令以褒美之胤注百法論十二門論各一卷注周易十卷毛詩總集六卷毛詩隱義十卷禮記隱義二十卷禮答問五十卷梁書卷五十一處士何胤傳何點與何胤何點門世信佛從弟遁以東籬門園居之德璋為築室焉園有卞忠貞冢點植花於冢側每飲必舉酒酌之招攜勝侶及名德桑門清言賦詠優遊自得後點在法輪寺子良就見之點角巾登席子良欣悅無已遺點嵇叔夜酒杯徐景山酒鎗點少時嘗患渴利積歲不愈後在吳中石佛寺建講於講所晝寢夢一道人形貌非常授丸一掬夢中服之自此而差時人以為淳德所感性通侻好施遠近致遺一無所逆隨復散焉嘗行經朱雀門街有自車後盜點衣者見而不言旁人擒盜與之點乃以衣施盜盜不敢受點令告有司盜懼乃受之永元中崔慧景圍城人間無薪點悉伐園樹以贍親黨慧景性好佛義先慕交點點不顧之至是乃逼召點點裂裙為褲往赴其軍終日談說不及軍事何胤以會稽山多靈異往游焉居若邪山雲門寺初胤二兄求點並棲遁求先卒至是胤又隱世號點為大山胤為小山亦曰東山兄弟發跡雖異克終皆隱世謂何氏三高何胤至吳居武丘山西寺講經論學僧復隨之東境守宰經途者莫不畢至胤常禁殺有虞人逐鹿鹿徑來趨胤伏而不動又有異鳥如鶴紅色集講堂馴狎如家禽初開善寺藏法與胤遇於秦望山後還都卒於鍾山死日胤在波若寺見一名僧授胤香爐奩並函書云貧道發自揚都呈何居士言訖失所在胤開函乃是大莊嚴論世中未有訪之香爐乃藏公所常用又於寺內立明珠柱柱乃七日七夜放光太守何遠以狀啓昭明太子太子欽其德遣舍人何思澄致手令以褒美之中大通三年卒年八十六初胤侈於味食必方丈後稍欲去甚者猶食白魚鱔脯糖蟹以為非見生物汝南周顒與胤書勸令食菜曰變之大者莫過死生生之所重無逾性命性命之於彼極切滋味之在我可賒若云三世理誣則幸矣良快如使此道果然而受形未息一往一來生死常事則傷心之慘行亦自及丈人於血氣之類雖不身踐至於晨鳧夜鯉不能不取備屠門財貝之經盜手猶為廉士所棄生性之一啓鑾刀寧復慈心所忍騶虞雖饑非自死之草不食聞其風者豈不使人多愧丈人得此有素聊復片言發起耳故胤末年遂絶血味胤注百論十二門論各一卷注周易十卷毛詩總集六卷毛詩隱義十卷禮記隱義二十卷禮答問五十五卷子撰亦不仕有高風初沙門釋寶志嘗謂何敬容曰君後必貴終是何敗耳及敬容為宰相謂何姓當為其禍故抑沒宗族無仕進者至是竟河東所敗中大同元年三月武帝幸同泰寺講金字三慧經敬容啓預聽敕許之又起為金紫光祿大夫未拜又加侍中敬容舊時賓客門生喧譁如昔冀其復用何氏自晉司空充宋司空尚之奉佛法並建立塔寺至敬容又舍宅東為伽藍趨權者因助財造構敬容並不拒故寺堂宇頗為宏麗時輕薄者因呼為衆造寺及敬容免職出宅止有常用器物及囊衣而已竟無餘財貨時亦以此稱之敬容特為從兄胤所親愛胤在若邪山嘗疾篤有書云田疇館宇悉奉衆僧書經並歸從弟敬容其見知如此南史卷三十何尚之傳附阮孝緒阮孝緒字士宗陳留尉氏人也幼至孝性沉靜雖與兒童遊戲恆以穿池築山為樂年十三遍通五經十五冠而見其父彥之誡曰三加彌尊人倫之始宜思自勖以庇爾躬答曰願跡松子於瀛海追許由於穹谷庶保促生以免塵纍自是屏居一室非定省未嘗出戶家人莫見其面親友因呼為居士其恆所供養石像先有損壞心欲治補經一夜忽完復衆並異之杜按南史本傳無其恆所供養石像等語餘略同故未録梁書卷五十一處士阮孝緒傳陶弘景陶弘景字通明丹陽秣陵人也天監四年移居積金東澗善辟榖導引之法年逾八十而有壯容深慕張良之為人云古賢莫比曾夢佛授其菩提記名為勝力菩薩乃詣鄮縣阿育王塔自誓受五大戒後太宗臨南徐州欽其風素召至後堂與談論數日而去太宗甚敬異之大通初令獻二刀於高祖其一名善勝一名威勝並為佳寶大同二年卒時年八十五顏色不變屈申如恆詔贈中散大夫諡曰貞白先生仍遣餘人監護喪事弘景遺令薄葬弟子尊而行之梁書卷五十一處士陶弘景傳陶弘景天監四年陶弘景移居積金東澗弘景善辟榖導引之法自隱處四十許年年逾八十而有壯容仙書云眼方者壽千歲弘景末年一眼有時而方曾夢佛授其菩提記云名為勝力菩薩乃詣鄮縣阿育王塔自誓受五大戒後簡文臨南徐州欽其風素召至後堂以葛巾進見與談論數日而去簡文甚敬異之天監中獻丹於武帝中大通初又獻二刀其一名善勝一名威勝並為佳寶無疾自知應逝逆克亡日仍為告逝詩大同二年卒時年八十一顏色不變屈申如常香氣纍日氛氳滿山遺令既沒不須沐浴不須施床止兩重席於地因所著舊衣上加生裓裙及臂衣靺冠巾法服左肘録鈴右肘藥鈴佩符絡左腋下繞腰穿環結於前叉符於髻上通以大袈裟覆衾蒙首足明器有車馬道人道士並在門中道人左道士右百日內夜常燃燈旦常香火弟子遵而行之詔贈太中大夫諡曰貞白先生南史卷七十六隱逸下陶弘景傳劉慧斐劉慧斐字文宣彭城人也少博學能屬文起家安成王法曹行參軍嘗還都途經尋陽遊於匡山過處士張孝秀相得甚歡遂有終焉之志因不仕居於東林寺又於山北構園一所號曰離垢園時人乃謂為離垢先生慧斐尤明釋典工篆隸在山手寫佛經二千餘卷常所誦者百餘卷晝夜行道孜孜不怠遠近欽慕之太宗臨江州遺以几杖論者