body:
  text: 二人物楚王英楚王英以建武十五年封為楚公十七年進爵為王二十八年就國英少時好遊俠交通賓客晚節更喜黃老學為浮屠齊戒祭祀八年詔命天下死罪皆入縑贖英遣郎中令奉黃縑白紈三十匹詣國相曰托在蕃輔過惡纍積歡喜大恩奉送縑帛以贖愆罪國相以聞詔報曰楚王誦黃老之微言尚浮屠之仁祠潔齊三月與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌因以班示諸國中傳英後遂大交通方士作金龜玉鶴刻文字為符瑞後漢書卷四十二楚王英傳陶謙陶謙字恭祖丹陽人也少為諸生仕州郡四遷為車騎將軍張溫司馬西討邊章會徐州黃巾起以謙為徐州刺史擊黃巾大破走之境內晏然初同郡人笮融聚衆數百往依于謙謙使督廣陵下邳彭城運糧遂斷三郡委輸大起浮屠寺上纍金盤下為重樓又堂閣周回可容三千許人作黃金塗像衣以錦彩每浴佛輒多設飲飯布席於路其有就食及觀者且萬餘人及曹操擊謙徐方不安融乃將男女萬口馬三千匹走廣陵廣陵太守趙昱待以賓禮融利廣陵資貨遂乘酒酣殺昱放兵大掠因以過江南奔豫章殺郡守朱皓入據其城後為楊州刺史劉繇所破走入山中為人所殺後漢書卷七十三陶謙傳孫綽孫綽字興公博學善屬文少與高陽許詢俱有高尚之志綽與詢一時名流或愛詢高邁則鄙於綽或受綽才藻而無取於詢沙門支遁試問綽君何如許答曰高情遠致弟子早已伏膺然一詠一吟許將北面矣絶重張衡左思之賦每云三都二京五經鼓吹也嘗作天臺山賦辭致甚工初成以示友人范榮期云卿試擲地當作金石聲也榮期曰恐此金石非中宮商然每至佳句輒云應是我輩語除著作佐郎襲爵長樂侯晉書卷五十六孫楚傳附孫綽傳郗超郗超性好聞人棲遁有能辭榮拂衣者超為之起屋宇作器服畜僕豎費百金而不吝又沙門支遁以清談著名於時風流勝貴莫不崇敬以為造微之功足參諸正始而遁常重超以為一時之俊甚相知賞超無子從弟儉之以子僧施嗣晉書卷六十七郗鑒傳附郗超王坦之初王坦之與沙門竺法師甚厚每共論幽明報應便要先死者當報其事後經年師忽來云貧道已死罪福皆不虛惟當勤修道德以升濟神明耳言訖不見坦之尋亦卒時年四十六臨終與謝安桓沖書言不及私惟憂國家之事朝野甚痛惜之追贈安北將軍諡曰獻晉書卷七十五王湛傳附王坦之傳何充何充居宰相雖無澄正改革之能而強力有器局臨朝正色以社稷為己任凡所選用皆以功臣為先不以私恩樹親戚談者以此重之然所昵庸雜信任不得其人而性好釋典崇修佛寺供給沙門以百數糜費巨億而不吝也親友至於貧乏無所施遺以此獲譏於世阮裕嘗戲之曰卿志大宇宙勇邁終古充問其故裕曰我圖數千戶郡尚未能得卿圖作佛不亦大乎於時郗愔及弟曇奉天師道而充與弟准崇信釋氏謝萬譏之云二郗諂於道二何佞於佛充能飲酒雅為劉惔所貴惔每云見次道飲命人欲傾家釀言其能溫克也晉書卷七十七何充傳王恭王恭性抗直深存節義讀左傳至奉王命討不庭每輟卷而歎為性不弘以暗於機會自在北府雖以簡惠為政然自矜貴與下殊隔不閒用兵尤信佛道調役百姓修營佛寺務在壯麗士庶怨嗟臨刑猶誦佛經自理鬚鬢神無懼容謂監刑者曰我暗於信人所以致此原其本心豈不忠於社稷但令百代之下知有王恭耳家無財帛唯書籍而已為識者所傷晉書卷八十四王恭傳法泉初苻堅建元之末徙江漢之人萬餘戶於敦煌又以前表未報復遣沙門法泉間行奉表曰遙途險曠未知達不晉書卷八十七涼武昭王李玄盛傳佛圖澄佛圖澄天竺人也本姓帛氏少學道妙通玄術永嘉四年來適洛陽自云百有餘歲常服氣自養能積日不食善誦神咒能役使鬼神腹旁有一孔常以絮塞之每夜讀書則拔絮孔中出光照於一室又嘗齊時平旦至流水側從腹旁孔中引出五藏六府洗之訖還內腹中又能聽鈴音以言吉凶莫不懸驗及洛中寇亂乃潛草野以觀變石勒屯兵葛陂專行殺戮沙門遇害者甚衆澄投勒大將軍郭黑略家黑略每從勒征伐輒豫克勝負勒疑而問曰孤不覺卿有出衆智謀而每知軍行吉凶何也黑略曰將軍天挺神武幽靈所助有一沙門智術非常云將軍嘗略有區夏已應為師臣前後所白皆其言也勒召澄試以道術澄即鉢盛水燒香咒之須臾鉢中生青蓮花光色曜日勒由此信之勒自葛陂還河北過枋頭枋頭人夜欲斫營澄謂黑略曰須臾賊至可令公知果如其言有備故不敗勒欲試澄夜冠胄衣甲執刀而坐遣人告澄云夜來不知大將軍何所在使人始至未及有言澄逆問曰平居無寇何故夜嚴勒益信之勒後因忿欲害諸道士並欲苦澄澄乃潛避至黑略舍語弟子曰若將軍信至問吾所在者報云不知所之既而勒使至覓澄不得使還報勒勒驚曰吾有惡意向澄澄捨我去矣通夜不寢思欲見澄澄知勒意悔明旦造勒勒曰昨夜何行澄曰公有怒心昨故權避公今改意是以敢來勒大笑曰道人謬矣襄國城塹水源在城西北五里其水源暴竭勒問澄何以致水澄曰今當敕龍取水乃與弟子法首等數人至故泉源上坐繩床燒安息香咒願數百言如此三日水泫然微流有一小龍長五六寸許隨水而來諸道士競往視之有頃水大至隍塹皆滿鮮卑段末波攻勒衆甚盛勒懼問澄澄曰昨日寺鈴鳴云明旦食時當擒段末波勒登城望末波軍不見前後失色曰末波如此豈可獲乎更遣夔安問澄澄曰已獲末波矣時城北伏兵出遇未波執之澄勸勒宥末波遣還本國勒從之卒獲其用劉曜遣從弟嶽攻勒勒遣石季龍距之嶽敗退保石梁塢季龍堅柵守之澄在襄國忽歎曰劉嶽可憫弟子法祚問其故澄曰昨日亥時嶽已敗被執果如所言及曜自攻洛陽勒將救之其群下咸諫以為不可勒以訪澄澄曰相輪鈴音云秀支替戾岡僕谷劬禿當此羯語也秀支軍也替戾岡出也僕谷劉曜胡位也劬禿當捉也此言軍出捉得曜也又令一童子潔齊七日取麻油合胭脂躬自開於掌中舉手示童子粲然有輝童子驚曰有軍馬甚衆見一人長大白晰以朱絲縛其肘澄曰此即曜也勒甚悅遂赴洛距曜生擒之勒僭稱趙天王行皇帝事敬澄彌篤時石蔥將叛澄誡勒曰今年蔥中有蟲食必害人可令百姓無食蔥也勒班告境內慎無食蔥俄而石蔥果走勒益重之事必咨而後行號曰大和尚勒愛子斌暴病死將殯勒歎曰朕聞虢太子死扁鵲能生之今可得效乎乃令告澄澄取楊枝沾水灑而咒之就執斌手曰可起矣因此遂蘇有頃平復自是勒諸子多在澄寺中養之勒死之年天靜無風而塔上一鈴獨鳴澄謂衆曰鈴音云國有大喪不出今年矣既而勒果死及季龍僭位遷都於鄴傾心事澄有重於勒下書衣澄以綾錦乘以雕輦朝會之日引之升殿常侍以下悉助舉輿太子諸公扶翼而上主者唱大和尚衆坐皆起以彰其尊又使司空李農旦夕親問其太子諸公五日一朝尊敬莫與為比支道林在京師聞澄與諸石游乃曰澄公其以季龍為海鷗鳥也百姓因澄故多奉佛皆營造寺廟相競出家真僞混淆多生愆過季龍下書料簡其著作郎王度奏曰佛外國之神非諸華所應祠奉漢代初傳其道惟聽西域人得立寺都邑以奉其神漢人皆不出家魏承漢制亦循前軌今可斷趙人悉不聽詣寺燒香禮拜以遵典禮其百辟卿士下逮衆隸例皆禁之其有犯者與淫祀同罪其趙人為沙門者還服百姓朝士多同度所奏季龍以澄故下書曰朕出自邊戎忝君諸夏至於饗祀應從本俗佛是戎神所應兼奉其夷趙百姓有樂事佛者特聽之澄時止鄴城寺中弟子遍於郡國嘗遣弟子法常北至襄國弟子法佐從襄國還相遇於梁基城下對車夜談言及和尚比旦各去佐始入澄逆笑曰昨夜爾與法常交車共說汝師邪佐愕然愧懺於是國人每相語莫起噁心和尚知汝及澄之所在無敢向其方面涕唾者季龍太子邃有二子在襄國澄語邃曰小阿彌比當得疾可往看之邃即馳信往視果已得疾太醫殷騰及外國道士自言能療之澄告弟子法牙曰正使聖人復出不愈此疾況此等乎後三日果死邃將圖為逆謂內豎曰和尚神通倘發吾謀明日來者當先除之澄月望將入覲季龍謂弟子僧慧曰昨夜天神呼我曰明日若入還勿過人我倘有所過汝當止我澄常入必過邃邃知澄入要候甚苦澄將上南台僧慧引衣澄曰事不得止坐未安便起邃固留不住所謀遂差還寺歎曰太子作亂其形將成欲言難言欲忍難忍乃因事從容針季龍季龍終不能解俄而事發方悟澄言後郭黑略將兵征長安北山羌墮羌伏中時澄在堂上坐慘然改容曰郭公今有厄乃唱云衆僧祝願澄又自祝願須臾更曰若東南出者活餘向者則困復更祝願有頃曰脫矣後月餘黑略還自說墜羌圍中東南走馬乏正遇帳下人推馬與之曰公乘此馬小人乘公馬濟與不濟命也略得其馬故獲免推檢時日正是澄祝願時也時天旱季龍遣其太子詣臨漳西滏口祈雨久而不降乃令澄自行即有白龍二頭降於祠所其日大雨方數千里澄嘗遣弟子向西域市香既行澄告餘弟子曰掌中見買香弟子在某處被劫垂死因燒香祝願遙救護之弟子後還云某月某日某處為賊所劫垂當見殺忽聞香氣賊無故自驚曰救兵已至棄之而走黃河舊不生黿時有得者以獻季龍澄見而歎之曰桓溫入河其不久乎溫字元子後果如其言也季龍嘗晝寢夢見群羊負魚從東北來寤以訪澄澄曰不祥也鮮卑其有中原乎後亦皆驗澄嘗與季龍升中台澄忽驚曰變變幽州當火災乃取酒噀之久而笑曰救已得矣季龍遣驗幽州云爾日火從四門起西南黑雲來驟雨滅之雨亦頗有酒氣石宣將殺石韜宣先至寺與澄同坐浮屠一鈴獨鳴澄謂曰解鈴音乎鈴云鬍子洛度宣變色曰是何言歟澄謬曰老胡為道不能山居無言重茵美服豈非洛度乎石韜後至澄孰視良久韜懼而問澄澄曰怪公血臭故相視耳季龍夢龍飛西南自天而落旦而問澄澄曰禍將作矣宜父子慈和深以慎之季龍引澄入東閣與其後杜氏問訊之澄曰脅下有賊不出十日自浮圖以西此殿以東當有血流慎勿東也杜後曰和尚耄邪何處有賊澄即易語云六情所受皆悉是賊老自應耄但使少者不昏即好耳遂便寓言不復彰的後二日宣果遣人害韜於佛寺中欲因季龍臨喪殺之季龍以澄先誡故獲免及宣被收澄諫季龍曰皆陛下之子也何為重禍邪陛下若含怒加慈者尚有六十餘歲如必誅之宣當為彗星下掃鄴宮季龍不從後月餘有一妖馬髦尾皆有燒狀入中陽門出顯陽門東首東宮皆不得入走向東北俄爾不見澄聞而歎曰災其及矣季龍大享群臣於太武前殿澄吟曰殿乎殿乎棘子成林將壞人衣季龍令發殿石下視之有棘生焉冉閔小字棘奴季龍造太武殿初成圖畫自古賢聖忠臣孝子烈士貞女皆變為胡狀旬餘頭悉縮人肩中惟冠䯰仿佛微出季龍大惡之祕而不言也澄對之流涕乃自啓塋墓於鄴西紫陌還寺獨語曰得三年乎自答不得又曰得二年一年百日一月乎自答不得遂無復言謂弟子法祚曰戊申歲禍亂漸萌己酉石氏當滅吾及其未亂先從化矣卒於鄴宮寺後有沙門從雍州來稱見澄西入關季龍掘而視之惟有一石而無尸季龍惡之曰石者朕也葬我而去吾將死矣因而遇疾明年季龍死遂大亂晉書卷九十五藝術佛圖澄佛圖澄劉曜敗季龍於高候遂圍洛陽佛圖澄亦謂勒曰大軍若出必擒劉曜勒尤悅使內外戒嚴有諫者斬晉書卷一百五石勒載記下佛圖澄鄴西山石間血流出長十餘步廣二尺餘太武殿畫古賢悉變為胡旬餘頭悉縮入肩中季龍大惡之佛圖澄對之流涕晉書卷一百六石季龍載記上麻襦麻襦者不知何許人也莫得其姓名石季龍時在魏縣市中乞丐恆著麻襦布裳故時人謂之麻襦言語卓越狀如狂者乞得米榖不食輒散置大路云飴天馬趙興太守籍狀收送詣季龍先是佛圖澄謂季龍曰國東二百里某月日法送一非常人勿殺之也如期果至季龍與共語了無異言惟道陛下當終一柱殿下季龍不解送以詣澄麻襦謂澄曰昔在光和中會奄至今日酉戎受玄命絶歷終有期金離消於壤邊荒不能遵驅除靈期跡莫已已之懿裔苗葉繁其來方積休期於何期永以歎之澄曰天回運極否將不支九木水為難無可以術寧玄哲雖存世莫能基必莫能基必頽久游閻浮利擾擾多此患行登陵雲宇會於虛游間其所言人莫能曉季龍遣驛馬送還本縣既出城請步云我當有所過君至合口橋見待使人如言而馳至橋麻襦已先至後慕容俊投季龍尸於漳水倚橋柱不流時人以為一柱殿下即謂此也及元帝嗣位江左亦以為天馬之應云晉書卷九十五藝術麻襦傳單道開單道開敦煌人也常衣粗褐或贈以繒服皆不著不畏寒暑晝夜不臥恆服細石子一吞數枚日一服或多或少好山居而山樹諸神見異形試之初無懼色石季龍時從西平來一日行七百里其一沙彌年十四行亦及之至秦州表送到鄴季龍令佛圖澄與語不能屈也初止鄴城西沙門法綝祠中後徙臨漳昭德寺於房內造重閣高八九尺於上編菅為禪室常坐其中季龍資給甚厚道開皆以施人人或來咨問者道開都不答日服鎮守藥數丸大如梧子藥有松蜜姜桂伏苓之氣時復飲荼蘇一二升而已自云能療目疾就療者頗驗視其行動狀若有神佛圖澄曰此道士觀國興衰若去者當有大亂及季龍末道開南渡許昌尋而鄴中大亂升平三年至京師後至南海入羅浮山獨處茅茨蕭然物外年百餘歲卒於山舍敕弟子以尸置石穴中弟子乃移入石室陳郡袁宏為南海太守與弟穎叔及沙門支法防共登羅浮山至石室口見道開形骸如生香火瓦器猶存宏曰法師業行殊群正當如蟬蛻耳乃為之贊云晉書卷九十五藝術單道開傳王嘉王嘉字子年隴西安陽人也輕舉止醜形貌外若不足而聰睿內明滑稽好語笑不食五穀不衣美麗清虛服氣不與世人交遊隱於東陽谷鑿崖穴居弟子受業者數百人亦皆穴處姚萇之入長安禮嘉如苻堅故事逼以自隨每事咨之萇既與苻登相持問嘉曰吾得殺苻登定天下不嘉曰略得之萇怒曰得當云得何略之有遂斬之先此釋道安謂嘉曰世故方殷可以行矣嘉答曰卿其先行吾負債未果去俄而道安亡至是而嘉戮死所謂負債者也苻登聞嘉死設壇哭之贈太師諡曰文及萇死萇子興字子略方殺登略得之謂也嘉之死日人有隴上見之其所造牽三歌讖事過皆驗纍世猶傳之又著拾遺録十卷其記事多詭怪今行於世晉書九十五卷藝術王嘉傳僧涉僧涉者西域人也不知何姓少為沙門苻堅時入長安虛靜服氣不食五穀日能行五百里言未然之事驗若指掌能以祕祝下神龍每旱堅常使之咒龍請雨俄而龍下鉢中天輒大雨堅及群臣親就鉢觀之卒於長安後大旱移時苻堅歎曰涉公若在豈憂此乎晉書九十五卷藝術僧涉傳晉書鳩摩羅什鳩摩羅什天竺人也世為國相父鳩摩羅炎聰懿有大節將嗣相位乃辭避出家東度蔥嶺龜慈王聞其名郊迎之請為國師王有妹年二十才悟明敏諸國交娉並不許及見炎心欲當之王乃逼以妻焉既而羅什在胎其母慧解倍常及年七歲母遂與俱出家羅什從師受經日誦千偈偈有三十二字凡三萬二千言義亦自通年十二其母攜到沙勒國王甚重之遂停沙勒一年博覽五明諸論及陰陽星算莫不必盡妙達吉凶言若符契為性率達不拘小檢修行者頗共疑之然羅什自得於心未嘗介意專以大乘為化諸學者皆共師焉年二十龜慈王迎之還國廣說諸經四遠學徒莫之能抗有頃羅什母辭龜茲王往天竺留羅什住謂之曰方等深教不可思議傳之東土惟爾之力但於汝無利其可如何什曰必使大化流傳雖苦而無恨母至天竺道成進登第三果西域諸國咸伏羅什神俊每至講說諸王皆長跪坐側令羅什踐而登焉苻堅聞之密有迎羅什之意會太史奏云有星見外國分野當有大智入輔中國堅曰朕聞西域有鳩摩羅什將非此邪乃遣驍騎將軍呂光等率兵七萬西伐龜茲謂光曰若獲羅什即馳驛送之光軍未至羅什謂龜茲王白純曰國運衰矣當有勍敵從日下來宜恭承之勿抗其鋒純不從出兵距戰光遂破之乃獲羅什光見其年齒尚少以凡人戲之強妻以龜茲王女羅什拒而不受辭甚苦至光曰道士之操不踰先父何所固辭乃飲以醇酒同閉密室羅什被逼遂妻之光還中路置軍於山下將士已休羅什曰在此必狼狽宜徙軍隴上光不納至夜果大雨洪潦暴起水深數丈死者數千人光密異之光欲留王西國羅什謂光曰此凶亡之地不宜淹留中路自有福地可居光還至涼州聞苻堅已為姚萇所害於是竊號河右屬姑臧大風羅什曰不祥之風當有奸叛然不勞自定也俄而有叛者尋皆殄滅沮渠蒙遜先推建康太守段業為主光遣其子纂率衆討之時論謂業等烏合纂有威聲勢必全克光以訪羅什答曰此行未見其利既而纂敗於合黎俄又郭黁起兵纂棄大軍輕還復為黁所敗僅以身免中書監張資病光博營救療有外國道人羅叉云能差資病光喜給賜甚重羅什知叉誑詐告資曰叉不能為益徒煩費耳冥運雖隱可以事試也乃以五色絲作繩結之燒為灰末投水中灰若出水還成繩者病不可愈須臾灰聚浮出復為繩叉療果無效少日資亡頃之光死纂立有豬生子一身三頭龍出東箱井中於殿前蟠臥比旦失之纂以為美瑞號其殿為龍翔殿俄而有黑龍升於當陽九宮門纂改九宮門為龍興門羅什曰比日潛龍出遊豕妖表異龍者陰類出入有時而今屢見則為災眚則有下人謀上之變宜克己修德以答天戒纂不納後果為呂超所殺羅什之在涼州積年呂光父子既不弘道故蘊其深解無所宣化姚興遣姚碩德西伐破呂隆乃迎羅什待以國師之禮仍使入西明閣及逍遙園譯出衆經羅什多所喑誦無不究其義旨既覽舊經多有紕繆於是興使沙門僧睿僧肇等八百餘人傳受其旨更出經論凡三百餘卷沙門慧睿才識高明常隨羅什傳寫羅什每為慧睿論西方辭體商略同異云天竺國俗甚重文制其宮商體韻以入管弦為善凡覲國王必有贊德經中偈頌皆其式也羅什雅好大乘志在敷演常歎曰吾若著筆作大乘阿毗曇非迦旃子比也今深識者既寡將何所論惟為姚興著實相論二卷興奉之若神嘗講經於草堂寺興及朝臣大德沙門千有餘人肅容觀聽羅什忽下高坐謂興曰有二小兒登吾肩欲鄣須婦人興乃召宮女進之一交而生二子焉興嘗謂羅什曰大師聰明超悟天下莫二何可使法種少嗣遂以伎女十人逼令受之爾後不住僧坊別立廨舍諸僧多效之什乃聚針盈鉢引諸僧謂之曰若能見效食此者乃可畜室耳因舉匕進針與常食不別諸僧愧服乃止杯渡比丘彭城聞羅什在長安乃歎曰吾與此子戲別三百餘年相見杳然未期遲有遇於來生耳羅什未終少日覺四大不悆乃口出三番神咒令外國弟子誦之以自救未及致力轉覺危殆於是力疾與衆僧告別曰因法相遇殊未盡心方復後世惻愴可言死於長安姚興於逍遙園依外國法以火焚尸薪滅形碎惟舌不爛晉書九十五卷藝術鳩摩羅什傳姚興如逍遙園引諸沙門於澄玄堂聽鳩摩羅什演說佛經羅什通辨夏言尋覽舊經多有乖謬不與胡本相應興與羅什及沙門僧略僧遷道樹僧睿道坦僧肇曇順等八百餘人更出大品羅什持胡本興執舊經以相考校其新文異舊者皆會於理義續出諸經並諸論三百餘卷今之新經皆羅什所譯興既托意於佛道公卿已下莫不欽附沙門自遠而至者五千餘人起浮圖於永貴里立波若臺於中宮沙門坐禪者恆有千數州郡化之事佛者十室而九矣晉書卷一百十七姚興載記上權翼苻堅游于東苑命沙門道安同輦權翼諫曰臣聞天子法駕侍中陪乘清道而行進止有度三代末主或虧大倫適一時之情書惡來世故班姬辭輦垂美無窮道安毀形賤士不宜參穢神輿堅作色曰安公道冥至境德為時尊朕舉天下之重未足以易之非公與輦之榮此乃朕之顯也命翼扶安升輦顧謂安曰朕將與公南遊吳越整六師而巡狩謁虞陵於疑嶺瞻禹穴於會稽泛長江臨滄海不亦樂乎安曰陛下應天御世居中土而制四維逍遙順時以適聖躬動則鳴鑾清道止則神棲無為端拱而化與堯舜比隆何為勞身於馳騎口倦於經略櫛風沐雨蒙塵野次乎且東南區區地下氣癘虞舜游而不返大禹適而弗歸何足以上勞神駕下困蒼生詩云惠此中國以綏四方苟文德足以懷遠可不煩寸兵而坐賓百越堅曰非為地不廣人不足也但思混一六合以濟蒼生天生蒸庶樹之君者所以除煩去亂安得憚勞朕既大運所鍾將簡天心以行天罰高辛有熊泉之役唐堯有丹水之師此皆著之前典昭之後王誠如公言帝王無省方之文乎且朕此行也以義舉耳使流度衣冠之胄還其墟墳復其桑梓止為濟難銓才不欲窮兵極武安曰若鑾駕必欲親動猶不願遠涉江淮可暫幸洛陽明授勝略馳紙檄於丹楊開其改迷之路如其不庭伐之可也堅不納先是群臣以堅信重道安謂安曰主上欲有事於東南公何不為蒼生致一言也故安因此而諫堅南遊灞上從容謂群臣曰軒轅大聖也其仁若天其智若神猶隨不順者從而征之居無常所以兵為衛故能日月所照風雨所至莫不率從今天下垂平惟東南未殄朕忝荷大業巨責攸歸豈敢優遊卒歲不建大同之業每思桓溫之寇也江東不可不滅今有徑卒百萬文武如林鼓行而摧遺晉若商風之隕秋籜朝廷內外皆言不可吾實未解所由晉武若信朝士之言而不征吳者天下何由一軌吾計決矣不復與諸卿議也太子宏進曰吳今得歲不可伐也且晉主無罪人為之用謝安桓沖兄弟皆一方之俊才君臣戮力阻險長江未可圖也但可厲兵積粟以待暴主一舉而滅之今若動而無功則威名損於外資財竭於內是故聖王之行師也內斷必誠然後用之彼若憑長江以固守徙江北百姓於江南增城清野杜門不戰我已疲矣彼未引弓土下氣癘不可久留陛下將若之何堅曰往年車騎滅燕亦犯歲而捷之天道幽遠非汝所知也昔始皇之滅六國其王豈皆暴乎且吾內斷於心久矣舉必克之何為無功吾方命蠻夷以攻其內精甲徑兵以攻其外內外如此安有不克道安曰太子之言是也願陛下納之堅弗從姚萇又遣尹緯說堅求為堯舜禪代之事堅責緯曰禪代者聖賢之事姚萇叛賊奈何擬之古人堅既不許萇以禪代罵而求死萇乃縊堅於新平佛寺中時年四十八中山公詵及張夫人並自殺是歲太元十年也初堅強盛之時國有童謠云河水清復清苻詔死新城堅聞而惡之每征伐戒軍候云地有名新者避之時又童謠云阿堅連牽三十年若後欲敗當在江淮間堅在位二十七年因壽春之敗其國大亂後二年竟死於新平佛寺咸應謠言矣晉書卷一百十四苻堅載記下道安與習鑿齒時有桑門釋道安俊辨有高才自北至荊州與鑿齒初相見道安曰彌天釋道安鑿齒曰四海習鑿齒時人以為佳對及襄陽陷於苻堅堅素聞其名與道安俱輿而致焉既見與語大悅之賜遺甚厚又以其蹇疾與諸鎮書昔晉氏平吳利在二陸今破漢南獲士裁一人有半耳俄以疾歸襄陽晉書卷八十二習鑿齒傳苻融苻堅僭號拜侍中尋除中軍將軍苻融聰辨慧下筆成章至於談玄論道雖道安無以出之耳聞則誦過目不忘時人擬之王粲嘗著浮圖賦壯麗清贍世咸珍之未有升高不賦臨喪不誄朱彤趙整等推其妙速晉書卷一百十四苻堅載記附苻融傳釋法汰沙門釋法汰問苻朗曰見王吏部兄弟未朗曰吏部為誰非人面而狗心狗面而人心兄弟者乎王忱醜而才慧國寶美貌而才劣於弟故朗云然汰悵自失其忤物侮人皆此類也晉書卷一百十四苻堅載記附苻朗傳支曇慕容垂遣其太子寶及農與慕容麟等率衆八萬伐魏慕容德慕容紹以步騎一萬八為寶後繼魏聞寶將至徙往河西寶進師臨河懼不敢濟還次參合忽有大風黑氣狀若隄防或高或下臨覆軍上沙門支曇猛言於寶曰風氣暴迅魏軍將至之候宜遣兵禦之寶笑而不納曇猛固以為言乃遣麟率騎三萬為後殿以禦非常麟以曇猛言為虛縱騎遊獵俄而黃霧四塞日月晦冥是夜魏師大至三軍奔潰寶與德等數千騎奔免士衆還者十一二紹死之晉書卷一百二十三慕容垂載記慕容熙苻氏死慕容熙悲號躄踴若喪考妣擁其尸而撫之曰體已就冷命遂斷矣於是僵仆氣絶久而乃蘇大斂既訖復啓其棺而與交接服斬縗食粥制百僚於宮內哭臨令沙門素服晉書卷一百二十四慕容熙載記劉義慶劉義慶為性簡素寡嗜欲愛好文義才詞雖不多然足為宗室之表受任歷藩無浮淫之過唯晚節奉養沙門頗致費損少善騎乘及長以世路艱難不復跨馬招聚文學之士近遠必至宋書卷五十一宗室劉義慶傳孟顗太守孟顗事佛精懇而為靈運所輕嘗謂顗曰得道應須慧業文人生天當在靈運前成佛必在靈運後顗深恨此言宋書卷六十七謝靈運傳法略有法略道人先為義康所供養粗被知待又有王國寺法靜尼亦出人義康家內皆感激舊恩規相拯拔並與孔熙先往來使法略罷道本姓孫改名景玄以為臧質寧遠參軍熙先善於治病兼備能診脈法靜尼妹夫許耀領隊在台宿衛殿省嘗有病因法靜尼就熙先乞治為合湯一劑耀疾即損耀自往酬謝因成周旋熙先以耀膽幹可施深相待結因告逆謀耀許為內應豫章胡遵世藩之子也與法略甚款亦密相酬和法靜尼南上熙先遣婢采藻隨之付以箋書陳說圖讖法靜還義康餉熙先銅匕銅鑷袍段棋奩等物熙先慮事泄鴆采藻殺之湛之又謂范曄等臧質見與異常歲內當還已報質悉攜門生義故其亦當解人此旨故應得健兒數百質與蕭思話款密當仗要之二人並受大將軍眷遇必無異同思話三州義故衆力亦不減質郡中文武及合諸處偵邏亦當不減千人不憂兵力不足但當勿失機耳乃略相署置湛之為撫軍將軍揚州刺史曄中軍將軍南徐州刺史熙先左衛將軍其餘皆有選擬凡素所不善及不附義康者又有別簿併入死目范曄撰和香方其序之曰此序所言悉以比類朝士麝本多忌比庾炳之甘松蘇合比慧琳道人沈實易和以自比也宋書卷六十九范曄傳法略有法略道人先為康所養粗被知待又有王國寺法靜尼出入義康家內皆感激舊恩規相拯拔並與熙先往來使法略罷道法略本姓孫改名景玄以為臧質寧遠參軍熙先善療兼能診脈法靜尼妹夫許耀領隊在台宿衛殿省嘗有疾因法靜尼就熙先乞療得損因成周旋熙先以耀膽幹因告逆謀耀許為內應豫章胡藩子遵世與法靜甚款亦密相酬和法靜尼南上熙先遣婢采藻隨付以箋書陳說圖讖法靜還義康餉熙先銅匕銅鑷袍段棋奩等物熙先慮事泄鴆采藻殺之南史卷三十三范泰傳附范曄傳戴顒與戴逵衡陽王義季鎮京口長史張邵與戴顒姻通迎來止黃鵠山山北有竹林精舍林澗甚美顒憩於此澗義季亟從之遊顒服其野服不改常度為義季鼓琴並新聲變曲基三調游弦廣陵止息之流皆與世異自漢世始有佛像形制未工戴逵特善其事顒亦參焉宋世子鑄丈六銅像於瓦官寺既成面恨瘦工人不能治乃迎顒看之顒曰非面瘦乃臂胛肥耳既錯減臂胛瘦患即除無不歎服焉杜按南史本傳大同故不録宋書卷九十三隱逸戴顒傳宗炳宗炳妙善琴書精於言理每遊山水往輒忘歸征西長史王敬弘每從之未嘗不彌日也乃下入廬山就釋慧遠考尋文義炳妻羅氏亦有高情與炳協趣羅氏沒炳哀之過甚既而輟哭尋理悲情頓釋謂沙門釋慧堅曰死生之分未易可達三復至教方能遣哀好山水愛遠遊西陟荊巫南登衡嶽因而結宇衡山欲懷尚平之志有疾還江陵歎曰老疾俱至名山恐難遍睹唯當澄懷觀道臥以游之凡所游履皆圖之於室謂人曰撫琴動操欲令衆山皆響元嘉二十年炳卒時年六十九衡陽王義季與司徒江夏王義恭書曰宗居士不救所病其清履肥素終始可嘉為之惻愴不能已已宋書卷九十三隱逸宗炳傳宗少文宗炳宗少文又名宗炳妙善琴書圖畫精於言理每遊山水往輒忘歸征西長史王敬弘每從之未嘗不彌日也乃下入廬山就釋慧遠考尋文義兄臧為南平太守逼與俱還乃於江陵三湖立宅閒居無事妻羅氏亦有高情與少文協趣羅氏沒少文哀之過甚既乃悲情頓釋謂沙門釋慧堅曰死生之分未易可達三復至教方能遣哀南史卷七十五隱逸上宗少文傳周續之周續之字道祖雁門廣武人也既而閒居讀老易入廬山事沙門釋慧遠時彭城劉遺民遁跡廬山陶淵明亦不應徵命謂之尋陽三隱以為身不可遣餘纍宜絶遂終身不娶妻布衣蔬食高祖之北討世子居守迎續之館於安樂寺延入講禮月餘復還山宋書卷九十三隱逸周續之傳周續之周續之字道祖雁門廣武人也其先過江居豫章建昌縣續之年十二年詣范寧受業居學數年通五經五緯號曰十經名冠同門稱為顏子既而閒居讀老易入廬山事沙門釋慧遠時彭城劉遺人遁跡廬山陶深明亦不應徵命謂之尋陽三隱南史卷六十五隱逸上周續之傳孔淳之孔淳之字彥深魯郡