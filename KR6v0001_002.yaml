名僧莫不請質疑滯陳書卷二十四周弘正傳周弘正藏法師於開善寺講說門徒數百周弘正年少未知名著紅褌錦絞髻踞門而聽衆人蔑之弗遣也既而乘間進難舉坐盡傾法師疑非世人覘知大相賞狎弘正特善玄言兼明釋典雖碩德名僧莫不請質疑滯南史卷三十四周朗傳附周弘正傳徐陵徐孝克與寶志時寶志上人者世稱其有道徐陵年數歲家人攜以候之寶志手摩其頂曰天上石麒麟也光宅惠雲法師每嗟陵早成就謂之顏回八歲能屬文十二通莊老義既長博涉史籍縱橫有口辨徐孝克徐陵之第三弟也又剃髮為沙門改名法整兼乞食以充給焉臧氏孝克原妻亦深念舊恩數私致饋餉故不乏絶後景行戰死臧伺孝克於途中纍日乃見謂孝克曰往日之事非為相負今既得脫當歸供養孝克默然無答於是歸俗更為夫妻後東遊居於錢塘之佳義里與諸僧討論釋典遂通三論每日二時講旦講佛經晚講禮傳道俗受業者數百人天嘉中除剡令非其好也尋復去職太建四年徵為祕書丞不就乃蔬食長齊持菩薩戒晝夜講誦法華經高宗甚嘉其操行孝克性清素而好施惠故不免饑寒後主敕以石頭津稅給之孝克悉用設齊寫經隨得隨盡二年為散騎常侍侍東宮陳亡隨例入闕家道壁立所生母患欲粳米為粥不能常辦母亡之後孝克遂常啖麥有遺粳米者孝克對而悲泣終身不復食之焉開皇十年長安疾疫隋文帝聞其名行召令於尚書都堂講金剛般若經尋授國子博士後侍東宮講禮傳十九年以疾卒時年七十三臨終正坐念佛室內有非常異香氣鄰里皆驚異之陳書卷二十六徐陵傳附徐孝克傳徐陵徐陵少而崇信釋教經論多所釋解後主在東宮令陵講大品經義學名僧自遠雲集每講筵商較四坐莫能與抗目有青精時人以為聰慧之相也南史卷六十二徐摛傳附徐陵傳徐孝克徐陵弟徐孝克有口辨能談玄理性至孝遭父憂殆不勝喪事所生母陳氏盡就養之道染末侯景寇亂孝克養母饘粥不能給妻東莞臧氏領軍將軍盾女也甚有容色孝克乃謂曰今饑荒如此供養交闕欲嫁卿與富人望彼此俱濟於卿如何臧氏弗許之時有孔景行者為侯景將多從左右逼而迎之臧氏涕泣而去所得谷帛悉以遺母孝克又剃髮為沙門改名法整兼乞食以充給焉臧氏亦深念舊恩數私致饋餉故不乏絶後景行戰死臧氏伺孝克於途中纍日乃見謂孝克曰往日之事非為相負今既得脫當歸供養孝克默然無答於是歸俗更為夫妻後東遊居錢唐之佳義里與諸僧討論釋典遂通三論每日二時講旦講佛經晚講禮傳道俗受業者數百人天嘉中除剡令非其好尋去職太建四年征為祕書丞不就乃蔬食長齊持菩薩戒晝夜講誦法華經宣帝甚嘉其操行孝克性清素好施惠故不免饑寒後主敕以石頭津稅給之孝克悉用設齊寫經隨盡二年為散騎常侍侍東宮陳亡隨例入長安家道壁立所生母患欲粳米為粥不能常辦母亡後孝克遂常啖麥有遺粳米者孝克對而悲泣終身不復食焉開皇十二年長安疾疫隋文帝聞其名行召令於尚書都堂講金剛般若經尋授國子博士後侍東宮講禮傳十九年以疾卒年七十三臨終政坐念佛室內有非常香氣鄰里皆驚異之子萬載位太子洗馬南史卷六十二徐摛傳附徐孝克傳姚察姚察幼年嘗就鍾山明慶寺尚禪師受菩薩戒及官陳祿俸皆捨寺起造並追為禪師樹碑文甚遒麗及是遇見梁國子祭酒肅子雲書此寺禪齊詩覽之愴然乃用肅韻述懷為詠詞又哀切法俗益以此稱之察年七十四大業二年終於東都遺命薄葬務從率儉其略云吾家世素士自有常法吾意斂以法服並宜用布士周於身又恐汝等不忍行此必不爾須松板薄棺才可周身土周於棺而已葬日止粗車即送厝舊塋北吾在梁世當時年十四就鍾山明慶寺尚禪師受菩薩戒自爾深悟苦空頗知回向矣當得留連山寺一去忘歸及仕陳代諸名流遂許與聲價兼時主恩遇宦途遂至通顯自入朝來又蒙恩渥既牽纏人世素志弗從且吾習蔬菲五十餘年既歷歲時循而不失瞑目之後不須立靈置一小床每日設清水六齊日設齊食果菜任家有無不須別經營也初察原讀一藏經並已究竟將終曾無痛惱但西向坐正念云一切空寂其後身體柔軟顏色如恆兩宮悼惜賵賻甚厚察性至孝有人倫鑒識沖虛謙遜不以所長矜人終日恬靜唯以書記為樂於墳籍無所不睹兼諳識內典所撰寺塔及衆僧文章特為綺密在位多所稱引一善可録無不賞薦陳書卷二十七姚察傳初姚察欲讀一藏經並已究竟將終會無痛惱但西向坐正念云一切空寂其後身體柔軟顏色如恆兩宮悼惜贈賵甚厚南史卷六十九姚察傳章華吳興章華字仲宗家世農夫至華獨好學與士君子游處頗覽經史善屬文侯景之亂乃游嶺南居羅浮山寺專精習業杜按南史本傳同故不録陳書卷三十章華傳謝貞謝貞父藺居母阮氏憂不食泣血而卒家人賓客懼貞復然從父洽族兄皓乃共往華嚴寺請長爪禪師為貞說法仍謂貞曰孝子既無兄弟極須自愛若憂毀滅性誰養母邪自後少進饘飲粥太清之亂親屬散亡貞於江陵陷沒皓逃難番禺貞母出家於宣明寺杜按南史本傳大同故不録陳書卷三十二孝行謝貞傳張譏後主嘗幸鍾山開善寺召從臣坐於寺西南松林下敕張譏豎義時索麈尾未至後主敕取松枝手以屬譏曰可代麈尾顧謂群臣曰此即是張譏後事禎明三年入隋終於長安時年七十六譏性恬靜不求榮利常慕閒逸所居宅營山池植花果講周易老莊而教授焉吳郡陸元朗朱孟博一乘寺沙門法才法雲寺沙門慧休至真觀道士姚綏皆傳其業杜按南史本傳慧休作慧拔餘同故不録陳書卷三十三張譏傳陸慶時有吳郡陸慶少好學遍知五經尤明春秋左氏傳節操甚高值梁季喪亂乃