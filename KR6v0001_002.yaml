述九章數家雜要披釋章次意況大旨又演隱審五藏六府心髓血脈商功算端部變化玄象土圭周髀練精鋭思蘊習四年從穆所聞粗皆倣佛穆等仁矜特垂憂憫復以先師和公所注黃帝四序經文三十六卷合有三百二十四章專說天地陰陽之本以此等文傳授於臣山神禁嚴不得繼出尋究經年粗舉綱要山居險難無以自供不堪窘迫心生懈怠以甲寅之年日維鶉火月呂林鐘景氣鬱盛感物懷歸奉辭影等自爾至今四十五載歷觀時俗堪輿八會徑世已久傳寫謬誤吉凶禁忌不能備悉或考良日而值惡會舉吉用凶多逢殃咎仰奉明旨謹審先所見四序經文抄撮要略請付中祕通儒達士定其得失事若可施乞即班用其四序堪輿遂大行於世魏書卷九十一藝術殷紹傳殷紹殷紹長樂人也達九章七曜太武時為算生博士給事東宮西曹太安四年上四序堪輿表言以姚氏之時行學伊川遇游遁大儒成公興從求九章要術興字廣明自云膠東人也山居隱跡希在人間興將臣到陽翟九崖沙門釋曇影間興即北還臣獨留住依止影所求請九章影復將臣向長廣東山就道人法穆法穆時共影為臣開述九章數家雜要復以先師和公所注黃帝四序經文三十六卷合有三百二十四章專說天地陰陽之本其第一孟序九卷八十一章說陰陽配合之原第二仲序九卷八十一章解四時氣王休殺吉凶第三叔序九卷八十一章明日月辰宿交會相生為表裡第四季序九卷八十一章具釋六甲刑禍福德以此經文傳授於臣山神禁嚴不得賚出尋究經年粗舉綱要山居險難無以自供不堪窘迫心生懈怠以甲寅之年日維鶉火感物懷歸自爾至今四十五載臣前在東宮以狀奏聞奉被景穆皇帝聖詔敕臣撰録集其要最仰奉明旨謹審先所見四序經文抄撮要略當世所須吉凶舉動集成一卷上至天子下及庶人貴賤等級尊卑差別吉凶所用罔不畢備未及內呈先帝晏駕依先撰録謹以上聞其四序堪輿遂大行於世北史卷八十九藝術上殷紹傳李修李修字思祖本陽平館陶人父亮少學醫術未能精究世祖時奔劉義隆於彭城又就沙門僧坦研習衆方略盡其術針灸授藥莫不有效徐兗之間多所救恤四方疾苦不遠千里竟往從之杜按北史本傳文字稍異意同故不録魏書卷九十一李修傳曇無讖又告牧犍父子多畜毒藥前後隱竊殺人乃有百數姊妹皆為左道朋行淫佚曾無愧顏始罽賓沙門曰曇無讖東入鄯善自云能使鬼治病令婦人多子與鄯善王妹曼頭陀林私通發覺亡奔涼州蒙遜寵之號曰聖人曇無讖以男女交接之術教授婦人蒙遜諸女子婦皆往受法世祖聞諸行人言曇無讖之術乃召曇無讖蒙遜不遣遂發露其事拷訊殺之至此帝知之於是賜昭儀沮渠氏死誅其宗族唯萬年及祖以前先降得免杜按北史本傳大同故不録魏書卷九十九沮渠蒙遜傳宋雲與沙門法力初熙平中肅宗遣王伏子統宋雲沙門法力等使西域訪求佛經時有沙門慧生者亦與俱行正光中還慧生所經諸國不能知其本末及山川里數蓋舉其略云杜按北史本傳同故不録魏書卷一百二西域傳文宣皇后李氏文宣皇后李氏諱祖娥趙郡李希宗女也被武成帝撾撻后犢車載送妙勝尼寺后性愛佛法因此為尼齊亡入關隋時得還趙郡杜按北史本傳同故不録北齊書卷九李后傳武成皇后胡氏武成皇后胡氏安定胡延之女其母範陽盧道約女初懷孕有胡僧詣門曰此宅瓠蘆中有月既而生后天保初選為長廣王妃産後主日梟鳴於産帳上自武成崩後胡氏數出詣佛寺又與沙門曇獻通布金錢於獻席下又掛寶裝胡床於獻屋壁武成平生之所御也乃置百僧於內殿托以聽講日夜與曇獻寢處以獻為昭玄統僧徒遙指太后以弄曇獻乃至謂之為太上者帝聞太后不謹而未之信後朝太后見二少尼悅而召之乃男子也於是曇獻事亦發皆伏法並殺元山王三郡君皆太后之所昵也杜按北史本傳大同故不録北齊書卷九胡后傳武成皇后胡氏武成皇后胡氏安定胡延之女其母範陽盧道約女初懷孕有胡僧詣門曰此宅瓠蘆中有月既而生后初武成時后與諸閹人褻狎武成寵幸和士開每與后握槊因此與后姦通自武成崩後數出詣佛寺又與沙門曇獻通布金錢於獻席下又掛寶裝胡床於獻屋壁武成平生之所御也乃置百僧於內殿托以聽講日夜與曇獻寢處以獻為昭玄統僧徒遙指太后以弄曇獻乃至謂之為太上者帝聞太后不謹而未之信後朝太后見二少尼悅而召之乃男子也於是曇獻事亦發皆伏法並殺元山王三郡君皆太后之所昵也北史卷十四后妃下武成皇后胡氏傳高思宗上洛王高思宗神武從子也子元海纍遷散騎常侍願處山林修行釋典文宣許之乃入林慮山經二年絶棄人事志不能固啓求歸元海好亂樂禍然詐仁慈不飲酒啖肉文宣天保末年敬信內法乃至宗廟不血食皆元海所謀及為右僕射又說後主禁屠宰斷酤酒然本心非靖故終致覆敗杜按北史本傳同故不録北齊書卷十四上洛王思宗傳附元海傳劉世清劉世清武平末侍中開府儀同三司任遇與孝卿相亞情性甚整周慎謹密在孝卿之右能通四夷語為當時第一後主命世清作突厥語翻涅槃經以遺突厥可汗敕中書侍郎李德林為其序世清隋開皇中卒於開府親衛驃騎將軍杜按北史未記此事北齊書卷二十斛律羌舉傳附楊愔楊愔從兄幼卿為岐州刺史以直言忤旨見誅愔聞之悲懼因哀感發疾後取急就雁門溫湯療疾郭秀素害其能因致書恐之曰高王欲送卿於帝所仍勸其逃亡愔遂棄衣冠於水濱若自沉者變易名姓自稱劉士安入嵩山與沙門曇謨征等屏居削跡又潛之光州因東入田橫島以講誦為業海隅之士為之劉先生太守王元景陰佑之神武知愔存遣愔從兄寶猗賚書慰喻見之悅遷給事黃門侍郎妻以庶女又兼散騎常侍為聘梁使主至碻磝戍州內有愔家舊佛寺入精廬禮拜見太傅容像悲感慟哭嘔血數升遂發病不成行輿疾還鄴杜按北史本傳同故不録北齊書卷三十四楊愔傳祖珽祖珽犯罪在押會并州定國寺新成神武謂陳元康溫子升曰昔作芒山寺碑文時稱妙絶今定國寺碑當使誰作詞也元康因薦祖珽才學並解鮮卑語乃給筆札就禁所具草二日內成其文甚麗神武以其工而且速特恕不問然猶免官散參相府文襄嗣事以為功曹參軍杜按北史本傳同故不録北齊書卷三十九祖珽傳孫靈暉天統中敕令朝臣推舉可為南陽王綽師者吏部尚書尉瑾表薦之征為國子博士授南陽王經綽欲以管記馬子結為咨議參軍乃表請轉靈暉為王師以子結為咨議綽除大將軍靈暉以王師領大將軍司馬綽誅停廢從綽死後每至七日及百日終靈暉恆為綽請僧設齊轉經行道齊亡後數年卒北齊書卷四十四儒林孫靈暉傳皇甫遐皇甫遐字永賢河東汾陰人也纍世寒微而鄉里稱其和睦遐性純至少喪父事母以孝聞保定末又遭母喪乃廬於墓側負土為墳後於墓南人作一禪窟陰雨則穿窟晴霽則營墓曉夕勤力未嘗暫停積以歲年墳高數丈周回五十餘步禪窟重台兩匝總成十有二室中間行道可容百人遐食粥枕塊櫛風沐雨形容枯悴家人不識當其營墓之初乃有鴟鳥各一徘徊悲鳴不離墓側若助遐者經月餘日乃去遠近聞其至孝競以米面遺之遐皆受而不食悉以營佛齊焉郡縣表上其狀有詔旌異之杜按北史本傳文字稍異意同故不録周書卷四十六孝義皇甫遐傳張元張元性謙謹有孝行微涉經史然精修釋典村陌有狗子為人所棄者元見即收而養之其叔父怒曰何用此為將欲更棄之元對曰有生之類莫不重其性命若天生天殺自然之理今為人所棄而死非其道也若見而不收養無仁心也是以收而養之叔父感其言遂許焉未幾乃有狗母銜一死兔置元前而去及張元年十六其祖喪明三年元恆憂泣晝夜讀佛經禮拜以祈福佑後讀藥師經見盲者得視之言遂請七僧然七燈七日七夜轉藥師經行道每言天人師乎元為孫不孝使祖喪明今以燈光普施法界願祖目見明元求代暗如此經七日其夜夢見一老公以金鎞治其祖目謂元曰勿憂悲也三日之後汝祖目必差元於夢中喜躍遂即驚覺乃遍告家人居三日祖果目明杜按北史同故不録周書卷四十六孝義張元傳張元及張元年十六其祖喪明三年元恆憂泣晝夜讀佛經禮拜以祈福佑後讀藥師經見盲者得視之言遂請七僧然七燈七日七夜轉藥師經行道每言天人師乎元為孫不孝使祖喪明今以燈光普施法界願祖目見明元求代暗如此經七日其夜夢見一老翁以金鎞療其祖目於夢中喜躍遂即驚覺乃遍告家人三日祖目果明北史卷八十四孝行張元傳蕭察蕭察少有大志不拘小節雖多猜忌而知人善任使撫將士有恩能得其死力性不飲酒安於儉素事其母以孝聞又不好聲色尤惡見婦人雖相去數步遙聞其臭經御婦人之衣不復更著又惡見人發白事者必方便以避之其在東揚州頗放誕省覽薄簿領好為戲論之言以此獲譏於世篤好文義所著文集十五卷內典華嚴般若法華金光明義疏四十六卷並行於世周書卷四十八蕭察傳蕭察梁帝蕭察字理孫蘭陵人武帝之孫昭明太子統之第三子也幼好學善屬文尤長佛義特為梁武嘉賞蕭察篤好文義所著文集十五卷內典華嚴般若法華金光明義疏三十六卷並行於世北史卷九十三僭僞附庸梁帝蕭察傳蕭巋蕭巋孝悌慈仁有君人之量四時祭享未嘗不悲慕流涕性尤儉約御下有方境內稱治所著文集及孝經周易義記及大小乘幽微並行於世杜按北史本傳大同故不録周書卷四十八蕭察傳蕭歸傳甄玄成甄玄成字敬平中山人博達經史善屬文少為簡文所知以録事參軍隨察鎮襄陽以江陵甲兵殷盛遂懷二心密書梁元帝申其誠款遂有得其書者進之於察蕭察深信佛法常願不殺誦法華經人甄玄成素誦法華經遂以此獲免察後見之常曰甄公好得法華經力歷位中書侍郎御史中丞祠部尚書吏部尚書有文集二十卷杜按北史本傳文稍異意同故不録周書卷四十八蕭察傳甄玄成傳楊綸與沙汴惠恩崛多煬帝即位楊綸尤被猜忌綸憂懼不知所為呼術者王琛而問之琛答曰王相祿不凡乃因曰滕即騰也此字足為善應有沙門惠恩崛多等頗解占候綸每與交通常令此三人為度星法有人告綸怨望咒誼帝命黃門侍郎王弘窮治之隋書卷四十四滕穆王瓚傳附楊俊秦孝王俊字阿祗高祖第三子也開皇元年立為秦王俊仁恕慈愛崇敬佛道請為沙門上不許隋書卷四十五秦孝王俊傳盧太翼盧太翼字協昭河間人也本姓章仇氏及長閒居味道不求榮利博綜群書爰及佛道皆得精微隋書卷七十八盧太翼傳韋鼎又有人客遊通主家之妾及其還去妾盜珍物於夜亡尋於草中為人所殺主家知客與妾通因告客殺之縣司鞫問具得奸狀因斷客死獄成上於鼎鼎覽之曰此客實奸而殺非也乃某寺僧詃妾盜物令奴殺之贓在某處即放此客遣掩僧並獲贓物自是部內肅然不言咸稱其有神道無拾遺尋追入京以年老多病纍加優賜頃之卒年七十九隋書卷七十八藝術韋鼎傳惠琳北齊有沙門惠琳被掠入突厥中因謂他鉢曰齊國富強者為有佛法耳遂說以因緣果報之事他鉢聞而信之建一伽藍遣使聘於齊氏求淨名涅槃華嚴等經並十誦律他鉢亦躬自齊戒繞塔行道恨不生內地隋書卷八十四突厥傳惠琳北齊有沙門惠琳掠入突厥中因謂突厥他鉢曰齊國富強皆為有佛法遂說以因緣果報之理他鉢聞而信之建一伽藍遣使聘齊求淨名涅槃華嚴等經並十誦律他鉢亦躬自齊戒繞塔行道恨不生內地建德二年他鉢遣使獻馬及齊滅齊定州刺史范陽王高紹義自馬邑奔之他鉢立紹義為齊帝召集所部云為之復讎北史卷九十九突厥傳司馬德戡司馬德戡幼孤以屠豕自給有桑門釋粲通戡德母和氏遂撫教之因解書計隋書卷八十五司馬德勘傳劉義慶劉義慶後改授江州又遷南兗州刺史並帶都督尋即本號加開府儀同三司性簡素寡嗜欲愛好文義文辭雖不多足為宗室之表歷任無浮淫之過唯晚節奉沙門頗致費損少善騎乘及長不復跨馬招聚才學士遠近必至所著世說十卷撰集林二百卷並行於世文帝每與義慶書常加意斟酌杜按宋書本傳文字稍異意同故不録南史卷十三臨川烈武王道規傳附徐湛之廣陵舊有高樓徐湛之更加修整南望鍾山城北有陂澤水物豐盛湛之更起風亭月觀吹台琴室果竹繁茂花藥成行招集文士盡遊玩之適一時之盛也時有沙門釋惠休善屬文辭采綺艷湛之與之甚厚世祖命使還俗本姓湯位至揚州從事史杜按南史本傳文字稍異意同故不録宋書卷七十一徐湛之傳王慈王慈字伯寶年八歲外祖宋太宰江夏王義恭迎之內齊施寶物恣所取慈取素琴石硯及孝子圖而已義恭善之十歲時與蔡興宗子約入寺禮佛正遇沙門懺約戲慈曰衆僧今日可謂虔虔慈應聲曰卿如此何以興蔡氏之宗歷位吳郡太守大司馬長史侍中領步兵校尉司徒左長史杜按南齊書本傳不記其與沙門事南史卷二十二王曇首傳附王慈傳王固王固清虛寡欲居喪以孝聞又信佛法及丁生母憂遂終身蔬食夜則坐禪晝誦佛經嘗聘於西魏因宴饗之際請停殺一羊羊於固前跪拜又宴昆明池魏人以南人嗜魚大設罟綱固以佛法咒之遂一鱗不獲杜按南史本傳大同故不録陳書卷二十一王固傳到溉溉家門雍睦兄弟特相友愛初與弟洽常共居一齊洽卒後便捨為寺因斷腥膻終身蔬食別營小室朝夕從僧徒禮誦武帝每月三致淨饌恩禮甚篤蔣山有延賢寺者溉家世創立故生平公俸咸以供焉略無所取性又不好交遊唯與朱異劉之遴張綰同志友密及臥疾家園門可羅雀三君每歲時常鳴騶枉道以相存問置酒敘生平極歡而去杜按南史本傳前所大同但又敘有以太清二年卒臨終托張劉勒子孫薄葬之禮曰氣絶便斂斂以法服先有冢竁斂竟便葬不須擇日凶事必存約儉孫姪不得違言便屏家人請僧贊唄及卒顏色如恆手屈二指即佛道所云得果也等語梁書卷四十到溉傳釋慧琳時沙門釋慧琳以才學為太祖所賞愛每召見常升獨榻延之甚疾焉因醉白上曰昔同子參乘袁絲正色此三台之坐豈可使刑餘居之上變色宋書卷七十三顏延之傳釋慧琳時沙門釋慧琳以才學為文帝太祖所賞朝廷政事多與之謀遂士庶歸仰上每引見常升獨榻顏延之甚疾焉因醉白上曰昔同子參乘袁絲正色此三台之坐豈可使刑餘居之上變色南史卷三十四顏延之傳王斌與慧超時有王斌者不知何許人著四聲論行於時斌初為道人博涉經籍雅有才辨善屬文能唱導而不修容儀嘗弊衣於瓦官寺聽雲法師講成實論無復坐處唯僧正慧超尚空席斌直坐其側慧超不能平乃罵曰那得此道人祿蔌似隊父唐突人因命驅之斌笑曰既有敘勳僧正何為無隊父道人不為動而撫機問難辭理清舉四座皆屬目後還俗以詩樂自樂人莫能名之南史卷四十八陸慧曉傳明僧紹慶符罷任明僧紹隨歸住江乘攝山太祖渭慶府曰卿史高尚其事亦堯之外臣朕雖不相接有時通夢遺僧紹竹根如意筍籜冠僧紹聞沙門釋慧遠風德住候定林寺太祖欲出寺見之僧遠問僧紹曰天子若來居士若為相對僧紹曰山藪之人政當鑿壞以遁若辭不獲命便當依戴公故事耳南齊書卷五十四明僧紹傳明僧紹慶符罷任明僧紹隨歸住江乘攝山僧紹聞沙門釋僧遠夙德往候定林寺高帝欲出寺見之僧遠問僧紹曰天子若來居士若為相對僧紹曰山藪之人政當鑿壞以遁若辭不獲命便當依戴公故事既而遁還攝山建棲霞寺而居之高帝甚以為恨昔戴顒高臥牖下以山人之服加其身僧紹故云渤海封延伯者高行士也聞之歎曰明居士身彌後而名彌先亦宋齊之儒仲也南史卷五十明僧紹傳蕭昱普通五年肖昱坐於宅內鑄錢為有司所奏下廷尉得免死徙臨海郡行至上虞有敕追還且令受菩薩戒昱既至恂恂盡禮改意蹈道持戒又精潔帝甚嘉之杜按南史本傳大同故不録梁書卷二十四蕭景傳附蕭昱傳梁武帝歎蕭藻高祖梁武帝每歎曰子弟並如迦葉吾復何憂加葉藻小名也杜按南史本傳文稍異意同故不録梁書卷三十二蕭藻傳昭明太子昭明太子統字德施小字維摩武帝長子也太子生而聰睿三歲受孝經論語五歲遍讀五經悉通諷誦性仁孝自出宮恆思戀不樂帝知之每五日一朝多便留永福省或五日三日乃還宮天監十四年正月朔旦帝臨軒冠太子於太極殿舊制太子著遠遊冠金蟬翠緌纓至是詔加金博山太子美姿容善舉止讀書數行並下過目皆憶每游宴祖道賦詩至十數韻或作劇韻皆屬思便成無所點易帝大弘佛教親自講說太子亦素信三寶遍覽衆經乃於宮內別立慧義殿專為法集之所招引名僧自立二諦法身義普通元年四月甘露降於慧義殿咸以為至德所感時俗稍奢太子欲以己率物服御朴素身衣浣衣膳不兼肉南史卷五十三梁武帝諸子昭明太子肖統傳昭明太子高祖大弘佛教親自講說昭明太子亦崇信三寶遍覽衆經乃於宮內別立慧義殿專為法集之所招引名僧談論不絶太子自立二諦法身義並有新意普通元年四月甘露降於慧義殿咸以為至德所感焉梁書卷八昭明太子傳王神念王神念太原祁人也少好儒術尤明內典杜按南史本傳同故不録梁書卷三十九王神念傳陳詳陳詳字文幾少出家為桑門善書記談論清雅高祖討侯景召詳令反初服配以兵馬從定京邑陳書卷十五陳詳傳陳詳遂興侯陳詳字文幾少出家為沙門善書記談論清雅武帝討侯景召令還俗配以兵馬從定建鄴南史卷六十五陳宗室諸王遂興侯陳詳傳孫瑒孫瑒常於山齊設講肆集玄儒之士冬夏資奉為學者所稱而處己率易不以名位驕物時興皇寺慧朗法師該通釋典瑒每造講筵時有抗論法侶莫不傾心又巧思過人為起部尚書軍國器械多所創立杜按南史本傳文同故不録陳書卷二十五孫瑒傳傅縡傅縡篤信佛教從興皇寺慧朗法師受三論盡通其學尋以本官兼通直散騎侍郎使齊還纍遷太子庶子僕杜按傅縡著明道論南史盡刪然陳書本傳存詳見本書議論篇南史卷六十九傅縡傳孝文帝孝文帝雅好讀書手不釋卷五經之義覽之便講學不師受探其精奧史傳百家無不該涉善談莊老尤精釋義才藻富贍好為文章詩賦銘頌任興而作至年十五便不復殺生射獵之事悉止性儉素常服瀚濯之衣鞍勒鐵木而已杜按北史本傳同故不録魏書卷七高祖紀七下李義徽李義徽太和中以儒學博通有才華補清河王懌府記室性好老莊甚嗤釋教靈太后臨朝屬有沙門惠憐以咒水飲人云能愈疾百姓奔湊日以千數義徽白懌稱其妖妄因令義徽草奏以諫太后納其言元叉惡懌徙義徽都水使者俄而懌被害因棄官隱於大房山杜按此事魏書不載北史卷二十七李先傳沙門道可武邑郡奸人石華告沙門道可與源賀謀反有司以聞高宗問群臣曰賀誠心事國朕為卿等保之無此明矣乃精加訊檢華果引誣杜按北史本傳文簡意同故不録魏書卷四十一源賀傳靈太后靈太后曾幸芒山集僧尼齊會公卿盡在坐會事將終太后引見羊深欣然勞問之深謝曰太后顧謂左右曰羊深真忠臣也舉坐傾心杜按北史本傳文稍異意同故不録魏書卷七十七羊深傳韓顯宗與法撫興宗弟顯宗字茂親性剛直能面折廷諍亦有才學沙門法撫三齊稱聰悟嘗與顯宗校試抄百餘人名各讀一遍隨即覆呼法撫猶有一二舛謬顯宗了無誤錯法撫歎曰貧道生平以來唯服郎耳杜按北史本傳僅異一性字意同故不録魏書卷六十韓麒麟傳附韓顯宗傳劉芳劉芳聰敏過人篤志墳典晝則傭書以自資給夜則讀誦終夕不寢至有易衣並日之弊而淡然自守不汲汲於榮利不戚戚於貧賤乃著窮通論以自慰焉芳常為諸僧傭寫經論筆跡稱善卷直一縑歲中能入百餘匹如此數十年賴以頗振由是與德學大僧多有還往時有南方沙門慧度以事被責未幾暴亡芳因緣關知文明太后召入禁中鞭之一百時中官李豐主其始末知芳篤學有志行言之於太后太后微愧於心芳才思深敏特精經義博聞強記兼覽蒼雅尤長音訓辨析無疑於是禮遇日隆嘗繼豐渥杜按北史本傳文稍異意同故不録魏書卷五十五劉芳傳邢季彥邢季彥弟晏字幼平美風儀博涉經史善談釋老雅好文詠杜按北史本傳同故不録魏書卷六十五邢巒傳附邢季彥傳鹿悆鹿悆好兵書陰陽釋氏之學太師彭城王協召為館客杜按北史本傳同故不録魏書卷七十九鹿悆傳高謙之高謙之以父舅氏沮渠蒙遜曾據涼土國書漏闕謙之乃修涼書十卷行於世涼國盛事佛道為論貶之因稱佛是九流之一家當世名士競以佛理來難謙之還以佛義對之竟不能屈杜按北史本傳文稍異意同故不録魏書卷七十七高崇傳附高謙之傳曇璨東益氐蜀尋反攻逼唐永永棄城而走乃喪一藩矣初永之走魏子建客有沙門曇璨及巨鹿人耿顯皆沒落氐手及知子建之客垂泣追衣物還之送出白馬遺愛所被如此杜按北史本傳文字大同故不録魏書卷一百四魏收自序蘇綽蘇綽又著佛性論七經論並行於世周書卷二十三蘇綽傳蘇綽蘇綽又著佛性論七經論並行於世蘇威見宇文護專權恐禍及己逃入山為叔父所逼卒不獲免然每居山寺以諷讀為娛北史卷六十三蘇綽傳楊俊秦王楊俊仁恕慈愛崇敬佛道請為沙門上不許杜按北史本傳同故不録隋書卷四十五秦王楊俊傳馮熙洛陽雖經破亂而舊三字石經宛然猶在至馮熙與常伯夫相繼為州廢毀分用大至頽落熙為政不能仁厚而信佛法自出家財在諸州鎮建佛圖精舍合七十二處寫一十六部一切經延致名德沙門日與講論精勤不倦所費亦不資而在諸州營塔寺多在高山秀阜傷殺人牛有沙門勸止之熙曰成就後人唯見佛圖焉知殺人牛也其北邙寺碑文中書侍郎賈元壽之詞高祖頻登北邙寺親讀碑文稱為佳作熙為州因事取人子女為奴婢有容色者幸之為妾有子女數十人號為貪縱杜按北史本傳文字稍異意同故不録魏書卷八十三上外戚馮熙傳孫惠尉魏初已來儒生寒宦惠蔚最為顯達先單名蔚正始中侍講禁內夜論佛經有愜帝皆詔使加惠號惠蔚法師焉神龜元年卒於官時年六十七杜按北史本傳大同故不録魏書卷八十四儒林孫惠尉傳柳辨柳辨性又嗜酒言雜誹諧由是彌為太子所親狎以其好內典令撰法華玄宗為二十卷奏之太子閲而大悅賞賜優洽儕輩莫與為比杜按北史本傳大同故不録隋書卷五十八柳辨傳蘇瓊蘇瓊性清慎不發私書道人道研為濟州沙門統資産巨富在郡多有出息常得郡縣為征及欲求謁度知其意每見則談問玄理應對肅敬研雖為債數來無由啓口其弟子問其故研曰每見府君徑將我入青雲間何由得論地上事瓊遷左丞行徐州事徐州城中五級寺忽被盜銅像一百軀有司征檢四鄰防宿及縱跡所疑逮繫數十人瓊一時放遣寺僧怨訴不為推賊瓊遣僧謝曰但且還寺得像自送爾後十日抄賊姓名及贓處所徑收掩悉獲實驗賊徒疑引道俗歎伏北齊書卷四十六循吏蘇瓊傳蘇瓊蘇瓊性清慎不發私書道人道研為濟州沙門統資産臣富在郡多出息常得郡縣為征及欲求謁度知其意每見則談問玄理研雖為債數來無由啓口其弟子問其故研曰每見府君徑將我入青雲間何由得論地上事師徒還歸遂焚債券杜按餘大同北齊書故不贅録北史卷八十六循吏蘇瓊傳靈遠沙門靈遠者不知何許人有道術嘗言爾朱榮成敗預知其時又言代魏者齊葛榮聞之故自號齊及齊神武至信都靈遠與勃海李嵩來謁神武待靈遠以殊禮問其天文人事對曰齊當興東海出天子今王據勃海是齊地又太白與月並宜速用兵遲則不吉靈遠後罷道姓荊字次德求之不知所在杜按魏書劉靈助傳不載沙門遠事北史卷八十九藝術劉靈助傳附靈遠傳檀特師檀特師者名惠豐身為比丘不知何處人飲酒啖肉語默無常逆論來事後皆如言居於涼州宇文仲和為刺史請之至州內歷觀廄庫乃云何意畜他官馬官物仲和怒不聽住涼州未幾仲和拒不受代朝廷令獨孤信擒之仲和身死資財沒官周文遣書召之檀特發至岐州會齊神武來寇玉壁檀特曰狗豈能至龍門也神武果不至龍門而還侯景未叛東魏之前忽捉一杖杖頭刻為獼猴令其面常向西日夜弄之又索一角弓牽挽之俄而景啓降尋復背叛人皆以為驗至大統十七春初忽著一布帽周文左右驚問之檀特曰汝亦著王亦著也至三月而魏文帝崩復取一白絹帽著之左右復問之檀特云汝亦著王亦著也未幾丞相夫人薨後又著白絹帽左右復問之云汝不著王亦著也尋而丞相第二兒武邑公薨其事多如此也俄而疾死北史卷八十九藝術上檀特師傳陸法和陸法和不知何許人也隱於江陵百里洲衣食居處一與苦行沙門同耆老自幼見之容色常不定人莫能測也或謂出自嵩高遍游遐邇既入荊州汶陽郡高安縣之紫石山無故捨所居山俄有蠻賊文道期之亂時人以為預見萌兆及侯景始告降於梁法和謂南郡朱元英曰貧道共檀越擊侯景去元英曰侯景為國立效師云擊之何也法和曰正自如此及景渡江法和時在青溪山元英往問曰侯景今圍城其事云何法和曰凡人取果宜待熟時不撩自落檀越但待侯景熟何勞問也固問之曰亦克亦不克景遣將任約擊梁湘東王於江陵法和乃詣湘東乞征約召諸蠻弟子八百人在江津二日便發湘東遣胡僧佑領千餘人與同行法和登艦大笑曰無量兵馬江陵多神祠人俗恆所祈禱自法和軍出無復一驗人以為神皆從行故也至赤沙湖與約相對法和乘輕船不介胄沿流而下去約軍一里乃還謂將士曰聊觀彼龍睡不動吾軍之龍甚自踴躍即攻之若得待明日當不損客主一人而破賊然有惡處遂縱火舫於前而逆風不便法和執白羽扇麾風風勢即返約衆皆見梁兵步於水上於是大潰皆投水而死約逃竄不知所之法和曰明日午時當得及期而未得人問之法和曰吾前於此洲水乾時建一剎語檀越等此雖為剎實是賊標今何不向標下求賊也如其言果於水中見約抱剎仰頭裁出鼻遂禽之約言求就師目前死法和曰檀越有相必不兵死且於王有緣決無他慮王於後當得檀越力耳湘東果釋用為郡守及魏圍江陵約以兵赴救力戰焉法和既平約往進見王僧辨於巴陵謂曰貧道已卻侯景一臂其更何能為檀越宜即逐取乃請還謂湘東王曰侯景自然平矣無足可慮蜀賊將至法和請守巫峽待之乃總諸軍而往親運石以填江三日水遂不流橫之以鐵鎖武陵王紀果遣蜀兵來渡峽口勢蹙進退不可王琳與法和經略一戰而殄之軍次白帝謂人曰諸葛孔明可謂為名將吾自見之此城旁有其埋弩箭鏃一斛許因插表令掘之如其言又嘗至襄陽城北大樹下畫地方二尺令弟子掘之得一龜長尺半以杖叩之曰汝欲出不能得已數百歲不逢我者豈天日乎為授三歸龜乃入草初八疊山多惡疾人法和為採藥療之不過三服皆差即求為弟子山中毒蟲猛獸法和授其禁戒不復噬螫所泊江湖必於峰側結表云此處放生漁者皆無所得才或少獲輒有大風雷船人懼而放之風雨乃定晚雖將兵猶禁諸軍漁捕有竊違者中夜猛獸必來欲噬之或亡其船纜有小弟子戲截蛇頭來詣法和法和曰汝何意殺蛇因指以示之弟子乃見蛇頭齰褲襠而不落法和使懺悔為蛇作功德又有人以牛試刀一下而頭斷來詣法和法和曰有一斷頭牛就卿征命殊急若不為作功德一月內報至其人弗信少日果死法和又為人置宅圖墓以避禍求福嘗謂人曰勿擊馬於碓其人行過鄉曲門側有碓因繫馬於其柱入門中憶法和戒走出將解之馬已斃矣梁元帝以法和為都督郢州刺史封江乘縣公法和不稱臣其啓文朱印名上自稱司徒梁元謂其僕射王褒曰我未嘗有意用陸為三公而自稱何也褒曰彼既以道術自命容是先知梁元帝以法和功業稍重遂就加司徒都督刺史如故部曲數千人通呼為弟子唯以道術為化不以法獄加人又列肆之內不立市丞牧佐之法無人領受但以空檻籥在道間上開一孔受錢賈客店人隨貨多少計其估限自委檻中行掌之司夕方開取條其孔目輸之於庫又法和平常言若不出口時有所論則雄辨無敵然猶帶蠻音善為攻戰具在江夏大聚兵艦欲襲襄陽而入武關梁元帝使止之法和曰法和是求佛之人尚不希釋梵天王坐處豈規王位但於空王佛所與主上有香火因緣見主人應有報至故救援耳今既被疑是業定不可改也於是設供食具大䭔薄餅及魏舉兵法和自郢入漢口將赴江陵梁元帝使人逆之曰此自能破賊但鎮郢州不須動也法和乃還州堊其城門著粗白布衫布褲邪巾大繩束腰坐葦席終日乃脫之及聞梁元敗滅復取前凶服著之哭泣受弔梁人入魏果見䭔餅焉法和始於百里洲造壽王寺既架佛殿更截梁柱曰後四十許年佛法當遭雷雹此寺幽僻可以免難及魏平荊州宮室焚燼總管欲發取壽王佛殿嫌其材短乃停後周氏滅佛法此寺隔在陳境故不及難天保六年春清河王嶽進軍臨江法和舉州入齊文宣以法和為大都督十州諸軍事太尉公西南道大行台大都督五州諸軍事荊州刺史安湘郡公宋蒞為郢州刺史官爵如故蒞弟簉為散騎常侍儀同三司湘州刺史義興縣公梁將侯王真來逼江夏齊軍棄城而退法和與宋蒞兄弟入朝文宣聞其奇術虛心想見備三公鹵簿於城南十二里供帳以待之法和遙見鄴城下馬禹步辛術謂曰公既萬里歸誠主上虛心相待何為作此術法和手持香爐步從路車至於館明日引見給通幰油絡綱車仗身百人詣闕通名不稱官爵不稱臣但云荊山居士文宣宴法和及其徒屬於昭陽殿賜法和錢百萬物萬段甲第一區田一百頃奴婢二百人生資什物稱是宋蒞千段其餘儀同刺史以下各有差法和所得奴婢盡免之曰各隨緣去錢帛散施一日便盡以官所賜宅營佛寺自居一房與凡人無異三年間再為太尉世猶謂之居士無疾而告弟子死期至時燒香禮佛坐繩床而終浴訖將殮尸小縮止三尺許文宣令開棺而視之空棺而已法和書其所居壁而塗之及剝落有文曰十年天子為尚可百日天子急如火周年天子遞代坐又曰一母生三天兩天共五年說者以為婁太后生三天子自孝昭即位至武成傳位後主共五年焉法和在荊郢有少姬年可二十餘自稱越姥身披法服不嫁恆隨法和東西或與其私通十有餘年今者賜棄別更他淫有司考驗並實越姥因爾改適生子數人杜按北史本傳文字稍異意同故不録北齊書卷三十二陸法和傳瞿曇天后時瞿曇羅造光宅歷中宗時南宮說造景龍歷皆舊法之所棄者復取用之徒云革易寧造深微尋亦不行開元中僧一行精諸家曆法言麟德歷行用既久晷緯漸差宰相張說言之玄宗召見令造新歷遂與星官梁令瓚先造黃道游儀圖考校七曜行度准周易大衍之數別成一法行用垂五十年舊唐書卷三十二歷志僧一行玄宗開元九年太史頻奏日蝕不效詔沙門僧一行改造新歷一行奏云今欲創歷立元須知黃道進退請太史令測候星度有司云承前唯依赤道推步官無黃道游儀無由測候時率府兵曹梁令瓚待制於麗正書院因造游儀木樣甚為精密一行乃上言曰黃道游儀古有其術而無其器以黃道隨天運動難用常儀格之故昔人潛思皆不能得今梁令瓚創造此圖日道月交莫不自然契合既於推步尤要望就書院更以銅鐵為之庶得考驗星度無有差舛從之至十三年造成又上疏曰按舜典云在璇樞玉衡以齊七政說者以為取其轉運者為樞持正者為衡皆以玉為之用齊七政之變知其盈縮進退得失政之所在即古太史渾天儀也自周室衰微疇人喪職其制度遺像莫有傳者漢興丞相張蒼首創律歷之學至武帝詔司馬遷等更造漢歷乃定東西立咎儀下漏刻以追二十八宿相距星度與古不同故唐都分天部洛下閎運算轉歷今赤道歷星度則其遺法也後漢永元中左中郎將賈逵奏言臣前上傅安等用黃道度日月弦望多近史官一以赤道度之不與天合至差一日以上願請太史官日月宿簿及星度課與待詔星官考校奏可問典星待詔姚崇等十二人皆曰星圖有規法日月實從黃道官無其器不知施行甘露二年大司農丞耿壽昌奏以圓儀度日月行考驗天運日月行赤道至牽牛東井日行一度月行十五度至婁角日行一度月行十三度此前代所共知也是歲永元四載也明年始詔太史造黃道銅儀冬至日在斗十九度四分度之一與赤道定差二度史官以校日月弦望雖密近而不為望日儀黃道與度運轉難候是以少終其事其後劉洪因黃道渾儀以考月行出入遲速而後代理歷者不遵其法更從赤道命文以驗賈逵所言差謬益甚此理歷者之大惑也今靈台鐵儀後魏明元時都匠解蘭所造規制朴略度刻不均赤道不動乃如膠柱不置黃道進退無准此據赤道月行以驗人歷遲速多者或至十七度少者僅出十度不足以上稽天象敬授人時近祕閣郎中李淳風著法象志備載黃道渾儀法以玉衡旋規別帶日道傍列二百四十九交以攜月游用法頗雜其術竟寢臣伏承恩旨更造游儀使黃道運行以追列舍之變因二分之中以立黃道交於軫奎之間二至陟降各二十四度黃道之內又施白道月環用究陰陽朓朒之數動合天運簡而易從足以製器垂象永傳不朽於是玄宗親為制銘置之於靈台以考星度其二十八宿及中外官與古經不同者凡數十條又詔一行與梁令瓚及諸術士更造渾天儀鑄銅為圓天之象上具列宿赤道及周天度數注水激輪令其自轉一日一夜天轉一周又別置二輪絡在天外綴以日月令得運行每天西轉一匝日東行一度月行十三度十九分度之七凡二十九轉有餘而日月會三百六十五轉而日行匝仍置木匱以為地平令儀半在地下晦明朔望遲速有准又立二木人於地平之上前置鐘鼓以候辰刻每一刻自然擊鼓每辰則自然撞鐘皆於匱中各施輪軸鉤鍵交錯關鎖相持既與天道合同當時共稱其妙鑄成命之曰水運渾天俯視圖置於武成殿前以示百僚無幾而銅鐵漸澀不能自轉遂收置於集賢院不復行用今録游儀制度及所測星度異同開元十二年分遣使諸州所測日晷長短李淳風僧一行所定十二次分野武德已來交蝕及五星祥變著於篇舊唐書卷三十五天文志上僧一行又凡日晷差冬夏至不同南北亦異而先儒一以里數齊之喪其事實沙門一行因修大衍圖更為覆矩圖自丹穴以暨幽都之地凡為圖二十四以考日蝕之分數知夜漏之短長舊唐書卷三十五天文志上僧一行貞觀中李淳風撰法象志始以唐之州縣配焉至開元初沙門一行又增損其書更為詳密既事包今古與舊有異同頗裨後學故録其文著於篇舊唐書卷三十五天文志下僧一行僧一行姓張氏先名遂魏州昌樂人襄州都督郯國公公謹之孫也父擅武功令一行少聰敏博覽經史尤精歷象陰陽五行之學時道士尹崇博學先達素多墳籍一行詣崇借揚雄太玄經將歸讀之數日復詣崇還其書崇曰此書意指稍深吾尋之積年尚不能曉吾子試更研求何遽見還也一行曰究其義矣因出所撰大衍圖及義決一卷以示崇崇大驚因與一行談其奧賾甚嗟伏之謂人曰此後生顏子也一行由是大知名武三思慕其學行就請與結交一行逃匿以避之尋出家為僧隱於嵩山師事沙門普寂睿宗即位敕東都留守韋安石以禮征一行固辭以疾不應命後步往荊州當陽山依沙門悟真以習梵律開元五年玄宗令其族叔禮部郎中洽賚敕書就荊州強起之一行至京置於光太殿數就之訪以安國撫人之道言皆切直無有所隱開元十年永穆公主出降敕有司優厚發遣依太平公主故事一行以為高宗末年唯有一女所以特加其禮又太平驕僭竟以得罪不應引以為例上納其言遽追敕不行但依常禮其諫諍皆此類也一行尤明著述撰大衍論三卷攝調伏藏十卷天一太一經及太一局遁甲經釋氏系録各一卷時麟德歷經推步漸疏敕一行考前代諸家曆法改撰新歷又令率府長史梁令瓚等與工人創造黃道游儀以考七曜行度互相證明於是一行推周易大衍之數立衍以應之改撰開元大衍歷經至十五年卒年四十五賜諡曰大慧禪師初一行從祖東台舍人太素撰後魏書一百卷其天文志未成一行續而成之上為一行制碑文親書於石出內庫錢五十萬為起塔於銅人之原明年幸溫湯過其塔前又駐騎徘徊令品官就塔以告其出豫之意更賜絹五十匹以蒔塔前松柏焉初一行求訪師資以窮大衍至天臺山國清寺見一院古松十數門有流水一行立於門屏間聞院僧於庭布算聲而謂其徒曰今日當有弟子自遠求吾算法已合到門豈無人導達也即除一算又謂曰門前水當卻西流弟子亦至一行承其言而趨入稽首請法盡受其術焉而門前水果卻西流道士邢和璞嘗謂尹愔曰一行其聖人乎漢之洛下閎造歷云後八百歲當差一日必有聖人正之今年期畢矣而一行造大衍正其差謬則洛下閎之言信矣非聖人而何時又有黃州僧泓者善葬法每行視山原即為之圖張說深信重之杜按新唐書未立僧一行傳但在歷志等篇多次記一行事跡與舊唐書所記大同故不贅録舊唐書卷一百九十一方伎僧一行傳僧一行開元九年麟德歷署日蝕比不效詔僧一行作新歷推大衍數立術以應之較經史所書氣朔日名宿度可考者皆合十五年草成而一行卒詔特進張說與歷官陳玄景等次為歷術七篇略例一篇歷議十篇玄宗顧訪者則稱制旨自太初到麟德歷有二十三家與天雖近而未密也至一行密矣其倚數立法固無以易也後世雖有改作者皆依倣而已故詳録之新唐書卷二十七歷志上僧一行及一行考月行出入黃道為圖三十六究九道之增損而蓋天之狀見矣及一行作大衍歷詔太史測天下之晷求其土中以為定數而一行以為天下山河之象存乎兩戒新唐書卷三十一天文志僧一行唐沙門一行鑄渾天儀時稱精妙未幾銅鐵漸澀不能自轉置不復用金質不精水性不行況移之沍寒之地乎遼史卷四十四歷象志僧一行元佑時尚書右丞蘇頌與昭文館校理沈括奉敕詳定渾儀法要遂奏舉吏部勾當官韓公廉通九章勾股法常以推考天度與張衡王蕃僧一行梁令瓚張思訓法式大綱可以尋究金史卷二十二歷志下高曇晟與高開道先是有懷藏戎沙門高曇晟者因縣令設齊士女大集曇晟與其僧徒五十人擁齊衆而反殺縣令及鎮將自稱大乘皇帝立尼靜宣為耶輸皇后建元為法輪至夜遣人招誘高開道結為兄弟改封齊王開道以衆五千人歸之居數月襲殺曇晟悉並其衆杜按新唐書本傳數月作三月五千人作衆餘大同故不録舊唐書卷五十五高開道傳法雅貞觀三年有沙門法雅初以恩幸出入兩宮至是禁絶之法雅怨望出妖言伏法兵部尚書杜如晦鞫其獄法雅乃稱裴寂知其言寂對曰法雅惟云時候方行疾疫初不聞妖言法雅證之坐是免官削食邑之半放歸本邑寂請住京師太宗數之曰計公勳庸不至於此徒以恩澤特居第一武德之時政刑紕繆官方馳紊職公之由但以舊情不能極法歸掃墳墓何得復辭寂遂歸蒲州未幾有狂人自稱信行寓居汾陰方多妖妄常謂寂家僮曰裴公有天分於時信行已死寂監奴恭命以其言白寂寂惶懼不敢聞奏陰呼恭命殺所言者恭命縱令亡匿寂不知之寂遣恭命收納封邑得錢百餘萬因用而盡寂怒將遣人捕之恭命懼而上變太宗大怒謂侍臣曰寂有死罪者四位為三公而與妖人法雅親密罪一也事發之後乃負氣憤怒稱國家有天下是我所謀罪二也妖人言其有天分匿而不奏罪三也陰行殺戮以滅口罪四也我殺之非無辭矣議者多言流配朕其從衆乎於是徙交州竟流靜州俄逢山羌為亂或言反獠劫寂為主太宗聞之曰我國家於寂有性命之恩必不然矣未幾果稱寂率家僮破賊杜按新唐書本傳文簡許多意同故不録舊唐書卷五十七裴寂傳法雅浮屠法雅坐訞言辭連裴寂坐免官削封邑半歸故郡寂請留京師帝讓曰公勳不稱位徒以恩澤居第一武德之政間或弛紊職公為之今歸掃墳墓尚何辭寂遂歸新唐書卷八十八裴寂傳蕭瑀蕭瑀字時文高祖梁武帝曾祖昭明太子祖察後梁宣帝父巋明帝瑀年九歲封新安郡王幼以孝行聞姊為隋晉王妃從入長安聚學屬文端正鯁亮好釋氏常修梵行每與沙門難及苦空必詣微旨常觀劉孝標辨命論惡其傷先王之教迷性命之理乃作非辨命論以釋之大旨以為人稟天地以生孰云非命然吉凶禍福亦因人而有若一之於命其蔽已甚時晉府學士柳顧言諸葛穎見而稱之曰自孝標後數十年間言性命之理者莫能詆詰今蕭君此論足療劉子膏肓太宗以蕭瑀好佛道嘗賚繡佛像一軀並繡瑀形狀於佛像側以為供養之容又賜王褒所書大品般若經一部並賜袈裟以充講誦之服焉會瑀請出家太宗謂曰甚知公素愛桑門今者不能違意瑀旋踵奏曰臣頃思量不能出家太宗以對群臣吐言而取捨相違心不能平瑀尋稱足疾時詣朝堂又不入見太宗謂侍臣曰瑀豈不得其所乎而自慊如此遂手詔曰朕聞物之順也雖異質而成功事之違也亦同形而罕用是以舟浮楫舉可濟千里之川轅引輪停不越一毫之地故知動靜相循易為務曲直相反難為功況乎上下之宜君臣之際者矣朕以無明於元首期托德於股肱思欲去僞歸真除澆反朴至於佛教非意所遵雖有國之常經固弊俗之虛術何則求其道者未驗福於將來修其教者翻受辜於既往至若梁武窮心於釋氏簡文鋭意於法門傾帑藏以給僧祇殫人力以供塔廟及乎三淮沸浪五嶺騰煙假餘息於熊蹯引殘魂於雀鷇子孫覆亡而不暇社稷俄頃而為墟報施之征何其繆也而太子太保宋國公瑀踐覆車之餘軌襲亡國之遺風棄公就私未明隱顯之際身俗口道莫辨邪正之心修纍棄之殃源祈一躬之福本上以違忤君主下則扇習浮華往前朕謂張亮云卿既事佛何不出家瑀乃端然自應請先入道朕即許之尋復不用一回一惑在於瞬息之間自可自否變於帷扆之所乖棟梁之大體豈具瞻之量乎朕猶隱忍至今瑀尚全無悛改宜即去茲朝闕出牧小藩可商州刺史仍除其封舊唐書卷六十三蕭瑀傳上官儀上官儀本陝州陝人也父弘隋江都宮副監因家於江都大業末弘為將軍陳稜所殺儀時幼藏匿獲免因私度為沙門游情釋典尤精三論兼涉獵經史善屬文舊唐書卷八十上官儀傳上官儀上官儀字游韶陝州人父弘為隋江都宮副監大業末為陳稜所殺時儀幼左右匿免昌為沙門服浸工文詞涉貫墳典新唐書卷一百五上官儀傳盧伽阿逸多又有胡僧盧伽阿逸多受詔合長年藥高宗將餌之處俊諫曰修短有命未聞萬乘之主輕服蕃夷之藥昔貞觀末年先帝令婆羅門僧那羅邇娑寐依其本國舊方合長生藥胡人有異術徵求靈草祕石歷年而成先帝服之竟無異效大漸之際名醫莫知所為時議者歸罪於胡人將申顯戮又恐取笑夷狄法遂不行龜鏡若是惟陛下深察高宗納之但加盧伽為懷化大將軍不服其藥杜按新唐書本傳文稍簡意同故不録舊唐書卷八十四郝處俊傳盧伽阿逸多郝處俊入拜東台侍郎時浮屠盧伽阿逸多治丹曰可以續年高宗欲遂餌之處俊諫曰修短固有命異方之劑安得輕服哉昔先帝詔浮屠那羅邇娑寐案其方書為祕劑取靈葩怪石歷歲乃能就先帝餌之俄而大漸上醫不知所為群臣請顯戮其人議者以為取笑夷狄故法不得行前鑒不遠惟陛下深察帝納其言弟拜盧伽逸多為懷化大將軍進處俊同東西台三品新唐書卷一百一十五郝處俊傳理中與姚璹時新都丞朱待辟坐贓至死逮捕繫獄待辟素善沙門理中陰結諸不逞因待辟以殺姚璹為名擬據巴蜀為亂人密表告之者制令璹按其獄璹深持之事涉疑似引而誅死者僅以千數杜按新唐書本傳文稍異意同故不録舊唐書卷八十九姚璹傳理中與姚璹新都丞朱待辟坐贓應死待辟所厚浮屠理中謀殺璹據劍南有密告后者詔璹窮按新唐書卷一百二姚思廉傳附姚璹傳姚璹劉承慶時則天又於明堂後造天堂以安佛像高百餘尺始起建構為大風振倒俄又重營其功未畢證聖元年正月丙申夜佛堂災延燒香堂至曙二堂並盡尋時又無雲而雷起自西北則天欲責躬避正殿宰相姚璹曰此實人火非是天災至如成周宣榭卜代逾長漢武建章盛德彌永今明堂是布政之所非宗祀也則天乃御端門觀酺宴下詔令文武九品已上各上封事極言無有所隱左拾遺劉承慶上疏曰臣聞自古帝王皆有美惡休祥所以昭其德災變所以知其咎天道之常理王者之常事臣愚以為火發既先從麻主後及總章意將所營佛舍恐勞而無益但崇其教即是津梁何假紺宮方存汲引既僻在明堂之後又前逼牲牢之筵兼以厥構崇大功多難畢立像弘法本擬利益黎元傷財役人卻且煩勞家國承前大風摧木天誡已顯今者毒焰冥熾人孽復彰聖人動作必假天人之助一興功役二者俱違厥應昭然殆將緣此臣以為明堂是正陽之位至尊所居展禮班常崇化立政玉帛朝會神靈依憑營之可曰大功損之實非輕事既失嚴禋之所復傷孝理之情陛下昨降明制猶申寅畏之旨群僚理合兢畏震悚勉力司存豈合承恩耽樂安然酺宴又下人感荷聖德睹變憎惶神體克寧豈非深悅但以火氣初止尚多驚懼餘憂未息遽以觀事遏之臣恐憂喜相爭傷於情理故傅曰可憂而為樂取憂之道又古者有火祭四墉四墉積陰之氣祈之以禳火災火陽之氣歡樂陽事火氣方勝不可復興陽事臣聞災變之興至聖不免聿修其德來患可禳陛下垂制博訪許陳至理而左史張鼎以為今既火流王屋彌顯大周之祥通事舍人逢敏奏稱當彌勒初成佛道時有天魔燒宮七寶台須臾散壞斯實諂妄之邪言實非君臣之正論暗昧王化無益萬機夫天道雖高其察彌近神心雖寂其聽彌聰交際皇王事均影響今大風烈火譴告相仍實天人丁寧匡諭聖主使鴻基益固天祿永終之意也伏願陛下乾乾在慮翼翼為懷若涉巨川如承大祭審其致災之理詳其降眚之由無瞢天人之心而興不急之役則兆人蒙賴福祿靡窮幸甚幸甚則天尋令依舊規制重造明堂凡高二百九十四尺東西南北廣三百尺上施寶鳳俄以火珠代之明堂之下圜繞施鐵渠以為辟雍之象天冊萬歲二年三月重造明堂成號為通天宮四月朔日又行親享之禮大赦改元為萬歲通天翼日則天御通天宮之端扆殿命有司讀時令布政於群后舊唐書卷二十二禮儀志二僧崇一僧崇一療李憲稍瘳上玄宗大悅特賜緋袍魚袋以賞異崇一舊唐書卷九十五睿宗諸子讓皇帝李憲傳僧崇一李憲後有疾護醫將膳騎相望也僧崇一者療之少損帝喜甚賜緋袍銀魚新唐書卷八十一讓皇帝李憲傳崔日用與普潤中宗暴崩韋庶人稱制崔日用恐禍及己知玄宗將圖義舉乃因沙門普潤道士王曄密詣藩邸深自結納潛謀翼戴玄宗嘗謂曰今謀此舉直為親不為身日用曰此乃孝感動天事必克捷望速發出其不意若少遲延或恐生變舊唐書卷九十九崔日用傳崔日用與普潤帝崩韋后專制畏禍及更因僧普潤道士王曄私謁臨淄王以自托且密贊大計王曰謀非計身直紓親難爾日用曰至孝動天舉無不克然利先發不則有後憂及韋氏平夜詔權雍州長史以功授黃門侍郎參知機務封齊國公賜實戶二百新唐書卷一百二十一崔日用傳嚴挺之嚴挺之素歸心釋典事僧惠義及至東都鬱鬱不得志成疾自為墓志曰天寶元年嚴挺之自絳郡太守抗疏陳乞天恩允請許養疾歸閒兼授太子詹事前後歷任二十五官每承聖恩嘗忝獎擢不盡驅策駑蹇何階仰答鴻造春秋七十無所展用為人士所悲其年九月寢疾終於洛陽某里之私第十一月葬於大照和尚塔次西原禮也盡忠事君叨載國史勉拙從仕或布人謠陵谷可以自紀文章焉用為飾遺文薄葬斂以時服挺之與裴寬皆奉佛開元末惠義卒挺之服縗麻送於龕所寬為河南尹僧普寂卒寬與妻子皆服縗絰設次哭臨妻子送喪至嵩山故挺之志文云葬於大照塔側祈其靈佑也挺之素重交結有許與凡舊交先歿者厚撫其妻子凡嫁孤女數十人時人重之舊唐書卷九十九嚴挺之傳嚴挺之嚴挺之重交遊許與生死不易嫁故人孤女數十人當時重之然溺志於佛與浮屠惠義善義卒衰服送其喪己乃自葬於其塔左君子以為偏新唐書卷一百二十九嚴挺之傳僧惠范時僧惠范持太平公主權勢逼奪百姓店肆州縣不能理謙光又名薛登將加彈奏或請寢之謙光曰憲台理冤滯何所回避朝彈暮黜亦可矣遂與殿中慕容珣奏彈之反為太平公主所構出為岐州刺史舊唐書卷一百一薛登傳僧惠范景雲中薛登為御史大夫僧慧范怙太平公主勢奪民邸肆官不能直薛登將治之或勸以自安答曰憲府直枉朝奏暮黜可矣遂奏反為主所構出岐州刺史新唐書卷一百一十二薛登傳杜鴻漸杜鴻漸心無遠圖志氣怯懦又酷好浮圖道不喜軍戎既至成都懼旰雄武不復問罪乃以劍南節製表讓於旰鴻漸晚年樂於退靜私第在長興里館宇華靡賓僚宴集鴻漸悠然賦詩曰常願追禪理安能挹化源朝士多屬和之及休致後病令僧剃頂髮及卒遺命其子依胡法塔葬不為封樹冀類緇流物議哂之舊唐書卷一百八杜鴻漸傳杜鴻漸杜鴻漸性畏怯無它遠略而晚節溺浮圖道畏殺戮鴻漸自蜀還食千僧以為有報縉紳效之病甚令僧剔頂髮遺命依浮圖葬不為封樹新唐書卷一百二十六杜暹傳附杜鴻漸傳王縉王縉字夏卿河中人也少好學與兄維早以文翰著名縉弟兄奉佛不茹葷血縉晚年尤甚與杜鴻漸捨財造寺無限極妻李氏卒捨道政里第為寺為之追福奏其額曰寶應度僧三十人住持每節度觀察使入朝必延到寶應寺諷令施財助己修繕初代宗喜祠祀未甚重佛而元載杜鴻漸與縉喜飯僧徒代宗嘗問以福業報應事載等因而啓奏代宗由是奉之過當嘗令僧百餘人於宮中陳設佛像經行念誦謂之內道場其飲膳之厚窮極珍異出入乘廄馬度支具稟給每西蕃入寇必令群僧講誦仁王經以攘虜寇苟幸其退則橫加錫賜胡僧不空官至卿監封國公通籍禁中勢移公卿爭權擅威日相凌奪凡京畿之豐田美利多歸於寺觀吏不能制僧之徒侶雖有贓奸畜亂敗戮相繼而代宗信心不易乃詔天下官吏不得箠曳僧尼又見縉等施財立寺窮極環麗每對揚啓沃必以業果為證以為國家慶祚靈長皆福報所資業力已定雖小有患難不足道也故祿山思明毒亂方熾而皆有子禍僕固懷恩將亂而死西戎犯闕未擊而退此皆非人事之明征也帝信之愈甚公卿大臣既掛以業報則人事棄而不修故大歷刑政日以陵遲有由然也五臺山有金閣寺鑄銅為瓦塗金於上照耀山谷計錢巨億萬縉為宰相給中書符牒令台山僧數十人分行郡縣聚徒講說以求貨利代宗七月望日於內道場造盂蘭盆飾以金翠所費百萬又設高祖已下七聖神座備幡節龍傘衣裳之制各書尊號於幡上以識之舁出內陳於寺觀是日排儀仗百僚序立於光順門以俟之幡花鼓舞迎呼道路歲以為常而識者嗤其不典其傷教之源始於縉也李氏初為左丞韋濟妻濟卒奔縉縉嬖之冒稱為妻實妾也又縱弟妹女尼等廣納財賄貪猥之跡如市賈焉元載得罪縉連坐貶括州刺史移處州刺史大歷十四年除太子賓客留司東都建中二年十二月卒年八十二舊唐書卷一百一十八王縉傳王縉王縉素奉佛不茹葷食肉晚節尤謹妻死以道政里第為佛祠諸道節度觀察使來朝必邀至其所諷令出財佐營作初代宗喜祠祀而未重浮屠法每從容問所以然縉與元載盛陳福業報應帝意向之繇是禁中祀佛諷唄齊薰號內道場引內沙門日百餘饌供珍滋出入乘廄馬度支具稟給或夷狄入寇必合衆沙門誦護國仁王經為禳厭幸其去則橫加錫與不知紀極胡人官至卿監封國公者著籍禁省勢傾公王群居賴寵更相凌奪凡京畿上田美産多歸浮屠雖藏奸宿亂踵相逮而帝終不悟詔天下官司不得捶辱僧尼初五臺山祠鑄銅為瓦金塗之費億萬計縉給中書符遣浮屠數十輩行州縣斂丐資貨縉為上言國家慶祚靈長福報所憑雖時多難無足道者祿山思明毒亂方煽而皆有子禍僕固懷恩臨亂而踣西戎內寇未及擊輒去非人事也故帝信愈篤七月望日宮中造盂蘭盆綴飾鏐琲設高祖以下七聖位幡節衣冠皆具各以帝號識其幡自禁內分詣道佛祠鐃吹鼓舞奔走相屬是日立仗百官班光順門奉迎導從歲以為常群臣承風皆言生死報應故人事置而不修大歷政刑日以堙陵由縉與元載杜鴻漸倡之也性貪冒縱親戚尼女姏招財納賄猥屑相稽若市賈然及敗劉晏等鞫其罪同載論死晏曰重刑再覆有國常典況大臣乎法有首從不容俱死於是以聞上憫其耄不加刑乃貶括州刺史久之遷太子賓客分司東都建中二年死年八十二新唐書卷一百四十五王縉傳王維王維字摩詰太原祁人安祿山陷兩都玄宗出幸維扈從不及為賊所得維服藥取痢僞稱瘖病祿山素憐之遣人迎置洛陽拘於普施寺迫以僞署維弟兄俱奉佛居常蔬食不茹葷血晚年長齊不衣文綵在京師日飯十數名僧以玄談為樂齊中無所有唯茶鐺藥臼經案繩床而已退朝之後焚香獨坐以禪誦為事妻亡不再娶三十年孤居一室屏絶塵纍乾元二年七月卒臨終之際以王縉在鳳翔忽索筆作別縉書又與平生親故作別書數幅多敦厲朋友奉佛修心之旨捨筆而絶舊唐書卷一百九十卷文苑下王維傳王維王維字摩詰九歲知屬辭與弟縉齊名資孝友維工草隸善畫名盛於開元天寶間豪英貴人虛左以迎寧薛諸王待若師友畫思入神至山水平遠雲勢石色繪工以為天機所到學者不及也客有以按樂圖示者無題識維徐曰此霓裳第三疊最初拍也客未然引工按曲乃信兄弟皆篤志奉佛食不葷衣不文彩別墅在輞川地奇勝有華子岡欹湖竹里館柳浪茱萸沜辛夷塢與裴迪游其中賦詩相酬為樂喪妻不娶孤居三十年母亡表輞川第為寺終葬其西新唐書卷二百二文藝中王維傳僧圓靜賊出長夏門轉掠郊墅東濟伊水入嵩山呂元膺誡境上兵重購以捕之數月有山棚鬻鹿於市賊遇而奪之山棚走而征其黨或引官軍共圍之谷中盡獲之窮理得其魁首乃中嶽寺僧圓靜年八十餘嘗為史思明將偉悍過人初執之使巨力者奮錘不能折脛圓靜罵曰鼠子折人腳猶不能敢稱健兒乎乃自置其足教折之臨刑乃曰誤我事不得使洛城流血死者凡數十人留守禦將二人都亭驛卒五人甘水驛卒三人皆潛受其職署而為之耳目自始謀及將敗無知者初李師道多買田於伊闕陸渾之間凡十所處欲以舍山棚而衣食之有訾嘉珍門察者潛部分之以屬圓靜以師道錢千萬僞理嵩山之佛光寺期以嘉珍竊發時舉火於山中集二縣山棚人作亂杜按新唐書本傳無賊出長夏門至無知者一段餘大同故不録舊唐書卷一百二十四李正己傳附李師道傳僧圓靜呂元膺誡境上兵重購以捕之數月有山棚賣鹿於市賊過山棚乃召集其黨或引官兵圍於谷中盡獲之窮理其魁乃中嶽寺僧圓淨年八十餘嘗為史思明將偉悍過人初執之使折其脛錘之不折圓淨罵曰腳猶不解折乃稱健兒乎自置其足教折之臨刑歎曰誤我事不得使洛城流血死者凡數十人留守防禦將二人都亭驛卒五人甘水驛卒三人皆潛受其職署而為之耳目自始謀及將敗無知者初師道多買田於伊闕陸渾之間凡十餘處故以舍山棚而衣食之有訾嘉珍門察者潛部分之以屬圓淨以師道錢千萬僞理佛寺期以嘉珍竊發時舉火於山中集二縣山棚人作亂及窮按之嘉珍門察皆稱害武元衡者元膺以聞送之上都賞告變人楊進李再興錦彩三百匹宅一區授之郎將元膺因請募山河子弟以衛宮城從之盜發之日都城震恐留守兵寡弱不可倚而元膺坐皇城門指使部分氣意自若以故居人帖然杜按新唐書本傳未記中嶽寺僧圓淨事舊唐書卷一百五十四呂元膺傳李廣弘李廣弘者或云宗室親王之胤落髮為僧自云見五嶽四瀆神已當為人主貞元三年自邠州至京師有市人董昌者通導廣弘舍于資敬寺尼智因之室智因本宮人董昌以酒食結殿前射生將韓欽緒李政諫南珍霞神策將魏修李參前越州參軍劉昉陸緩陸絳陸充徐綱等同謀為逆廣弘言嶽瀆神言可以十月十日舉事必捷自欽緒已下皆有署置為宰相以智因尼為后謀於舉事日夜令欽緒擊鼓於凌霄門焚飛龍廄舍草積又令珍霞盜擊街鼓集城中人又令政諫修參等領射生神策兵內應事克縱剽五日朝官悉殺之事未發魏修李參上變令內官王希遷等捕其黨輿斬之德宗因禁止諸色人不得輒入寺觀舊唐書卷一百四十四韓游環傳附李廣弘李廣弘者自言宋室子始為浮屠妄曰我嘗見嶽瀆神當作天子可復冠男子董昌舍廣弘於資敬寺召相工唐郛視之教郛告人曰廣弘且大貴乃誘欽緒神策將魏循李參越州軍事劉昉等作亂昉家數具酒大會廣弘所陰相署置又妄曰神戒我十月十日趣舉約欽緒夜擊鼓譟凌霄門焚飛龍廄循等以神策兵迎廣弘事捷大剽三日循參上變乃擒廣弘及支黨鞫仗內付三司訊實皆殊死廣弘臨刑色自如由是禁人不得入觀祠新唐書卷一百五十六韓游環傳附法湊時有玄法寺僧法湊為寺衆所訴萬年縣尉盧伯達斷還俗後又復為僧伯達上表論之詔中丞宇文邈刑部侍郎張彧大理卿鄭雲逵等三司與功德使判官諸葛述同按鞫舊唐書卷一百五十八鄭餘慶傳法湊浮屠法湊以罪為民訴闕下詔御史中丞宇文邈刑部侍郎張彧大理卿鄭雲逵為三司與功德判官諸葛述參按新唐書一百六十五鄭餘慶傳韋綬韋綬字子章京兆人少有至性喪父刺血寫佛經舊唐書卷一百六十二韋綬傳韋綬韋綬字子章京兆萬年人有至性然不好經喪父挽臂血寫浮屠書新唐書卷一百六十韋綬傳歸登歸登與孟簡劉