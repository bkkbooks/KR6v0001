杜甫之壯麗能兼之者其唯筠乎舊唐書卷一百九十二隱逸吳筠傳吳筠吳筠字貞節華州華陰人通經誼美文辭舉進士不中性高鯁不耐沈浮於時去居南陽倚帝山天寶初召至京師請隸道士籍乃入嵩山依潘師正究其術南遊天台觀滄海與有名士相娛樂文辭傳京師玄宗遣使召見大同殿與語甚悅敕待詔翰林獻玄綱三篇帝嘗問道對曰深於道者無如老子五千文其餘徒喪紙札耳復問神仙治煉法對曰此野人事積歲月求之非人主宜留意筠每開陳皆名教世務以微言諷天子天子重之群沙門嫉其見遇而高力士素事浮屠共短筠於帝筠亦知天下將亂懇求還嵩山詔為立道館安祿山欲稱兵乃還茅山而兩京陷江淮盜賊起因東入會稽剡中大歷十三年卒弟子私諡為宗元先生始筠見惡於力士而斥故文章深底釋氏筠所善孔巢父李白歌詩略相甲乙云新唐書卷一百九十六隱逸吳筠傳慧乘高祖已釋奠召博士徐文遠浮屠慧乘道士劉進喜各講經陸德明隨方立義遍析其要帝大喜曰三人者誠辨然德明一舉輒蔽可謂賢矣賜帛五十匹遷國子博士封吳縣男新唐書卷一百九十八儒學上陸德明傳惠慧乘後高祖親臨釋奠時徐文遠講孝經沙門惠乘講波若經道士劉進喜講老子德明難此三人各因宗指隨端立義衆皆為之屈高祖善之賜帛五十匹貞觀初拜國子博士封吳縣男尋卒撰經典釋文三十卷老子疏十五卷易疏二十卷並行於世太宗後嘗閲德明經典釋文甚嘉之賜其家束帛二百段舊唐書卷一百八十九上儒學上陸德明傳馬嘉運馬嘉運魏州繁水人少出家為沙門明於三論後更還俗專精儒業尤善論難貞觀初纍除越王東閣祭酒頃之罷歸隱居白鹿山十一年召拜太學博士兼弘文館學士預修文思博要嘉運以穎達所撰正義頗多繁雜每掎托之諸儒亦稱為允當舊唐書卷七十三馬嘉運傳馬嘉運馬嘉運魏州繁水人少為沙門還治儒學長論議貞觀初纍除越王東閣祭酒退隱白鹿山諸方來授業至千人新唐書卷一百九十八儒學上馬嘉運傳寶志沙門寶志謂王曇選曰生子當為神仙之宗伯也舊唐書卷一百九十二隱逸王遠知傳寶志浮屠寶志謂王曇選曰生子當為世方士新唐書卷二百四方伎王遠知傳夜光夜光者蘇州人少為浮屠至長安因九仙公主得召見溫泉帝奇其辨賜冠帶授四門博士賜緋衣銀魚金繒千數得侍左右如幸臣杜按舊唐書本傳不載夜光為蘇州人少為浮屠等語新唐書卷二百四方伎張果傳附李輔國李輔國不茹葷血常為僧行視事之隙手持念珠人皆信以為善舊唐書卷一百八十四宦者李輔國傳李輔國李輔國能隨事齪齪謹密取人主親信而內深賊未敢肆不啖葷時時為浮屠詭行人以為柔良不忌也新唐書卷二百八宦者下李輔國傳劉總長慶元年二月己卯幽州節度使劉總奏請去位落髮為僧三月甲子劉總請以私第為佛寺乃遣中使賜寺額曰報恩幽州奏劉總堅請為僧又賜以僧衣賜號大覺總是夜遁去幽州人不知所之夏四月丙寅朔授劉總弟約及總男等一十一人官內五人為刺史餘朝班環衛庚午易定奏劉總已為僧三月二十七日卒於當道界贈太尉舊唐書卷十六穆宗本紀十六附劉總傳劉總及吳元濟就擒李師道梟首王承官憂死田弘正入鎮州總既無黨援懷懼每謀自安之計初總弒逆後每見父史為祟甚慘懼乃於官署後置數百僧厚給衣食令晝夜乞恩謝罪每公退則憩於道場若入他室則忷惕不敢寐晚年恐悸尤甚故請落髮為僧冀以脫禍乃以判官張皋為留後總以落髮上表歸朝穆宗援天平軍節度使既聞落髮乃賜紫號大覺師總行至易州界暴卒舊唐書卷一百四十三劉怦傳附劉總傳劉總及吳元濟李師道平承宗憂死田弘正入鎮州劉總失支助大恐謀自安又數見父兄為崇乃衣食浮屠數百人晝夜祈禳而總憩祠場則暫安或居臥內輒驚不能寐晚年益慘悸請剔髮衣浮屠服欲祓除之會穆宗沖逸宰相崔植杜元穎無遠謀欲寵弘靖重其權故全付總地唯分瀛莫置觀察使拜總檢校司徒兼侍中天平節度使又賜浮屠服號大覺榜其第為佛祠遣使者以節印偕來時總已自髡祝讓節印遂衣浮屠服行及定州卒新唐書卷二百一十二藩鎮劉怦傳附劉總傳開平二年六月辛亥雍州奏鏌鎁山僧法通道璘有道行各賜紫衣舊五代卷四太祖紀四張策張策字少逸敦煌人策少聰警好學尤樂章句然而妙通因果酷奉空教未弱冠落髮為僧居雍之慈恩精廬頗有高致唐廣明末大盜犯闕策遂返初服奉父母逃難君子多之及丁家艱以孝聞服滿自屏郊藪一無干進意若是者十餘載案唐托言云張策自少從學浮圖法號藏機粲名內道場為大德又北夢瑣言載趙崇凝之辭曰張策衣冠子弟無故出家不能參禪訪道抗跡塵外乃于御簾前進詩希望恩澤如此行止豈掩人口某十度知舉十度斥之薛史以為自屏郊藪無仕進意與托言諸書異孔本方出為廣文博士改祕書郎舊五代卷十八張策傳張策張策少好浮圖之說乃落髮為僧居長安慈恩寺新五代史卷三十五張策傳王鎔王鎔宴安既久惑於左道專求長生之要常聚緇黃合練仙丹或講說佛經親受符録西山多佛寺又有王母觀鎔增置館宇雕飾土木次子昭誨當鎔被禍之夕昭誨為軍人攜出府第置之地穴十餘日乃髡其髮被以僧衣屬湖南綱官李震南還軍士以昭誨托於震震置之茶褚中既至湖湘乃令依南嶽寺僧習業歲給其費昭誨年長思歸震即賚送而還時鎔故將符習為汴州節度使會昭誨來投即表其事曰故趙王王鎔小男昭誨年十餘歲遇禍為人所匿免今尚為僧名崇隱謹令赴闕明宗賜衣一襲令脫僧服舊五代史卷五十四王鎔傳王鎔王鎔小子昭誨年十歲其軍士有德鎔者藏之穴中亂定髡其髮被以僧衣遇湖南人李震匿昭誨於茶籠中載之湖南依南嶽為浮圖易名崇隱新五代史卷三十九王鎔傳張全義張全義位極王公不衣羅綺心奉釋老而不溺左道如是數者人以為難自莊宗至洛陽趨向者皆由徑以希恩寵全義不改素履盡誠而已杜按新五代史本傳不記心奉釋老事舊五代史卷六十三張全儀傳蕭希甫蕭希甫宋州人也少舉進士為梁開封尹袁象先書記為巡官希甫不樂乃棄其母妻變姓名亡之鎮州自稱青州掌書記進謁王鎔鎔以希甫為參軍尤不樂居歲餘又亡之易州削髮為僧居百丈山舊五代史卷七十一蕭希甫傳蕭希甫蕭希甫又亡之易州削髮為僧居百丈山莊宗將建國於魏置百官求天下隱逸之士幽州李紹宏薦希甫為魏州推官新五代史卷二十八蕭希甫傳誠惠同光時以方術著者又有僧誠惠誠惠初於五臺山出家能修戒律稱通皮骨肉三命人初歸向聲名漸遠四方供饋不遠千里而至者衆矣自云能役使毒龍可致風雨其徒號曰降龍大師京師旱莊宗迎至洛下親拜之六宮參禮士庶瞻仰謂朝夕可致甘澤禱祝數旬略無征應或謂官以祈雨無驗將加焚燎誠惠懼而遁去及卒賜號法雨大師塔曰慈雲之塔舊五代史卷七十一許寂傳附後唐莊宗皇后劉氏誠惠後唐莊宗皇后劉氏自以出於賤微逾次得立以為佛力惟寫佛書饋賂僧尼而莊宗由此亦佞佛有胡僧自于闐來莊宗率皇后及諸子迎拜之僧游五臺山遣中使供頓所至傾動城邑又有僧誠惠自言能降龍嘗過鎮州王鎔不為之禮誠惠怒曰吾有毒龍五百當遣一龍揭片石常山之人皆魚鱉也會明年滹沱河大水壞鎮州關城人皆以為神莊宗及后率諸子諸妃拜之誠惠端坐不起由是士無貴賤皆拜之獨郭崇韜不拜也許州節度使溫韜以后佞佛因請以私第為佛寺為后薦福新五代史卷十四皇后劉氏傳世宗皇后五代史補世宗皇后符氏即魏王彥卿之女至世宗即位納為皇后既免河中之難其母欲使出家資其福壽后不悅曰死生有命誰能髡首跣足以求苟活也母度不可逼遂止世宗素以后賢又聞命不以出家為念愈賢之所以為天下母也舊五代史卷一百二十一后妃列傳宣懿皇后符氏傳後案玄豹周玄豹者本燕人世為從事玄豹少為僧其師有知人之鑒從游十年餘苦辛無憚師知其可教遂以袁許之術授之大略狀人形貌比諸龜魚禽獸目視臆斷咸造其理及還鄉遂歸俗舊五代史卷七十一周玄豹傳聶嶼聶嶼鄴中人少為僧漸學吟詠舊五代史卷七十三聶嶼傳賈少瑜初劉昫避難河朔匿於北山蘭若有賈少瑜者為僧輟衾袍以溫燠之及昫官達致少瑜進士及第拜監察御史聞者義之杜按新五代史本傳不記此事舊五代史卷八十九劉昫傳張從訓張從訓字德恭本姑臧人其先回鶻別派隨沙阤徙居雲中後從唐武皇家於太原從訓遂為太原人祖君政雲州長史識蕃字通佛理舊五代史卷九十一張從訓傳宋彥筠初宋彥筠入成都據一甲第第中資貨巨萬妓女數十輩盡為其所有一旦與其主母微忿遽擊殺之自後常有所睹彥筠心不自安乃修浮屠法以禳之因而溺志於釋氏其後每歲至金仙入涅之日常衣斬縗號慟於其像前其佞佛也如是家有侍婢數十人皆令削髮披緇以侍左右大為當時所誚舊五代史卷一百二十三宋彥筠傳孫方諫與尼深意孫方諫鄚州清苑縣人也本名方簡廣順初以犯廟諱故改焉定州西北二百里有狼山山上有堡邊人賴之以避剽掠之患因中置佛舍有尼深意者俗姓孫氏主其事以香火之教聚其徒聲言尸不壞因復以衣襟瞻禮信奉有同其生方諫即其宗人也嗣行其教率衆不食葷茹其黨推之為寨主其弟行友繼為定州節度皇朝乾德中以其祅妄惑衆詔毀狼山佛寺遷其尼朽骨赴京遣焚於北郊以行友為諸衛大將軍自是祅徒遂息焉案續通鑒長編建隆二年八月義成節度使同平章事孫行友在鎮逾八年而狼山妖尼深意黨益盛己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進侄保塞軍使全暉皆詣闕待罪詔釋之舊五代史卷一百二十五孫方諫傳孫方諫與尼深意孫方諫鄭州清苑人也初定州西北有狼山堡定人常保以避契丹有尼深意居其中以佛法誘民民多歸之後尼死堡人言其尸不朽因奉而事之尼姓孫氏方諫自以為尼族人即繼行其法堡人推以為主新五代史卷四十九孫方諫傳孫行友孫方諫與尼深意孫行友莫州清苑人世業農初定州西二百里有狼山者當易州中路舊有城堡邊人賴之以避寇山中蘭若有尼姓孫氏名深意有術惑衆行友兄方諫名之為姑師事之甚謹及尼坐亡行友益神其事因以其術燃香燈聚民漸衆自晉少帝與契丹絶好邊州困於轉輸逋民往往依方諫推以為帥方諫懼主帥捕逐乃表歸朝因署為東北面招收指揮使且賜院額曰勝福每契丹軍來必率其徒襲擊之鎧仗畜産所得漸多人益依以避難焉易定帥聞於朝因以方諫為邊界游奕使行友副之自是捍御侵軼多所殺獲乘勝入祁溝關平庸城破飛狐寨契丹頗畏之邊民千餘家賴以無患然亦陰持兩端以圖自固宋初加同平章事狼山佛舍妖妄愈甚衆趨之不可禁行友不自安纍表乞解官歸山詔不允建隆二年乃徙其帑廩召集丁壯繕治兵甲欲還狼山以自固兵馬都監樂繼能密表其事太祖遣閣門副使武懷節馳騎會鎮趙之兵稱巡邊直入其城行友不之覺既而出詔示之令舉族赴闕行友蒼黃聽命既至命侍御史李維嶽就第鞫之得實下詔切責削奪從前官爵勒歸私第仍戮其部下數人遣使馳詣狼山輦其尼師之尸焚之行友弟易州刺史方進兄子保塞軍使全暉皆詣闕待罪詔釋之宋史卷二百五十三孫行友傳張沆張沆性儒雅好釋氏雖久居祿位家無餘財死之日圖書之外唯使鄆之資耳舊五代史卷一百三十一張沆傳李從昶李從昶生於紈綺少習華侈以逸游燕樂為務而音律圖畫無不通之然性好談笑喜接賓客以文翰為賞曾無虛日復篤信釋氏時岐下有僧曰阿闍梨通五天竺語為士人所歸舊五代史卷一百三十二李茂貞傳附李從昶傳僧洪道僧洪道不知何許人通內外學道行尤高大為時人所重天福中居於衡州石羊鎮山谷中馬氏文昭王之嗣位也聞其名召於府使於報慈寺住持洪不應命文昭堅欲致之督責州縣憂懼計無所出率五七十人拱擁入州洪道知之乃引徒弟數輩轉徙入深山中得一巖遂且止息然離舊居抵於山巖下則衆鳥千萬和鳴而隨之州縣雖失其蹤或有相謂曰且深山之中衆鳥何故而鳴又聲韻優逸得非和尚在彼耶試尋果得之於巖所父老再拜曰和尚佛之徒也佛不遣衆生願大王崇重要與和尚相見輒不應召竄入山林於是和尚即得計矣而州縣與鄉村得無勞擾而和尚忍不為之開慈憫耶洪道於是始點頭曰如此則吾為汝行矣及至府文昭以國師待之未幾堅乞歸山文昭知不可留乃許焉其後竟不知所終初洪道之入巖也見一虎在穴乳二子徒弟大駭洪道叱曰無懼彼當移去言訖虎銜二子趨出穴至行之所感也如此馬希范常重一僧號報慈長老能入定觀人休咎希范因問之曰吾於富貴固無遺恨但不知者壽爾吾師以為何如報慈曰大王無憂當與佛齊年希范喜以為享壽無窮及薨也止於四十九初馬希萼之來也希廣以全軍付親校許可瓊使遂擊之可瓊睹希萼衆盛恐懼夜送旗鼓乞降希萼大喜於是兼可瓊之衆長驅而至馬希廣素奉佛聞之計無所出乃被緇衣引群僧念寶勝如來謂之禳災頃之府廨火起人忽紛擾猶念誦之聲未輟其戇如此初邊鎬嘗為僧以覘湖南尤善弄鈸每侵晨必弄鈸行乞遇城往往擲起鈸以度門之高下及來湖南士庶頗有識之者舊五代史卷一百三十三馬殷傳附馬希范傳案語引五代史補僧昭者僧昭者通於術數居兩浙大為錢塘錢鏐所禮謂之國師一旦謁鏐有宮中小兒嬉於側墜下錢數十文鏐見謂之曰速收慮人恐踏破汝錢昭師笑曰汝錢欲踏破須是牛即可鏐喜以為社稷堅牢之義後至曾孫俶舉族入朝因而國除俶年屬丑為牛可謂牛踏錢而破矣僧契盈閩中人通內外學性尤敏速廣順初遊戲錢塘一旦陪吳越王游碧浪亭時潮水初滿舟楫輻輳望之不見其首尾王喜曰吳越地去京師三千餘里而誰知一水之利有如此耶契盈對曰可謂三千里外一條水十二時中兩度潮時人謂之佳對時江南未通兩浙貢賦自海路而至青州故云三千里也舊五代史卷一百三十三錢鏐傳附錢俶傳案語引五代史補僧謙光僧謙光金陵人也素有才辨江南國主以國師禮之然無羈檢飲酒如常國主無以禁制而又於諸肉中尤嗜鵝鱉國主常以從容語及釋氏果報且問曰吾師莫有志願否寡人固欲之謙光對曰老僧無他願但得鵝生四支腿鱉長兩重裙足矣國主大笑顯德中政亂國主猶晏然不以介意一旦因賞花命謙光賦詩因為所諷詩云擁衲對芳叢由來事不同鬢從今日白花似去年紅艷冶隨朝露馨香逐曉風何須對零落然後始知空舊五代史卷一百三十四李忭傳附李景傳案語引五代史補趙鳳燕王劉守光時悉黥燕人以為兵趙鳳懼因髡為僧依燕王弟守奇自匿新五代史卷二十八趙鳳傳永王存霸莊宗遇弒明宗入京師太原猶未知而永王存霸奔於太原已而存霸削髮見北京巡檢符彥超願為僧以求生彥超麾下兵大噪殺存霸新五代史卷二十八張憲傳王建王建立好殺人其晚節始惑浮圖法戒殺生所至人稍安之新五代史卷四十六王建立傳李守貞李守貞以漢室新造嗣君才立自謂舉無遺策又有僧總倫者以占術干守貞謂守貞有人君之位既而守貞敗城中糧盡殺人為食召總倫詰其休咎總倫至曰王自有天分人不能奪然分野災變俟磨滅將盡存留一人一騎即王鵲起之際也守貞深以為信舊五代史卷一百九李守貞傳李守貞與僧總倫後漢高祖崩杜重威死李守貞懼不自安以謂漢室新造隱帝初立天下易以圖而門下僧總倫以方術干守貞為言有非常之相守貞乃決計反初守貞召總倫問之濟否總倫曰王當自有天下然分野方災俟殺人垂盡則王事濟矣守貞以為然新五代史卷五十二李守貞傳馬裔馬裔胤孫好古慕韓愈之為人尤不重佛及廢居里巷追感唐末帝平昔之遇乃依長壽僧舍讀佛書冀申冥報歲除枕籍黃卷中見華嚴楞嚴詞理富贍由是酷賞之仍抄撮之相形於歌詠謂之法喜集又纂諸經要言為佛國記凡數千言或朝之曰公平生以付奕韓愈為高識何前倨而後恭是佛佞公耶公佞佛耶裔胤孫笑而答曰佛佞豫則多矣每閉關養素唯事謳吟著述嗜八分書往來酬答必親禮以衒其墨跡舊五代史卷一百二十七孫裔胤孫傳馬胤裔孫馬胤孫既學韓愈為文故多斥浮屠氏之說及罷歸乃反學佛撰法喜集佛國記行於世時人誚之曰佞清泰不徹乃來佞佛清泰廢帝年號也人有戲胤孫曰公素慕韓愈為人而常誦傅奕之論今反佞佛是佛佞公邪公佞佛邪胤孫答曰豈知非佛佞我也時人傳以為笑新五代史卷五十五馬胤孫傳馮延魯周師南征李景東都副留守馮延魯光州刺史張紹舒州刺史周祚泰州刺史方訥皆棄城走延魯削髮為僧為周兵所獲新五代史卷六十二南唐李忭世家李煜李煜性驕侈好聲色又喜浮圖為高談不恤政事新五代史卷六十二南唐李忭世家王昭遠陳知祥智諲王昭遠成都人也年十三事東郭禪師智諲為童子孟知祥嘗飯僧於府昭遠執巾履從智諲以入知祥見之愛其惠黠新五代史卷六十四後蜀孟知祥世家北漢劉承鈞與繼顒北漢地狹産薄以歲輸契丹故國用日削劉承鈞乃拜五臺山僧繼顒為鴻臚卿紀顒故燕王劉守光之子守光之死以孽子得不殺削髮為浮圖後居五臺山為人多智善商財利自旻世頗以賴之繼顒能講華嚴經四方供施多積畜以佐國用五臺當契丹界上繼顒常得其馬以獻號添都馬歲率數百匹又於柏谷置銀冶募民鑿山取礦烹銀以輸劉氏仰以足用即其冶建寶興軍繼顒後纍官至太師中書令以老病卒追封定王新五代史卷七十北漢劉旻世家韓重贇韓重贇信奉釋氏在安陽六七年課民采木為寺郡內苦之宋史卷二百五十韓重贇傳陶穀契丹主北歸脅陶穀令從行穀逃匿僧舍中衣布褐陽為行者狀穀強記嗜學博通經史諸子佛老咸所總覽多蓄法書名畫善隸書為人雋辨宏博然奔競務進見後學有文采者必極言以譽之聞達官有聞望者則巧詆以排之其多忌好名類此宋史卷二百六十九陶穀傳孫承恭孫承恭少疏縱及長能折節自勵嘗上疏請令州縣長吏詢訪耆老求知民間疾苦吏治得失及舉令文賤避貴少避長輕避重去避來請詔京邑並諸州於要害處設木牌刻其字違者論如律上皆為行之尤奉佛多蔬食所得奉祿太半以飯僧嘗勸上不殺人又請於征戰地修寺及普度僧尼人多言其迂闊云宋史卷二百七十六孫承恭傳王賓王賓事宣祖太祖太宗殆六十年最為勤舊故恩寵尤異前後賜賚數千萬俱奉釋氏在黎陽日按見古寺基即以奉錢修之掘地丈餘得數石佛及石碣有賓姓名賓異其事以聞詔名寺為淳化賜新印經一藏錢三百萬以助之宋史卷二百七十六王賓傳丁謂丁謂在貶所專事浮屠因果之說其所著詩並文亦數萬言宋史卷二百八十三丁謂傳王則王則者本涿州人歲饑流至恩州自賣為人牧羊後隸宣毅軍為小校恩冀俗妖幻相與習五龍滴淚等經及圖讖諸書言釋迦佛衰謝彌勒佛當持世初則去涿母與之訣別刺福字於其背以為記妖人因妄傳字隱起爭信事之而州吏張巒卜吉主其謀黨連德齊諸州約以慶歷八年正旦斷澶州浮梁亂河北會其黨潘方淨以書謁北京留守賈昌朝事覺被執故不待期亟以七年冬至叛王則僭號東平郡王以張巒為宰相卜吉為樞密使建國曰安陽榜所居門曰中京居室廄庫皆立名號改年曰得聖以十二月為正月百姓年十二以上七十以下皆涅其面曰義軍破趙得勝旗幟號令率以佛為稱宋史卷二百九十二王則傳查道查道字湛然歙州休寧人道幼沉嶷不群罕言笑喜親筆硯文徽特愛之未冠以詞業稱侍母渡江奉養以孝聞母嘗病思鱖羹方冬苦寒市之不獲道泣禱於河鑿冰取之得鱖尺許以饋又刲臂血寫佛經母疾尋愈後數年母卒絶意名宦游五臺將落髮為僧一夕震雷破柱道坐其下了無怖色寺僧異之咸勸以仕好學嗜奕棋深信內典平居多茹蔬或止一食默坐終日服玩極於卑儉嘗夢神人謂曰汝位至正郎壽五十七而享年六十四論者以為積善所延也有集二十卷從兄陶宋史卷二百九十六查道傳楊億楊億天性穎悟自幼及終不離翰墨文格雄健才思敏捷略不凝滯對客談笑揮翰不輟精密有規裁善細字起草一幅數千言不加點竄當時學者翕然宗之而博覽強記尤長典章制度時多取正喜誨誘後進以成名者甚衆人有片辭可紀必為諷誦手集當世之述作為筆苑時文録數十篇重交遊性耿介尚名節多周給親友故廩祿亦隨而盡留心釋典禪觀之學所著括蒼武夷穎陰韓城退居汝陽蓬山冠鰲等集內外制刀筆共一百九十四卷宋史卷三百五楊億傳王皞本名王皞字子融元昊反請以字為名性儉嗇街道卒除道侵子融邸店尺寸地至自詣開封府訴之然教飭子孫嚴厲有家法晚學佛氏從僧懷璉游宋史卷三百一十王曾傳附王皞傳歐陽修歐陽修始在滁州號醉翁晚更號六一居士宋史卷三百一十九歐陽修傳種世衡與僧王光信有僧王光信者趫勇善騎射習知蕃部山川道路種世衡出兵常使為嚮導數蕩族帳奏以為三班借職改名嵩世衡為蠟書遣嵩遺剛浪㖫言浪埋等已至朝廷知王有向漢心命為夏州節度使奉錢月萬緡旌節已至趣其歸附以棗綴畫龜喻其早歸之意剛浪㖫得書大懼自所治執嵩歸元昊元昊疑剛浪㖫二己不得還所治且錮嵩阱中使其臣李文貴以剛浪㖫旨報世衡且言不達所遺書意或許通和願賜一言世衡以白籍時朝廷已欲招拊籍召文貴至諭以國家寬大開納意縱使還報元昊得報出嵩禮之甚厚使與文貴偕來自是繼遣使者請降遂稱臣如舊世衡聞野利兄弟已誅為文越境祭之籍疏嵩勞具言元昊未通時世衡畫策遣嵩冒艱險間其君臣遂成猜二因此與中國通請優進嵩官遷三班奉職後嵩因對自陳又進侍禁閣門祗候世衡死籍為樞密使世衡子古上書訟父功為籍所抑古復上書遂贈世衡成州團練使詔流內銓授古大縣簿尉押還本貫籍既罷古復辨理下御史考驗以籍前奏王嵩疏為定詔以其事付史官聽古從官便郡宋史卷三百三十五種世衡傳蘇軾僧淨源蘇軾既至杭大旱饑疫並作軾請於朝免本路上供米三之一復得賜度僧牒易米以救饑者明年春又減價糶常平米多作饘粥藥劑遣使挾醫分坊治病活者甚衆軾曰杭水陸之會疫死比他處常多乃裒羡緡得二千復發橐中黃金五十兩以作病坊稍畜錢糧待之杭本近海地泉鹼苦居民稀少唐刺史李泌始引西湖水作六井民足於水白居易又浚西湖水入漕河自河入田蘇軾收其利以備修湖取救荒餘錢萬緡糧萬石及請得百僧度牒以募役者堤成植芙蓉楊柳其上望之如畫圖杭人名為蘇公堤杭僧淨源舊居海濱與舶客交通舶至高麗交譽之元豐末其王子義天來朝因往拜焉至是淨源死其徒竊持其像附舶往告義天亦使其徒來祭因持其國母二金塔云祝兩宮壽軾不納奏之曰高麗久不入貢失賜豫厚利意欲求朝未測吾所以待之厚薄故因祭亡僧而行祝壽之禮若受而不答將生怨心受而厚賜之正墮其計今宜勿與知從州郡自以理卻之彼庸僧猾商為國生事漸不可長宜痛加懲創朝廷皆從之未幾貢使果至舊例使所至吳越七州費二萬四千餘緡軾乃令諸州量事裁損民獲交易之利無復侵撓之害矣宋史卷三百三十八蘇軾傳趙宗印有僧趙宗印者喜談兵席益薦之范致虛以便宜假官俾充宣撫司參議官兼節制軍馬致虛以大軍遵陸宗印以舟師趨西京金人破京師遣人持登城不下之詔以止入援之師致虛斬之初金人守潼關致虛奪之作長城起潼關迄龍門所築僅及肩宗印又以僧為一軍號尊勝隊童子行為一軍號淨勝隊致虛勇而無謀委己以聽宗印宗印徒大言實未嘗知兵至是宗印舟師至三門津致虛使整兵出潼關次年宗印領兵出武關與致虛合會金將銀朱兵壓境致虛遁宗印兵不戰走轉運使劉汲力戰死焉致虛坐落職責授安遠軍節度副使英州安置高宗幸建康召復資政殿學士知鼎州行至巴陵卒贈銀青光祿大夫宋史卷三百六十二范致虛傳程皓程皓資性過人充養有道和粹之氣自十五六時與弟頤聞汝南周敦頤論學遂厭科舉之習慨然有求道之志泛濫於諸家出入於老釋者幾十年返求諸六經而後得之秦漢以來未有臻斯理者宋史卷四百二十七道學程皓傳張載張載字子厚長安人少喜談兵至欲結客取洮西之地年二十一以書謁范仲淹一見知其遠器乃驚之曰儒者自有名教可樂何事於兵因勸讀中庸載讀其書猶以為未足又訪諸釋老纍年究極其說知無所得反而求之六經嘗坐虎皮講易京師聽從者甚衆宋史卷四百二十七道學張載傳張繹張繹字思叔河南壽安人家甚微年長未知學傭力於市出聞邑官傳呼聲心慕之問人曰何以得此人曰此讀書所致爾即發憤力學遂以文名預鄉里計偕謂科舉之習不足為嘗游僧舍見僧道楷將祝髮從之時周行己官河南警之曰何為捨聖人之學而學佛異日程先生歸可師也會程頤還自涪乃往受業頤賞其穎悟讀孟子志士不忘在溝壑勇士不忘喪其元慨然若有得未及仕而卒頤嘗言吾晚得二士謂繹與尹焞也宋史卷四百二十八道學張繹傳劉子翬劉子翬少喜佛氏說歸而讀易即渙然有得宋史卷四百三十四儒林劉子翬傳黃庭堅黃庭堅游灊皖山谷寺石牛洞樂其林泉之勝因自號山谷道人云宋史卷四百四十四文苑六黃庭堅傳僧真寶僧真寶代州人為五臺山僧正學佛能外死生靖康之擾與其徒習武事於山中欽宗召對便殿眷賚隆縟真寶還山益聚兵助討州不守敵衆大至晝夜拒之力不敵寺舍盡焚酋下令生致真寶至則抗詞無撓酋異之不忍殺也使郡守劉騊誘勸百方終不顧且曰吾法中有口四之罪吾既許宋皇帝以死豈當妄言也怡然受戮北人聞見者歎異焉宋史卷四百五十五忠義僧真寶傳莫謙之莫謙之常州宜興僧人也德佑元年糾合義士捍御鄉閭詔為溧陽尉是冬沒於戰陳贈武功大夫時萬安僧亦起兵舉旗曰降魔又曰時危聊作將事定復為僧旋亦敗死宋史卷四百五十五忠義莫謙之傳越州應天寺僧又有越州應天寺僧者幼貧無以養母剃髮乞食以給晨夕母年一百五歲而終宋史卷四百五十六孝義郭王宗傳附代淵代淵字蘊之本代州人唐末避地導江家世為吏有陰德淵性簡潔事親以孝聞受學於李畋張達謝絶諸生著周易旨要老佛雜說數十篇田況上其書自太常丞改祠部員外郎晚上日菜食巾褐山水間自號虛一子宋史卷四百五十八隱逸中代淵傳譙定譙定字天授涪陵人少喜學佛析其理歸於儒後學易於郭曩氏自見乃謂之象一語以入宋史卷四百五十九隱逸下譙定傳洪蘊沙門洪蘊本姓藍潭州長沙人母翁初以無子專誦佛經既而有娠生洪蘊年十三詣郡之開福寺沙門智笆求出家習方技之書後遊京師以醫術知名太祖召見賜紫方袍號廣利大師太平興國中詔購醫方洪蘊録古方數十以獻真宗在蜀邸洪蘊嘗以方藥謁見咸平初補右街首座纍轉左街副僧録洪蘊尤工診切每先歲時言人生死無不應湯劑精至貴戚大臣有疾者多詔遣診療景德元年卒年六十八又有廬山僧法堅亦以善醫著名久游京師嘗賜紫方袍號廣濟大師後還山景德二年以雍王元份久被疾召赴闕至則元份已薨法堅復歸山而卒宋史卷四百六十一方伎上沙門洪蘊傳僧志言僧志言自言姓許壽春人落髮東京景德寺七俱胝院事清璲初璲誦經勤苦志言忽造璲跪前願為弟子璲見其相貌奇古直視不瞬心異之為授具戒然動止軒昂語笑無度多行市里褰裳疾趨舉指畫空佇立良久時從屠酤游飲啖無所擇衆以為狂璲獨曰此異人也人有欲為齊施輒先知以至不召款門指名取供溫州人林仲方自其家以摩衲來獻舟始及岸遽來取去仁宗每延入禁中徑登坐結趺飯畢遽出未嘗揖也王公士庶召即赴然莫與交一言者或陰卜休咎書紙揮翰甚疾字體遒壯初不可曉其後多驗仁宗春秋漸高嗣未立默遣內侍至言所言所書有十三郎字人莫測何謂後英宗以濮王第十三子入繼衆始悟大宗正守節請書言不顧迫之得潤州字未幾守節薨贈丹陽郡王見寺童義懷撫其背曰德山臨濟懷既落髮住天衣說法大為學者所宗其前知多類此普淨院施浴夜漏初盡門扉未啓方迎佛而浴室有人聲往視則言在焉有具齊薦鱠者並食之臨流而吐化為小鮮群泳而去海客遇風且沒見僧操緪引舶而濟客至都下遇言忽謂之曰非我汝奈何客記其貌真引舟者也與曹州士趙棠善後棠棄官隱居番禺人傳棠與言數以偈頌相寄萬里間輒數日而達棠死亦盛夏身不壞言將死作頌不可曉已而曰我從古始成就逃多國土今南國矣仁宗遣內侍以真身朔像置寺中榜曰顯化禪師其後善厚者禮之見額上熒然有光就視之得舍利宋史卷四百六十二方伎下僧志言僧懷丙僧懷丙真定人巧思出天性非學所能至也真定構木為浮圖十三級勢尤孤絶既久而中級大柱壞欲西北傾他匠莫能為懷丙度短長別作柱命衆工維而上已而卻衆工以一介自從閉戶良久易柱下不聞斧鑿聲趙州洨河鑿石為橋鎔鐵貫其中自唐以來相傳數百年大水不能壞歲久鄉民多盜鑿鐵橋遂欹倒計千夫不能正懷丙不役衆工以術正之使復故河中府浮梁鐵牛八維之一牛且數萬斤後水暴漲絶梁牽牛沒於河募能出之者懷丙以二大舟實土夾牛維之用大木為權衡狀鉤牛徐去其土舟浮牛出轉運使張燾以聞賜紫衣尋卒宋史卷四百六十二方伎下僧懷丙傳僧智緣僧智緣隨州人善醫嘉佑末召至京師舍於相國寺每察脈知人貴賤禍福休咎診父之脈而能道其子吉凶所言若神士大夫爭造之王圭與王安石在翰林圭疑古無此安石曰昔醫和診晉侯而知其良臣將死夫良臣之命乃見於其君之脈則視父知子亦何足怪哉熙寧中王韶謀取青唐上言蕃族重僧而僧結吳叱臘主部帳甚衆請智緣與俱至邊神宗召見賜白金遣乘傳而西遂稱經略大師智緣有辨口徑入蕃中說結吳叱臘歸化而他族俞龍珂禹藏訥令支等皆因以書款韶頗忌惡之言其撓邊事召還以為右街首坐卒宋史卷四百六十二方伎下僧智緣傳王韶與智緣王韶經略熙河遣僧智緣往說之啖以厚利因隨以兵前後殺其老弱數千焚族帳萬數得腹心酋領十餘人又禽其妻子皆不殺趙思忠遂以熙寧七年四月舉洮河二州來降賜以姓名拜榮州團練使宋史卷四百九十二吐蕃傳林靈素林靈素溫州人少從浮屠學苦其師笞罵去為道士善妖幻往來淮泗間丐食僧寺僧寺苦之後得寵於宋徽宗始欲盡廢釋氏以逞前憾既而改其名稱冠服宋史卷四百六十二方伎下林靈素傳莎衣道人莎衣道人姓何氏淮陽軍朐山人嘗游妙嚴寺臨池見影豁然大悟人無貴賤問休咎罔不奇中會有瘥者乞醫命持一草去旬日而愈宋史卷四百六十二方伎下莎衣道人傳李遵勖李遵勖所居第園池冠京城嗜奇石募人載送有自千里至者構堂引水環以佳木延一時名士大夫與宴樂師楊億為文億卒為制服及知許州奠億之墓慟哭而返又與劉筠相友善筠卒存恤其家通釋氏學將死與浮圖楚圓為偈頌卒贈中書令諡曰和文有間宴集二十卷外館芳題七卷宋史卷四百六十四外戚李遵勖傳黃潛善黃潛善進左僕射兼門下侍郎鄆濮相繼陷沒宿泗屢警右丞許景衡以扈衛單弱請帝避其鋒潛善以為不足慮率同列聽浮屠克勤說法宋史卷四百七十三奸臣黃潛善傳錢俶錢俶崇信釋氏前後造寺數百歸朝又以愛子為僧善草書上一日遣使謂曰聞卿善草聖可寫一二紙進來俶即以舊所書絹圖上之詔書褒美因賜玉硯金匣一紅緑象牙管筆龍鳳墨蜀箋盈丈紙皆百數錢俶妻俞氏又進金銀十餘萬犀二十株通犀頳犀玉帶二十二條水晶佛像十二事宋史卷四百八十吳越錢氏世家錢惟治錢俶子惟治善草隸尤好二王書嘗曰心能御手手能御筆則法在其中矣家藏書帖圖書甚衆太宗知之嘗謂近臣曰錢俶兒侄多工草書因命翰林書學賀丕顯詣其第遍取視之曰諸錢皆效浙僧亞棲之跡故筆力軟弱獨惟治為工耳惟治嘗以鍾繇王羲之唐玄宗墨跡凡七軸為獻優詔褒答宋史卷四百八十吳越錢氏世家錢儼錢儼字誠允俶之異母弟也本名信淳化初改焉幼為沙門及長頗謹慎好學俶襲國封命為鎮東軍安撫副使宋史卷四百八十吳越錢氏世家錢昱錢昱好學多聚書喜吟詠多與中朝卿大夫唱酬嘗與沙門贊寧談竹事迭録所記昱得百餘條因集為竹譜三卷俄獻太平興國録宋史卷四百八十吳越錢氏世家奝然雍熙元年日本國僧奝然與其徒五六人浮海而至獻銅器十餘事並本國職員令王年代紀各一卷奝然衣緑自云姓藤原氏父為真連真連其國五品品官也奝然善隸書而不通華言問其風土但書以對云國中有五經書及佛經白居易集七十卷並得自中國土宜五穀而少麥交易用銅錢文曰乾文大寶次應神天皇甲辰歲始於百濟得中國文字今號八蕃菩薩有大臣號紀武內年三百七歲次仁德天皇次履中天皇次敏達天皇次用明天皇有子曰聖德太子年三歲聞十人語同時解之七歲悟佛法於菩提寺講聖鬘經天雨曼陀羅華當此土隋開皇中遣使泛海至中國求法華經次孝德天皇白雉四年律師道照求法至中國從三藏僧玄奘受經律論當此土唐永徽四年也次天豐財重日足姬天皇令僧智通等入唐求大乘法相教當顯慶三年次文武天皇大寶三年當長安元年遣粟田真人入唐求書籍律師道慈求經次阿閉天皇次皈依天皇次聖武天皇寶龜二年遣僧正玄昉入朝當開元四年次孝明天皇聖武天皇之女也天平勝寶四年當天寶中遣使及僧入唐求內外經教及傳戒次天炊天皇次高野姬天皇聖武天皇之女也次白璧天皇二十四年遣二僧靈仙行賀入唐禮五臺山學佛法次桓武天皇遣騰元葛野與空海大師及延歷寺僧澄入唐詣天臺山傳智者止觀義當元和元年也次諾樂天皇次嵯峨天皇次淳和天皇次仁明天皇當開成會昌中遣僧入唐禮五臺次文德天皇當大中年間次清和天皇次陽成天皇次光孝天皇遣僧宗睿入唐傳教當光啓元年也次仁和天皇當此土梁龍德中遣僧寬建等入朝次醍醐天皇次天慶天皇次封上天皇當此土周廣順年也次冷泉天皇今為太上天皇次守平天皇即今王也凡六十四世上皆奝然所記云大中光啓龍德及周廣順中皆嘗遣僧至中國唐書中五代史失其傳太宗召見奝然存撫之甚厚賜紫衣館於太平興國寺其國多有中國典籍奝然之來復得孝經一卷越王孝經新義第十五一卷皆金縷紅羅褾水晶為軸孝經即鄭氏注者越王者乃唐太宗子越王貞新義者記室參軍任希古等撰也奝然復求詣五臺許之令所過續食又求印本大藏經詔亦給之二年隨台州寧海縣商人鄭仁德船歸其國後數年仁德還奝然遣其弟子喜因奉表來謝曰日本國東大寺大朝法濟大師賜紫沙門大然啓傷鱗入夢不忘漢主之恩枯骨合歡猶亢魏氏之敵雖云羊僧之拙誰忍鴻霈之誠奝然誠惶誠恐頓首頓首死罪奝然附商船之離岸期魏闕於生涯望落日而西行十萬里之波濤難盡顧信風而東別數千里之山嶽易過妄以下根之卑適詣中華之盛於是宣旨頻降恣許荒外之跋涉宿心克協粗觀宇內之環奇況乎金闕曉後望堯雲於九禁之中巖扃晴前拜聖燈於五臺之上就三藏而稟學巡數寺而優遊遂使蓮華回文神筆出於北闕之北貝葉印字佛詔傳於東海之東重蒙宜恩忽趁來跡季夏解台州之纜孟秋達本國之郊爰逮明春初到舊邑緇素欣待侯伯慕迎伏惟陛下惠溢四溟恩高五嶽世超黃軒之古人直金輪之新奝然空辭鳳凰之窟更還螻蟻之封在彼在斯只仰皇德之盛越山越海敢忘帝念之深縱粉百年之身何報一日之惠染筆試淚伸紙搖魂不勝慕恩之至謹差上足弟子傳燈大法師位嘉因並大朝剃頭受戒僧祚乾等拜表以聞稱其本國永延二年次戊子二月八日實端拱元年也又別啓貢佛經納青木函琥珀青紅白水晶紅黑木患子念珠各一連宋史卷四百九十一外國日本國傳僧寂照景德元年其國僧寂照等八人來朝寂照不曉華言而識文字繕寫甚妙凡問答並以筆札詔號圓通大師賜紫方袍天聖四年十二月明州言日本國太宰府遣人貢方物而不持本國表詔卻之熙寧五年有僧誠尋至台州止天臺國清寺願留州以聞詔使赴闕誠尋獻銀香爐木患子白琉璃五香水精紫檀琥珀所飾念珠及青色織物綾神宗以其遠人而有戒業處之開寶寺盡賜同來僧紫方袍是後連貢方物而來者皆僧也元豐元年使通事僧仲回來賜號慕化懷德大師宋史卷四百九十一外國日本國傳僧志福遼道宗咸雍五年閏十一月戊申夏國王李秉常遣使乞賜印綬己未僧志福加守司徒遼史卷二十二道宗紀蕭蒲離不蕭蒲離不晚年謝絶人事卜居抹古山屏遠葷茹潛心佛書延有道者談論彌日人問所得何如但曰有深樂惟覺六鑿不相攘餘無知者一日易服無疾而逝遼史卷一百六卓行蕭蒲離不傳金昭聖皇后劉氏昭聖皇后劉氏遼陽人天眷二年九月己亥夜后家若見有黃衣女子入其母室中者俄頃后生性聰慧凡字過目不忘初讀孝經旬日終卷最喜佛書金史卷六十四后妃下昭聖皇后傳光慶光慶好古讀書識大義喜為詩善篆隸尤工大字二十五年卒年五十一上遣使致祭賻銀三百兩重彩十端絹百匹平時喜為善言蓄善藥號善善道人晚信浮屠法自作真贊語皆任達云金史卷七十五左比傳附光慶傳宗雅中京留守宗雅喜事佛世稱善大王海陵知其無能將存之以奉太宗後召至闕不數日竟殺之金史卷七十六太宗諸子宗本傳金豫王永成永成自幼喜讀書晚年所學益醇每暇日引文士相與切磋接之以禮未嘗見驕色自號曰樂善居士有文集行於世云金史卷八十五世宗諸子豫王永成傳楊雲翼與趙秉文楊雲翼嘗與趙秉文代掌文柄時人號楊趙然晚年頗以禪語自污人亦以為秉文之恨云金史卷一百十趙秉文傳李純甫李純甫字之純弘州襄陰人祖安上嘗魁西京進士父采卒於益都府治中純甫幼穎悟異常初業詞賦及讀左氏春秋大愛之遂更為經義學擢承安二年經義進士為文法莊周列禦寇左氏戰國策後進多宗之又喜談兵慨然有經世心純甫為人聰敏少自負其材謂功名可俯拾作矮柏賦以諸葛孔明王景略自期由小官上萬言書援宋為證甚切當路者以迂闊見抑中年度其道不行益縱酒自放無仕進意得官未成考旋即歸隱日與禪僧士子游以文酒為事嘯歌袒裼出禮法外或飲數月不醒人有酒見招不擇貴賤必往往輒醉雖沉醉亦未嘗廢著書然晚年喜佛力探其奧義自類其文凡論性理及關佛老二家者號內稿其餘應物文字為外稿又解楞嚴金剛經老子莊子又有中庸集解鳴道集解號中國心學西方文教數十萬言以故為名教所貶云金史卷一百二十六文藝李純甫傳褚承亮天會六年斡離不既破真定拘籍境內進士試安國寺褚承亮名亦在籍中匿而不出金史卷一百二十七隱逸褚成亮傳李懋李懋不知何許人有異術正大間游京兆行省完顏合達愛其術與俱至汴京薦於哀宗遣近侍密問國運否泰言無忌避居之繁台寺朝士日走問之或能道隱事及吉凶之變人以為神帝惡其言太泄遣使者殺之使者乃持酒肴入寺懋出迎笑曰是矣使者曰何謂也懋曰我數當盡今日尚復何言遂索酒痛飲就死金史卷一百三十一方伎李懋傳僧子聰歲丙辰春三月忽必烈命僧子聰卜地於桓州東灤水北城開平府經營宮室元史卷四世祖紀元仁宗仁宗天性慈孝聰明恭儉通達儒術妙悟釋典嘗曰明心見性佛教為深修身治國儒道為切又曰儒者可尚以能維持三綱五常之道也平居服御質素淡然無欲不事游畋不喜征伐不崇貨利事皇太后終身不違顏色待宗戚勳舊始終以禮大臣親老時加恩賚太官進膳必分賜貴近有司奏大辟每慘惻移時其孜孜為治一遵世祖之成憲云元史卷二十六仁宗紀三月兒思蠻月兒思蠻事憲宗襲父爵兼領僧人元史卷一百二十四哈剌亦哈赤北魯傳忽蘭忽蘭性純篤然酷好佛嘗施千金修龍宮寺建金輪大會供僧萬人卒年四十二贈太保金紫光祿大夫上柱國追封雲國公諡康忠元史卷一百二十四速哥傳鐵哥鐵哥姓伽乃氏迦葉彌兒人迦葉彌兒者西域築乾國也父斡脫赤與叔父那摩俱學浮屠氏斡脫赤兄弟相謂曰世道擾攘吾國將亡東北有天子氣蓋往歸之乃偕入見太宗禮遇之定宗師事那摩以斡脫赤佩金符奉使省民瘼憲宗尊那摩為國師授玉印總天下釋教斡脫赤亦貴用事領迦葉彌兒萬戶奏曰迦葉彌兒西陲小國尚未臣服請往諭之詔偕近侍以往其國主不從怒而殺之帝為發兵誅國主元貞元年封代國公諡忠遂斡脫赤之歿鐵哥甫四歲性穎悟不為嬉戲從那摩入見帝問誰氏子對曰兄斡脫赤子也帝方食雞輟以賜鐵哥鐵哥捧而不食帝問之對曰將以遺母帝奇之加賜一雞世祖即位幸香山永安寺見書畏吾字於壁問誰所書僧對曰國師兄子鐵哥書也帝召見愛其容儀秀麗語音清亮命隸丞相孛羅備宿衛先是世祖事憲宗甚親愛後以讒稍疏國師導世祖宜加敬慎遂友愛如初至是帝將用鐵哥曰吾以酬國師也於是鐵哥年十七詔釋貴家女妻之辭曰臣母漢人每欲求漢人女為婦臣不敢傷母心乃為娶冉氏女元史卷一百二十五鐵哥傳阿魯渾薩理阿魯渾薩理畏兀人祖阿台薩理當太祖定西域還時因從至燕會畏兀國王亦都護請於朝蓋歸其民詔許之遂復西還精佛氏學生乞台薩理襲先業通經律論業既成師名之曰萬全至元十二年入為釋教都總統拜正議大夫同知總制院事加資德大夫統制使年七十卒子三人長曰畏吾兒薩理纍官資德大夫中書右丞行泉府太卿季曰島瓦赤薩理阿魯渾薩理其中子也以父字為全氏幼聰慧受業於國師八哈思巴既通其學且解諸國語世祖聞其材俾習中國之學於是經史百家及陰陽歷數圖緯方技之說皆通習之後事裕宗入宿衛深見器重至元二十年有西域僧自言能知天象譯者皆莫能通其說帝問左右誰可使者侍臣脫烈對曰阿魯渾薩理可即召與論難僧大屈服帝悅令宿衛內朝元史卷一百三十阿魯渾薩理傳劉秉忠劉秉忠字仲晦初名侃因從釋氏又名子聰拜官後始更今名其先瑞州人也世仕遼為官族秉忠生而風骨秀異志氣英爽不羈八歲入學日誦數百言年十三為質子於帥府十七為邢台節度使府令史以養其親居常鬱鬱不樂一日投筆歎曰吾家纍世衣冠乃汩沒為刀筆吏乎丈夫不遇於世當隱居以求志耳即棄去隱武安山中久之天寧虛照禪師遣徒招致為僧以其能文詞使掌書記後遊雲中留居南堂寺世祖在潛邸海雲禪師被召過雲中聞其博學多材藝邀與俱行既入見應對稱旨屢承顧問秉忠於書無所不讀尤邃於易及邵氏經世書至於天文地理律歷三式六壬遁甲之屬無不精通論天下事如指諸掌世祖大愛之海雲南還秉忠遂留藩邸後數歲奔父喪賜金百兩為葬具仍遣使送至邢州服除復被召奉旨還和林元史卷一百五十七劉秉忠傳姚樞姚樞字公茂柳城人後遷洛陽歲乙未南伐詔樞從惟中即軍中求儒道釋醫卜者元史卷一百五十八姚樞傳竇默竇默字子聲初名傑字漢卿廣平肥鄉人幼知讀書毅然有立志適中書楊惟中奉旨招集儒道釋之士默乃北歸隱於大名與姚樞許衡朝暮講習至忘寢食繼還肥鄉以經術教授由是知名元史卷一百五十八竇默傳郭守敬郭守敬因奏唐一行開元間令南宮說天下測景晝中見者凡十三處今疆宇比唐尤大若不遠方測驗日月交食分數時刻不同晝夜長短不同日月星辰去天高下不同即目測驗人少可先南北立表取直測景帝可其奏元史卷一百六十四郭守敬傳趙孟俯久之趙孟俯遷知汾州未上有旨書金字藏經既成除集賢直學士江浙等處儒學提舉遷泰州尹未上帝又嘗稱孟俯操履純正博學多聞書畫絶倫旁通佛老之旨皆人所不及有不悅者間之帝初若不聞者又有上書言國史所載不宜使孟俯與聞者帝乃曰趙子昂世祖皇帝所簡拔朕特優以禮貌置於館閣典司述作傳之後世此屬呶呶何也俄賜鈔五百錠謂侍臣曰中書每稱國用不足必持而不與其以普慶寺別貯鈔給之孟俯嘗纍月不至宮中帝以問左右皆謂其年老畏寒敕御府賜貂鼠裘孟俯所著有尚書注有琴原樂原得律呂不傳之妙詩文清邃奇逸讀之使人有飄飄出塵之想篆籀分隸真行草書無不冠絶古今遂以書名天下天竺有僧數萬里來求其書歸國中寶之其畫山水木石花竹人馬尤精緻前史官楊載稱孟俯之才頗為書畫所掩知其書畫者不知其文章知其文章者不知其經濟之學人以為知言云元史卷一百七十二趙孟俯傳石抹宜孫石抹宜孫為學本於經術而兼通名法縱橫天文地理術數方技釋老之說見稱薦紳間元史卷一百八十八石抹宜孫傳許謙許謙又有自省編晝之所為夜必書之其不可書者則不為也其他若天文地理典章制度食貨刑法字學音韻醫經術數之說亦靡不該貫旁而釋老之言亦洞究其蘊嘗謂學者孰不曰辟異端苟不深探其隱而識其所以然能辨其同異別其是非也幾希元史卷一百八十九儒學許謙傳阿尼哥阿尼哥尼波羅國人也其國人稱之曰八魯布幼敏悟異凡兒稍長誦習佛書期年能曉其義同學有為繪畫妝塑業者讀尺寸經阿尼哥一聞即能記長善畫塑及鑄金為像中統元年命帝師八合斯巴建黃金塔於吐蕃尼波羅國選匠百人往成之得八十人求部送之人未得阿尼哥年十七請行衆以其幼難之對曰年幼心不幼也乃遣之帝師一見奇之命監其役明年塔成請歸帝師勉以入朝乃祝髮受具為弟子從帝師入見帝視之久問曰汝來大國得無懼乎對曰聖人子育萬方子至父前何懼之有又問汝來何為對曰臣家西域奉命造塔吐蕃二載而成見彼土兵難民不堪命願陛下安輯之不遠萬里為生靈而來耳又問汝何所能對曰臣以心為師頗知畫塑鑄金之藝帝命取明堂針灸銅像示之曰此宣撫王楫使宋時所進歲久闕壞無能修完之者汝能新之乎對曰臣雖未嘗為此請試之至元二年新像成關鬲脈絡皆備金工歎其天巧莫不愧服凡兩京寺觀之像多出其手為七寶鑌鐵法輪車駕行幸用以前導原廟列聖御容織錦為之圖畫弗及也至元十年始授人匠總管銀章虎符十五年有詔返初服授光祿大夫大司徒領將作院事寵遇賞賜無與為比卒贈太師開府儀同三司涼國公上柱國諡敏慧子六人曰阿僧哥大司徒阿述臘諸色人匠總管府達魯花赤有劉元者嘗從阿尼哥學西天梵相亦稱絶藝元字秉元薊之寶坻人始為黃冠師事青州把道録傳其藝非一至元中凡兩都名剎塑土范金搏換為佛像出元手者神思妙合天下稱之其所為西番佛像多祕人罕得見者元史二百三方技傳哈麻初哈麻嘗陰進西天僧以運氣術媚帝帝習為之號演揲兒法演揲兒華言大喜樂也哈麻之妹壻集賢學士禿魯帖木兒故有寵於帝與老的沙八郎答剌馬吉的波迪哇兒禡等十人俱號倚納禿魯帖木兒性奸狡帝愛之言聽計從亦薦西蕃僧伽璘真於帝其僧善祕密法謂帝曰陛下雖尊居萬乘富有四海不過保有見世而已人生能幾何當受此祕密大喜樂禪定帝又習之其法亦名雙修法曰演揲兒曰祕密皆房中術也帝乃詔以西天僧為司徒西蕃僧為大元國師其徒皆取良家女或四人或三人奉之謂之供養於是帝日從事於其法廣取女婦惟淫戲是樂又選采女為十六天魔舞八郎者帝諸弟與其所謂倚納者皆在帝前相與褻狎甚至男女裸處號所處室曰皆即兀該華言事事無礙也君臣宣淫而群僧出入禁中無所禁止醜聲穢行著聞於外雖市井之人亦惡聞之皇太子年日以長尤深疾禿魯帖木兒等所為欲去之未能也明年二月哈麻既為相自以前所進蕃僧為恥告其父禿魯曰我兄弟位居宰輔宜導人主以正今禿魯帖木兒專媚上以淫褻天下士大夫必譏笑我將何面目見人我將除之且上日趨於昏暗何以治天下今皇太子年長聰明過人不若立以為帝而奉上為太上皇其妹聞之歸告其夫禿魯帖木兒恐皇太子為帝則己必先見誅即以聞於帝然不敢斥言淫褻事第曰哈麻謂陛下年老故耳帝大驚曰朕頭未白齒未落遽謂我為老耶帝即與禿魯帖木兒謀去哈麻雪雪計已定禿魯帖木兒走匿尼寺中明日帝遣使傳旨哈麻與雪雪毋早入朝其家居聽旨元史卷二百五奸臣傳孝定李太后孝定李太后顧好佛京師內外多置梵剎動費巨萬帝亦助施無算張居正在日嘗以為言未能用也明史卷一百十四后妃孝定李太后傳懷慶公主懷慶公主母成穆孫貴妃下嫁王寧寧壽州人既尚主掌後軍都督府事寧能詩頗好佛嘗侍帝燕語勸帝誦佛經飯僧為太祖資福帝不懌自是恩禮漸衰久之坐事下獄見原卒明史卷一百二十一公主懷慶公主傳朱棣與道衍姚廣孝王明成祖朱棣密與僧道衍謀令指揮張玉朱能潛納勇士八百人入府守衛明史卷五成祖紀一道衍姚廣孝永樂二年四月壬申僧道衍為太子少師復其性姚賜名廣孝明史卷六成祖紀二姚廣孝姚廣孝長洲人本醫家子年十四度為僧名道衍字斯道事道士席應真得其陰陽術數之學嘗游嵩山寺相者袁珙見之曰是何異僧目三角形如病虎性必嗜殺劉秉忠流也道衍大喜洪武中詔通儒書僧試禮部不受官賜僧服還經北固山賦詩懷古其儕宗泐曰此豈釋子語耶道衍笑不答高皇后崩太祖選高僧侍諸王為誦經薦福宗泐時為左善世舉道衍燕王與語甚合請以從至北平住持慶壽寺出入府中跡甚密時時屏人語及太祖崩惠帝立以次削奪諸王周湘代齊岷相繼得罪道衍遂密勸成祖舉兵成祖曰民心向彼奈何道衍曰臣知天道何論民心乃進袁珙及卜者金忠於是成祖意益決陰選將校勾軍卒收材勇異能之士燕邸故元宮也深邃道衍練兵後苑中穴地作重屋繚以厚垣密甃瓴瓶缶日夜鑄軍器畜鵝鴨亂其聲建文元年六月燕府護衛百戶倪諒上變詔逮府中官屬都指揮張信輸誠於成祖成祖遂決策起兵適大風雨至檐瓦墜地成祖色變道衍曰祥也飛龍在天從以風雨瓦墜將易黃也兵起以誅齊泰黃子澄為名號其衆曰靖難之師道衍輔世子居守其年十月成祖襲大寧李景隆乘間圍北平道衍守禦甚固擊卻攻者夜縋壯士擊傷南兵援師至內外合擊斬首無算景隆平安等先後敗遁成祖圍濟南三月不克道衍馳書曰師老矣請班師乃還復攻東昌戰敗亡大將張玉復還成祖意欲稍休道衍力趣之益募勇士敗盛庸破房昭西水寨道衍語成祖毋下城邑疾趨京師京師單弱勢必舉從之遂連敗諸將於淝河靈璧渡江入京師成祖即帝位授道衍僧録司左善世帝在藩邸所接皆武人獨道衍定策起兵及帝轉戰山東河北在軍三年或旋或否戰守機事皆決於道衍道衍未嘗臨戰陳然帝用兵有天下道衍力為多論功以為第一永樂二年四月拜資善大夫太子少師復其姓賜名廣孝贈祖父如其官帝與語呼少師而不名命蓄髮不肯賜第及兩宮人皆不受常居僧寺冠帶而朝退仍緇衣出振蘇湖至長洲以所賜金帛散宗族鄉人重修太祖實録廣孝為監修又與解縉等纂修永樂大典書成帝褒美之帝往來兩都出塞北征廣孝皆留輔太子於南京五年四月皇長孫出閣就學廣孝侍說書十六年三月入覲年八十有四矣病甚不能朝仍居慶壽寺車駕臨視者再語甚歡賜以金唾壺問所欲言廣孝曰僧溥洽繫久願赦之溥洽者建文帝主録僧也初帝入南京有言建文帝為僧遁去溥洽知狀或言匿溥洽所帝乃以他事禁溥洽而命給事中胡濴等遍物色建文帝久之不可得溥洽坐繫十餘年至是帝以廣孝言即命出之廣孝頓首謝尋卒帝震悼輟視朝二日命有司治喪以僧禮葬追贈推誠輔國協謀宣力文臣特進榮録大夫上柱國榮國公諡恭靖賜葬房山縣東北帝親制神道碑志其功官其養子繼尚寶少卿廣孝少好學工詩與王賓高啓楊孟載友善宋濂蘇伯衡亦推獎之晚著道餘録頗毀先儒識者鄙焉其至長洲候同産姊姊不納訪其友王賓賓亦不見但遙語曰和尚誤矣和尚誤矣復往見姊姊詈之廣孝惘然洪熙元年加贈少師配享成祖廟庭嘉靖九年世宗諭閣臣曰姚廣孝佐命嗣興勞烈具有顧係釋氏之徒班諸功臣侑食太廟恐不足尊敬祖宗於是尚書李時偕大學士張璁桂萼等議請移祀大興隆寺太常春秋致祭詔曰可明史卷一百四十五姚廣孝傳聊讓聊讓蘭州人肅府儀衛司餘丁也好學有志尚明習時務景帝嗣位懲王振蒙蔽大辟言路吏民皆得上書言事景泰元年六月讓詣闕陳數事其略曰邇歲土木繁興異端盛起番僧絡驛污吏縱橫相臣不正其非御史不劾其罪上下蒙蔽民生凋瘵明史卷一百六十四聊讓傳許譽卿福王立起許譽卿光祿卿不赴國變剃髮為僧久之卒明史卷二百五十八許譽卿傳盧象晉其後南都亡盧象觀赴水死盧象晉為僧一門先後赴難者百餘人明史卷二百六十一盧象升傳蔡懋德蔡懋德字維立崑山人少慕王守仁為人著管見宗良知之說舉萬曆四十七年進士授杭州推官崇禎初出為江西提學副使好以守仁拔本塞源論教諸生大抵釋氏之緒論明史卷二百六十三蔡懋德傳申甫申甫者僧也好談兵方私制戰車火器帝納金聲言取其車入覽授都司僉書即日召見奏對稱旨超擢副總兵敕募新軍便宜從事改聲御史參其軍甫倉猝募數千人皆市井游手所需軍裝戎器又不時給而是時大清兵在郊圻久勢當速戰急出營柳林總理滿桂節制諸軍甫不肯為下桂卒掠民間甫軍捕之桂輒索去聲以兩軍不和聞帝即命聲調護亡何桂歿甫連敗於柳林大井乃結車營盧溝橋大清兵繞出其後御車者惶懼不能轉殲戮殆盡甫亦陳亡聲痛傷之言甫受事日淺直前衝鋒遺骸矢刃殆遍非喋血力戰不至此帝亦傷之命豫恤典明史卷二百七十七金聲傳陳子龍陳子龍與同邑夏允彝皆負重名允彝死子龍念祖母年九十不忍割遁為僧尋以受魯王部院職銜結太湖兵欲舉事事露被獲乘間投水死明史卷二百七十七陳子龍傳王冕王冕字元章諸暨人幼貧父使牧牛竊入學舍聽諸生誦書暮乃返亡其牛父怒撻之已而復然母曰兒癡如此曷不聽其所為冕因去依僧寺夜坐佛膝上映長明燈讀書會稽韓性聞而異之録為弟子遂稱通儒性卒門人事冕如事性屢應舉不中棄去北遊燕都客祕書卿泰不花家擬以館職薦力辭不就既歸每大言天下將亂攜妻孥隱九里山樹梅千株桃杏半之自號梅花屋主善畫梅求者踵至以幅長短為得米之差嘗仿周官著書一卷曰持此遇明主伊呂事業不難致也太祖下婺州物色得之置幕府授咨議參軍一夕病卒明史卷二百八十五王冕傳趙介趙介字伯貞番禺人博通六籍及釋老書氣豪邁無仕進意行以囊自隨遇景賦詩投其中日往來西樵泉石間有司纍薦皆辭免洪武二十二年坐纍逮赴京卒於南昌舟次四子潔絢繹純皆善詩文工篆隸絢隱居不出有父風純仕御史明史卷二百八十五文苑趙介傳王洪王洪者字希范錢塘人八歲能文十八成進士授吏科給事中改翰林檢討偕稱等與修大典歷修撰侍講帝頒佛曲於塞外命洪為文逡巡不應詔為同列所排不復進用卒官而稱後坐纍謫交址復以縉事連及繫死獄中明史卷二百八十六文苑王洪傳楊黼楊黼雲南太和人也好學讀五經皆百遍工篆籀好釋典或勸其應舉笑曰不理性命理外物耶庭前有大桂樹縛板樹上題曰桂樓偃仰其中歌詩自得躬耕數畝供甘膬但求親悅不顧餘也注孝經數萬言證群書根性命字皆小篆所用硯乾將下樓取水硯池忽滿自是為常時人咸異之父母歿為傭營葬畢入雞足棲羅漢壁石窟山十餘年壽至八十子孫迎歸一日沐浴令子孫拜曰明日吾行矣果卒明史卷二百九十八隱逸楊黼傳戴思恭戴思恭字原禮浦江人以字行受學於義烏朱震亨震亨師金華許謙得朱子之傳又學醫於宋內侍錢塘羅知悌知悌得之荊山浮屠浮屠則河間劉守真門人也震亨醫學大行時稱為丹溪先生愛思恭才敏盡以醫術授之明史卷二百九十九方伎戴思恭智光時有浮屠智光者亦賜號圓融妙慧淨覺弘濟輔國光范衍教灌頂廣善大國師賜以金印智光武定人洪武時奉命兩使烏斯藏諸國永樂時又使烏斯藏迎尚師哈立麻遂通番國諸經多所譯解歷事六朝寵錫冠群僧與淵然輩淡泊自甘不失戒行逮成化正德嘉靖朝邪妄雜進恩寵濫加所由與先朝異矣明史卷二百九十九劉淵然傳附興安興安佞佛臨歿遺命舂骨為灰以供浮屠明史卷三百宦官一金英傳附僧繼曉憲宗之世李孜省僧繼曉以祈禱被寵任萬安尹直彭華等至因之以得高位明史卷三百七佞幸傳繼曉繼曉江夏僧也憲宗時以祕術因梁芳進授僧録司左覺義進右善世命為通元翊教廣善國師日誘帝為佛事建大永昌寺於西市逼徙民居數百家費國帑數十萬員外郎林俊請斬芳繼曉以謝天下幾得重譴繼曉虞禍及乞歸養母並乞空名度牒五百道帝悉從之帝初即位即以道士孫道玉為真人其後西番僧劄巴堅參封萬行莊嚴功德最勝智慧圓明能仁感應顯國光教弘妙大悟法王西天至善金剛普濟大智慧佛其徒劄實巴鎖南堅參端竹也失皆為國師錫誥命服食器用僭擬王者出入乘棕輿衛卒執金吾仗前導錦衣玉食幾千人取荒冢頂骨為數珠髑髏為法碗給事中魏元等切諫不納尋進劄實巴為法王班卓兒藏卜為國師又封領占竹為萬行清修真如自在廣善普慧弘度妙應掌教翊國正覺大濟法王西天圓智大慈悲佛又封西天佛子劄失藏卜劄失堅參乳奴班丹鎖南堅參法領占五人為法王其他授西天佛子大國師國師禪師者不可勝計羽流加號真人高士者亦盈都下大國師以上金印真人玉冠玉帶玉圭銀章繼曉尤奸黠竊權所奏請立從成化二十一年星變言官極論其罪始勒為民而諸番僧如故孝宗初詔禮官議汰禮官言諸寺法王至禪師四百三十七人剌麻諸僧七百八十九人華人為禪師及善世覺義諸僧官一百二十人道士自真人高士及正一演法諸道官一百二十三人請俱貶黜詔法王佛子遞降國師禪師都綱餘悉落職為僧遣還本土追奪誥敕印章儀仗諸法物真人降左正一高士降左演法亦追奪印章及諸玉器僧録司止留善世等九員道録司留正一等八員餘皆廢黜而繼曉以科臣林廷玉言逮治棄市明史卷三百七佞幸繼曉傳俺答自丙兔據青海有切盡台吉者河套酋吉能從子俺答從孫也從之而西屢掠番人不得志邀俺答往助俺答雅欲侵瓦剌乃假迎活佛名擁衆西行疏請授丙兔都督賜金印且開茶市部議不許但稍給以茶俺答既抵瓦剌戰敗而還乃移書甘肅守臣乞假道赴烏斯藏守臣不能拒遂越甘肅而南會諸酋於海上番人益遭蹂躪多竄徙八年春始以活佛言東還而切盡弟火落赤及俺答庶兄子永邵卜遂留居青海不去八月丙兔率衆掠番並內地人畜詔絶其市賞俺答聞之馳書切責乃盡還所掠執獻為惡者六人自罰牛羊七百帝嘉其父恭順賚之銀幣即以牛羊賜其部人為惡者付之自治仍許貢市俺答益感德明史卷三百三十西域傳昆澤思巴大乘法王大乘法王者烏斯藏僧昆澤思巴也其徒亦稱為尚師永樂時成祖既封哈立麻又聞昆澤思巴有道術命中官賚璽書銀幣征之其僧先遣人貢舍利佛像遂偕使者入朝十一年二月至京帝即延見賜藏經銀鈔彩幣鞍馬茶果諸物封為萬行圓融妙法最勝真如慧智弘慈廣濟護國演教正覺大乘法王西天上善金剛普應大光明佛領天下釋教賜印誥袈裟幡幢鞍馬傘器諸物禮之亞於大寶法王明年辭歸賜加於前命中官護行後數入貢帝亦先後命中官喬來喜楊三保賚賜佛像法器袈裟禪衣絨錦彩幣諸物洪熙宣德間並來貢成化四年其王完卜遣使來貢禮官言無法王印文且從洮州入非制宜減其賜物使者言所居去烏斯藏二十餘程涉五年方達京師且所進馬多乞給全賜乃命量增十七年來貢弘治元年其王桑加瓦遣使來貢故事法王卒其徒自相繼承不由朝命三年輔教王遣使奉貢奏舉大乘法王襲職帝但納其貢賜賚遣還不命襲職正德五年遣其徒綽吉我些兒等從河州衛入貢禮官以其非貢道請減其賞並治指揮徐經罪從之已綽吉我些兒有寵於帝亦封大德法王十年僧完卜鎖南堅參巴爾藏卜遣使來貢乞襲大乘法王禮官失於稽考竟許之嘉靖十五年偕輔教闡教諸王來貢使者至四千餘人帝以人數逾額減其賞並治四川三司官濫送之罪初成祖封闡化等五王各有分地惟二法王以游僧不常厥居故其貢期不在三年之列然終明世奉貢不絶云明史卷三百三十一西域傳釋迦也失大慈法王大慈法王名釋迦也失亦烏斯藏僧稱為尚師者也永樂中既封二法王其徒爭欲見天子邀恩寵於是來者趾相接釋迦也失亦以十二年入朝禮亞大乘法王明年命為妙覺圓通慈慧普應輔國顯教灌頂弘善西天佛子大國師賜之印誥十四年辭歸賜佛經佛像法仗僧衣綺帛金銀器且御製贊詞賜之其徒益以為榮明年遣使來貢十七年命中官楊三保賚佛像衣幣往賜二十一年復來貢宣德九年入朝帝留之京師命成國公朱勇禮部尚書胡濴持節冊封為萬行妙明真如上勝清淨般若弘照普慧輔國顯教至善大慈法王西天正覺如來自在大圓通佛宣宗崩英宗嗣位禮官先奏汰番僧六百九十人正統元年復以為請命大慈法王及西天佛子如故餘遣還不願者減酒饌廩餼自是輦下稍清西天佛子者能仁寺僧智光也本山東慶雲人洪武永樂中數奉使西國成祖賜號國師仁宗加號圓融妙慧淨覺弘濟輔國光范演教灌頂廣善大國師賜金印冠服金銀器至是復加西天佛子初太祖招徠番僧本籍以化愚俗弭邊患授國師大國師者不過四五人至成祖兼崇其教自闡化等五王及二法王外授西天佛子者二灌頂大國師者九灌頂國師者十有八其他禪師僧官不可悉數其徒交錯於道外擾郵傳內耗大官公私騷然帝不恤也然至者猶即遣還及宣宗時則久留京師耗費益甚英宗初年雖多遣斥其後加封號者亦不少景泰中封番僧沙加為弘慈大善法王班卓兒藏眩為灌頂大國師英宗復辟務反景帝之政降法王為大國師大國師為國師成化初憲宗復好番僧至者日衆劄巴堅參劄實巴領占竹等以祕密教得幸並封法王其次為西天佛子他授大國師國師禪師者不可勝紀四方奸民投為弟子輒得食大官每歲耗費巨萬廷臣屢以為言悉拒不聽孝宗踐阼清汰番僧法王佛子以下皆遞降驅還本土奪其印誥由是輦下復清弘治六年帝惑近習言命取領占竹等詣京言官交章力諫事乃寢十三年命為故西天佛子著癿領占建塔工部尚書徐貫等言此僧無益於國營墓足矣不當建塔不從尋命那卜堅參三人為灌頂大國師帝崩禮官請黜異教三人並降禪師既而武宗蠱惑佞幸復取領占竹至京命為灌頂大國師以先所降禪師三人為國師帝好習番語引入豹房由是番僧復盛封那卜堅參及劄巴藏卜為法王那卜領占及綽即羅竹為西天佛子已封領占班丹為大慶法王給番僧度牒三千聽其自度或言大慶法王即帝自號也綽吉我些兒者烏斯藏使臣留豹房有寵封大德法王乞令其徒二人為正副使還居本土如大乘法王例入貢且為二人請國師誥命入番設茶禮官劉春等執不可帝不聽春等復言烏斯藏遠在西方性極頑獷雖設四王撫化而其來貢必為節制若令賚茶以往賜之誥命彼或假上旨以誘諸番妄有所幹請從之則非法不從則生釁害不可勝言帝乃罷設茶敕而豫之誥命帝時益好異教常服其服誦習其經演法內廠綽吉我些兒輩出入豹房與權幸雜處氣焰灼然及二人乘傳歸所過驛騷公私咸被其患世宗立復汰番僧法王以下悉被斥後世宗崇道教益黜浮屠自是番僧鮮至中國者明史卷三百三十一西域傳三闡化王闡化王者烏斯藏僧也初洪武五年河州衛言烏斯藏怕木竹巴之地有僧曰章陽沙加監藏元時封灌頂國師為番人推服今朵甘酋賞竹監藏與管兀兒勾兵若遣此僧撫諭朵甘必內附帝如其言仍封灌頂國師遣使賜玉印彩幣明年其僧使酋長鎖南藏卜貢佛像佛書舍利是時方命佛寶國師招諭番人於是怕木竹巴僧等自稱輦卜闍遣使進表及方物帝厚賜之輦卜闍者其地首僧之稱也八年正月設怕木竹巴萬戶府以番酋為之已而章陽沙加卒授其徒鎖南扎思巴噫監藏卜為灌頂國師二十一年上表稱病舉弟子吉剌思巴監藏巴藏卜自代遂授灌頂國師自是三年一貢成祖嗣位遣僧智光往賜永樂元年遣使入貢四年封為灌頂國師闡化王賜螭紐玉印白金五百兩綺衣三襲錦帛五十匹巴茶二百斤明年命與護教贊善二王必力工瓦國師及必里朵甘隴答諸衛川藏諸族復置驛站通道往來十一年中官楊三保使烏斯藏還其王遣從子劄結等隨之入貢明年覆命三保使其地令與闡教護教贊善三王及川卜川藏等共修驛站諸未復者盡復之自是道路畢通使臣往還數萬里無虞寇盜矣其後貢益頻數帝嘉其誠覆命三保賚佛像法器袈裟禪衣及絨錦彩幣往勞之已又命中官戴興往賜彩幣宣德二年命中官侯顯往賜絨錦彩幣其貢使嘗毆殺驛官子帝以其無知遣還敕王戒飭而已九年貢使歸以賜物易茶至臨洮有司沒入之羈其使請命詔釋之還其茶正統五年王卒遣禪師二人為正副使封其從子吉剌思巴永耐監藏巴藏卜為闡化王使臣私市茶彩數萬令有司運致禮官司請禁之帝念其遠人但令自僦舟車已王卒以桑兒結堅咱巴藏卜嗣成化元年禮部言宣正間諸貢不過三四十人景泰時十倍天順間百倍今貢使方至乞敕諭闡化王令如洪武舊制三年一貢從之五年王卒命其子公葛列思巴中奈領占堅參巴兒藏卜嗣遣僧進貢還至西寧留寺中不去又冒名入貢隱匿所賜璽書幣物王使其下三人來趣其僧閉之室中剜二人目一人逸訴於都指揮孫鑒鑒捕置之獄受其徒賄而復以聞下四川巡按鞫治坐僧四人死鑒將逮治會敕悉免十七年以長河西諸番多假番王名朝貢命給闡化贊善闡教輔教四王敕書勘合以防奸僞二十二年遣使四百六十人來貢守臣遵新例但納一百五十人禮官以使者已入境難固拒請順其情概納之為後日兩貢之數從之弘治八年遣僧來貢還至揚州廣陵驛遇大乘法王貢使相與殺牲縱酒三日不去見他使舟至則以石投之不容近陸知府唐愷詣驛呼其舟子戒之諸僧持兵仗呼噪擁而入愷走避隸卒力格鬥乃免為所傷者甚衆事聞命治通事及伴送者罪遣人諭王令自治其使者其時王卒子班阿吉江東劄巴請襲命番僧二人為正副使往封比至新王亦死其子阿往劄失劄巴堅參即欲受封二人不得已授之遂具謝恩儀物並獻其父所領勘合印章為左驗至四川守臣劾其擅封逮治論斬減死戌邊副使以下悉宥正德三年禮官以工使逾額令為後年應貢之數嘉靖三年偕輔教王及大小三十六番請入貢禮官以諸番不具地名族氏令守臣核實以聞四十二年闡化諸王遣使入貢請封禮官循故事遣番僧二十二人為正副使序班朱廷對監之至中途大騷擾不受廷對約束廷對還白其狀禮官請自後封番王即以誥敕付使者賚還或下守臣擇近邊僧人賚賜封諸藏之不遣京寺番僧自此始也番入素以入貢為利雖屢申約束而來者日增隆慶三年再定令闡化闡教輔教三王俱三歲一貢貢使各千人半全賞半減賞全賞者遣八人赴京餘留邊上遂為定例萬曆七年貢使言闡化王長子札釋藏卜乞嗣職如其請久之卒其子請襲神宗許之而制書但稱闡化王用閣臣沈一貫言加稱烏斯藏怕木竹巴灌頂國師闡化王其後奉貢不替所貢物有畫佛銅佛銅塔珊瑚犀角氆氌左髻毛纓足力麻鐵力麻刀劍明甲胄之屬諸王所貢亦如之明史卷三百三十一西域傳三靈藏贊善王贊善王者靈藏僧也其地在四川徼外視烏斯藏為近成祖踐阼命僧智光往使永樂四年其僧著思巴兒監藏遣使入貢命為灌頂國師明年封贊善王國師如故賜金印誥命十七年中官楊三保往使洪熙元年王卒從子喃葛監藏襲宣德二年中官侯顯往使正統五年奏稱年老請以長子班丹監銼代帝不從其請而授其子為都指揮使初入貢無定期自永樂迄正統或間歲一來或一歲再至而歷朝遣使往賜者金幣寶鈔佛像法器袈裟禪服不一而足至成化元年始定三歲一貢之例三年命塔兒把堅粲襲封故事封番王誥敕及幣帛遣官繼賜至是西陲多事禮官乞付使者繼回從之五年四川都司言贊善諸王不遵定制遣使率各寺番僧百三十二種入貢且無番王印文今止留十餘人守貢物餘已遣還禮官言番地廣遠番王亦多若遵例並時入貢則內郡疲供億莫若令諸王於應貢之歲各具印文取次百來今貢使已至難拂其情乞許作明年應貢之數報可十八年禮官言番王三歲一貢貢使百五十人定制也近贊善王連貢者再已遣四百十三人今請封請襲又遣千五百五十人違制宜卻乞許其請封襲者以三百人為後來兩貢之數餘悉遣還亦報可遂封喃葛堅粲巴藏卜為贊善王弘治十六年卒命其弟端竹堅咱嗣嘉靖後猶入貢如制明史卷三百三十一西域傳三宗巴斡護教王護教王者名宗巴斡即南哥巴藏卜館覺僧也成祖初僧智光使其地永樂四年遣使入貢詔授灌頂國師賜之誥明年遣使入謝封為護教王賜金印誥命國師如故遂頻歲入貢十二年卒命其從子幹些兒吉剌思巴藏卜嗣洪熙宣德中併入貢已而卒無嗣其爵逐絶明史卷三百三十一西域傳三必力工瓦闡教王闡教王者必力工瓦僧也成祖初僧智光繼敕入番其國師端竹監藏遣使入貢永樂元年至京帝喜宴賚遣還四年又貢帝優賜並賜其國師大板的達律師鎖南藏卜衣幣十一年乃加號灌頂慈慧淨戒大國師又封其僧領真巴兒吉監藏為闡教王賜印誥彩幣後比年一貢楊三保戴興侯顯之使皆繼金幣佛像法器賜焉宣德五年王卒命其子綽兒加監巴領占嗣久之卒命其子領占叭兒結堅參嗣成化四年從禮官言申三歲一貢制明年王卒命其子領占堅參叭兒藏卜襲二十年帝遣番僧班著兒賚璽書勘合往賜其僧憚行至半道僞為王印信番文覆命詔逮治正德十三年遣番僧領占劄巴等封其新王劄巴等乞馬快船三十艘載食鹽為入番買路之資戶科戶部並疏爭不聽劄巴等在途科索無厭至呂梁毆管洪主事李瑜幾斃恣橫如此迄嘉靖世闡教王修貢不輟明史卷三百三十一西域傳三思達輔教王輔教王者思達藏僧也其地視烏斯藏尤遠成祖即位命僧智光持詔招諭賜以銀幣永樂十一年封其僧南渴烈思巴為輔教王賜誥印彩幣數通貢使楊三保侯顯皆往賜其國與諸法王等景泰七年使來貢自陳年老乞令其子喃葛堅粲巴藏卜代帝從之封為輔教王賜誥敕金印彩幣袈裟法器以灌頂國葛藏右覺義桑加巴充正副使往封至四川多雇牛馬任載私物禮官請治其罪英宗方復辟命收其敕書減供應之半成化五年王卒命其子喃葛劄失堅參叭藏卜嗣六年申舊制三年一貢多不過百五十人由四川雅州入國師以下不許貢弘治十二年輔教等四王及長河西宣慰司並時入貢使者至二千八百餘人禮官以供費不資請敕四川守臣遵制遣送違者卻還從之歷正德嘉靖世奉貢不絶明史卷三百三十一西域傳三
