body:
  text: 六敬佛龜茲城廓中有佛塔廟千所龜茲國西去洛陽八千二百八十里俗有城郭其城三重中有佛塔廟千所人以田種畜牧為業男女皆翦髮垂項王宮壯麗煥若神居晉書卷九十七四夷龜茲國傳梁武帝幸同泰寺捨身大通元年三月辛未梁武帝下同輿駕幸同泰寺捨身甲戌還宮赦天下改元梁書卷三武帝紀下梁武帝幸同泰寺設四部無遮大會中大通元年九月癸巳輿駕幸同泰寺設四部無遮大會因捨身公卿以下以錢一億萬奉贖冬十月己酉輿駕還宮大赦改元梁書卷三武帝紀下梁武帝幸同泰寺設四部無遮大會中大通元年秋九月辛巳朱雀航華表災癸巳幸同泰寺設四部無遮大會上釋御服披法衣行清淨大捨以便省為房素床瓦器乘小車私人執役甲午升講堂法坐為四部大眾開涅槃經題癸卯群臣錢一億萬奉贖皇帝菩薩大捨僧眾默許乙巳百辟詣寺東門奉表請還臨宸極三請乃許帝三答書前後並稱頓首冬十月己酉又設四部無遮大會道俗五萬餘人會畢帝御金輅還宮御太極殿大赦改元二年夏四月癸丑幸同泰寺設平等會庚申大雨雹三年冬十月己酉上幸同泰寺升法坐為四部眾說涅槃經迄於乙卯十一月乙未上幸同泰寺升法座為四部眾說般若經迄於十二月辛丑南史卷七梁本紀中七梁武帝幸同泰寺為四眾說涅槃經中大通三年冬十月己酉行幸同泰寺高祖升法座為四部眾說大般若涅槃經義迄於乙卯前樂山縣侯蕭正則有罪流徙至是招誘亡命欲寇廣州在所討平之十一月乙未行幸同泰寺高祖升法座為四部眾說摩訶般若波羅蜜經義訖於十二月辛丑梁書卷三武帝紀下梁武帝幸同泰寺說摩訶波若中大通五年二月癸未行幸同泰寺設四部大會高祖升法座發金字摩訶波若經題訖於己丑梁書卷三武帝紀下梁武帝幸同泰寺說摩訶波若中大通五年二月癸未幸同泰寺設四部大會升法坐發金字般若經題訖於己丑南史卷七梁本紀中七梁武帝幸同泰寺設無礙會大同元年夏四月庚子波斯國遣使朝貢壬戌幸同泰寺鑄十方銀像並設無礙會南史卷七梁本紀中七梁武帝幸同泰寺設平等法會大同二年三月庚申詔求讜言及令文武在位舉士戊寅帝幸同泰寺設平等法會南史卷七梁本紀中七梁武帝幸同泰寺設四部無礙法會大同二年秋九月辛亥幸同泰寺設四部無礙法會南史卷七梁本紀中七梁武帝幸同泰寺設無礙會大同二年冬十月乙亥詔大舉北侵壬午幸同泰寺設無礙大會南史卷七梁本紀中七梁武帝幸同泰寺鑄金銅像大同三年夏五月癸未幸同泰寺鑄十方金銅像設無礙法會南史卷七梁本紀中七梁武帝幸阿育王寺大同三年八月辛卯輿駕幸阿育王寺赦天下梁書卷三武帝紀下梁武帝幸阿育王寺大同三年八月辛卯幸阿育王寺設無礙法喜食大赦南史卷七梁本紀中七梁武帝以李胤之降舍利赦天下大同四年七月癸亥詔以東冶徒李胤之降如來真形舍利大赦天下梁書卷三武帝紀下梁武帝以李胤之降象牙如來真形大赦大同四年秋七月癸亥詔以東冶徒李胤之降象牙如來真形大赦河南王求釋迦像大同六年五月己卯河南王遣使朝獻馬及方物求釋迦像並經論十四條敕付像並制旨涅槃般若金光明講疏一百三卷南史卷七梁本紀中七百濟求涅槃經大同七年是歲宕昌蠕蠕高麗百濟滑國各遣使朝貢百濟求涅槃等經疏及醫工畫師毛詩博士並許之南史卷七梁本紀中七梁武帝於皇基寺設法會大同十年三月辛丑哭於修陵壬寅於皇基寺設法會詔賜蘭陵老少位一階並加頌賚南史卷七梁本紀中七梁武帝於同泰寺講經中大同元年三月庚戌法駕出同泰寺大會停寺省講金字三慧經中大同元年夏四月丙戌於同泰寺解講設法會大赦改元孝悌力田為父後者賜爵一級賚宿衛文武各有差是夜同泰寺災梁書卷三武帝紀下梁武帝於同泰寺講經施身中大同元年三月乙巳大赦庚戌幸同泰寺講金字三慧經仍施身夏四月丙戌皇太子以下奉贖仍於同泰寺解講設法會大赦改元是夜同泰寺災南史卷七梁本紀中七梁武帝幸同泰寺捨身太清元年三月庚子高祖幸同泰寺設無遮大會捨身公卿等以錢一億萬奉贖夏四月丁亥輿駕還宮大赦天下改元孝悌力田為父後者賜爵一級在朝群臣宿衛文武並加頒賚梁書卷三武帝紀下梁武帝幸同泰寺捨身太清元年三月庚子幸同泰寺設無遮大會上釋御服服法衣行清淨大捨名曰羯磨五明殿為房設素木床葛帳土瓦器乘小輿私人執役乘輿法服一皆屏除乙巳帝升光嚴殿講堂坐師子座講金字三慧經捨身南史卷七梁本紀中七群臣贖皇帝菩薩梁武帝太清元年夏四月庚午群臣以錢一億萬奉贖皇帝菩薩僧眾默許戊寅百辟詣鳳莊門奉表三請三答頓首並如中大通元年故事南史卷七梁本紀中七梁武帝於鍾山造大愛敬寺等梁武帝及居帝位即於鍾山造大愛敬寺青溪邊造智度寺又於臺內立至敬等殿又立七廟堂月中再過設淨饌每至展拜恆涕泗滂沲哀動左右加以文思欽明能事畢究少而篤學洞達儒玄雖萬機多務猶卷不輟手燃燭側光常至戊夜兼篤信正法尤長釋典制涅槃大品淨名三慧諸經義記復數百卷聽覽餘閒即於重雲殿及同泰寺講說名僧碩學四部聽眾常萬餘人不飲酒不聽音聲非宗廟祭祀大會饗宴及諸法事未嘗作樂梁書卷三武帝紀下梁武帝於鍾山造大愛敬寺等梁武帝及居帝位即於鍾山造大愛敬寺青溪邊造智度寺於臺內立至敬等殿又立七廟堂月中再設饌每至殿拜涕泗滂沱哀動左右晚乃溺信佛道日止一食膳無鮮腴惟豆羹糲飯而已或遇事擁日儻移中便嗽口以過制涅槃大品淨名三慧諸經義記數百卷聽覽餘閒即於重雲殿及同泰寺講說名僧碩學四部聽眾常萬餘人身衣布衣木綿皂帳一冠三戴一被二年自五十外便斷房室後宮職司貴妃以下六宮緯褕三翟之外皆衣不曳地傍無錦綺不飲酒不聽音聲非宗廟祭祀大會饗宴及諸法事未嘗作樂南史卷七梁本紀中七史臣曰梁武帝流連釋老史臣侍中鄭國公魏徵曰高祖多藝多才大修文教盛飾禮容鼓扇玄鳳闡揚儒業然不能息末敦本斫凋為樸慕名好事崇尚浮華抑揚孔墨流連釋老或經夜不寢或終日不食非弘道以利物惟飾智以驚愚且心未遺榮虛廁蒼頭之伍高談脫屣終戀黃屋之尊梁書卷六敬帝紀後史臣語丁貴嬪信佛高祖丁貴嬪性仁恕及高祖弘佛教貴嬪奉而行之屏絕滋腴長進蔬膳受戒日甘露降於殿前方一丈五尺高祖所立經義皆得其指歸尤精淨名經所受供賜悉以充法事梁書卷七高祖丁貴嬪傳丁貴嬪信佛梁武帝丁貴嬪性仁恕及居宮接馭自下皆得其歡心不好華飾器服無珍麗未嘗為親戚私謁及武帝弘佛教貴嬪長進蔬膳受戒日甘露降於殿前方一丈五尺帝所立經義皆得其指歸尤精淨名經南史卷十二后妃下丁貴嬪傳梁武帝制文數篇皆述佛法梁武帝既篤敬佛法又制善哉大樂大歡天道仙道神王龍王滅過惡除愛水斷苦輪等十篇名為正樂皆述佛法又有法樂童子伎童子倚歌焚唄設無遮大會則為之隋書卷十三音樂志上梁武帝幸同泰寺捨身大通元年八月甲申月掩填星閏月癸酉又掩之占曰有大喪天下無主國易政其後中大通元年九月癸巳上又幸同泰寺捨身王公以一億萬錢奉贖十月己酉還宮大赦改元中大通三年太子薨皆天下無主易政及大喪之應隋書卷二十一天文志下梁武暮年君臣唯講佛經談玄而已梁武暮年不以政事為意君臣唯講佛經談玄而已朝綱紊亂令不行言不從之咎也其後果至侯景之亂隋書卷二十二五行志上梁武帝年老又專精佛戒武帝年老厭於萬機又專精佛戒每斷重罪則終日弗懌隋書卷二十五刑法志梁武帝與寶志詩梁武帝雖在蒙塵齋戒不廢衣疾不能進膳盥漱如初皇太子日中再朝每問安否涕泗交面賊臣侍者莫不掩泣始天監中沙門釋寶誌為詩曰昔年三十八今年八三十四中復有四城北火酣酣帝使周捨封記之及中大同元年同泰寺災帝啟封見捨手跡為之流涕帝生於甲辰三十八克建鄴之年也遇災歲實丙寅八十三矣四月十四日而火火起之始自浮屠第三層三者帝之昆季次也帝惡之召太史令虞履筮之遇巛履曰無害其繇云西南得朋東北喪朋安貞吉文言云東北喪朋乃終有慶帝曰斯魔鬼也酉應見卯金來克木卯為陰賊鬼而帶賊非魔何也孰為致之酉為口舌當乎說位說言乎兌故知善言之口宜前為法事於是人人讚善莫不從風或刺血灑地或刺血書經穿心然燈坐禪不食及太清元年帝捨身光嚴重雲殿遊仙化生皆震動三日乃止當時謂之祥瑞識者以非動而動在鴻範為妖以比石季龍之敗殿壁畫人頸皆縮入頭之類時海中浮鵠山去餘姚岸可千餘里上有女人年三百歲有女官道士四五百人年並出百但在山學道遣使獻紅席帝方捨身時其使適至云此草常有紅鳥居下故以為名觀其圖狀則鸞鳥也時有男子不知何許人於大眾中自割身以飴饑鳥血流遍體而顏色不變又沙門智泉鐵鉤掛體以然千燈一日一夜端坐不動開講日有三足鳥集殿之東戶自戶適於西南懸楣三飛三集白雀一見於重雲閣前連理樹又有五色雲浮於華林園昆明池上帝既流遁益甚境內化之遂至喪亡云南史卷七梁本紀中七梁武帝幸同泰寺捨身敕徐勉撰儀注中大通元年梁武帝幸同泰寺捨身敕勉撰儀注徐勉以先無此禮召杜之偉草具其儀南史卷七十二文學杜之偉傳鄧元起施沙門稻鄧元起少時又嘗至其西沮田舍有沙門造之乞元起問田人曰有稻幾何對曰二十斛元起悉以施之時人稱其有大度梁書卷十鄧元起傳樂藹割宅為寺樂藹子法才字元備幼與弟法藏俱有美名高祖嘉其清節曰居職若斯可以為百城表矣即日遷太舟卿尋除南康內史恥以讓俸受名辭不拜俄轉雲騎將軍少府卿出為信武長史江夏太守因被代表便道還鄉至家割宅為寺棲心物表梁書卷十九樂藹傳長沙嗣王篤誠佛法長沙嗣王業性敦篤所在留惠深信因果篤誠佛法高祖每嘉歎之梁書卷二十三長沙嗣王業傳蕭顯持戒精潔普通五年蕭顯坐於宅內鑄錢為有司所奏下廷尉得免死徙臨海郡行至上虞有敕追還且令受菩薩戒昱既至恂恂盡禮改意蹈道持戒又精潔高祖甚嘉之以為招遠將軍晉陵太守下車勵名跡除煩苛明法憲嚴於奸吏優養百姓旬日之間郡中大化梁書卷二十四蕭景傳附蕭顯傳裴子野深信釋氏撰眾僧傳裴子野在禁省十餘年靜默自守未嘗有所請謁外家及中表貧乏所得俸悉分給之末年深信釋氏持其孝戒終身飯麥食蔬子野少時又敕撰眾僧傳二十卷梁書卷三十裴子野傳梁武帝奉同泰寺講經中大通五年二月高祖幸同泰寺開講設四部大會眾數萬人南越所獻馴象忽於眾中狂逸乘轝羽衛及會皆駭散惟臧盾與散騎郎裴之禮嶷然自若高祖甚嘉焉梁書卷四十二臧盾傳梁武帝奉同泰寺講經中大通五年帝幸同泰寺開講設四部大會眾數萬人南越所獻馴象忽於眾中狂逸眾皆駭散唯臧盾與散騎侍郎裴之禮嶷然自若帝甚嘉焉南史卷十八臧燾傳附臧盾傳蕭衍信佛道初蕭衍崇信佛道於建業起同泰寺又於故宅立光宅寺於鍾山立大愛敬寺兼營長干二寺皆窮工極巧殫竭財力百姓苦之曾設齋會自以身施同泰寺為奴其朝臣三表不許於是內外百官共斂珍寶而贖之衍每禮佛捨其法服著乾陀袈裟令其王侯子弟皆受佛誡有事佛精苦者輒加以菩薩之號其臣下奏表上書亦稱衍皇帝菩薩衍所部刺史郡守初至官者皆責其上禮獻物多者便云稱職所貢微少言為弱惰故其牧守在官皆競事聚斂劫剝細民以自封殖多妓妾梁肉金綺百姓怨苦咸不聊生又發召兵士皆須鎖械不爾便即逃散其王侯貴人奢淫無度弟兄子侄侍妾或及千數至乃回相贈遺其風俗頹喪綱維不舉若此衍自以持戒乃至祭其祖禰不設牢牲時人皆竊云雖僭司王者然其宗廟實不血食矣衍未敗前災其同泰寺衍祖父墓前石麟一旦亡失識者咸知其將滅也魏書卷九十八蕭衍傳伏曼容宅在瓦官寺東時明帝不重儒術伏曼容宅在瓦官寺東施高坐於聽事有賓客輒升高坐為講說生徒常數十百人梁書卷四十八儒林伏曼容傳詔出佛牙於杜姥宅庚辰詔出佛牙於杜姥宅集四部設無遮大會高祖親出闕前禮拜初齊故僧統法獻於烏纏國得之常在定林上寺梁天監末為攝山慶雲寺沙門慧興保藏慧興將終以屬弟慧志承聖末慧志密送於高祖至是乃出陳書卷二高祖紀下開善寺沙門采甘露永定元年十一月己亥甘露降於鍾山松林彌滿巖谷庚子開善寺沙門采之以獻敕頒賜群臣陳書卷二高祖紀下沈皇后誦佛經後主沈皇后而居處儉約衣服無錦繡之飾左右近侍才百許人唯尋閱圖史誦佛經為事陳書卷七後主沈皇后傳林邑國佛教林邑其王著法服加瓔珞如佛像之飾出則乘象吹螺擊鼓罩吉貝傘以吉貝為幡旗國不設刑法有罪者使象踏殺之其大姓號婆羅門嫁娶必用八月女先求男由賤男而貴女也同姓還相婚姻使婆羅門引婿見婦握手相付咒曰吉利吉利以為成禮死者焚之中野謂之火葬梁書卷五十四諸夷林邑國傳林邑國人皆奉佛林邑其先所出事具南史王死七日而葬有官者三日庶人一日皆以函盛屍鼓舞導從輿至水次積薪焚之收其餘骨王則內金甕中沉之於海有官者以銅甕沉之海口庶人以瓦送之於江男女皆截髮哭至水次盡哀而止歸則不哭每七日燃香散花復哭盡哀而止百日三年皆如之人皆奉佛文字同於天竺北史卷九十五林邑國傳林邑國王事尼乾道林邑國其國俗居處為閣名曰干闌門戶皆北向書樹葉為紙男女皆以橫幅古貝繞腰以下謂之干漫亦曰都漫穿耳貫小環貴者著革屣賤者跣行自林邑扶南以南諸國皆然也其王者著法服加瓔珞如佛像之飾出則乘象吹螺擊鼓罩古貝傘以古貝為幡旗國不設刑法有罪者使象蹋殺之其大姓號婆羅門嫁娶必用八月女先求男由賤男而貴女同姓還相婚姻使婆羅門引婿見婦握手相付咒曰吉利吉利為成禮死者焚之中野謂之火葬其寡婦孤居散髮至老國王事尼乾道鑄金銀人像大十圍南史卷七十八夷貊上林邑國傳林邑國林邑國王死七日而葬有官者三日庶人一日皆以函盛屍鼓舞導從輿至水次積薪焚之收其餘骨王則內金罌中沉之於海有官者以銅罌沉之於海口庶人以瓦送之於江男女皆截髮隨喪至水次盡哀而止歸則不哭每七日然香散花復哭盡哀而止盡七七而罷至百日三年亦如之人皆奉佛文字同於天竺隋書卷八十二南蠻林邑國傳林邑國尤信佛法林邑國俗有文字尤信佛法人多出家父母死子則剔髮而哭以棺盛屍積柴燔柩收其灰藏於金瓶送之水中舊唐書卷一百九十七南蠻林邑國傳扶南國有佛髮等扶南王亦能作天竺書書可三千言說其宿命所由與佛經相似並論善事天監二年跋摩復遣使送珊瑚佛像並獻方物扶南今其國人皆醜黑拳髮所居不穿井數十家共一池引汲之俗事天神天神以銅為像二面者四手四面者八手手各有所持或小兒或鳥獸或日月其王出入乘象嬪侍亦然王坐則偏踞翹膝垂左膝至地以白疊敷前設金盆香爐於其上國俗居喪則剃除鬚髮列者有四葬水葬則投之江流火葬則焚為灰燼土葬則瘞埋之鳥葬則棄之中野人性貪吝無禮義男女恣其奔隨普通元年中大通二年大同元年累遣使獻方物五年復遣使獻生犀又言其國有佛髮長一丈二尺詔遣沙門釋雲寶隨使往迎之先是三年八月高祖改造阿育王寺塔出舊塔下舍利及佛爪髮髮青紺色眾僧以手伸之隨手長短放之則旋屈為蠡形案僧伽經云佛髮青而細猶如藕莖絲佛三昧經云我昔在宮沐頭以尺量髮長一丈二尺放已右旋還成蠡文則與高祖所得同也阿育王即鐵輪王王閻浮提一天下佛滅度後一日一夜役鬼神造八萬四千塔此即一也吳時有尼居其地為小精舍孫綝尋毀除之塔亦同泯吳平後諸道人復於舊處建立焉晉中宗初渡江更修飾之至簡文咸安中使沙門安法師程造小塔未及成而亡弟子僧顯繼而修立至孝武太元九年上金相輪及承露其後西河離石縣有胡人劉薩何遇疾暴亡而心下猶暖其家未敢便殯經十日更蘇說云有兩吏見錄向西北行不測遠近至十八地獄隨報重輕受諸楚毒見觀世音語云汝緣未盡若得活可作沙門洛下齊城丹陽會稽並有阿育王塔可往禮拜若壽終則不墮地獄語竟如墮高巖忽然醒寤因此出家名慧達遊行禮塔次至丹陽未知塔處乃登越城四望見長干里有異氣色因就禮拜果是阿育王塔所屢放光明由是定知必有舍利乃集眾就掘之入一丈得三石碑並長六尺中一碑有鐵函函中有銀函函中又有金函盛三舍利及爪髮各一枚髮長數尺即遷舍利近北對簡文所造塔西造一層塔十六年又使沙門僧尚伽為三層即高祖所開者也初穿土四尺得龍窟及昔人所捨金銀鈽釧釵鑷等諸雜寶物可深九尺許方至石磉磉下有石函函內有鐵壺以盛銀坩坩內有金鏤罌盛三舍利如粟粒大圓正光潔函內又琉璃碗內得四舍利及髮爪爪有四枚並為沉香色至其月二十七日高祖又到寺禮拜設無礙大會大赦天下是日以金鉢盛水泛舍利其最小者隱鉢不出高祖禮數十拜舍利乃於鉢內放光旋回久之乃當鉢中而止高祖問大僧正慧念今日見不可思議事不慧念答曰法身常住湛然不動高祖曰弟子欲請一舍利還台供養至九月五日又於寺設無礙大會遣皇太子王侯朝貴等奉迎是日鳳景明和京師傾屬觀者百數十萬人所設金銀供具等物並留寺供養並施錢一千萬為寺基業至四年九月十五日高祖又至寺設無礙大會豎二剎各以金罌次玉罌重盛舍利及爪髮內七寶塔中又以石函盛寶塔分入兩剎下及王侯妃主百姓富室所捨金銀鈽釧等珍寶充積十一年十一月二日寺僧又請高祖於寺發般若經題爾夕二塔俱放光明敕鎮東將軍邵陵王綸制寺大功德碑文先是二年改造會稽鄮縣塔開舊塔舍利遣光宅寺釋敬脫等四僧及舍人孫照暫迎還台高祖禮拜竟即送還縣入新塔下此縣塔亦是劉薩何所得也晉咸和中丹陽尹高悝行至張侯橋見浦中五色光長數尺不知何怪乃今人於光處掊視之得金像未有光趺悝乃下車載像還至長干巷首牛不肯進悝乃令馭人任牛所之牛徑牽車至寺悝因留像付寺僧每至中夜常放光明又聞空中有金石之響經一歲捕魚人張係世於海口忽見銅花趺浮出水上係世取送縣縣以送台乃施像足宛然合會簡文咸安元年交州合浦人董宗之採珠沒水於底得佛光艷交州押送台以施像又合焉自咸和中得像至咸安初歷三十餘年光趺始具初高悝得像後西域胡僧五人來詣悝曰昔於天竺得阿育王造像來至鄴下值胡亂埋像於河邊今尋覓失所五人嘗一夜俱夢見像曰已出江東為高悝所得悝乃送此五僧至寺見像噓欷涕泣像便放光照燭殿宇又瓦官寺慧邃欲模寫像形寺主僧尚慮虧損金色謂邃曰若能令像放光回身西向乃可相許慧邃便懇到拜請其夜像即轉坐放光回身西向明旦便許模之像趺先有外國書莫有識者後有三藏那求跋摩識之云是阿育王為第四女所造也及大同中出舊塔舍利敕市寺側數百家宅地以廣寺域造諸堂殿並瑞像周回闔等窮於輪奐焉其圖諸經變並吳人張繇丹青運手繇丹青之工一時冠絕梁書卷五十四諸夷扶南國傳扶南國遣使送珊瑚佛像等齊永明中扶南國王憍陳如闍邪跋摩遣使貢獻梁天監二年跋摩復遣使送珊瑚佛像並獻方物詔授安南將軍扶南王其國人皆醜黑拳髮所居不穿井數十家共一池引汲之俗事天神天神以銅為像二而者四手四面者八手手各有所持或小兒或鳥獸或日月其王出入乘象嬪侍亦然王坐則偏踞翹膝垂左膝至地以白疊敷前設金盆香爐於其上國俗居喪則剃除鬚髮死者有四葬水葬則投之江流火葬則焚為灰燼土葬則瘞埋之鳥葬則棄之中野人性貪吝無禮義男女恣其奔隨十年十三年跋摩累遣使貢獻其年死庶子留陀跋摩殺其嫡弟自立十六年遣使竺當抱老奉表貢獻十八年復遣使送天竺旃檀瑞像婆羅樹葉並獻火齊珠郁金蘇合等香普通元年中大通二年大同元年累遣使獻方物五年復遣使獻生犀又言其國有佛髮長一丈二尺詔遣沙門釋雲寶隨使往迎之先是三年八月武帝改造阿育王佛塔出舊塔下舍利及佛爪髮髮青紺色眾僧以手伸之隨手長短放之則旋屈為蠡形按僧伽經云佛髮青而細猶如藕莖絲佛三昧經云我昔在宮沐頭以尺量髮長一丈二尺放已右旋還成蠡文則與帝所得同也阿育王即鐵輪王王閻浮提一天下佛滅度後一日一夜役鬼神造八萬四千塔此即其一吳時有尼居其地為小精舍孫綝尋毀除之塔亦同滅吳平後諸道人復於舊處建立焉晉元帝初度江更修飾之至簡文咸安中使沙門安法程造小塔未及成而亡弟子僧顯繼而修立至孝武太元九年上金相輪及承露其後有西河離石縣胡人劉薩何遇疾暴亡而心猶暖其家未敢便殯經七日更蘇說云有兩吏見錄向西北行不測遠近至十八地獄隨報重輕受諸楚毒觀世音語云汝緣未盡若得活可作沙門洛下齊城丹陽會稽並有阿育王塔可往禮拜若壽終則不墜地獄語竟如墜高巖忽然醒悟因此出家名慧達遊行禮塔次至丹陽未知塔處及登越城四望見長干里有異氣因就禮拜果是先阿育王塔所屢放光明由是定知必有舍利乃集眾就掘入一丈得三石碑並長六尺中一碑有鐵函函中有銀函函中又有金函盛三舍利及髮爪各一枚髮長數尺即遷舍利近北對簡文所造塔西造一層塔十六年又使沙門僧尚加為三層即是武帝所開者也初穿土四尺得龍窟及昔人所捨金銀環釧釵鑷等諸雜寶物可深九尺許至石頭磉磉下有石函函內有鐵壺以盛銀坩坩內有金鏤罌盛三舍利如粟粒大圓正光潔函內有琉璃碗碗內得四舍利及髮爪爪有四枚並為沈香色至其月二十七日帝又到寺禮拜設無礙大會大赦是日以金鉢盛水泛舍利其最小者隱不出帝禮數十拜舍利乃於鉢內放光旋回久之乃當中而止帝問大僧正慧念曰見不可思議事不慧念答曰法身常住湛然不動帝曰弟子欲請一舍利還台供養至九月五日又於寺設無礙大會遣皇太子王侯朝貴等奉迎是日風景明淨傾都觀屬所設金銀供具等物並留寺供養並施錢一千萬為寺基業至四年九月十五日帝又至寺設無礙大會豎二剎各以金罌次玉罌重盛舍利及爪髮內七寶塔內又以石函盛寶塔分入兩剎剎下及王侯妃主百姓富室所捨金銀環釧等珍寶充積十一年十一月二日寺僧又請帝於寺發般若經題爾夕二塔俱放光明敕鎮東邵陵王綸制寺大功德碑文先是二年改造會稽鄮縣塔開舊塔中出舍利遣光宅寺釋敬脫等四僧及舍人孫照暫迎還台帝禮拜竟即送還縣入新塔下此縣塔亦是劉薩何所得也晉咸和中丹陽尹高悝行至張侯橋見浦中五色光長數尺不知何怪乃