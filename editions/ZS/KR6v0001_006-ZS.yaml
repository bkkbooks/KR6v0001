官繼真武像建醮武當山使使詣泰山進神袍或白晝散燈市上帝重違太后意曲從之而健劉等諫甚力十五年六月詔擬釋迦啞塔像贊十七年二月詔建延壽塔朝陽門外除道士杜永祺等五人為真人皆以建等力諫得寢明史卷一百八十一劉健傳帝好佛自稱大慶法王正德六年代費宏為禮部尚書禮部事視他部為簡自珪數有執爭章奏遂多帝好佛自稱大慶法王番僧乞田百頃為法王下院中旨下部稱大慶法王與聖旨並珪佯不知執奏孰為大慶法王敢與至尊並書大不敬詔勿問田亦竟止明史卷一百八十四付珪傳劉允迎佛烏斯藏帝遣中官劉允迎佛烏斯藏徐文華力諫不報明史卷一百九十一徐文華傳侯顯西使當成祖時銳意通四夷奉使多用中貴西洋則和景弘西域則李達迤北則海童而西番則率使侯顯侯顯者司禮少監帝聞烏思藏僧尚師哈立麻有道術善幻化欲致一見因通迤西諸番乃命侯顯繼書幣往迓選壯士健馬護行元年四月奉使陸行數萬里至四年十二月始與其僧偕來詔駙馬都尉沐昕迎之帝延見奉天殿寵優渥儀仗鞍馬什器多以金銀為之道路烜赫五年二月建普度大齋於靈谷寺為高帝高后薦福或言卿雲天花甘露甘雨青鳥青獅白象白鶴及舍利祥光連日畢見又聞梵唄天樂自空而下帝益大喜廷臣表賀學士胡廣等咸獻聖孝瑞應歌詩乃封哈立麻萬行具足十方最勝圓覺妙智慧善普應佑國演教如來大寶法王西天大善自在佛領天下釋教給印誥制如諸王其徒三人亦封灌頂大國師再宴奉天殿顯以奉使勞擢太監十一年春復奉命賜西番尼八剌地湧塔二國尼八剌王沙的新葛遣使隨顯入朝表貢方物詔封國王賜誥印十三年七月帝欲通榜葛剌諸國覆命顯率舟師以行其國即東印度之地去中國絕遠其王賽佛丁遣使貢麒麟及諸方物帝大悅錫予有加榜葛剌之西有國曰沼納樸兒者地居五印度中古佛國也侵榜葛剌賽佛丁告於朝十八年九月命顯往宣諭賜金幣遂罷兵宣德二年二月復使顯賜諸番遍歷烏斯藏必力工瓦靈藏思達藏諸國而還途遇寇劫督將士力戰多所斬獲還朝錄功升賞者四百六十餘人顯有才辨強力敢任五使絕域勞績與鄭和亞明史卷三百四宦官傳一中使祠五臺山萬曆十六年中使祠五臺山還言紫荊關外廣昌靈丘有礦砂可作銀冶明史卷三百五宦官傳二高麗惟知崇信釋氏洪武二年帝從容問高麗使者王居國何為城郭修乎兵甲利乎宮室壯乎頓首言東海波臣惟知崇信釋氏他未遑也遂以書諭之曰古者王公設險未嘗去兵民以食為天而國必有出政令之所今有人民而無城郭人將何依武備不修則威弛地不耕則民艱於食且有居室無廳事無以示尊嚴此數者朕甚不取夫國之大事在祀與戎苟闕斯二者而徒事佛求福梁武之事可為明鑒明史卷三百二十外國傳一賓童龍國設齋禮佛賓童龍國與占城接壤或言如來入舍衛國乞食即其地氣候草木人物風土大類占城惟遭喪能持服葬以僻地設齋禮佛婚姻偶合酋出入乘象或馬從者百餘人前後贊唱民編茅覆屋貨用金銀花布明史卷三百二十四外國傳五真臘國中有金塔真臘其國城隍周七十餘里幅員廣數千里國中有金塔金橋殿宇三十餘所王歲時一會羅列玉猿孔雀白象犀牛於前名曰百塔洲婚嫁兩家俱八日不出門晝夜燃燈人死置於野任烏鳶食俄頃食盡者謂為福報俗尚釋教僧皆食魚肉或以供佛惟不飲酒明史卷三百二十四外國傳五暹羅國崇信釋教暹羅國崇信釋教男女多為僧尼亦居庵寺持齋受戒衣服頗類中國富貴者尤敬佛百金之產即以其半施之富貴者死用水銀灌其口而葬之貧者則移置海濱即有群鴉飛啄俄頃而盡家人拾其骨號泣而棄之於海謂之鳥葬亦延僧設齋禮佛明史卷三百二十四外國傳五相傳釋迦佛昔經此山錫蘭山相傳釋迦佛昔經此山浴於水或竊其袈裟佛誓云後有穿衣者必爛其皮肉自是寸布掛身輒發瘡毒故男女皆裸體但紉木葉蔽其前後或圍以布故又名裸形國地不生谷惟啖魚蝦及山芋波羅密芭蕉實之屬自此山西行七日見鸚哥嘴山又二三日抵佛堂山即入錫蘭國境海邊山石上有一足跡長三尺許故老云佛從翠藍嶼來踐此故足跡尚存中有淺水四時不幹人皆手蘸拭目洗面曰佛水清淨山下僧寺有釋迦真身側臥床上旁有佛牙及舍利相傳佛涅槃處也其寢座以沉香為之飾以諸色寶石莊嚴甚王所居側有大山高出雲漢其顛有巨人足跡入石深二尺長八尺餘云是盤古遺跡王瑣里國人崇釋教重牛日取牛糞燒灰塗其體又調以水遍塗地上乃禮佛手足直舒腹貼於地以為敬王及庶民皆如之不食牛肉止食其乳死則瘞之有殺牛者罪至死明史卷三百二十六外國傳七白葛達崇釋教白葛達其國土地瘠薄崇釋教市易用鐵錢明史卷三百二十六外國傳七火州僧寺多於居民火州其地多山青紅若火故名火州氣候熱五穀畜產與柳城同城方十餘里僧寺多於民居東有荒城即高昌國都漢戊巳校尉所治明史卷三百二十九西域傳一瞿曇寺初西寧番僧三剌為書招降罕東諸部又建佛剎於碾白南川以居其眾至是來朝貢馬請敕護持賜寺額帝從所請賜額曰瞿曇寺立西寧僧綱司以三剌為都綱司又立河州番漢二僧綱司並以番僧為之紀以符契自是其徒爭建寺帝輒錫以嘉名且賜敕護持番僧來者日眾永樂時諸衛僧戒行精勤者多授剌麻禪師灌頂國師之號有加至大國師西天佛子者悉給以印誥許之世襲且令歲一朝貢由是諸僧及諸衛土官輻輳京師其他族種如西寧十三簇岷州十八族洮州十八族之屬大者數千人少者數百亦許歲一奉貢優以宴賚西番之勢益分其力益弱西陲之患亦益寡宣德元年以協討安定曲先功加國師吒思巴領占等五人為大國師給誥命銀印秩正四品加剌麻著星等六人為禪師給敕命銀印秩正六品明史卷三百三十西域傳二烏斯藏僧活佛時烏斯藏僧有稱活佛者諸部多奉其教丙兔乃以焚修為名請建寺青海及嘉峪關外為久居計廷臣多言不可許禮官言彼已采土興工而令改建於他所勢所不能莫若因而許之以鼓其善心而杜其關外之請況中國之御戎惟在邊關之有備戎之順逆亦不在一寺之遠近帝許之丙兔既得請又近肋番人使通道松潘以迎活佛四川守臣懼逼乞令俺答約束其子毋擾鄰境俺答言丙兔止因甘肅不許開市寧夏又道遠艱難雖有禁令不能盡制宣大總督方逢時亦言開市為便帝以責陝西督撫督撫不敢違萬曆二年冬許丙兔市於甘肅賓兔市於莊浪歲一次既而寺成賜額仰華明史卷三百三十西域傳二烏斯藏僧佛教烏斯藏在雲南西徼外去雲南麗江府千餘里四川馬湖府千五百餘里陝西西寧衛五千餘里其地多僧無城郭群居大土台上不食肉娶妻無刑罰亦無兵革鮮疾病佛書其多楞伽經至萬卷其土台外僧有食肉娶妻者元世祖尊八思巴為大寶法王錫玉印既沒賜號皇天之下一人之上宣文輔治大聖至德普覺真智佐國如意大寶法王西天佛子大元帝師自是其徒嗣者咸稱帝師洪武初太祖懲唐世吐蕃之亂思制御之惟因其俗尚用僧徒化導為善乃遣使廣行招諭又遣陝西行省員外郎許允德使其地令舉元故官赴京授職於是烏斯藏攝帝師喃加巴藏卜先遣使朝貢五年十二月至京帝喜賜紅綺禪衣及鞋帽錢物明年二月躬自入朝上所舉故官六十人帝悉授以職改攝帝師為熾盛佛寶國師仍錫玉印及彩幣表裏各二十玉人制印成帝視玉未美令更制其崇敬如此暨辭還命河州衛遣官繼敕偕行招諭諸番之未附者冬元帝師之後鎖南堅巴藏卜元國公哥列思監藏巴藏卜並遣使乞玉印廷臣言已嘗給賜不宜復予乃以文綺賜之七年夏佛寶國師遣其徒來貢秋元帝師八思巴之後公哥監藏巴藏卜及烏斯藏僧答力麻八剌遣使來朝請封號詔授帝師後人為圓智妙覺弘教大國師烏斯藏僧為灌頂國師並賜玉印佛寶國師復遣其徒來貢上所舉土官五十八人亦皆授職九年答力麻八剌遣使來貢十一年復貢奏舉故官十六人為宣慰招討等官亦皆報允十四年復貢其時喃加巴藏卜已卒有僧哈立麻者國人以其有道術稱之為尚師成祖為燕王時知其名永樂元年命司禮少監侯顯僧智光繼書幣往征其僧先遣人來貢而躬隨使者入朝四年冬將至命駙馬都尉淋昕往迎之既至帝延見於奉天殿明日宴華蓋殿賜黃金百白金千鈔二萬彩幣四十五表裏法器裀褥鞍馬香果茶米諸物畢備其從者亦有賜明年春賜儀仗銀瓜牙仗骨朵魫燈紗燈香合拂子各二手爐六傘蓋一銀交椅銀足踏銀杌銀盆銀罐青圓扇紅圓扇拜褥帳幄各一幡幢四十有八鞍馬二散馬四帝將薦福於高帝后命建普度大齋於靈谷寺七日帝躬自行香於是卿雲甘露青鳥白象之屬連日畢見帝大悅侍臣多獻賦頌事竣復賜黃金百白金千寶鈔二千彩幣表裏百二十馬九其徒灌頂圓通善慧大國師答師巴囉葛羅思等亦加優賜遂封哈立麻為萬行具足十方最勝圓覺妙智慧善普應佑國演教如來大寶法王西天大善自在佛領天下釋教賜印誥及金銀鈔彩幣織金珠袈裟金銀器鞍馬命其徒勃隆逋瓦桑兒加領真為灌頂圓修淨慧大國師高日瓦禪伯為灌頂通悟弘濟大國師果欒羅葛羅監藏巴里藏卜為灌頂弘智淨戒大國師並賜印誥銀鈔彩幣已命哈立麻赴五臺山建大齋再為高帝后薦福賜予優厚六年四月辭歸復賜金幣佛像命中官護行自是迄正統末入貢者八已法王卒久不奉貢弘治八年王葛哩麻巴始遣使來貢十二年兩貢禮官以一歲再貢非制請裁其賜賚從之正德元年來貢十年復來貢時帝惑近習言謂烏斯藏僧有能知三生者國人稱之為活佛欣然欲見之考永宣間陳誠侯顯入番故事命中官劉允乘傳往迎閣臣梁儲等言西番之教邪妄不經我祖宗朝雖嘗遣使蓋因天下初定藉以化導愚頑鎮撫荒服非信其教而崇奉之也承平之後累朝列聖止因其來朝而賞賚之未嘗輕辱命使遠涉其地今忽遣近侍往送幢幡朝野聞之莫不駭愕而允奏乞鹽引至數萬動撥馬船至百艘又許其便宜處置錢物勢必攜帶私鹽騷擾郵傅為官民患今蜀中大盜初平瘡痍未起在官已無餘積必至苛斂軍民鋌而走險盜將復發況自天全六番出境涉數萬之程歷數歲之久道途絕無郵置人馬安從供頓脫中途遇寇何以御之虧中國之體納外番之侮無一可者所繼敕書臣等不敢撰擬帝不聽禮部尚書毛紀六科給事中葉相十三道御史周倫等並切諫亦不聽允行以珠琲為幢幡黃金為供具賜其僧金印犒賞以鉅萬計內庫黃金為之罄盡敕允往返以十年為期所攜茶鹽以數十萬計允至臨清漕艘為之阻滯入峽江舟大難進易以䑦𦪇相連二百餘里及抵成都日支官廩百石蔬菜銀百兩錦官驛不足取傍近數十驛供之治入番器物估直二十萬守臣力爭減至十三萬工人雜造夜以繼日居歲餘始率將校十人士千人以行越兩月入其地所謂活佛者恐中國誘害之匿不出見將士怒欲肋以威番人夜襲之奪寶貨器械以去將校死者二人卒數百人傷者半之允乘善馬疾走僅免返成都戒部下弗言而以空函馳奏至則武宗已崩世宗召允還下吏治罪嘉靖中法王猶數入貢迄神宗朝不絕時有僧鎖南堅錯者能知已往未來事稱活佛順義王俺答亦崇信之萬曆七年以迎活佛為名西侵瓦剌為所敗此僧戒以好殺勸之東還俺答亦勸此僧通中國乃自甘州遺書張居正自稱釋迦摩尼比丘求通貢饋以儀物居正不敢受聞之於帝帝命受之而許其貢由是中國亦知有活佛此僧有異術能服人諸番莫不從其教即大寶法王及闡化諸王亦皆俯首稱弟子自是西方止知奉此僧諸番王徒擁虛位不復能施其號令矣大乘法王者烏斯藏僧昆澤思巴也其徒亦稱為尚師永樂時成祖既寺哈立麻又聞昆澤思巴有道術命中官繼璽書銀幣征之其僧先遣人貢舍利佛像遂偕使者入朝十一年二月至京帝即延見賜藏經銀鈔彩幣鞍馬茶果諸物封為萬行圓融妙法最勝真如慧智弘慈廣濟護國演教正覺大乘法王西天上善金剛普應大光明佛領天下釋教賜印誥袈裟幡幢鞍馬傘器諸物禮之亞於大寶法王明年辭歸賜加於前命中官護行後數入貢帝亦先後命中官喬來喜楊三保繼賜佛像法器袈裟禪衣絨錦彩幣諸物洪熙宣德間並來貢成化四年其王完卜遣使來貢禮官言無法王印文且從洮州入非制宜減其賜物使者言所居去烏斯藏二十餘程涉五年方達京師且所進馬多乞給全賜乃命量增十七年來貢弘治元年其王桑加瓦遣使來貢故事法王卒其徒自相繼承不由朝命三年輔教王遣使奉貢奏舉大乘法王襲職帝但納其貢賜賚遣還不命襲職正德五年遣其徒綽吉我些兒等從河州衛入貢禮官以其非貢道請減其賞並治指揮徐經罪從之已綽吉我些兒有寵於帝亦封大德法王十年僧完卜鎖南堅參巴爾藏卜遣使來貢乞襲大乘法王禮官失於稽考竟許之嘉靖十五年偕輔教闡教諸王來貢使者至四千餘人帝以人數逾額減其賞並治四川三司官濫送之罪初成祖封闡化等五王各有分地惟二法王以游僧不常厥居故其貢期不在三年之列然終明世奉貢不絕云大慈法王名釋迦也失亦烏斯藏僧稱為尚師者也永樂中既封二法王其徒爭欲見天子邀恩寵於是來者趾相接釋迦也失亦以十二年入朝禮亞大乘法王明年命為妙覺圓通慈慧普應輔國顯教灌頂弘善西天佛子大國師賜之印誥十四年辭歸賜佛經佛像法仗僧衣綺帛金銀器且御製贊詞賜之其徒益以為榮明年遣使來貢十七年命中官楊三保繼佛像衣幣往賜二十一年復來貢宣德九年入朝帝留之京師命成國公朱勇禮部尚書胡濴持節冊封為萬行妙明真如上勝清淨般若弘照普慧輔國顯教至善大慈法王西天正覺如來自在大圓通佛宣宗崩英宗嗣位禮官先奏汰番僧六百九十人正統元年復以為請命大慈法王及西天佛子如故餘遣還不願者減酒饌廩餼自是輦下稍清西天佛子者能仁寺僧智光也本山東廣雲人洪武永樂中數奉使西國成祖賜號國師仁宗加號圓融妙慧淨覺弘濟輔國光范演教灌頂廣善大國師賜金印冠服金銀器至是復加西天佛子初太祖招徠番僧本藉以化愚俗弭邊患授國師大國師者不過四五人至成祖兼崇其教自闡化等五王及二法王外授西天佛子者二灌頂大國師者九灌頂國師者十有八其他禪師僧官不可悉數其徒交錯於道外擾郵傳內耗大官公私騷然帝不恤也然至者猶即遣還及宣宗時則久留京師耗費益甚英宗初年雖多遣斥其後加封號者亦不少景泰中封番僧沙加為弘慈大善法王班卓兒藏卜為灌頂大國師英宗復辟務反景帝之政降法王為大國師大國師為國師成化初憲宗復好番僧至者日眾劄巴堅參劄實巴領占竹等以秘密教得幸並封法王其次為西天佛子他授大國師國師禪師者不可勝紀四方奸民投為弟子輒得食大官每歲耗費鉅萬廷臣屢以為言悉拒不聽孝宗踐阼清汰番僧法王佛子以下皆遞降驅還本土奪其印誥由是輦下復清弘治六年帝惑近習言命取領占竹等詣京言官交章力諫事乃寢十三年命為故西天佛子著癿領占建塔工部尚書徐貫等言此僧無益於國營墓足矣不當建塔不從尋命那卜堅參三人為灌頂大國師帝崩禮官請黜異教三人並降禪師既而武宗蠱惑佞倖復取領占竹至京命為灌頂大國師以先所降禪師三人為國師帝好習番語引入豹房由是番僧復盛封那卜堅參及劄巴藏卜為法王那卜領占及綽即羅竹為西天佛子已封領占班丹為大慶法王給番僧度牒三千聽其自度或言大慶法王即帝自號也綽吉我些兒者烏斯藏使臣留豹房有寵封大德法王乞令其徒二人為正副使還居本土如大乘法王例入貢且為二人請國師誥命入番設茶禮官劉春等執不可帝不聽春等復言烏斯藏遠在西方性極頑獷雖設四王撫化而其來貢必為節制若令繼茶以往賜之誥命彼或假上旨以誘諸番妄有所幹請從之則非法不從則生釁害不可勝言帝乃罷設茶敕而予之誥命帝時益好異教常服其服誦習其經演法內廠綽吉我些兒輩出入豹房與權倖雜處氣焰灼然及二人乘傳歸所過驛騷公私咸被其患世宗立復汰番僧法王以下悉被斥後世宗崇道教益黜浮屠自是番僧鮮至中國者闡化王者烏斯藏曾也初洪武五年河州衛言烏斯藏怕木竹巴之地有僧曰章陽沙加鹽藏元時封灌頂國師為番人推服今朵甘酋賞竹監藏與管兀兒勾兵若遣此僧撫諭朵甘必內附帝如其言仍封灌頂國師遣使賜玉印彩幣明年其僧使酋長鎖南藏卜貢佛像像書舍利是時方命佛寶國師招諭番人於是怕木竹巴僧等自稱輦卜闍遣使進表及方物帝厚賜之輦卜闍者其地首僧之稱也八年正月設怕木竹巴萬戶府以番酋為之已而章陽沙加卒授其徒鎖南扎思巴噫監藏卜為灌頂國師二十一年上表稱病舉弟子吉剌思巴監藏巴藏卜自代遂授灌頂國師自是三年一貢成祖嗣位遣僧智光往賜永樂元年遣使入貢四年封為灌頂國師闡化王賜螭紐玉印白金五百兩綺衣三襲錦帛五十匹巴茶二百斤明年命與護教贊善二王必力工瓦國師及必里朵甘隴答諸衛川藏諸族復置驛站通道往來十一年中官楊三保使烏斯藏還其王遣從子劄結等隨之入貢明年覆命三保使其地令與闡教護教贊善三王及川卜川藏等共修驛站諸未復者盡復之自是道路畢通使臣往還數萬里無虞寇盜矣其後貢益頻數帝嘉其誠覆命三保繼佛像法器袈裟禪衣及絨錦彩幣往勞之已又命中官戴興往賜彩幣宣德二年命中官侯顯往賜絨錦彩幣其貢使嘗毆殺驛官子帝以其無知遣還敕王戒飭而已九年貢使歸以賜物易茶至臨洮有司沒入之羈其使請命詔釋之還其茶正統五年王卒遣禪師二人為正副使封其從子吉剌思巴永耐監藏巴藏卜為闡化王使臣私市茶彩數萬令有司運致禮官請禁之帝念其遠人但令自僦舟車已王卒以桑兒結堅昝巴藏卜嗣成化元年禮部言宣正間諸貢不過三四十人景泰時十倍天順間百倍今貢使方至乞敕諭闡化王令如洪武舊制三年一貢從之五年王卒命其子公葛列思巴中柰領占堅參巴兒藏卜嗣遣僧進貢還至西寧留寺中不去又冒名入貢隱匿所賜璽書幣物王使其下三人來趣其僧閉之室中剜二人目一人逸訴於都指揮孫鑒鑒捕置之獄受其徒賄而復以聞下四川巡按鞫治坐僧四人死鑒將逮治會敕悉免十七年以長河西諸番多假番王名朝貢命給闡化贊善闡教輔教四王敕書勘合以防奸偽二十二年遣使四百六十人來貢守臣遵新例但納一百五十人禮官以使者已入境難固拒請順其情概納之為後日兩貢之數從之弘治八年遺僧來貢還至揚州廣陵驛遇大乘法王貢使相與殺牲縱酒三日不去見他使舟至則以石投之不容近陸知府唐愷詣驛呼其舟子戒之諸僧持兵仗呼噪擁而入愷走避隸卒力格鬥乃免為所傷者甚眾事聞命治通事及伴送者罪遣人諭王令自治其使者其時王卒子班阿吉江東劄巴請襲命番僧二人為正副使往封比至新王亦死其子阿往劄失劄巴堅參即欲受封二人不得已授之遂具謝恩儀物並獻其父所領勘合印章為左驗至四川守臣劾其擅封逮治論斬減死戌邊副使以下悉宥正德三年禮官以貢使逾額令為後年應貢之數嘉靖三年偕輔教王及大小三十六番請入貢禮官以諸番不具地名族氏令守臣核實以聞四十二年闡化諸王遣使入貢請封禮官循故事遣番僧二十二人為正副使序班朱廷對監之至中途大騷擾不受廷對約束廷對還白其狀禮官請自後封番王即以誥敕付使者繼還或下守臣擇近邊僧人繼賜封諸藏之不遣京寺番僧自此始也番入素以入貢為利雖屢申約束而來者日增隆慶三年再定令闡化闡教輔教三王俱三歲一貢貢使各千人半全賞半減賞全賞者遣八人赴京餘留邊上遂為定例萬曆七年貢使言闡化王長子札釋藏卜乞嗣職如其請久之卒其子請襲神宗許之而制書但稱闡化王用閣臣沈一貫言加稱烏斯藏怕木竹巴灌頂國師闡化王其後奉貢不替所貢物有畫佛銅佛銅塔珊瑚犀角氆氌左髻毛纓足力麻鐵力麻刀劍明甲冑之屬諸王所貢亦如之贊善王者靈藏僧也其地在四川徼外視烏斯藏為近成祖踐阼命僧智光往使永樂四年其僧著思巴兒監藏遣使入貢命為灌頂國師明年封贊善王國師如故賜金印誥命十七年中官楊三保往使洪熙元年王卒從子喃葛監藏襲宣德二年中官侯顯往使正統五年奏稱年老請以長子班丹監剉代帝不從其請而授其子為都指揮使初入貢無定期自永樂迄正統或間歲一來或一歲再至而歷朝遣使往賜者金幣寶鈔佛像法器袈裟禪服不一而足至成化元年始定三歲一貢之例三年命塔兒把堅粲襲封故事封番王誥敕及幣帛遣官繼賜至是西陲多事禮官乞付使者繼回從之五年四川都司言贊善諸王不遵定制遣使率各寺番僧百三十二種入貢且無番王印文今止留十餘人守貢物餘已遣還禮官言番地廣遠番王亦多若遵例並時入貢則內郡疲供億莫若令諸王於應貢之歲各具印文取次而來今貢使已至難拂其情乞許作明年應貢之數報可十八年禮官言番王三歲一貢貢使百五十人定制也近贊善王連貢者再已遣四百十三人今請封請襲又遣千五百五十人違制宜卻乞許其請封襲者以三百人為後來兩貢之數餘悉遣還亦報可遂封喃葛堅粲巴藏卜為贊善王弘治十六年卒命其弟端竹堅昝嗣嘉靖後猶入貢如制護教王者名宗巴斡即南哥巴藏卜館覺僧也成祖初僧智光使其地永樂四年遣使入貢詔授灌頂國師賜之誥明年遣使入謝封為護教王賜金印誥命國師如故遂頻歲入貢十二年卒命其從子幹些兒吉剌思巴藏卜嗣洪熙宣德中併入貢已而卒無嗣其爵逐絕闡教王者必力工瓦僧也成祖初僧智光繼敕入番其國師端竹監藏遣使入貢永樂元年至京帝喜宴賚遣還四年又貢帝優賜並賜其國師大板的達律師鎖南藏卜衣幣十一年乃加號灌頂慈慧淨戒大國師又封其僧領真巴兒吉監藏為闡教王賜印誥彩幣後比年一貢楊三保戴興侯顯之使皆繼金幣佛像法器賜焉宣德五年王卒命其子綽兒加監巴領占嗣久之卒命其子領占叭兒結堅參嗣成化四年從禮官言申三歲一貢之制明年王卒命其子領占堅參叭兒藏卜襲二十年帝遣番僧班著兒繼璽書勘合往賜其僧憚行至半道偽為王印信番文覆命詔逮治正德十三年遣番僧領占劄巴等封其新王劄巴等乞馬快船三十艘載食鹽為入番買路之資戶科戶部並疏爭不聽劄巴等在途科索無厭至呂梁毆管洪主事李瑜幾斃恣橫如此迄嘉靖世闡教王修貢不輟輔教王者思達藏僧也其地視烏斯藏尤遠成祖即位命僧智光持詔招諭賜以銀幣永樂十一年封其僧南渴烈思巴為輔教王賜誥印彩幣數通貢使楊三保侯顯皆往賜其國與諸法王等景泰七年使來貢自陳年老乞令其子喃葛堅粲巴藏卜代帝從之封為輔教王賜誥敕金印彩幣袈裟法器以灌頂國葛藏右覺義桑加巴充正副使往封至四川多雇牛馬任載私物禮官請治其罪英宗方復辟命收其敕書減供應之半成化五年王卒命其子喃葛劄失堅參叭藏卜嗣六年申舊制三年一貢多不過百五十人由四川雅州人國師以下不許貢弘治十二年輔教等四王及長河西宣慰司並時入貢使者至二千八百餘人禮官以供費不貲請敕四川守臣遵制遣送違者卻還從之歷正德嘉靖世奉貢不絕西天阿難功德國西方番國也洪武七年王卜哈魯遣其講主必尼西來朝貢方物及解毒藥石詔賜文綺禪衣及布帛諸物後不復至又有和林國師朵兒只怯烈失思巴藏卜亦遣其講主汝奴汪叔來朝獻銅佛舍利白哈丹布及元所授玉印一玉圖書一銀印四銅印五金字牌三命宴賚遣還明年國師入朝又獻佛像舍利馬二匹賜文綺禪衣和林即元太祖故都在極北非西番其國師則番僧與功德國同時來貢後亦不復至尼八剌國在諸藏之西去中國絕遠其王皆僧為之洪武十七年太祖命僧智光繼璽書彩幣往並使其鄰境地湧塔國智光精釋典負才辨宣揚天子德意其王馬達納羅摩遣使隨入朝貢金塔佛經及名馬方物二十年達京師帝喜賜銀印玉圖書誥敕符驗及幡幢彩幣二十三年再貢加賜玉圖書紅羅傘終太祖時數歲一貢成祖覆命智光使其國永樂七年遣使來貢十一年命楊三保繼璽書銀幣賜其嗣王沙的新葛及地湧塔王可般明年遣使來貢封沙的新葛為尼八剌國王賜誥及鍍金銀印十六年遣使來貢命中官鄧誠繼璽書錦綺紗羅往報之所經罕東靈藏必力工瓦烏斯藏及野藍卜納皆有賜宣德二年又遣中官侯顯賜其王絨錦紵絲地湧塔王如之自後貢使不復至又有速睹嵩者亦四方之國永樂三年遣行人連迪等繼敕往招賜銀鈔彩幣其酋以道遠不至朵甘在四川徼外南與烏斯藏鄰唐吐蕃地元置宣慰司招討司元帥府萬戶府分統其眾洪武二年太祖定陝西即遣官繼詔招撫又遣員外郎許允德諭其酋長舉元故官赴京攝帝師喃加巴藏卜及故國公南哥思丹八亦監藏等於六年春入朝上所舉六十人名帝喜置指揮使司二曰朵甘曰烏斯藏宣慰司二元帥府一招討司四萬戶府十三千戶所四即以所舉官任之廷臣言來朝者授職不來者宜弗予帝曰吾以誠心待人彼不誠曲在彼矣萬里來朝俟其再請豈不負遠人歸鄉之心遂皆授之降詔曰我國家受天明命統御萬方恩撫善良武威不服凡在幅員之內咸推一視之仁乃者攝帝師喃加巴藏卜率所舉故國公司徒宣慰招討元帥萬戶諸人自遠入朝朕嘉其識天命不勞師旅共效職方之貢已授國師及故國公等為指揮同知等官皆給誥印自今為官者務遵朝廷法撫安一方僧務敦化導之誠率民為善共享太平永綏福禳豈不休哉並宴賚遣還初元尊番僧為帝師授其徒國公等秩故降者襲舊號鎖南兀即爾者歸朝授朵甘衛指揮僉事以元司徒銀印來上命進指揮同知已而朵甘宣慰賞竹監藏舉首領可為指揮宣慰萬戶千戶者二十二人詔從其請鑄分司印予之乃改朵甘烏斯藏二衛為行都指揮使司以鎖南兀即爾為朵甘都指揮同知管招兀即爾為烏斯藏都指揮同知並賜銀印又設西安行都指揮使司於河州兼轄二都司已佛寶國師鎖南兀即爾等遣使來朝奏舉故官賞竹監藏等五十六人命增置朵甘思宣慰司及招討等司招討司六曰朵甘思曰朵甘隴答曰朵甘丹曰朵甘倉溏曰朵甘川曰磨兒勘萬戶府四曰沙兒可曰乃竹曰羅思端曰列思麻千戶所十七以賞竹監藏為朵甘都指揮同知餘授職有差自是諸番修貢惟謹八年置俄力思軍民元帥府尋置隴答衛指揮使司十八年以班竹兒藏卜為烏斯藏都指揮使乃更定品秩自都指揮以下皆令世襲未幾又改烏斯藏俺不羅衛為行都指揮使司二十六年西番思曩日等族遣使貢馬命賜金銅信符文綺襲衣許之朝貢永樂元年改必里千戶所為衛後置烏斯藏牛兒宗寨行都指揮使司又置上邛部衛皆以番人官之十八年帝以番悉入職方其最遠白勒等百餘寨猶未歸附遣使往招亦多入貢帝以番俗惟僧言是聽乃寵以國師諸美號賜誥印令歲朝由是諸番僧來者日多迄宣德朝禮之益厚九年命中官宋成等繼璽書賜物使其地敕都督趙安率兵送之畢力術江正統初以供費不貲稍為裁損時有番長移書松潘守將趙得言欲入朝為生番阻遏乞遣兵開道詔令得遣使招生番相率朝貢者八百二十九寨悉賜賚遣歸天順四年四川三司言比奉敕書番僧朝貢入京者不得過十人餘留境上候賞今蜀地災傷若悉留之動經數月有司困於供億宜如正統間制宴待遣還報可成化三年阿昔洞諸族土官言西番大小二姓為惡殺之不懼惟國師剌麻勸化則革心信服乃進禪師遠丹藏卜為國師都綱子瑺為禪師以化導之六年申諸番三歲一貢之例國師以下不許貢於是貢使漸希初太祖以西番地廣人獷悍欲分其勢而殺其力使不為邊患故來者輒授官又以其地皆食肉倚中國茶為命故設茶課司於天全六番令以馬市而入貢者又優以茶布諸番戀貢市之利且欲保世官不敢為變迨成祖益封法王及大國師西天佛子等俾轉相化導以共尊中國以故西陲宴然終明世無番寇之患長河西魚通寧遠宣慰司在四川徼外地通烏斯藏唐為吐蕃元時置碉門魚通黎雅長河西寧遠六安撫司隸吐蕃宣慰司洪武時其地打煎爐長河西土官元右承剌瓦蒙遣其理問高惟善來朝貢方物宴賚遣還十六年復遣惟善及從子萬戶若剌來貢命置長河西等處軍民安撫司以剌瓦蒙為安撫使賜文綺四十八匹鈔二百錠授惟善禮部主事二十年遣惟善招撫長河西魚通寧遠諸處明年還朝言安邊之道在治屯守而兼恩威屯守既堅雖遠而有功恩威未備雖近而無益今魚通九枝疆土及嚴州雜道二長官司東鄰碉門黎雅西接長河西自唐時吐蕃強盛寧遠安靖嚴州漢民往往為彼驅入九枝魚通防守漢邊元初設二萬戶府仍與盤陀仁陽置立寨柵邊民戍守其後各枝率眾攻仁陽等柵及川蜀兵起乘勢侵陵雅邛嘉等州洪武十年始隨碉門土酋歸附嚴州雜道二長官司自國朝設迨今十有餘年官民仍舊不相統攝蓋無統制之司恣其猖獗因襲舊弊故也其近而已附者如此遠而未附者何由而臣服之且嚴州寧遠等處乃古之州治苟撥兵戍守就築城堡開墾山田使近者向化而先附遠者畏威而來歸西域無事則供我徭役有事則使之先驅撫之既久則皆為我用如臣之說其便有六通烏斯藏朵甘鎮撫長河西可拓地四百餘里得番民二千餘戶非惟黎雅保障蜀亦永無西顧憂一也番民所處老思岡之地土瘠人繁專務貿販碉門烏茶蜀之細布博易羌貨以贍其生若於嚴州立市則此輩衣食皆仰給於我焉敢為非二也以長河西伯思東巴獵等八千戶為外番掎角其勢必固然後招徠遠者如其不來使八千戶近為內應遠為鄉導此所謂以蠻攻蠻誠制邊之善道三也天全六番招討司八鄉之民宜悉蠲其徭役專令蒸造烏茶運至嚴州置倉收貯以易番馬比之雅州易馬其利倍之且於打煎爐原易馬處相去甚近而價增於彼則番民如蟻之慕羶歸市必眾四也嚴州既立倉易馬則番民運茶出境倍收其稅其餘物貨至者必多又魚通九枝蠻民所種水陸之田遞年無征若令歲輸租米並令軍士開墾大渡河兩岸荒田亦可供給戌守官軍五也碉門至嚴州道路宜令繕修開拓以便往來人馬仍量地里遠近均立郵傳與黎雅烽火相應庶可以防遏亂略邊境無虞六也帝從之後建昌酋月魯帖木兒叛長河西諸酋陰附之失朝貢太祖怒三十年春謂禮部臣曰今天下一統四方萬國皆以時奉貢如烏斯藏尼八剌國其地極遠猶三歲一朝惟打煎爐長河西土酋外附月魯帖木兒賈哈剌不臣中國興師討之鋒刃之下死者必眾宜遣人諭其酋若聽命來覲一以恩待不悛則發兵三十萬聲罪徂征禮官以帝意為文馳諭之其酋懼即遣使入貢謝罪天子赦之為置長河西魚通寧遠宣慰司以其酋為宣慰使自是修貢不絕初魚通及寧遠長河西本各為部至是始合為一永樂十三年貢使言西番無他土產惟以馬易茶近年禁約生理實艱乞仍許開中從之二十一年宣慰使喃哩等二十四人來朝貢馬正統二年喃哩卒子加八僧嗣成化四年申諸番三歲一貢之令惟長河西仍比歲一貢六年頒定二年或三年一貢之例貢使不得過百人十七年禮官言烏斯藏在長河西之西長河西在松潘越雋之南壤地相接易於混淆烏斯藏諸番王例三歲一貢彼以道險來少而長河西番僧往往詐為諸王文牒入貢冒賞請給諸番王及長河西董卜韓胡敕書勘合邊臣審驗方許進入庶免詐偽之弊或道阻不許補貢從之十九年其部內灌頂國師遣僧徒來貢至千八百人守臣劾其違制詔止納五百人餘悉遣還二十二年禮官言長河西以黎州大渡河寇發連歲失貢至是補進三貢定制道梗者不得再補但今貢物已至宜順其情納之而量減賜繼報可弘治十二年禮官言長河西及烏斯藏諸番一時並貢使者至二千八百餘人乞諭守臣無濫送亦報可然其後來者愈多卒不能卻嘉靖三年定令不得過一千人隆慶三年定五百人全賞遣八人赴京之制如闡教諸王其貢物則珊瑚氆氌之屬悉准闡化王傳所載諸番貢皆如之董卜韓胡宣慰司在四川威州之西其南與天全六番接永樂九年酋長南葛遣使奉表入朝貢方物因言答隆蒙碉門二招討侵掠鄰境阻遏道路請討之帝不欲用兵降敕慰諭使比年一貢賜金印冠帶正統三年奏年老乞以子克羅俄堅粲代從之凶狡不循禮法七年乞封王賜金印帝不許命進秩鎮國將軍都指揮同知掌宣慰司事給之誥命益恃強數與雜谷安撫及別思寨安撫饒蛒構怨十年八月移牒四川守臣謂別思寨本父南葛故地分畀饒蛒父者後饒蛒受事私奏於朝獲設安撫司邇乃偽為宣慰司印自稱宣慰使糾合雜谷諸番將侵噬己地已拘執饒蛒追出偽印用番俗法剜去兩目謹以狀聞守臣上其事帝遣使繼敕責其專擅令與使臣推擇饒蛒族人為安撫仍轄其土地且送還饒蛒養之終身十三年十月四川巡按張洪等奏近接董卜宣慰文牒言雜谷故安撫烏標小妻毒殺其夫及子又賄威州千戶唐泰誣己謀叛今備物進貢欲從銅門山西開山通道乞官軍於日駐迓之臣等竊以雜谷內聯威州保縣外鄰董卜韓胡雜谷力弱欲抗董卜實倚重於威保董卜勢強欲通威保卻受阻於雜谷以此仇殺素不相能銅門及日駐諸寨乃雜谷威保要害地董卜欺雜谷妻寡子弱瞰我軍遠征麓川假進貢之名欲別開道路意在吞減雜谷搆陷唐泰所請不可許乃下都御史寇深等計度其議迄不行時董卜比歲入貢所遣僧徒強悍不法多攜私物強索舟車騷擾道途詈辱長吏天子聞而惡之景泰元年賜敕切責尋侵奪雜谷及達思蠻長官司地掠其人畜守臣不能制三年二月朝議獎其入貢勤誠進秩都指揮使令還二司侵地及所掠人民其酋即奉命惟舊維州之地尚為所據俄饋四川巡撫李匡銀罌金珀求御制大誥周易尚書毛詩小學方輿勝覽成都記諸書匡聞之於朝因言唐時吐蕃求毛詩春秋於休烈謂予之以書使知權謀愈生變詐非中國之利裴光廷謂吐蕃久叛新服因其有請賜以詩書俾漸陶聲教化流無外休烈徒知書有權略變詐不知忠信禮義皆從書出明皇從之今茲所求臣以為予之便不然彼因貢使市之書肆甚不為難惟方輿勝覽成都記形勝關塞所具不可概予帝如其言尋以其還侵地賜敕獎勵六年兵部尚書于謙等奏其僭稱蠻王窺伺巴蜀所上奏章語多不遜且招集群番大治戎器悖逆日彰不可不慮宜敕守臣預為戒備從之克羅俄堅粲死子劄思堅粲藏卜遣使來貢命為都指揮同知掌宣慰司事天順元年遣使入貢乞封王命如其父官進秩都指揮使仍掌宣慰司事成化五年四川三司奏保縣僻處極邊永樂五年特設雜谷安撫司令撫輯舊維州諸處蠻塞後與董卜構兵維州諸地俱為侵奪貢道阻絕今雜谷恢復故疆將遣使來貢不知貢期未敢擅遣帝從禮官言許以三年為期四年申諸番三年一貢之例惟董卜許比年一貢六年劄巴堅粲藏卜卒子綽吾結言千嗣為都指揮使弘治三年卒子日墨劄思巴旺丹巴藏卜遣國師貢珊瑚樹氆氌甲冑諸物請嗣父職許之賜誥命敕書彩幣九年卒子喃呆請襲亦遣國師貢方物詔授以父官卒子容中短竹襲嘉靖二年再定令貢使不得過千人其所隸別思寨及加渴瓦寺別貢隆慶二年董卜及別思寨貢使多至七百餘人命予半賞遣八人赴京為定制迄萬曆後朝貢不替明史卷三百三十一西域傳三
