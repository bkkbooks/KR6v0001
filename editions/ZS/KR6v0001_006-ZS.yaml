紀吐蕃求五臺山圖長慶四年九月甲子吐蕃遣使求五臺山圖舊唐書卷十七上敬宗紀吐蕃求五臺山圖長慶四年九月遣使求五臺山圖舊唐書卷一百九十六下吐蕃傳下迎佛骨於鳳翔咸通十四年三月迎佛骨於鳳翔新唐書卷九僖宗紀詔兩街僧於法門寺迎佛骨咸通十四年三月庚午詔兩街僧於鳳翔法門寺迎佛骨是日天雨黃土遍地四月八日佛骨至京自開遠門達安福門綵棚夾道念佛之音震地上登安福門迎禮之迎入內道場三日出於京城諸寺士女雲合威儀盛飾古無其比制曰朕以寡德繼承鴻業十有四年頃屬寇猖狂王師未息朕憂勤在位愛育生靈遂乃尊崇釋教至重玄門迎請真身為萬姓祈福今觀睹之眾隘塞路歧載念狴牢寢興在慮嗟我黎人陷於刑辟況漸當暑毒繫於縲紲或積幽凝滯有傷和氣或關連追擾有妨農務京畿及天下州府見禁囚徒除十惡忤逆故意殺人官典犯贓合造毒藥放火持仗開發墳墓外餘罪輕重節級遞減一等其京城軍鎮限兩日內疏理訖聞奏天下州府敕到三日內疏理聞奏舊唐書卷十九上懿宗紀宦官病令諸寺僧設齋祈福是歲霍仙鳴病德宗帝賜馬十匹令於諸寺為僧齋以祈福久病不愈十四年倉卒而卒舊唐書卷一百八十四宦官竇文場霍仙鳴傳天竺僧隨舶至海岸至道二年八月有天竺僧隨舶至海岸持帝鍾鈴杵銅鈴各一佛像一軀貝葉梵書一夾與之語不能曉天聖二年九月西印度僧愛賢智信護等來獻梵經各賜紫方袍束帛五年二月僧法吉祥等五人以梵書來獻賜紫方袍景佑三年正月僧善稱等九人貢梵經佛骨及銅牙菩薩像賜以束帛宋史卷四百九十外國傳六于闐僧善名善法來朝乾德三年五月于闐僧善名善法來朝賜紫衣其國宰相因善名等來致書樞密使李崇矩求通中國太祖令崇矩以書及器幣報之至是冬沙門道圓自西域還經于闐與其朝貢使至四年又遣其子德從來貢方物開寶二年遣使直末山來貢且言本國有玉一塊凡二百三十七斤願以上進乞遣使取之善名復至貢阿魏子賜號昭化大師因令還取玉又國王男總嘗貢玉把刀亦厚賜報之四年其國僧吉祥以其國王書來上自言破疏勒國得舞像一欲以為貢詔許之大中祥符二年其國黑韓王遣回鶻羅廝溫等以方物來貢廝溫跪奏曰臣萬里來朝昔時道路嘗有剽掠今自瓜沙抵于闐道路清謐行旅如流願遣使安撫遠俗上曰路遠命使益以勞費爾國今降詔書汝即賚往亦與命使無異也宋史卷四百九十外國傳六西州回鶻可汗遣僧法淵獻佛牙乾德三年十一月西州回鶻可汗遣僧法淵獻佛牙琉璃器琥珀盞雍熙元年四月王延德等還敘其行程來獻云凡八日至澤田寺高昌聞使至遣人來迎次歷地名寶莊又歷六種乃至高昌佛寺五十餘區皆唐朝所賜額寺中有大藏經唐韻玉篇經音等居民春月多群聚遨樂於其間游者馬上持弓矢射諸物謂之禳災有敕書樓藏唐太宗明皇御札詔敕緘鎖甚謹復有摩尼寺波斯僧各持其法佛經所謂外道者也其王遣人來言擇日以見使者又明日游佛寺曰應運太寧之寺貞觀十四年造宋史卷四百九十外國傳六伽設路國藏佛頂骨及錫杖五天竺所屬之國數十風俗物產略同有伽沒路國其俗開東門以向日王玄策至其王發使貢以奇珍異物及地圖因請老子像及道德經那揭陀國有醯羅城中有重閣藏佛頂骨及錫杖舊唐書卷一百九十八西戎天竺國傳南天竺上表乞寺額開元八年九月南天竺王尸利那羅僧伽寶多枝摩為國造寺上表乞寺額敕以歸化為名賜之十一月遣使冊利那羅伽寶多為南天竺國王遣使來朝十七年六月北天竺國三藏沙門僧密多獻質汗等藥十九年十月中天竺國王伊沙伏摩遣其大德僧來朝貢舊唐書卷一百九十八西戎天竺國傳李世民殺建成元吉復浮屠老子法武德九年六月丁巳太白經天庚申秦王世民殺皇太子建成齊王元吉大赦復浮屠老子法新唐書卷一高祖紀為死兵者立浮屠祠貞觀三年十二月閏月癸丑為死兵者立浮屠祠辛酉慮囚新唐書卷二太宗紀肅宗血寫佛書肅宗帝不豫后自箴血寫佛書以示誠新唐書卷七十七后妃下飯千桑門追福田神功自力入朝卒代宗為徹樂贈司徒詔其弟曹州刺史神玉知汴州留事賻絹千匹布五百端百官弔喪賜屏風茵褥飯千桑門追福至德後節度使不兼宰相者惟神功恩禮最篤新唐書卷一百四十四田神功傳飯萬人僧於禁中懿宗惑浮屠常飯萬人僧禁中自為贊唄蔚上疏切諫引狄仁傑姚元崇辛替否所言譏病時弊帝不聽但以虛禮褒答始懿宗成安國祠賜寶坐二度高二丈構以沈檀塗髹縷龍鳳葩蒍金扣之上施復坐陳經几其前四隅立瑞鳥神人高數尺蹬道以升前被繡囊錦襜珍麗精絕咸通十四年春詔迎佛骨鳳翔或言昔憲宗嘗為此俄晏駕帝曰使朕生見之死無恨乃以金銀為剎珠玉為帳孔鷸周飾之小者尋丈高至倍刻檀為檐注陛戚塗黃金每一剎數百人舉之香輿前後係道綴珠瑟瑟幡蓋殘彩以為幢節費無貲限夏四月至長安彩觀夾路其徒導衛天子御安福樓迎拜至泣下詔賜兩街僧金幣京師耆老及見元和事者悉厚賜之不逞小人至斷臂指流血滿道所過鄉聚皆裒土為剎相望於塗爭以金翠抆飾傳言剎悉震搖若有光景云京師高貲相與集大衢作繒台縵闕注水銀為池金玉為樹木聚桑門羅像考鼓鳴螺繼日夜錦車繡輿載歌舞從之秋七月帝崩方人主甘心篤向如李蔚言者甚多皆不能救僖宗立詔歸其骨都人耆耋辭餞或嗚咽流涕新唐書卷一百八十一李蔚傳出軍攻戰必禱佛祠鍾傅凡出軍攻戰必禱佛祠積餌餅為犀像高數尋晚節重斂商人至棄其貨去新唐書卷一百九十鍾傅傳吐蕃國事必以桑門參決吐蕃喜浮屠法習咒詛國之政