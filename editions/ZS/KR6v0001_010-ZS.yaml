body:
  text: 十毀佛孫綝壞浮屠祠斬道人孫綝遣將軍孫耽送亮之國徙尚於零陵遷公主於豫章綝意彌溢侮慢民神遂燒大橋頭伍子胥廟又壞浮屠祠斬道人三國誌卷六十四吳書孫綝傳詔州坑沙門毀諸佛像太平真君七年三月詔諸州坑沙門毀諸佛像徒長安城工巧二千家於京師車駕旋軫幸洛水分軍誅李閏叛羌魏書卷四下世祖紀四下鄴城毀五層佛圖太平真君七年夏四月甲申車駕至自長安戊子鄴城毀五層佛圖於泥像中得玉璽二其文皆曰受命於天既壽永昌其一刻其旁曰魏所受漢傳國璽魏書卷四下世祖紀四下詔沙門不得去寺延興二年四月癸酉詔沙門不得去寺浮遊民間行者仰以公文魏書卷七上高祖紀七上討沙門法秀大駕行幸三川苟頹留守京師沙門法秀謀反頹率禁衛收掩畢獲內外晏然魏書卷四十四苟頹傳討沙門法秀於栗磾長子烈從幸中山車駕還次肆州司空苟頹表沙門法秀詃惑百姓潛謀不軌詔烈與吏部尚書丞祖馳驛討之會秀已平轉左衛將軍賜爵昌國子魏書卷三十一於栗磾傳誅沙門法秀沙門法秀謀反伏誅詔曰法秀妖詐亂常妄說符瑞蘭台御史張求等一百餘人招結奴隸謀為大逆有司科以族誅誠合刑憲魏書卷七上高祖紀七上沙門法秀謀逆及沙門法秀謀逆事發多所牽引王睿曰與其殺不辜寧赦有罪宜梟斬首惡餘從疑赦不亦善乎高祖從之得免者千餘人魏書卷九十三王睿傳沙門法秀反魏誠弟亮字平誠承明初擢為中散告沙門法秀反遷冠軍將軍賜爵永寧侯加給事中魏書卷九十三恩倖傳平季與沙門法秀謀反平季字稚穆燕國薊人祖濟武威太守父雅州秀才與沙門法秀謀反伏誅魏書卷九十四閹官傳賒彌國不信佛法賒彌國在波知之南山居不信佛法專事諸神亦附厭噠東有鉢盧勒國路險緣鐵鎖而度下不見底熙平中宋雲等竟不能達魏書卷一百二西域志進兵焚佛寺門屋阿於子段暢以千騎投周周軍攻東門際昏遂入進兵焚佛寺門屋飛焰照天地北齊書卷十一文襄六王傳王則舊京取像毀以鑄錢王則性貪惏在州取受非法舊京取像毀以鑄錢於時世號河陽錢皆出其家北齊書卷二十王則傳周氏滅佛法法和始於百里洲造壽王寺既架佛殿更截樑柱曰後四十許年佛法當遭雷電此寺幽僻可以免難及魏平開荊州宮室焚燼總管欲發取壽王佛殿嫌其材短乃停後周氏滅佛法此寺隔在陳境故不及難北齊書卷三十二陸法和傳僧尼道士盡皆執役於是以蕭摩訶為皇畿大都督分兵鎮守要害僧尼道士盡皆執役南史卷十陳本紀下第十陳慶之斬僧強陳慶之出為北兗州刺史都督緣淮諸軍事曾有祅賊沙門僧強自稱為帝土豪蔡伯寵起兵應之攻陷北徐州詔慶之討焉慶之斬伯寵僧強傳其首南史卷六十一陳慶之傳禁私養沙門太延五年戊申詔自王公已下至於庶人私養沙門巫及金銀工巧之人在其家者皆遣詣官曹限今年二月十五日過期不出巫沙門身死主人門誅庚戌詔自三公已下至於卿士其子息皆詣太學其百工伎巧騶卒子息當習其父兄所業不聽私立學校違者師身死主人門誅北史卷二魏本紀第二詔諸州坑沙門毀諸佛像三月詔諸州坑沙門毀諸佛像徙長安城內工巧二千家於京師夏四月甲申車駕至自長安戊子毀鄴城五層佛圖於泥像中得玉璽二其文皆曰受命於天既壽永昌其一刻其旁曰魏所受漢傳國璽北史卷二魏本紀第二奚康生討涇州沙門劉慧汪永平二年春正月涇州沙門劉慧汪聚眾反詔華州刺史奚康生討之北史卷四魏本紀第四秦州捕斬沙門劉光秀永平三年春二月壬子秦州沙門劉光秀謀反州郡捕斬之北史卷四魏本紀第四沙門法慶反於冀州夏六月沙門法慶聚眾反於冀州殺阜城令自稱大乘北史卷四魏本紀第四法慶被斬時冀州沙門法慶既為妖幻遂說勃海人李歸伯歸伯閤家從之招率鄉人推法慶為主法慶以歸伯為十住菩薩平魔軍司定漢王自號大乘殺一人者為一住菩薩殺十人者為十住菩薩又合狂藥令人服之父子兄弟不相知識唯以殺害為事刺史蕭寶寅遣兼長史崔伯驎討之敗於煮棗城伯驎戰沒凶眾遂盛所在屠滅寺舍斬戮僧尼焚燒經像云新佛出世除去眾魔詔以遙為使持節都督北征諸軍事討破之禽法慶並其妻尼惠暉等斬法慶傳首京師後禽歸伯戮於都市北史卷十七景穆十二王傳上北周斷佛道二教建德三年丙子初斷佛道二教經像悉毀罷沙門道士並令還俗並禁諸淫祀非祀典所載者盡除之北史卷十周本紀下第十王文同毀法及帝征遼東令王文同巡察河北諸郡文同見沙門齋戒菜食者以為妖妄皆收繫之北至河間召諸郡官人小有遲違者輒覆面於地而捶殺之求沙門相聚講論及長老共為佛會者數百人文同以為聚結惑眾盡斬之又悉裸僧尼驗有淫狀非童男女者數千人復將殺之郡中士女號哭於路諸郡驚駭各奏其事帝聞大怒遣使者達奚善意馳鎖之斬於河間以謝百姓仇人剖其棺臠其肉啖之斯須咸盡北史卷八十七酷吏傳王文同毀法及帝征遼東令文同巡察河北諸郡文同見沙門齋戒菜食者以為妖妄皆收繫獄比至河間召諸郡官人小有遲違者輒皆覆面於地而箠殺之求沙門相聚講論及長老共為佛會者數百人文同以為聚結惑眾盡斬之又悉裸僧尼驗有淫狀非童男女者數千人復將殺之郡中士女號哭於路諸郡驚駭各奏其事帝聞而大怒遣使者達奚善意馳鎖之斬於河間以謝百姓讎人剖其棺臠其肉而啖之斯須咸盡隋書卷七十四酷吏傳自稱彌勒佛大業六年春正月癸亥朔旦有盜數十人皆素冠練衣焚香持華自稱彌勒佛入自建國門監門者皆稽首既而奪衛士仗將為亂齊王暕遇而斬之於是都下大索與相連坐者千餘家隋書卷三煬帝傳上付奕上疏去釋教武德七年付奕上疏請除去釋教曰佛在西域言妖路遠漢譯胡書恣其假托故使不忠不孝削髮而揖君親游手游食易服以逃租賦演其妖書述其邪法偽啟三塗謬張六道恐嚇愚夫詐欺庸品凡百黎庶通識者稀不察根源信其矯詐乃追既往之罪虛規將來之福布施一錢希萬倍之報持齋一日冀百日之糧遂使愚迷妄求功德不憚科禁輕犯憲章其有造作惡逆身墜刑網方乃獄中禮佛口誦佛經晝夜忘疲規免其罪且生死壽夭由於自然刑德威福關之人主乃謂貧富貴賤功業所招而愚僧矯詐皆云由佛竊人主之權擅造化之力其為害政良可悲矣案書云惟闢作福威惟辟玉食臣有作福作威玉食害於而家凶於而國人用側頗僻降自犧農至於漢魏皆無佛法君明臣忠祚長年久漢明帝假托夢想始立胡神西域桑門自傳其法西晉以上國有嚴科不許中國之人輒行髡髮之事洎於苻石羌胡亂華主庸臣佞政虐祚短皆由佛教致災也梁武齊襄足為明鏡昔褒姒一女妖惑幽王尚致亡國況天下僧尼數盈十萬翦刻繒綵裝束泥人而為厭魅迷惑萬姓者乎今之僧尼請令匹配即成十萬餘戶產育男女十年長養一紀教訓自然益國可以足兵四海免蠶食之殃百姓知威福所在則妖惑之風自革淳樸之化還興且古今忠諫鮮不及禍竊見齊朝章仇子他上表言僧尼徒眾糜損國家寺塔奢侈虛費金帛為諸僧附會宰相對朝讒毀諸尼依托妃主潛行謗讟子他竟被囚執刑於都市及周武平齊制封其墓臣雖不敏竊慕其蹤又上疏十一首詞甚切直高祖付群官詳議唯太僕卿張道源稱奕奏合理中書令蕭瑀與之爭論曰佛聖人也奕為此議非聖人者無法請置嚴刑奕曰禮本於事親終於奉上此則忠孝之理著臣子之行成而佛逾城出家逃背其父以匹夫而抗天子以繼體而悖所親蕭瑀非出於空桑乃遵無父之教臣聞非孝者無親其瑀之謂矣瑀不能答但合掌曰地獄所設正為是人高祖將從奕言會傳位而止奕武德九年五月密奏太白見秦分秦王當有天下高祖以狀授太宗及太宗嗣位召奕賜之食謂曰汝前所奏幾累於我然今後但須盡言無以前事為慮也太宗常臨朝謂奕曰佛道玄妙聖跡可師且報應顯然屢有征驗卿獨不悟其理何也奕對曰佛是胡中桀黠欺誑夷狄初止西域漸流中國遵尚其教皆是邪僻小人模寫莊老玄言文飾妖幻之教耳於百姓無補於國家有害太宗頗然之貞觀十三年卒年八十五臨終誡其子曰老莊玄一之篇周孔六經之說是為名教汝宜習之妖胡亂華舉時皆惑唯獨竊歎眾不我從悲夫汝等勿學也古人裸葬汝宜行之奕生平遇患未嘗請醫服藥雖究陰陽數術之書而並不之信又嘗醉臥蹶然起曰吾其死矣因自為墓誌曰傅奕青山白雲人也因酒醉死嗚呼哀哉其縱達皆此類注老子並撰音義又集魏晉以來駁佛教者為高識傳十卷行於世舊唐書卷七十九傅奕傳嵩山僧圓淨被殺元和十年八月己亥朔日有蝕之丙寅訶陵國遣使獻僧祇僮及五色鸚鵡頻伽鳥並異香名寶丁未淄青節度使李師道陰與嵩山僧圓淨謀反勇士數百人伏於東都進奏院乘洛城無兵欲竊發焚燒宮殿而肆行剽掠小將楊進李再興告變留守呂元膺乃出兵圍之賊突圍而出入嵩岳山棚盡擒之訊其首僧圓淨主謀也僧臨刑歎曰誤我事不得使洛城流血舊唐書卷十五憲宗傳下道士趙歸真排毀釋氏會昌四年三月以道士趙歸真為左右街道門教授先生時帝志學神仙師歸真歸真乘寵每對排毀釋氏言非中國之教蠹耗生靈盡宜除去帝頗信之舊唐書卷十八上武宗紀衡山道士劉玄靖及歸真膠固排毀釋氏會昌五年春正月己酉朔敕造望僊臺於南郊壇歸真自以涉物論遂舉羅浮道士鄧元起有長年之術帝遣中使迎之由是與衡山道士劉玄靖及歸真膠固排毀釋氏而拆寺之請行焉舊唐書卷十八上武宗紀拆大寺材木修建會昌五年八月中書門下奏東都太廟九室神主共二十六座自祿山叛後取太廟為軍營神主棄於街巷所司潛收聚見在太微宮內新造小屋之內其太廟屋室並在可以修崇如合置望以所拆大寺材木修建既是宗室官居守便望令充修東都太廟使勾當修繕奉敕宜依舊唐書卷二十六禮儀志六時廢浮圖法以銅像鑄錢時廢浮圖法以銅像鑄錢柳仲郢為京畿鑄錢使錢工欲於模加新字仲郢止之唯淮南加新字後竟為僧人取之為像設鐘磬舊唐書卷一百六十五柳公綽傳神策鎮將捕藍田縣念佛人尋而藍田縣人賀蘭進與里內五十餘人相聚念佛神策鎮將皆捕之以為謀逆當大辟高元裕疑其冤上疏請出賀蘭進等付台覆問然後行刑從之舊唐書卷一百七十一高元裕傳葉法善排擠佛法葉法善自高宗則天中宗歷五十年常往來名山數召入禁中盡禮問道然排擠佛法議者或譏其向背以其術高終莫之測睿宗即位稱法善有冥助之力先天二年拜鴻臚卿封越國公仍依舊為道士止於京師之景龍觀又贈其父為歙州刺史當時尊寵莫與為比舊唐書卷一百九十一方伎傳會昌五年大毀佛寺會昌五年八月壬午大毀佛寺復僧尼為民新唐書卷八宣宗紀唐武宗去浮圖之法甚銳唐武宗用一李德裕逐成其功烈然其奮然除去浮圖之法甚銳而躬受道家之菉服藥以求長年以此見其非明智之不惑者特好惡有不同爾新唐書卷八宣宗紀武宗即位廢浮圖法武宗即位廢浮圖法天下毀寺四千六百招提蘭若四萬籍僧尼為民二十六萬五千人奴婢十五萬人田數千萬頃大秦穆護祆二千餘人上都東都每街留寺二每寺僧三十人諸道留僧以三等不過二十人腴田鬻錢送戶部中下田給寺家奴婢丁壯者為兩稅戶人十畝以僧尼既盡兩京悲田養病坊給寺田十頃諸州七頃