身服色黃髮青如青絲乳青毛蛉赤如銅始莫邪夢白象而孕及生從母左脅出生而有結墮地能行七步此國在天竺城中天竺又有神人名沙律昔漢哀帝元壽元年博士弟子景盧受大月氏王使伊存口受浮屠經曰復立者其人也浮屠所載臨蒲塞桑門伯聞疏問白疏間比丘晨門皆弟子號也浮屠所載與中國老子經相出入蓋以為老子西出關過西域之天竺教胡浮屠屬弟子別號合有二十九不能詳載故略之如此三國誌卷三十烏丸鮮卑東夷傳史評注一魏書釋老志大人有作司牧生民結繩以往書契所絕故靡得而知焉自羲軒已還至於三代其神言秘策蘊圖緯之文范世率民垂墳典之跡秦肆其毒滅於灰燼漢采遺籍復若丘山司馬遷區別異同有陰陽儒墨名法道德六家之義劉歆著七略班固志藝文釋氏之學所未曾紀案漢武元狩中遣霍去病討匈奴至皋蘭過居延斬首大獲昆邪王殺休屠王將其眾五萬來降獲其金人帝以為大神列於甘泉宮金人率長丈餘不祭祀但燒香禮拜而已此則佛道流通之漸也及開西域遣張騫使大夏還傳其旁有身毒國一名天竺始聞有浮屠之教哀帝元壽元年博士弟子秦景憲受大月氏王使伊存口授浮屠經中土聞之未之信了也後孝明帝夜夢金人項有日光飛行殿庭乃訪群臣傅毅始以佛封帝遣郎中蔡愔博士弟子秦景等使於天竺寫浮屠遺范愔仍與沙門攝摩騰竺法蘭東還洛陽中國有沙門及跪拜之法自此始也愔又得佛經四十二章及釋迦立像明帝令畫工圖佛像置清涼台及顯節陵上經緘於蘭台石室愔之還也以白馬負經而至漢因立白馬寺於洛城雍門西摩騰法蘭咸卒於此寺浮屠正號曰佛陀佛陀與浮圖聲相近皆西方言其來轉為二音華言譯之則謂淨覺言滅穢成明道為聖悟凡其經旨大抵言生生之類皆因行業而起有過去當今未來歷三世識神常不滅凡為善惡必有報應漸積勝業陶冶粗鄙經無數形澡練神明乃致無生而得佛道其間階次心行等級非一皆緣淺以至深藉微而為著率在於積仁順蠲嗜欲習虛靜而成通照也故其始修心則依佛法僧謂之三歸若君子之三畏也又有五戒去殺盜淫妄言飲酒大意與仁義禮智信同名為異耳云奉持之則生天人勝處虧犯則墜鬼畜諸苦又善惡生處凡有六道焉諸服其道者則剃落鬚髮釋累辭家結師資遵律度相與和居治心修淨行乞以自給謂之沙門或曰桑門亦聲相近總謂之僧皆胡言也僧譯為和命眾桑門為息心比丘為行乞俗人之信憑道法者男曰優婆塞女曰優婆夷其為沙門者初修十誡曰沙彌而終於二百五十則具足成大僧婦入道者曰比丘尼其誡至於五百皆以為本隨事增數在於防心攝身正口心去貪忿癡身除殺淫盜口斷妄雜諸非正言總謂之十善道能具此謂之三業清淨凡人修行粗為極云可以達惡善報漸階聖跡初階聖者有三種人其根業各差謂之三乘聲聞乘緣覺乘大乘取其可乘運以至道為名此三人惡跡已盡但修心蕩累濟物進德初根人為小乘行四諦法中根人為中乘受十二因緣上根人為大乘則修六度雖階三乘而要由修進萬行拯度億流彌歷長遠乃可登佛境矣所謂佛者本號釋伽文者譯言能仁謂德充道備堪濟萬物也釋迦前有六佛釋迦繼六佛而成道處今賢劫文言將來有彌勒佛方繼釋迦而降世釋迦即天竺迦維衛國王之子天竺其總稱迦維別名也初釋迦於四月八日夜從母右脅而生既生姿相超異者三十二種天降嘉瑞以應之亦三十二其本起經說之備矣釋迦生時當周莊王九年春秋魯莊公七年夏四月恆星不見夜明是也至魏武定八年凡一千二百三十七年云釋迦年三十成佛導化群生四十九載乃於拘尸那城娑羅雙樹間以二月十五日而入般涅槃涅槃譯云滅度或言常樂我淨明無遷謝及諸苦累也諸佛法身有二種義一者真實二者權應真實身謂至極之體妙絕拘累不得以方處期不可以形量限有感斯應體常湛然權應身者謂和光六道同塵萬類生滅隨時修短應物形由感生體非實有權形雖謝真體不遷但時無妙感故莫得常見耳明佛生非實生滅非實滅也佛既謝世香木焚屍靈骨分碎大小如粒擊之不壞焚亦不焦或有光明神驗胡言謂之舍利弟子收奉置之寶瓶竭香花致敬慕建宮宇謂為塔塔亦胡言猶宗廟也故世稱塔廟於後百年有王阿育以神力分佛舍利役諸鬼神造八萬四千塔布於世界皆同日而就今洛陽彭城姑臧臨淄皆有阿育王寺蓋承其遺跡焉釋迦雖般涅槃而留影跡爪齒於天竺於今猶在中土來往並稱見之初釋迦所說教法既涅槃後有聲聞弟子大迦葉阿難等五百人撰集著錄阿難親承囑授多聞總持蓋能綜核深致無所漏失乃綴文字撰載三藏十二部經如九流之異統其大歸終以三乘為本後數百年有羅漢菩薩相繼著論贊明經義以破外道摩訶衍大小阿毗曇中論十二門論百法論成實論等是也皆傍諸藏部大義假立外問而以內法釋之漢章帝時楚王英喜為浮屠齋戒遣郎中令奉黃縑白紈三十匹詣國相以贖愆詔報曰楚王尚浮屠之仁祠潔齋三月與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌因以班示諸國桓帝時襄楷言佛陀黃老道以諫欲令好生惡殺少嗜欲去奢泰尚無為魏明帝曾欲壞宮西佛圖外國沙門乃金盤盛水置於殿前以佛舍利投之於水乃有五色光起於是帝歎曰自非靈異安得爾乎遂徙於道東為作周閣百間佛圖故處鑿為濛氾池種芙蓉於中後有天竺沙門曇柯迦羅入洛宣譯誡律中國誡律之始也自洛中構白馬寺盛飾佛圖畫跡甚妙為四方式凡宮塔制度猶依天竺舊狀而重構之從一級至三五七九世人相承謂之浮圖或云佛圖晉世洛中佛圖有四十二所矣漢世沙門皆衣赤布後乃易以雜色晉元康中有胡沙門支恭明譯佛經維摩法華三本起等微言隱義未之能究後有沙門常山衛道安性聰敏日誦經萬餘言研求幽旨慨無師匠獨坐靜室十二年覃思構精神悟妙賾以前所出經多有舛駁乃正其乖謬石勒時有天竺沙門浮圖澄少於烏萇國就羅漢入道劉曜時到襄國後為石勒所宗信號為大和尚軍國規謨頗訪之所言多驗道安曾至鄴侯澄澄見而異之澄卒後中國紛亂道安乃率門徒南遊新野欲令玄宗在所流布分遣弟子各趣諸方法汰詣揚州法和入蜀道安與慧遠之襄陽道安後入苻堅堅素欽德問既見宗以師禮時西域有胡沙門鳩摩羅什思通法門道安思與講釋每勸堅致羅什什亦承安令問謂之東方聖人或時遙拜致敬道安卒後二十餘載而羅什至長安恨不及安以為深慨道安所正經義與羅什譯出符會如一初無乖舛於是法旨大著中原魏先建國於玄朔風俗淳一無為以自守與西域殊絕莫能往來故浮圖之教未之得聞或聞而未信也及神元與魏晉通聘文帝久在洛陽昭成又至襄國乃備究南夏佛法之事太祖平中山經略燕趙所逕郡國佛寺見諸沙門道士皆致精敬禁軍旅無有所犯帝好黃老頗覽佛經但天下初定戎車屢動庶事草創未建圖宇招延僧眾也然時時旁求先是有沙門僧朗與其徒隱於泰山之琨谷帝遣使致書以繒素旃罽銀鉢為禮今猶號曰朗公谷焉天興元年下詔曰夫佛法之興其來遠矣濟益之功冥及存沒神蹤遺軌信可依憑其敕有司於京城建飾容範修整宮舍令信向之徒有所居止是歲始作五級佛圖耆闍崛山及須彌山殿加以繢飾別構講堂禪堂及沙門座莫不嚴具焉太宗踐位遵太祖之業亦好黃老又崇佛法京邑四方建立圖像仍令沙門敷導民俗初皇始中趙郡有沙門法果誡行精至開演法籍太祖聞其名詔以禮征赴京師後以為道人統綰攝僧徒每與帝言多所愜允供施甚厚至太宗彌加崇敬永興中前後授以輔國宜城子忠信侯安成公之號皆固辭帝常親幸其居以門小狹不容輿輦更廣大之年八十餘泰常中卒未殯帝三臨其喪追贈老壽將軍趙胡靈公初法果每言太祖明睿好道即是當今如來沙門宜應盡禮遂常致拜謂人曰能鴻道者人主也我非拜天子乃是禮佛耳法果四十始為沙門有子曰猛詔令襲果所加爵帝后幸廣宗有沙門曇證年且百歲邀見於路奉致果物帝敬其年老志力不衰亦加以老壽將軍號是時鳩摩羅什為姚興所敬於長安草堂寺集義學八百人重譯經本羅什聰辯有淵思達東西方言時沙門道肜僧略道恆道褾僧肇曇影等與羅什共相提挈發明幽致諸深大經論十有餘部更定章句辭義通明至今沙門共所祖習道肜等皆識學洽通僧肇尤為其最羅什之撰譯僧肇常執筆定諸辭義注維摩經又著數論皆有妙旨學者宗之又沙門法顯慨律藏不具自長安游天竺歷三十餘國隨有經律之處學其書語譯而寫之十年乃於南海師子國隨商人泛舟東下晝夜昏迷將二百日乃至青州長廣郡不其勞山南下乃出海焉是歲神瑞二年也法顯所逕諸國傳記之今行於世其所得律通譯未能盡正至江南更與天竺禪師跋陀羅辯定之謂之僧祇律大備於前為今沙門所持受先是有沙門法領從揚州入西域得華嚴經本定律後數年跋陀羅共沙門法業重加譯撰宣行於時世祖初即位亦遵太祖太宗之業每引高德沙門與共談論於四月八日輿諸佛像行於廣衢帝親御門樓臨觀散花以致禮敬先是沮渠蒙遜在涼州亦好佛法有罽賓沙門曇摩讖習諸經論於姑臧與沙門智嵩等譯涅槃諸經十餘部又曉術數禁咒歷言他國安危多所中驗蒙遜每以國事諮之神嘉中帝命蒙遜送讖詣京師惜而不遣既而懼魏威責遂使人殺讖讖死之日謂門徒曰今時將有客來可早食以待之食訖而走使至時人謂之知命智嵩亦爽悟篤志經籍後乃以新出經論於涼土教授辯論幽旨著涅槃義記戒行峻整門人齊肅知涼州將有兵役與門徒數人欲往胡地道路饑謹絕糧積日弟子求得禽獸肉請嵩強食嵩以戒自誓遂餓死於酒泉之西山弟子積薪焚其屍骸骨灰燼唯舌獨全色狀不變時人以為誦說功報涼州自張軌後世信佛教敦煌地接西域道俗交得其舊式村塢相屬多有塔寺太延中涼州平徙其國人於京邑沙門佛事皆俱東象教彌增矣尋以沙門眾多詔罷年五十已下者世祖初平赫連昌得沙門惠始姓張家本清河聞羅什出新經遂詣長安見之觀習經典坐禪於白渠北晝則入城聽講夕則還處靜坐三輔有識多宗之劉裕滅姚泓留子義真鎮長安義真及僚佐皆敬重焉義真之去長安也赫連屈丐追敗之道俗少長咸見坑戮惠始身被白刃而體不傷眾大怪異言於屈丐屈丐大怒召惠始於前以所持寶劍擊之又不能害乃懼而謝罪統萬平惠始到京都多所訓導時人莫測其跡世祖甚重之每加禮敬始自習禪至於沒世稱五十餘年未嘗寢臥或時跣行雖履泥塵初不污足色愈鮮白世號之曰白腳師太延中臨終於八角寺齋潔端坐僧徒滿側凝泊而絕停屍十餘日坐既不改容色如一舉世神異之遂瘞寺內至真君六年制城內不得留瘞乃葬於南郊之外始死十年矣開殯儼然初不傾壞送葬者六千餘人莫不感慟中書監高允為其傳頌其德跡惠始塚上立石精舍圖其形像經毀法時猶自全立世祖即位富於春秋既而銳志武功每以平定禍亂為先雖歸宗佛法敬重沙門而未存覽經教深求緣報之意及得寇謙之道帝以清淨無為有仙化之證遂信行其術時司徒崔浩博學多聞帝每訪以大事浩奉謙之道尤不信佛與帝言數加非毀常謂虛誕為世費害帝以其辯博頗信之會蓋吳反杏城關中騷動帝乃西伐至於長安先是長安沙門種麥寺內御騶牧馬於麥中帝入觀馬沙門飲從官酒從官入其便室見大有弓矢矛盾出以奏聞帝怒曰此非沙門所用當與蓋吳通謀規害人耳命有司案誅一寺閱其財產大得釀酒具及州郡牧守富人所寄藏物蓋以萬計又為屈室與貴室女私行淫亂帝既忿沙門非法浩時從行因進其說詔誅長安沙門焚破佛像敕留台下四方令一依長安行事又詔曰彼沙門者假西戎虛誕妄生妖孽非所以一齊政化布淳德於天下也自王公已下有私養沙門者皆送官曹不得隱匿限今年二月十五日過期不出沙門身死容止者誅一門時恭宗為太子監國素敬佛道頻上表陳刑殺沙門之濫又非圖像之罪今罷其道杜諸寺門世不修奉土木丹青自然毀滅如是再三不許乃下詔曰昔後漢荒君信惑邪偽妄假睡夢事胡妖鬼以亂天常自古九州之中無此也夸誕大言不本人情叔季之世暗君亂主莫不眩焉由是政教不行禮義大壞鬼道熾盛視王者之法蔑如也自此以來代經亂禍天罰亟行生民死盡五服之內鞠為丘墟千里蕭條不見人跡皆由於此朕承天緒屬當窮運之弊欲除偽定真復羲農之治其一切蕩除胡神滅其蹤跡庶無謝於風氏矣自今以後敢有事胡神及造形像泥人銅人者門誅雖言胡神問今胡人共云無有皆是前世漢人無賴子弟劉元真呂伯強之徒接乞胡之誕言用老莊之虛假附而益之皆非真實至使王法廢而不行蓋大奸之魁也有非常之人然後能行非常之事非朕孰能去此歷代之偽物有司宣告征鎮諸軍刺史諸有佛圖形像及胡經盡皆擊破焚燒沙門無少長悉坑之是歲真君七年三月也恭宗言雖不用然猶緩宣詔書遠近皆豫聞知得各為計四方沙門多亡匿獲免在京邑者亦蒙全濟金銀寶像及諸經論大得秘藏而土木宮塔聲教所及莫不畢毀矣始謙之與浩同從車駕苦與浩諍浩不肯謂浩曰卿今促年受戮滅門戶矣後四年浩誅備五刑時年七十浩既誅死帝頗悔之業已行難中修復恭宗潛欲興之未敢言也佛淪廢終帝世積七八年然禁稍寬弛篤信之家得密奉事沙門專至者猶竊法服誦習焉唯不得顯行於京都矣先是沙門曇曜有操尚又為恭宗所知禮佛法之滅沙門多以餘能自效還俗求見曜誓欲守死恭宗親加勸喻至於再三不得已乃止密持法服器物不暫離身聞者歎重之高宗踐極下詔曰夫為帝王者必祗奉明靈顯彰仁道其能惠著生民濟益群品者雖在古昔猶序其風烈是以春秋嘉崇明之禮祭典載功施之族況釋迦如來功濟大千惠流塵境等生死者歎其達觀覽文義者貴其妙明助王政之禁律益仁智之善性排斥群邪開演正覺故前代已來莫不崇尚亦我國家常所尊事也世祖太武皇帝開廣邊荒德澤遐及沙門道士善行純誠惠始之倫無遠不至風義相感往往如林夫山海之深怪物多有姦淫之徒得容假托講寺之中致有凶黨是以先朝因其瑕釁戮其有罪有司失旨一切禁斷景穆皇帝每為慨然值軍國多事未遑修復朕承洪緒君臨萬邦思述先志以隆斯道今制諸州郡縣於眾居之所各聽建佛圖一區任其財用不制會限其好樂道法欲為沙門不問長幼出於良家性行素篤無諸嫌穢鄉里所明者聽其出家率大州五十小州四十人其郡遙遠台者十人各當局分皆足以化惡就善播揚道教也天下承風朝不及夕往時所毀圖寺仍還修矣佛像經論皆復得顯京師沙門師賢本罽賓國王種人少入道東遊涼城涼平赴京罷佛法時師賢假為醫術還俗而守道不改於修復日即反沙門其同輩五人帝乃親為下發師賢仍為道人統是年詔有司為石像令如帝身既成顏上足下各有黑石冥同帝體上下黑子論者以為純誠所感興光元年秋敕有司於五級大寺內為太祖已下五帝鑄釋迦立像五各長一丈六尺都用赤金二十五萬斤太安初有師子國胡沙門邪奢遺多浮陀難提等五人奉佛像三到京都皆云備歷西域諸國見佛影跡及肉髻外國諸王相承咸遣工匠摹寫其容莫能及難提所造者去十餘步視之炳然轉近轉微又沙勒胡沙門赴京師致佛鉢並畫像跡和平初師賢卒曇曜代之更名沙門統初曇曜以復佛法之明年自中山被命赴京值帝出見於路御馬前銜曜衣時以為馬識善人帝后奉以師禮曇曜白帝於京城西武州塞鑿山石壁開窟五所鐫建佛像各一高者七十尺次六十尺雕飾奇偉冠於一世曇曜奏平齊戶及諸民有能歲輸谷六十斛入僧曹者即為僧祇戶粟為僧祇粟至於儉歲賑給饑民又請民犯重罪及官奴以為佛圖戶以供諸寺掃灑歲兼營田輸粟高宗並許之於是僧祇戶粟及寺戶遍於州鎮矣曇曜又與天竺沙門常那邪舍等譯出新經十四部又有沙門道進僧超法存等並有名於時演唱諸異顯祖即位敦信尤深覽諸經論好老莊每引諸沙門及能談玄之士與論理要初高宗太安末劉駿於丹陽中興寺設齋有一沙門容止獨秀舉眾往目皆莫識焉沙門惠璩起問之答名惠明又問所住答云從天安寺來語訖忽然不見駿君臣以為靈感改中興為天安寺是後七年而帝踐祚號天安元年是年劉彧徐州刺史薛安都始以城地來降明年盡有淮北之地其歲高祖誕載於時起永寧寺構七級佛圖高三百餘尺基架博敞為天下第一又於天宮寺造釋迦立像高四十三尺用赤金十萬斤黃金六百斤皇興中又構三級石佛圖榱棟楣楹上下重結大小皆石高十丈鎮固巧密為京華壯觀高祖踐位顯祖移御北苑崇光宮覽習玄籍建鹿野佛圖於苑中之西山去崇光右十里巖房禪堂禪僧居其中焉延興二年夏四月詔曰比丘不在寺舍游涉村落交通姦猾經歷年歲令民間五五相保不得容止無籍之僧精加隱括有者送付州鎮其在畿郡送付本曹若為三寶巡民教化者在外繼州鎮維那文移在台者繼都維那等印牒然後聽行違者加罪又詔曰內外之人興建福業造立圖寺高敞顯博亦足以輝隆至教矣然無知之徒各相高尚貧富相競費竭財產務存高廣傷殺昆蟲含生之類苟能精緻累土聚沙福鍾不朽欲建為福之因未知傷生之業朕為民父母慈養是務自今一切斷之又詔曰夫信誠則應遠行篤則感深歷觀先世靈瑞乃有禽獸易色草木移性濟州東平郡靈像發輝變成金銅之色殊常之事絕於往古熙隆妙法理在當今有司與沙門統曇曜令州送像達都使道俗咸睹實相之容普告天下皆使聞知三年十二月顯祖因田鷹獲鴛鴦一其偶悲鳴上下不去帝乃惕然問左右曰此飛鳴者為雌為雄左右對曰臣以為雌帝曰何以知對曰陽性剛陰性柔以剛柔推之必是雌矣帝乃慨然而歎曰雖人鳥事別至於資識性情竟何異哉於是下詔禁斷鷙鳥不得畜焉承明元年八月高祖於永寧寺設太法供度良家男女為僧尼者百有餘人帝為剃髮施以僧服令修道戒資福於顯祖是月又詔起建明寺太和元年二月幸永寧寺設齋赦死罪囚三月又幸永寧寺設會行道聽講命中秘二省與僧徒討論佛義施僧衣服寶器有差又於方山太祖營壘之處建思遠寺自興光至此京城內寺新舊且百所僧尼二千餘人四方諸寺六千四百七十八僧尼七萬七千二百五十八人四年春詔以鷹師為報德寺九年秋有司奏上谷郡比丘尼惠香在北山松樹下死屍形不壞爾來三年士女觀者有千百於時人皆異之十年冬有司又奏前被敕以勒籍之初愚民僥倖假稱入道以避輸課其無籍僧尼罷遣還俗重被旨所檢僧尼寺主維那當寺隱審其有道行精勤者聽仍在道為行凡粗者有籍無籍悉罷歸齊民今依旨簡遣其諸州還俗者僧尼合一千三百二十七人奏可十六年詔四月八日七月十五日聽大州度一百人為僧尼中州五十人下州二十人以為常准著於令十七年詔立僧制四十七條十九年四月帝幸徐州白塔寺顧謂諸王及侍官曰此寺近有名僧嵩法師受成實論於羅什在此流通後授淵法師淵法師授登紀二法師朕每玩成實論可以釋人染情故至此寺焉時沙門道登雅有義業為高祖眷賞恆侍講論曾於禁內與帝夜談同見一鬼二十年卒高祖甚悼惜之詔施帛一千匹又設一切僧齋並命京城七日行道又詔朕師登法師奄至徂背痛怛摧慟不能已已比藥治慎喪未容即赴便准師義哭諸門外緇素榮之又有西域沙門名跋陀有道業深為高祖所敬信詔於少室山陰立少林寺而居之公給衣供二十一年五月詔曰羅什法師可謂神出五才志入四行者也今常住寺猶有遺地欽悅修蹤情深遐遠可於舊堂所為建三級浮圖又見逼昏虐為道殄軀既暫同俗禮應有子胤可推訪以聞當加敘接先是立監福曹又改為昭玄備有官屬以斷僧務高祖時沙門道順惠覺僧意惠紀僧范道弁惠度智誕僧顯僧義僧利並以義行知重世宗即位永平元年秋詔曰緇素既殊法律亦異故道教彰於互顯禁勸各有所宜自今已後眾僧犯殺人已上罪者仍依俗斷餘犯悉付昭玄以內律僧制治之二年冬沙門統惠深上言僧尼浩曠清濁混流不遵禁典精粗莫別輒與經律法師群議立制諸州鎮郡維那上坐寺主各令戒律自修咸依內禁若不解律者退其本次又出家之人不應犯法積八不淨物然經律所制通塞有方依律車牛淨人不淨之物不得為己私畜唯有老病年六十以上者限聽一乘又比來僧尼或因三寶出貸私財緣州外又出家捨著本無凶儀不應廢道從俗其父母三師遠聞凶問聽哭三日若在見前限以七日或有不安寺舍游止民間亂道生過皆由此等若有犯者脫服還民其有造寺者限僧五十以上啟聞聽造若有輒營置者處以違敕之罪其寺僧眾擯出外州僧尼之法不得為俗人所使若有犯者還配本屬其外國僧尼來歸化者求精檢有德行合三藏者聽住若無德行遣還本國若其不去依此僧制治罪詔從之先是於恒農荊山造珉玉丈六像一三年冬迎置於洛濱之報德寺世宗躬觀致敬四年夏詔曰僧祇之粟本期濟施儉年出貸豐則收入山林僧尼隨以給施民有窘弊亦即賑之但主司冒利規取贏息及其征責不計水旱或償利過本或翻改券契侵蠹貧下莫知紀極細民嗟毒歲月滋深非所以矜此窮乏宗尚慈拯之本意也自今已後不得專委維那都尉可令刺史共加監括尚書檢諸有僧祇谷之處州別列其元數出入贏息賑給多少並貸償歲月見在未收上台錄記若收利過本及翻改初券依律免之勿復征責或有私債轉施償僧即以丐民不聽收檢後有出貸先盡貧窮征債之科一准舊格富有之家不聽輒貸脫仍冒濫依法治罪又尚書令高肇奏言謹案故沙門統曇曜昔於承明元年奏涼州軍戶趙苟子等二百家為僧祇戶立課積粟擬濟饑年不限道俗皆以拯施又依內律僧祇戶不得別屬一寺而都維那僧暹僧頻等進違成旨退乖內法肆意任情奏求逼召致使吁嗟之怨盈於行道棄子傷生自縊溺死五十餘人豈是仰贊聖明慈育之意深失陛下歸依之心遂令此等行號巷哭叫訴無所至乃白羽貫耳列訟宮闕悠悠之人尚為哀痛況慈悲之士而可安之請聽苟子等還鄉課輸儉乏之年周給貧寡若有不虞以擬邊捍其暹等違旨背律謬奏之愆請付昭玄依僧律推處詔曰暹等特可原之餘如奏世宗篤好佛理每年常於禁中親講經論廣集名僧標明義旨沙門條錄為內起居焉上既崇之下彌企尚至延昌中天下州郡僧尼寺積有一萬三千七百二十七所徒侶逾眾熙平元年詔遣沙門惠生使西域采諸經律正光三年冬還京師所得經論一百七十部行於世二年春靈太后令曰年常度僧依限大州應百人者州郡於前十日解送三百人其中州二百人小州一百人州統維那與官及精練簡取充數若無精行不得濫采若取非人刺史為首以違旨論太守縣令綱僚節級連坐統及維那移五百里外異州為僧自今奴婢悉不聽出家諸王及親貴亦不得輒啟請有犯者以違旨論其僧尼輒度他人奴婢者亦移五百里外為僧僧尼多養親識及他人奴婢子年大私度為弟子自今斷之有犯還俗被養者歸本等寺主聽容一人出寺五百里二人千里私度之僧皆由三長罪不及己容多隱濫自今有一人私度皆以違旨論鄰長為首里黨各相降一等縣滿十五人郡滿三十人州鎮滿三十人免官僚吏節級連坐私度之身配當州下役時法禁寬褫不能改肅也景明初世宗詔大長秋卿白整准代京靈巖寺石窟於洛南伊闕山為高祖文昭皇太后營石窟二所初建之始窟頂去地三百一十尺至正始二年中始出斬山二十三丈至大長秋卿王質謂斬山太高費功難就奏求下移就平去地一百尺南北一百四十尺永平中中尹劉騰奏為世宗復造石窟一凡為三所從景明元年至正光四年六月已前用功八十萬二千三百六十六肅宗熙平中於城內太社西起永寧寺靈太后親率百僚表基立剎佛圖九層高四十餘丈其諸費用不可勝計景明寺佛圖亦其亞也至於官私寺塔其數甚眾神龜元年冬司空公尚書令任城王澄奏曰仰惟高祖定鼎嵩瀍卜世悠遠慮括終始制洽天人造物開符垂之萬葉故都城制云城內唯擬一永寧寺地郭內唯擬尼寺一所餘悉城郭之外欲令永遵此制無敢逾矩逮景明之初微有犯禁故世宗仰修先志爰發明旨城內不造立浮圖僧尼寺舍亦欲絕其希覬文武二帝豈不愛尚佛法蓋以道俗殊歸理無相亂故也但俗眩虛聲僧貪厚潤雖有顯禁猶自冒營至正始三年沙門統惠深有違景明之禁便云營就之寺不忍移毀求自今已後更不聽立先旨含寬抑典從請前班之詔仍卷不行後來私謁彌以奔競永平二年深等復立條制啟云自今已後欲造寺者限僧五十已上聞徹聽造若有輒營置者依俗違敕之罪其寺僧眾擯出外州爾來十年私營轉盛罪擯之事寂爾無聞豈非朝格雖明恃福共毀僧制徒立顧利莫從者也不俗不道務為損法人而無厭其可極乎夫學跡沖妙非浮識所辯玄門曠寂豈短辭能究然淨居塵外道家所先功緣冥深匪尚華遁苟能誠信童子聚沙可邁於道場純陀儉設足薦於雙樹何必縱其盜竊資營寺觀此乃民之多幸非國之福也然比日私造動盈百數或乘請公地輒樹私福或啟得造寺限外廣制如此期罔非可稍計臣以才劣誠忝工務奉遵成規裁量是總所以披尋舊旨研究圖格輒遣府司馬陸昶屬崔孝芬都城之中及郭邑之內檢括寺舍數乘五百空地表剎未立塔宇不在其數民不畏法乃至於斯自遷都已來年逾二紀寺奪民居三分且一高祖立制非徒欲使緇素殊途抑亦防微深慮世宗述之亦不錮禁營福當在杜塞未萌今之僧寺無處不有或比滿城邑之中或連溢屠沽之肆或三五少僧共為一寺梵唱屠音連檐接響像塔纏於腥臊性靈沒於嗜欲真偽混居往來紛雜下司因習而莫非僧曹對制而不問其於污染真行塵穢練僧薰蕕同器不亦甚歟往在北代有法秀之謀近日冀州遭大乘之變皆初假神教以惑眾心終設奸誑用逞私悖太和之制因法秀而杜遠景明之禁慮大乘之將亂始知祖宗睿聖防遏處深履霜堅冰不可不慎昔如來闡教多依山林今此僧徒戀著城邑豈湫隘是經行所宜浮喧必棲禪之宅當由利引其心莫能自止處者既失其真造者或損其福乃釋氏之糟糠法中之社鼠內戒所不容王典所應棄矣非但京邑如此天下州鎮僧寺亦然侵奪細民廣占田宅有傷慈矜用長嗟苦且人心不同善惡亦異或有棲心真趣道業清遠者或外假法服內懷悖德者如此之徒宜辨涇渭若雷同一貫何以勸善然睹法贊善凡人所知矯俗避嫌物情同趣臣獨何為孤議獨發誠以國典一廢追理至難法綱暫失條綱將亂是以冒陳愚見兩願其益臣聞設令在於必行立罰貴能肅物令而不行不如無令罰不能肅孰與亡罰頃明詔屢下而造者更滋嚴限驟施而違犯不息者豈不以假福托善幸罪不加人殉其私吏難苟劾前制無追往之辜後旨開自今之恕悠悠世情遂忽成法今宜加以嚴科特設重禁糾其來違懲其往失脫不峻檢方垂容借恐今旨雖明復如往日又旨令所斷標榜禮拜之處悉聽不禁愚以為樹榜無常禮處難驗欲云有造立榜證公須營之辭指言嘗禮如此則徒有禁名實通造路且徙御已後斷詔四行而私造之徒不懼制旨豈是百官有司怠於奉法將由綱漏禁寬容托有他故耳如臣愚意都城之中雖有標榜營造粗功事可改立者請依先制在於郭外任擇所便其地若買得券證分明者聽其轉之若官地盜作即令還官若靈像既成不可移撤請依今敕如舊不禁悉令坊內行止不聽毀坊開門以妨里內通巷若被旨者不在斷限郭內准此商量其廟像嚴立而逼近屠沽請斷旁屠殺以潔靈居雖有僧數而事在可移者令就閒敞以避隘陋如今年正月赦後造者求依僧制案法科治若僧不滿五十者共相通容小就大寺必令充限其地賣還一如上式自今外州若欲造寺僧滿五十已上先令本州表列昭玄量審奏聽乃立若有違犯悉依前科州郡已下容而不禁罪同違旨庶仰遵先皇不朽之業俯奉今旨慈悲之令則繩墨可全聖道不墜矣奏可未幾天下喪亂加以河陰之酷朝士死者其家多舍居宅以施僧尼京邑第舍略為寺矣前日禁令不復行焉元象元年秋詔曰梵境幽玄義歸清曠伽藍淨土理絕囂塵前朝城內先有禁斷自聿來遷鄴率由舊章而百辟士民屆都之始城外新城並皆給宅舊城中暫時普借更擬後須非為永久如聞諸人多以二處得地或捨舊城所借之宅擅立為寺知非己有假此一名終恐因習滋甚有虧恆式宜付有司精加隱括且城中舊寺及宅並有定帳其新立之徒悉從毀廢冬又詔天下牧守令長悉不聽造寺若有違者不問財之所出並計所營功庸悉以枉法論興和二年春詔以鄴城舊宮為天平寺世宗以來至武定末沙門知名者有惠猛惠辨惠深僧暹道欽僧獻道晞僧深惠光惠顯法榮道長並見重於當世魏有天下至於禪讓佛經流通大集中國凡有四百一十五部合一千九百一十九卷正光已後天下多虞王役尤其於是所在編民相與入道假慕沙門實辟調役猥濫之極自中國之有佛法未之有也略而計之僧尼大眾二百萬矣其寺三萬有餘流弊不歸一至於此識者所以歎息也魏書卷一百一十四釋老志佛道自後漢明帝法始東流佛道自後漢明帝法始東流自此以來其教稍廣別為一家之學元嘉十二年丹陽尹蕭摹之奏曰佛化被於中國已歷四代而自頃以來更以奢兢為重請自今以後有欲鑄銅像者悉詣台自聞興造塔寺精舍皆先列言須許報然後就功詔可又沙汰沙門罷道者數百人孝武大明二年有曇標道人與羌人高闍謀反上因是下詔所在精加沙汰後有違犯嚴其誅坐於是設諸條禁自非戒行精苦並使還俗而諸寺尼出入宮掖交關妃後引制竟不能行先是晉世庾冰始創議欲使沙門敬王者後桓玄復述其義並不果行大明六年孝武使有司奏沙門接見皆盡敬詔可前廢帝初復舊孝武寵姬殷貴妃薨為之立寺貴妃子子鸞封新安王故以新安為寺號前廢帝殺子鸞乃毀廢新安寺驅斥僧徒尋又毀中興天寶諸寺明帝定亂下令修復宋世名僧有道生道人彭城人父為廣戚令道生為沙門法大弟子幼而聰悟年十五便能講經及長有異解立頓悟義時人推服元嘉十一年卒於廬山沙門慧琳之為之誄慧琳者秦郡秦縣人姓劉氏少出家信冶城寺有才章兼內外之學為廬陵王義真所知嘗著均善論頗貶裁佛法云有白學先生以為中國聖人經綸百世其德弘矣知周萬變天人之理盡矣道無隱旨教罔遣筌總睿迪哲保負於殊論哉有黑學道士陋之謂不照幽冥之塗弗及來生之化雖尚虛心未能虛事不逮西域之深也為客主酬答其歸以為六度與五教並行信順與慈悲齊立論行於世舊蓋僧謂其敗黜釋氏欲加擯斥文帝見論賞之元嘉中遂參權要朝廷大事皆與議焉賓客輻湊門車常有數十兩四方贈賂相係勢傾一時方筵七八座上恆滿琳著高屐披貂裘置通呈書佐權侔宰輔會稽孔覬嘗詣之遇賓客填咽暄涼而已覬慨然曰遂有黑衣宰相可謂冠履失所矣注孝經及莊子逍遙篇文論傳於世又有慧嚴慧議道人並住東安寺學行精整為道俗所推時鬥場寺多禪僧都下為之語曰鬥場禪師窟東安談義林孝武大明四年於中興寺設齋有一異僧眾莫之識問名答言名明慧從天安寺來忽然不見天下無此寺名乃改中興曰天安寺大明中外國沙門摩訶衍苦節有精理於都下出新經勝鬘經尤見重釋學南史卷七十八夷貊上天竺迦毗黎國傳元史釋老傳釋老之教行乎中國也千數百年而其盛衰每繫乎時君之好惡是故佛於晉宋梁陳黃老於漢魏唐宋而其效可睹矣元興崇尚釋氏而帝師之盛尤不可與古昔同語維道家方士之流假禱祠之說乘時以起曾不及其什一焉宋舊史嘗志老釋厥有旨哉乃本其意作釋老傳帝師八思巴者土番薩斯迦人族款氏也相傳自其祖朵栗赤以其法佐國主霸西海者十餘世八思巴生七歲誦經數十萬言能約通其大義國人號之聖童故名曰八思巴少長學富五明故又稱曰班彌怛歲癸丑年十有五謁世祖於潛邸與語大悅日見親禮中統元年世祖即位尊為國師授以玉印命制蒙古新字字成上之其字僅千餘其母凡四十有一其相關紐而成字者則有韻關之法其以二合三合四合而成字者則有語韻之法而大要則以諧聲為宗也至元六年詔頒行於天下詔曰朕惟字以書言言以紀事此古今之通制我國家肇基朔方俗尚簡古未遑製作凡施用文字因用漢楷及畏吾字以達本朝之言考諸遼金以及遐方諸國例各有字今文治浸興而字書有闕於一代制度實為未備故特命國師八思巴創為蒙古新字譯為一切文字期於順言達事而已自今以往凡有璽書頒降者並用蒙古新字仍各以其國字副之遂升號八思巴曰大寶法王更賜玉印十一年請告西還留之不可乃以其弟亦憐真嗣焉十六年八思巴卒訃聞賻贈有加賜號皇天之下一人之上開教宣文輔治大聖至德普覺真智佑國如意大寶法王西天佛子大元帝師至治間特詔郡縣建廟通祀泰定元年又以繪像十一頒各行省為之塑像云亦憐真嗣為帝師凡六歲至元十九年卒答兒麻八剌剌吉塔嗣二十三年卒亦攝思連真嗣三十一年卒乞剌斯八斡節兒嗣成宗特造寶玉五方佛冠賜之元貞元年又更賜雙龍盤紐白玉印文曰大元帝師統領諸國僧尼中興釋教之印大德七年卒明年以輦真監藏嗣又明年卒都相家班嗣皇慶二年卒相兒加思巴嗣延佑元年卒二年以公哥羅古羅思監藏班藏卜嗣至治三年卒旺出兒監藏嗣泰定二年卒公哥列思八丘沖納思監藏班藏卜嗣賜玉印降璽書諭天下其年卒天歷二年以輦真吃剌失思嗣八思巴時又有國師膽巴者一名功嘉葛剌思西番突甘斯旦麻人幼從西天竺古達麻失利傳習梵秘得其法要中統間帝師八思巴薦之時懷孟大旱世祖命禱之立雨又嘗咒食投龍湫頃之奇花異果上尊湧出波面取以上進世祖大悅至元末以不容於時相桑哥力請西歸既復召還謫之潮州時樞密副使月的迷失鎮潮而妻得奇疾膽巴以所持數珠加其身即愈又嘗為月的迷失言異夢及己還朝期後皆驗元貞間海都犯西番界成宗命禱於摩訶葛剌神已而捷書果至又為成宗禱疾遄愈賜與甚厚且詔分御前校尉十人為之導從成宗北巡命膽巴以象輿前導過雲州語諸弟子曰此地有靈怪恐驚乘輿當密持神咒以壓之未幾風雨大至眾咸震懼惟幄殿無虞復賜碧鈿杯一大德七年夏卒皇慶間追號大覺普惠廣照無上膽巴帝師其後又有必蘭納識里者初名只剌瓦彌的理北庭噶瑪拉國人幼熟畏兀兒及西天書長能貫通三藏暨諸國語大德六年奉旨從帝師授戒於廣寒殿代帝出家更賜今名皇慶中命翻譯諸梵經典延佑間特賜銀印授光祿大夫是時諸番朝貢表箋文字無能識者皆令必蘭納識理譯進嘗有以金刻字為表進者帝遣視之廷中愕眙觀所以對必蘭納識理隨取案上墨汁塗金葉審其字命左右執筆口授表中語及使人名氏與貢物之數書而上之明日有司閱其物色與所賚重譯之書無少差者眾無不服其博識而竟莫測其何所從授或者以為神悟云授開府儀同三司仍賜三台銀印兼領功德使司事厚其廩氣俾得以養母焉至治三年改賜金印特授沙律津愛護持且命為諸國引進使至順二年又賜玉印加號普覺圓明廣照弘辯三藏國師三年與安西王子月魯帖木兒等謀為不軌坐誅其所譯經漢字則有楞嚴經西天字則有大乘莊嚴寶度經乾陀般若經大涅槃經稱讚大乘功德經西番字則有不思議禪觀經通若千卷元起朔方固已崇尚釋教及得西域世祖以其地廣而險遠民獷而好鬥思有以因其俗而柔其人乃郡縣土番之地設官分職而領之於帝師乃立宣政院其為使位居第二者必以僧為之出帝師所辟舉而總其政於內外者帥臣以下亦必僧俗並用而軍民通攝於是帝師之命與詔敕並行於西土百年之間朝廷所以敬禮而尊信之者無所不用其至雖帝后妃主皆因受戒而為之膜拜正衙朝會百官班列而帝師亦或專席於坐隅且每帝即位之始降詔褒護必敕章佩監絡珠為字以賜蓋其重之如此其未至而迎之則中書大臣馳驛累百騎以往所過供億送迎比至京師則敕大府假法駕半仗以為前導詔省台院官以及百司庶府並服銀鼠質孫用每歲二月八日迎佛威儀往迓且命禮部尚書郎中專督迎接及其卒而歸葬舍利又命百官出郭祭餞大德九年專遣平章政事鐵木兒乘傳護送賻金五百兩銀千兩幣帛萬匹鈔三千錠皇慶二年加至賻金五千兩銀一萬五千兩錦綺雜彩共一萬七千匹雖其昆弟子姓之往來有司亦供億無乏泰定間以帝師弟公哥亦思監將至詔中書持羊酒郊勞而其兄瑣南藏卜遂尚公主封白蘭王賜金印給圓符其弟子之號司空司徒國公佩金玉印章者前後相望為其徒者怙勢恣睢日新月盛氣焰熏灼延於四方為害不可勝言有楊璉真加者世祖用為江南釋教總統發掘故宋趙氏諸陵之在錢唐紹興者及其大臣塚墓凡一百一所戕殺平民四人受人獻美女寶物無算且攘奪盜取財物計金一千七百兩銀六千八百兩玉帶九玉器大小百一十有一雜寶貝百五十有二大珠五十兩鈔一十一萬六千二百錠田二萬三千畝私庇平民不輸公賦者二萬三千戶他所藏匿未露者不論也又至大元年上都開元寺西僧強市民薪民訴諸留守李璧璧方詢問其由僧已率其黨持白梃突入公府隔案引璧發捽諸地捶撲交下拽之以歸閉諸空室久乃得脫奔訴於朝遇赦以免二年復有僧龔柯等十八人與諸王合兒八剌妃忽禿赤的斤爭道拉妃墮車毆之且有犯上等語事聞詔釋不問而宣政院臣方奏取旨凡民毆西僧者截其手詈之者斷其舌時仁宗居東宮聞之亟奏寢其令泰定二年西台御史李昌言嘗經平涼府靜會定西等州見西番僧佩金字圓符絡繹道途馳騎累百傳舍至不能容則假館民舍因迫逐男子姦污女婦奉元一路自正月至七月往者百八十五次用馬至八百四十餘匹較之諸王行省之使十多六七驛戶無所控訴台察莫得誰何且國家之制圓符本為邊防警報之虞僧人何事而輒佩之乞更正僧人給驛法且令台憲得以糾察不報必蘭納識里之誅也有司籍之得其人畜土田金銀貨貝錢幣邸舍書畫器玩以及婦人七寶裝具價直鉅萬萬云若歲時祝釐禱祠之常號稱好事者其目尤不一有曰鎮雷阿藍納四華言慶贊也有曰亦思滿藍華言藥師壇也有曰搠思串卜華言護城也有曰朵兒禪華言大施食也有曰朵兒只列朵四華言美妙金剛迴遮施食也有曰察兒哥朵四華言迴庶也有曰籠哥兒華言風輪也有曰喒朵四華言作施食也有曰出朵兒華言出水濟六道也有曰黨剌朵四華言迴遮施食也有曰典朵兒華言常川施食也有曰坐靜有曰魯朝華言獅子吼道場也有曰黑牙蠻答哥華言黑獄帝主也有曰搠思江朵兒麻華言護江法神施食也有曰赤思古林搠華言自受主戒也有曰鎮雷坐靜有曰吃剌察坐靜華言秘密坐靜也有曰斟惹華言文殊菩薩也有曰古林朵四華言至尊大黑神迴遮施食也有曰歇白咱剌華言大喜樂也有曰必思禪華言無量壽也有曰睹思哥兒華言白傘蓋咒也有曰收札沙剌華言五護陀羅尼經也有曰阿昔答撒答哈昔里華言八十千頌般若經也有曰撒思納屯華言大理天神咒也有曰闊兒魯弗卜屯華言大輪金剛咒也有曰且八迷屯華言無量壽經也有曰亦思羅八華言最勝王經也有曰撒思納屯華言護神咒也有曰南占屯華言懷壞相金剛也有曰卜魯八華言咒法也又有作擦擦者以泥作小浮屠也又有作答兒剛者其作答兒剛者或一所二所以至七所作擦擦者或十萬二十萬以至三十萬又嘗造浮屠二百一十有六實以七寶珠玉半置海畔半置水中以鎮海災延祐四年宣徽使會每歲內廷佛事所供其費以斤數者用面四十三萬九千五百油七萬九千酥二萬一千八百七十蜜二萬七千三百自至元三十年間醮祠佛事之目僅百有二大德七年再立功德司遂增至五百有餘僧徒貪利無已營結近侍欺昧奏請布施莽齋所需非一歲費千萬較之大德不知幾倍又每歲必因好事奏釋輕重囚徒以為福利雖大臣如阿里閫帥如別沙兒等莫不假是以逭其誅宣政院參議李良弼受賕鬻官直以帝師之言縱之其餘殺人之盜作奸之徒夤緣倖免者多至或取空名宣敕以為布施而任其人可謂濫矣凡此皆有關乎一代之治體者故今備著焉若夫天下寺院之領於內外宣政院曰禪曰教曰律則固各守其業惟所謂白雲宗白蓮宗者亦或頗通姦利去原書校勘元史卷二百二釋老傳
