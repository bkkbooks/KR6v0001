body:
  text: 正史佛教資料類編緣起佛教史和佛教藝術的研究是蘭州大學敦煌學研究所的重點研究方向一方面在杜斗城教授的主持下研究所其他同志各有側重地對敦煌佛教史和佛教藝術做了很多研究工作如杜斗城教授完成的北涼佛教研究敦煌本佛說十王經校錄研究敦煌五臺山文獻校錄研究炳靈寺石窟研究論文集等目前正在主持甘肅散見佛教石刻造像的調查與研究等課題其他同志也在這一領域圍繞晚唐五代敦煌佛教史發表了一系列學術論文另一方面敦煌學專業研究生博士論文也朝著這一研究領域發展目前從事這一研究的博士生及其論文有沙武田的敦煌畫稿研究梁曉鵬的敦煌壁畫千佛圖像研究黃維忠的敦煌藏文發願文研究楊明芬的唐代西方淨土懺法研究以敦煌莫高窟西方淨土信仰研究為中心等這些成果不久將與學術界見面現在展現在學術界面前的正史佛教資料類編又是我所的一項最新學術成果研究中國佛教史目前我們使用最為常見的是大藏經經藏之外還有很多重要的資料如敦煌文獻和正史佛教資料敦煌文獻已經刊布而作為正史中的佛教文獻資料由於淹沒在浩翰的正史之中利用起來非常困難杜斗城教授的這一成果為我們的科研工作提供了很大方便本課題的完成和出版得到了蘭州大學敦煌學創新基地的資助敦煌學是蘭州大學的重點學科早在年就建立了敦煌學研究機構年籌建敦煌專業資料室創辦了敦煌學輯刊申請到敦煌學碩士學位授權點年中國敦煌吐魯番學會在蘭州大學建立中國敦煌吐魯番學會蘭州大學資料中心年通過教育部申請到美國基督教亞洲高等教育基金會的資助年成立蘭州大學敦煌學研究所年建成敦煌學博士學位授權點並成為甘肅省重點學科年成為首批教育部人文社會科學重點基地年成為敦煌學博士後科研工作站作為學科所在單位的蘭州大學敦煌學研究所在科學研究人才培養資料建設學術交流等方面都取得很大的進展並逐步發揮了其無可替代的地緣優勢學術交流方面蘭州大學敦煌學研究所採取了四種渠道第一舉辦學術會議第二學術訪問第三申請國外及其港台地區的各種基金項目聯合進行學術研究第四聘請國內外專家來研究所駐所研究並開展學術交流還將通過聯合共建的形式與美國密西根大學在學術交流人才培養學術研究等方面進行合作籌建了中國佛教藝術與文化國際研究中心這樣便於同國際接軌提高蘭州大學敦煌學專業的培養水平要培養一流的敦煌學研究人才就必須擁有一流的圖書資料在圖書資料建設上採取購買複製與接受捐贈三種手段經過近幾年的重點建設本專業圖書資料有了很大的改觀不但購買了齊全的敦煌學研究資料如俄藏敦煌文獻法藏敦煌西域文獻英藏敦煌文獻永樂北藏四庫全書和續修等大型圖書及其近年或者以前出版的所有能購買到的敦煌學研究參考圖書還利用各種辦法購置日文版圖書及最近台灣地區出版的敦煌學圖書在採購圖書中我們採取集中購買與零星購買相結合個人購買與集體購買相結合等方法力圖在資料購置上做到齊全為敦煌學專業培養一流的人才出產標誌性成果提供必要的研究條件圖書資料建設在科學研究人才培養和對外交流上發揮了巨大作用不僅保證了敦煌學專業的科研教學同時也為敦煌學界提供服務還創建了敦煌學資料信息服務中心網站在條件成熟後為整個學術界的研究提供網上信息服務蘭州大學敦煌學研究所還注意為國外培養敦煌學研究人才招收國外和中國港台地區留學生先後招收的留學生有讀博和短期研修兩種形式主要來自於中國台灣地區南華大學韓國國立漢城大學日本早稻田大學京都大學東京大學九州大學青山學院大學成城大學東北大學東京藝術大學東京女子藝術大學龍谷大學美國密西根大學通過留學生的教授輔導對我們的研究方法和教學方法促進很大目前留學生培養趨於成熟教學和研修效果反映良好得到派出機構的稱讚這些經過培養的日本留學生也在敦煌佛教藝術研究上嶄露頭角發表了很多高質量的學術論文同時我們還接受國外及其台灣地區的訪問學者來研究所進行研究僅年就接待了台灣南華大學的許絹惠華梵大學的陳秀蓮釋大參政治大學的羅彤華教授等今後我們還將這一學術交流更加廣泛的開展不僅接受國內和港台地區的訪問學者還將接受國外的學者來研究所訪問和交流更歡迎國外有關學者來蘭州大學敦煌學研究所進行長期的研究工作目前有日本國速水大等在研究所從事學術研究工作敦煌學專業的人才培養還體現在整體研究成果和研究方向上敦煌學專業博士授權點承擔有國家教育部國家文物局古籍整理委員會教育部文科重點研究基地和國際交流基金項目特別是國際交流基金項目和博士生承擔的基金項目增多是本學科的特色有國際敦煌學項目美國學術基金項目和日本和平基金項目敦煌研究主要體現在三個方面第一敦煌文獻整理研究是蘭州大學敦煌學研究所的傳統與優勢除了對部分文書進行分類整理和專題研究外還將對俄藏和法藏敦煌文獻非佛經部分進行整理研究並逐步開展對甘肅藏藏文文獻的整理研究第二是敦煌史地文獻與中國西北區域史地研究是本所多年來的研究重點在這方面我們已做了很多工作有一大批研究成果第三是石窟藝術和敦煌文獻結合研究上體現我們的地緣優勢石窟藝術研究是敦煌研究院的優勢自年成立至今經過幾代人的辛勤努力基本上完成了敦煌石窟的斷代和壁畫內容考釋等大量的研究工作代表敦煌佛教藝術研究的國際水平聯合共建之後這一優勢的研究成果及時體現在博士生的培養過程中今後還要擴大敦煌學的研究範圍和研究領域提高我們的教學和培養水平出產更多敦煌學複合型研究人才成為名副其實的國家敦煌學人才的培養基地佛教史與佛教藝術的研究是蘭州大學敦煌學研究所加強的研究領域我們同美國密西根大學台灣地區南華大學等聯合先後召開了佛教藝術與文化國際學術討論會麥積山石窟藝術與絲綢之路歷史文化學術討論會等一系列的學術會議和絲綢之路學術考察活動在海峽兩岸和國際學術交流中做出了突出成績目前蘭州大學敦煌學研究所得到國家工程和計劃專門支持研究所的面貌得到徹底的改觀今後我們將利用國家和學校的支持將蘭州大學的敦煌學研究提高到一個新的水平以推動敦煌學的快速深入發展鄭炳林年月日記於蘭州大學敦煌學研究所前言事情就是這樣書的前言往往寫在最後雖然今天總算有機會給正史佛教資料類編寫前言了但我仍然沒有絲毫輕鬆的感覺因為我深深地知道擺在我面前的這個成果是有許多缺陷的一個做資料工作的人雖然努力想使自己的工作盡善盡美但實際上沒有一個人能做到這一點換言之由於編者的學力和疏漏可能還有一些有價值的相關資料未被編入此外分類指全編分通論人物塔寺議論事跡敬佛教令經籍出尼毀佛十類也是一個令人頭疼的問題也就是說有些人物或事件可以分入此類也可分入彼類在這種情況下編者只好根據自己的理解而定了總之問題肯定很多望使用者批評指正上大學時就發心把二十四史翻閱一遍但只翻了史記漢書在蘭州大學教書之後與敦煌學佛學沾了邊從翻閱後漢書時就把有關佛教史料勾出斷斷續續已經二十年了這些資料本來只供我平時教學科研時參考並未打算出書但同事和研究生都希望我把其整理出版給大家提供方便我同意了我的學生黨燕妮翁鴻濤李莉買小英梁紅王艷玲楊君尹雁崔峰彭建兵姜濤李豔婁新慶管輝樊翔王慧慧康亞軍許棟都幫我作過大量工作特別是姜濤付出的勞動量最大此外我還要感謝為我打字和校對資料的周保蘭及陶秀琴等同志沒有他們的努力這本書也不可能在今天完成最後我還要特別感謝蘭州大學敦煌學研究所的支持杜斗城草於年月日說明一正史佛教資料類編所據正史為中華書局北京標點本二每條資料皆於後註明出處並註明中華書局標點本頁碼以便查尋三每條資料前的小標題為編者所加四資料中括號內的文字如年月人名等為編者為保證文意的清晰和連貫性視情況而補入五同一人物或同一事件有兩處以上記載而文意基本相同者如某一人物在南北史中均立傳一般只錄一處並註明未錄者的出處和中華書局本頁碼六魏晉南北朝隋唐以來受佛教影響很多人名用佛教名詞如張菩薩王善人之類但卻與佛教活動無關故此類資料視情況而取捨七為了節省篇幅在一篇較長的資料中省略其中與佛教無關的文字並加省略號八某些資料後的杜按為編者杜斗城所加的按語目錄一通論天竺國佛教臨兒國佛教魏書釋老志佛道自後漢明帝法始東流元史釋老傳二人物楚王英陶謙孫綽郗超王坦之何充王恭法泉佛圖澄佛圖澄佛圖澄麻襦單道開王嘉僧涉鳩摩羅什權翼道安與習鑿齒苻融釋法汰支曇慕容熙劉義慶孟顗法略法略戴顒與戴逵宗炳宗少文宗炳周續之周續之孔淳之孔淳之沈道虔沈道虔雷次宗雷次宗道育釋僧含玄暢蕭嶷釋法智蕭子良蕭子良周顒周顒僧紹與僧遠何求之劉虯劉虯劉之遴宗測宗測徐伯珍楊法持韋叡蕭偉蕭偉徐摛陳慶之王筠張緬蕭子暉孔休源江革江革謝舉謝舉謝微謝弘微僧達劉義恭張融范泰釋寶誌釋寶誌蕭幾蕭幾大球江紑江紑江總劉霽劉霽劉勰劉勰劉杳謝征伏挺任孝恭任孝恭何點何胤何點與何胤阮孝緒陶弘景陶弘景劉慧斐范元琰劉訏劉訏庾詵庾詵庾承先庾承先張孝秀張孝秀慧摽慧摽馬樞馬樞王固周弘正周弘正徐陵徐孝克與寶志徐陵徐孝克姚察章華謝貞張譏陸慶顏晃陸瑜彭叔陵彭叔陵劉僧紹北魏世宗法慶法慶李歸伯與法慶法慶法慶元悅元悅步孫表崔浩曇無讖曇無讖曇無讖李同軌李同軌王慧龍裴宣高允高允蕭贊邢晏崔光崔敬友崔長文陽尼奚康生奚康生胡國珍胡國珍盧景裕盧景裕馮亮馮亮殷紹殷紹李修曇無讖宋雲與沙門法力文宣皇后李氏武成皇后胡氏武成皇后胡氏高思宗劉世清楊愔祖珽孫靈暉皇甫遐張元張元蕭詧蕭詧蕭巋甄玄成楊綸與沙汴惠恩崛多楊俊盧太翼韋鼎惠琳惠琳司馬德戡劉義慶徐湛之王慈王固到溉釋慧琳釋慧琳王斌與慧超明僧紹明僧紹蕭昱梁武帝歎蕭藻昭明太子昭明太子王神念陳詳陳詳孫瑒傅縡孝文帝李義徽沙門道可靈太后韓顯宗與法撫劉芳邢季彥鹿悆高謙之曇璨蘇綽蘇綽楊俊馮熙孫惠尉柳辯蘇瓊蘇瓊靈遠檀特師陸法和瞿曇僧一行僧一行僧一行僧一行僧一行僧一行僧一行僧一行高曇晟與高開道法雅法雅蕭瑀上官儀上官儀盧伽阿逸多盧伽阿逸多理中與姚璹理中與姚璹姚璹劉承慶僧崇一僧崇一崔日用與普潤崔日用與普潤嚴挺之嚴挺之僧惠范僧惠范杜鴻漸杜鴻漸王縉王縉王維王維僧圓靜僧圓靜李廣弘李廣弘法湊法湊韋綬韋綬歸登孟簡孟簡柳仲郢柳仲郢柳公權柳公權白居易白居易白居易段文昌段成式馮宿李訓與宗密李訓與