body:
  text: 五事迹安居二時冬夏三月安居二時冬夏三月遠僧有來近衆無闕法鼓朗響頌偈清發散華霏蕤流香飛越析曠劫之微言説像法之遺旨乘此心之一豪濟彼生之萬理啓善趣於南倡歸清暢於北機非獨愜於豫情諒僉感於君子衆僧冬夏二時坐謂之安居輒九十日衆遠近聚萃法鼓頌偈華香四種是齋講之事析説是齋講之議乘此之心可濟彼之生南倡者都講北機者法師山中靜寂實是講説之處兼有林木可隨寒暑恆得清和以為適也宋書卷六十七謝靈運傳生天當在靈運前成佛必在靈運後太守孟顗事佛精懇而為靈運所輕嘗謂顗曰得道應須慧業丈人生天當在靈運前成佛必在靈運後顗深恨此言南史卷十九謝靈運傳赤城山雲霧開朗見石橋瀑布永明六年赤城山雲霧開朗見石橋瀑布從來所罕睹也山道士朱僧標以聞上遣主書董仲民案視以為神瑞太樂令鄭義泰案孫興公賦造天臺山伎作莓苔石橋道士捫翠屏之狀尋又省焉南齊書卷十一樂志惠藏送璽永明二年十一月虜國民齊祥歸入靈丘關聞殷然有聲仰視之見山側有紫氣如雲衆鳥回翔其間祥往氣所獲璽方寸四分獸鈕文曰坤維聖帝永昌送與虜太后師道人惠度欲獻虜主惠度睹其文竊謂當今衣冠正朔在於齊國遂附道人惠藏送京師因羽林監崔士亮獻之南齊書卷十八祥瑞以鐵籠盛道僧人初佛狸討羯胡於長安殺道人且盡及元嘉南寇獲道人以鐵籠盛之後佛狸感惡疾自是敬畏佛教立塔寺浮圖宏父弘禪位後黃冠素服持戒誦經居石窟寺宏太和三年道人法秀與苟兒王阿辱瑰王等謀反事覺囚法秀加以籠頭鐵鎖無故自解脫虜穿其頸骨使咒之曰若復有神當令穿肉不入遂穿而殉之三日乃死偽咸陽王復欲盡殺道人太后馮氏不許宏尤精信粗涉義理宮殿內立浮圖南齊書卷五十七魏虜傳大馮為尼初偽太后馮氏兄昌黎王馮莎二女大馮美而有疾為尼小馮為宏皇后生偽太子詢後大馮疾差宏納為昭儀南齊書卷五十七魏虜傳林邑事尼乾道林邑有金山金汁流出於浦事尼乾道鑄金銀人像大十圍元嘉二十二年交州刺史檀和之伐林邑楊邁欲輸金萬斤銀十萬斤銅三十萬斤還日南地大臣䓯僧達諫不聽和之進兵破其北界犬戎區栗城獲金寶無芐毀其金人得黃金數萬斤餘物稱是和之後病死見胡神為祟南齊書卷五十七魏虜傳趙續伯乘佛輿永元二年十月巴西人趙續伯又反有衆二萬出廣漢乘佛輿以五彩裹青石誑百姓云天與我玉印當王蜀愚人從之者甚衆季連進討之遣長史趙越常前驅兵敗季連復遣李奉伯由涪路討之奉伯別軍自潺亭與大軍會於城進攻其柵大破之梁書卷二十劉季連傳李弘乘佛輿永元二年十月巴西人趙續伯反奉其鄉人李弘為聖主弘乘佛輿以五彩裹青石誑百姓云天與己玉印當王蜀季連遣中兵參軍李奉伯大破獲之將刑謂刑人曰我須臾飛去復曰汝空殺我我三月三日會更出遂斬之南史卷十三劉季連傳慧龍治眼鄱陽忠烈王恢恢有孝性初鎮蜀所生費太妃猶停都後於都下不豫恢未之知一夜忽夢還侍疾既覺憂遑便廢寢食俄而都信至太妃已瘳後又目有疾久廢視瞻有北渡道人慧龍得治眼術恢請之既至空中忽見聖僧及慧龍下針豁然開朗咸謂精誠所致杜按南史本傳文稍異意同故不録梁書卷二十二蕭恢傳北僧南渡葫蘆中藏漢書序傳始蕭琛在宣城有北僧南度惟賚一葫蘆中有漢書序傳僧曰三輔舊老相傳以為班固真本琛固求得之其書多有異今者而紙黑亦古文字多如龍舉之例非隸非篆琛甚祕之及是行也以書囊鄱陽王范范乃獻於東宮杜按南史本傳大同故不録梁書卷二十六蕭琛傳褚翔請沙門祈福褚翔少有孝性為侍中時母疾篤請沙門祈福中夜忽見戶外有異光又聞空中彈指及曉疾遂愈咸以翔精誠所致焉杜按南史本傳大同故不録梁書卷四十一褚翔傳佛像及夾侍自門而入滕曇恭豫章南昌人也年五歲母楊氏患熱思食寒瓜土俗所不産曇恭歷訪不能得銜悲哀切俄值一桑門問其故曇恭具以告桑門曰我有兩瓜分一相遺曇恭拜謝因捧瓜還以薦其母舉室驚異尋訪桑門莫知所在及父母卒曇恭水漿不入口者旬日感慟嘔血絶而復蘇隆冬不著蠶絮蔬食終身每至忌日思慕不自堪晝夜哀慟其門外有冬生樹二株時忽有神光自樹而起俄見佛像及夾侍之儀容光顯著自門而入曇恭家人大小咸共禮拜久之乃滅遠近道俗咸傳之杜按南史本傳大同故不録梁書卷四十七孝行滕曇恭傳寶志僧通與侯景天監中有釋寶志曰掘尾狗子自發狂當死未死嚙人傷須臾之間自滅亡起自汝陰死三湘又曰山家小兒果攘臂太極殿前作虎視掘尾狗子山家小兒皆猴狀侯景遂覆陷都邑毒害皇室及景將敗有僧通道人者意性若狂飲酒啖肉不異凡等世間遊行已數十載姓名鄉里人莫能知初言隱伏久乃方驗人並呼為闍梨景甚信敬之景嘗於後堂與其徒共射時僧通在坐奪景弓射景陽山大呼云得奴已景後又宴集其黨又召僧通僧通取肉搵鹽以進景問曰好不景答所恨太鹹僧通曰不鹹則爛臭果以鹽封其尸杜按南史本傳大同故不録梁書卷五十六侯景傳沙門相王昱後當富貴王顯布衣為諸生有沙門相顯後當富貴誡其勿為吏官吏官必敗由是世宗時或欲令其遂攝吏部每殷勤避之及世宗崩肅宗夜即位受璽册於儀須兼太尉及吏部倉卒百官不具以顯兼吏部行事矣杜按北史有漢王顯之死世以有報應之驗等語餘大同故不録魏書卷九十一藝術王顯傳崔彧子醫於沙門崔彧字文若清河東武城人彧少嘗詣青州逢隱逸沙門教以素問九卷及甲乙遂善醫術中山王英子略曾病王顯等不能療彧針之抽針即愈杜按北史本傳無彭城堵沙門共相和解句魏書卷九十一藝術崔彧傳彭城沙門和解他人傷爭王可久在徐州恃王仲興寵勢輕侮司馬梁郡太守李長壽遂至忿諍彭城諸沙門共相和解未幾復有所競可久乃令僮僕邀毆長壽遂折其脅州以表聞魏書卷九十三恩幸王仲興傳苻氏死沙門素服及苻氏死慕容熙擁其尸而撫之曰體已就冷命遂斷矣於是僵仆絶息久而乃蘇悲號劈踴斬衰食粥大斂之後復啓而交接制百官哭臨沙門素服令有司案檢有淚者為忠孝無淚者罪之魏書卷九十五慕容廆傳附慕容熙傳苻氏死沙門素服苻氏死慕容熙擁其尸僵仆絶息久而乃蘇悲號劈踴斬衰食粥大斂之後復啓而交接制百官哭臨沙門素服北史卷九十三僭偽附庸慕容氏傳高祖與沙門道登見鬼太和十六年十一月乙亥高祖與沙門道登幸侍中省日入六鼓見一鬼衣黃褶褲當戶欲入帝以為人叱之而退問諸左右咸言不見唯帝與道登見之魏書卷一百一十二上靈徵志上并州靜林寺僧掘藥得玉璧等肅宗正光三年六月并州靜林寺僧在陽邑城西橡谷掘藥得玉璧五圭十印一玉柱一瓂一併以獻魏書卷一百一十二下靈徵志下上谷郡惠化寺禮泉湧高祖太和八年正月上谷郡惠化寺醴泉湧醴泉水之精也味甘美王者修治則出魏書卷一百一十二下靈徵志下武邑郡姦人告沙門道可與賀源謀反賀之臨州鞫獄以情徭役簡省武邑郡姦人石華告沙門道可與賀謀反有司以聞魏書卷四十一源賀傳靈太后為孟鸞設二百僧齋孟鸞字龍兒坐事充閹人文明太后時王遇有寵鸞以謹敏為遇左右徑來方山營諸寺舍鸞初出靈太后聞之曰鸞必不濟我為之憂及奏其死為之下淚曰其事我如此不見我一日欣樂時也遂賜帛三百匹黃絹十匹以供喪用七日靈太后為設二百僧齋賜助施五十匹同類榮焉魏書卷九十四閹官孟鸞傳靈太后為孟鸞設二百僧齋孟欒初出靈太后聞之曰欒必不濟我為之憂及奏其死為之下淚曰其事我如此不見我一日欣樂時也賜帛三百匹黃絹一十匹以供喪用七日靈太后為設二百僧齋北史卷九十二恩幸孟欒傳薛孤延繞浮圖與霹靂鬥高祖嘗閲馬於北牧道逢暴雨大雷震地前有浮圖一所高祖令延視之延乃馳馬按槊直前未至三十步雷火燒面延唱殺繞浮圖走火遂滅延還眉鬢及馬鬃尾俱焦高祖歎曰薛孤延乃能與霹靂鬥其勇決如此杜按北史本傳大同故不録北齊卷十九薛孤延傳武成帝病中見美婦人變為觀世音徐之才醫術最高偏被命召武成酒色過度恍惚不恆曾病發自云初見空中有五色物稍近變成一美婦人去地數丈亭亭而立食頃變為觀世音之才云此色欲多大虛所致即處湯方服一劑便覺稍遠又服還變成五色物數劑湯疾竟愈北齊卷三十三徐之才傳武成帝病中見美婦人變為觀世音天統四年徐之才纍遷尚書左僕射俄除兗州刺史特給鐃吹一部之才醫術最高偏被命召武成酒色過度恍忽不恆曾病發自云初見空中有五色物稍近變成一美婦人去地數丈亭亭而立食頃變為觀世音徐之才云此色欲多大虛所致即處湯方服一劑便覺稍遠又服還變成五色物數劑湯疾竟愈杜按魏書本傳不載此事北史卷九十藝術下徐謇傳附徐之才傳沙門預言暴顯後將貴極人臣暴顯幼時見一沙門指之曰此郎子有好相表大必為良將貴極人臣語終失僧莫知所去杜按北史本傳大同故不録北齊卷四十一暴顯傳強練大哭釋迦牟尼佛強練不知何許人恆寄住諸佛寺好遊行民家建德中每夜上街衢邊樹大哭釋迦牟尼佛或至申旦如此者纍日聲甚哀憐俄而廢佛道二教大象末又以一無底囊歷長安市肆告乞市人爭以米麥遺之強緡張囊投之隨即漏之於地人或問之曰汝何為也強練曰此亦無餘但欲使諸人見盛空耳又有蜀郡衛元嵩者亦好言將來之事蓋江左寶志之流天和中著詩預論周隋廢興及皇家受命並有征驗性尤不信釋教嘗上疏極論之杜按北史本傳大同小異故不録北周書卷四十七藝術強練傳皇妣呂氏生高祖於馮翊般若寺有紫氣充庭皇妣呂氏以大統七年六月癸丑夜生高祖於馮翊般若寺紫氣充庭有尼來自河東謂皇妣曰此兒所從來甚異不可於俗間處之尼將高祖舍於別館躬自撫養皇妣嘗抱高祖忽見頭上角出遍體鱗起皇妣大駭墜高祖於地尼自外入見曰已驚我兒致令晚得天下為人龍顏額上有五柱入頂目光外射有文在手曰王長上短下沈深嚴重隋書卷一高祖本紀皇妣呂氏生高祖於馮翊般若寺有紫氣充庭隋文帝武元皇帝之長子也皇妣曰呂氏以周大統七年六月癸丑夜生帝於馮翊波若寺有紫氣充庭時有尼來自河東謂皇妣曰此兒所從來甚異不可於俗間處之乃將帝舍於別館躬自撫養皇妣抱帝忽見頭上出角遍體起鱗墜帝於地尼自外見曰已驚我兒致令晚得天下帝龍頷額上有五柱入頂目光外射有文在手曰王字長上短下沈深嚴重北史卷十一隋本紀上瓦官寺重閣下一女子震死陳太建元年七月大雨震萬安陵華表又震慧日寺剎瓦官寺重閣門下一女子震死隋書卷二十二五行志上雷震太皇寺剎其年陳太建十年六月又震太皇寺剎莊嚴寺露槃重陽閣東樓鴻臚府門太皇莊嚴二寺陳國奉佛之所重陽閣每所遊宴鴻臚賓客禮儀之所在而同歲震者天戒若曰國威已喪不務修德後必有恃佛道耽宴樂棄禮儀而亡國者陳之君臣竟不悟至後主之代災異屢起懼而於太皇寺捨身為奴以祈冥助不恤國政耽酒色棄禮法不修鄰好以取敗亡隋書卷二十二五行志上大雨雹梁武帝數捨身為奴梁中大通元年四月大雨雹洪範五行傳曰雹陰脅陽之象也時帝數捨身為奴拘信佛法為沙門所制隋書卷二十二五行志上沙門志公賦五言詩梁天監三年六月八日武帝講於重雲殿沙門志公忽然起舞歌樂須臾悲泣因賦五言詩曰樂哉三十餘悲哉五十裏但看八十三子地妖災起佞臣作欺妄賊臣滅君子若不信吾語龍時侯賊起且至馬中間銜悲不見喜梁自天監至於大同三十餘年江表無事至太清二年台城陷帝享國四十八年所言五十裏也太清元年八月十三而侯景自懸瓠來降在丹陽之北子地帝惑朱異之言以納景景之作亂始自戊辰之歲至午年帝憂崩十年四月八日志公於大會中又作詩曰兀尾狗子始著狂欲死不死嚙人傷須臾之間自滅亡患在汝陰死三湘橫尸一旦無人藏侯景小字狗子初自懸瓠來降懸瓠則古之汝南也巴陵南有地名三湘即景奔敗之所隋書卷二十二五行志上袁村設佛會現異事開皇十七年大興城西南四里有袁村設佛會有老翁皓首白裙襦衣來食而去衆莫識追而觀之行二里許不復見但有一陂中有白魚長丈餘小魚從者無數人爭射之或弓折弦斷後竟中之剖其腹得粳飯始知此魚向老翁也後數日漕渠暴溢射人皆溺死隋書卷二十三五行志下渭南有三沙門夜見大豕來旨其所開皇末渭南有沙門三人行投陀法於人場圃之上夜見大豕來詣其所小豕從者十餘謂沙門曰阿練多欲得賢聖道然猶負他一命言罷而去賢聖道者君上之所行也隋書卷二十三五行志下帝於太皇寺捨身作奴後主至德元年正月壬戌蓬星見占曰必有亡國亂臣後帝於太皇寺捨身作奴以祈冥助不恤國政為施文慶等所惑以至國亡隋書卷二十一天文志下願不生帝王尊貴之家月餘宇文儒童裴仁基等誅世充復尊立侗事泄並見害世充兄世惲因勸世充害侗以絶民望世充遣其侄行本繼鴆詣侗所曰願皇帝飲此酒侗知不免請與母相見不許遂布席焚香禮佛咒曰從今以去願不生帝王尊貴之家於是仰藥不能時絶更以帛縊之世充偽諡為恭皇帝隋書卷五十九楊侗傳京都大風剎寺鍾三鳴開皇二十年十一月京都大風發屋拔樹秦隴壓死者千餘人地大震鼓皆應淨剎寺鍾三鳴佛殿門鎖自開銅像自出戶外鐘鼓自鳴者近鼓妖也揚雄以為人君不聰為衆所惑空名得進則鼓妖見隋書卷二十三五行志下有桑門見鳥向之作禮齊後主時有桑門貌若狂人見烏則向之作禮見沙門則毆辱之烏周色也未幾齊為周所吞滅除佛法隋書卷二十三五行志下相州沙門變為蛇大業七年相州有桑門變為蛇尾繞樹而自抽長二丈許六年正月朔旦有盜衣白練裙襦手持香花自稱彌勒佛出世入建國門奪衛士仗將為亂齊王暕遇而斬之後三年楊玄感作亂引兵圍洛陽戰敗伏誅九年帝在高陽唐縣人宋子賢善為幻術每夜樓上有光明能變作佛形自稱彌勒出世又懸大鏡於堂上紙素上畫為蛇為獸及人形有人來禮謁者轉側其鏡遣觀來生形像或映見紙上蛇形子賢輒告云此罪業也當更禮念又令禮謁乃轉人形示之遠近惑信日數百千人遂潛謀作亂將為無遮佛會因舉兵欲襲擊乘輿事泄鷹揚郎將以兵捕之夜至其所繞其所居但見火坑兵不敢進郎將曰此地素無坑止妖妄耳及進無復火矣遂擒斬之並坐其黨與千餘家其後復有桑門向海明於扶風自稱彌勒佛出世潛謀逆亂人有歸心者輒獲吉夢由是人皆惑之三輔之士翕然稱為大聖因舉兵反衆至數萬官軍擊破之京房易飛候曰妖言動衆者茲謂不信路無人行不出三年起兵自是天下大亂路無人行隋書卷二十三五行志下琅邪王壞北宮中白馬浮圖武平三年龍見邯鄲井中其氣五色屬天又見汲郡佛寺涸井中琅邪王儼壞北宮中白馬浮圖石趙時澄公所建見白蛇長數丈回旋失所在時儼專誅失中之咎也見變不知戒以及於難隋書卷二十三五行志下文宣受佛戒放生自北齊天保六年之後文宣帝遂以功業自矜恣行酷暴昏狂酗醟任情喜怒為大鑊長鋸銼碓之屬並陳於庭意有不快則手自屠裂或命左右臠啖以逞其意時僕射楊遵彥乃令憲司先定死罪囚置於仗衛之中帝欲殺人則執以應命謂之供御囚經三月不殺者則免其死帝嘗幸金鳳台受佛戒多召死囚編籧篨為翅命之飛下謂之放生墜皆致死帝視以為歡笑隋書卷二十五刑法志沈光上禪定寺幡竿時人號為肉飛仙沈光字總持吳興人也光少驍捷善戲馬為天下之最初建禪定寺其中幡竿高十餘丈適遇繩絶非人力所及諸僧患之光見而謂僧曰可持繩來當相為上耳諸僧驚喜因取而與之光以口銜索拍竿而上直至龍頭繫繩畢手足皆放透空而下以掌拒地倒行數十步觀者駭悅莫不嗟異時人號為肉飛仙隋書卷六十四沈光傳王劭捃托佛經撰皇隋靈感志王劭於是采民間歌謠引圖書讖緯依約符命捃托佛經撰為皇隋靈感志合三十卷奏之上令宣示天下劭集諸州朝集使洗手焚香閉目而讀之曲折其聲有如歌詠經涉旬朔遍而後罷上益喜賞賜優洽仁壽中文獻皇后崩劭復上言曰佛説人應生天上及上品上生無量壽國之時天佛放大光明以香花妓樂來迎之如來以明星出時入涅槃伏惟大行皇后聖德仁慈福善禎符備諸祕記皆云是妙善菩薩臣謹案八月二十二日仁壽宮內再雨金銀之花二十三日大寶殿後夜有神光二十四日卯時永安宮北有自然種種音樂震滿虛空至夜五更中奄然如寐便即升遐與經文所説事皆符驗臣又以愚意思之皇后遷化不在仁壽大興宮者蓋避至尊常居正處也在永安宮者像京師之永安門平生所出入也后升遐後二日苑內夜有鐘聲三百餘處此則生天之應顯然也上覽而且悲且喜隋書卷六十九王劭傳文獻皇后崩王劭上言説感應及文獻皇后崩王劭復上言佛經説人應生天上及上品上生無量壽國之時天佛放大光明以香花妓樂來迎之如來以明星出時入涅槃伏惟大行皇后聖德仁慈福善禎符備諸祕記皆云是妙善菩薩臣謹案八月二十二日仁壽宮再雨金銀之花二十三日大寶殿後夜有神光二十四日卯時永安宮北有自然種種音樂震滿虛空至五更中奄然如寐便即升遐與經文所説事皆符驗臣又以愚意思之皇后遷化不在仁壽大興宮者蓋避至尊常居正處也在永安宮者像京師永安門平生所出入也后升遐後二日苑內夜有鐘聲二百餘處此則生天之應顯然也上覽之且悲且喜北史卷三十五王慧龍傳附王劭傳僧言薛睿壽不過六七薛睿性清儉死之日家無遺資睿初為童兒時與宗中諸兒遊戲於澗濱見一黃蛇有角及足召群兒共視了無見者睿以為不祥歸大憂悴母逼而問之睿以實對時有胡僧詣宅乞食睿母怖而告之僧曰此乃兒之吉應且是兒也早有名位然壽不過六七耳言終而出忽然不見時咸異之既而終於四十二六七之言於是驗矣隋書卷七十二薛睿傳宋武帝臥竹林寺堂前上有五色龍章宋武帝嘗遊京口竹林寺獨臥講堂前上有五色龍章衆僧見之驚以白帝帝獨喜曰上人無妄言南史卷一宋本紀上沙門渭宋武帝當安江表宋武帝又經客下邳逆旅會一沙門謂帝曰江表當亂安之者其在君乎帝先患手創積年不愈藥沙門有一黃藥因留與帝既而忽亡帝以黃散傅之其創一傅而愈寶其餘及所得童子藥每遇金創傅之並驗南史卷一宋本紀上劉昱往青園尼寺劉昱乘露車從二百許人無復鹵簿羽儀往青園尼寺晚至新安寺就曇度道人飲酒宋書卷九後廢帝劉昱紀廢帝往青園尼寺後廢帝又於蠻岡賭跳因乘露車無復鹵簿往青園尼寺晚至新安寺偷狗就曇度道人煮之飲酒南史卷三宋本紀下齊世祖纍石為佛圖齊世祖又於山纍石為佛圖其側忽生一樹狀若華蓋青翠扶疏有殊群木上將討戴凱之大饗士卒是日大熱上各令折荊枝自蔽言未終而有雲垂蔭正當會所會罷乃散南史卷四齊本紀上沙門僧惲謂蕭衍項有伏龍蕭衍尋為司州刺史有沙門自稱僧惲謂帝曰君項有伏龍非人臣也復求莫知所之南史卷五梁本紀上有狐人陳後主床下有狐入其陳後主床下捕之不見以為妖乃自賣於佛寺為奴以禳止於郭內大皇佛寺起七層塔未畢火從中起飛至石頭燒死者甚衆南史卷十陳本紀下梁元帝徐妃與瑤光寺智遠私通梁元帝徐妃與荊州後堂瑤光寺智遠道人私通酷妒忌見無寵之妾便交杯接坐才覺有娠者即手加刀刃帝左右暨季江有姿容又與淫通季江每歎曰柏直狗雖老猶能獵蕭溧陽馬雖老猶駿徐娘雖老猶尚多情時有賀徽者美色妃要之於普賢尼寺書白角枕為詩相贈答既而貞惠世子方諸母王氏寵愛未幾而終元帝歸咎於妃及方等死愈見疾太清三年遂逼令自殺妃知不免乃透井死帝以尸還徐氏謂之出妻葬江陵瓦官寺帝制金樓子述其淫行杜按梁書本傳僅言其太清三年五月被譴死葬江陵瓦官寺餘無載南史卷十二后妃下尼道變服為尼上宋文帝驚惋即收鸚鵡家得劭濬手書皆咒詛巫蠱之言得所埋上形像於宮內道育叛亡捕之不得上詰責劭濬劭濬唯陳謝而已道育變服為尼逃匿東宮三十年正月大風飛霰且雷上憂有竊發輒加劭兵東宮實甲萬人其年二月濬自京口入朝當鎮江陵復載道育還東宮欲將西上有告上云京口人張旿家有一尼服食出入征北內似是嚴道育上使掩得二婢云道育隨征北還都上惆悵惋駭須檢覆廢劭賜濬死南史卷十四宋宗室及諸王傳下誦觀音經千遍則免殺初王玄謨始將見殺夢人告曰誦觀音經千遍則免既覺誦之得千遍明日將刑誦之不輟忽傳呼停刑遣代守碻礉杜按南史本傳觀音經作觀世音又有玄謨夢中曰何可竟也仍見授等語宋書卷十六王玄謨傳梁武帝欲買王騫田施寺梁武帝於鍾山西造大愛敬寺騫舊墅在寺側者即王導賜田也帝遣主書宣旨就騫市之欲以施寺答云此田不賣若敕取所不敢言酬對又脫略帝怒遂付市評田價以直逼還之由是忤旨出為吳興太守南史卷二十二王曇首傳附王騫傳曾口寺沙門淫人婦時南郡江陵縣人苟將之弟胡之婦為曾口寺沙門所淫夜入苟家蔣之殺沙門為官司所檢蔣之列家門穢行欲告則恥欲忍則不可實己所殺胡之列又如此兄弟爭死南史卷二十六袁湛傳附袁彖傳長沙寺僧業富沃長沙寺僧業富沃鑄黃金為龍數千兩埋土中歷相傳付稱為下方黃鐵蕭穎胄因取此龍以充軍實杜按南史本傳大同故不録南史卷四十一蕭赤斧傳附蕭穎胄傳釋寶志讖云蕭氏當天先是天監中沙門釋寶志為讖云太歲龍將無理蕭經霜草應死餘人散十八子時言蕭氏當滅李氏代興南史卷六十三王念神傳附王僧辨傳孫彬還長沙寺金甄法崇孫彬彬有行業鄉黨稱善嘗以一束苧就州長沙寺庫質錢後贖苧還於苧束中得五兩金以手巾裹之彬得送還寺庫道人驚云近有人以此金質錢時有事不得舉而失檀越乃能見還輒以金半仰酬往復十餘彬堅然不受因謂曰五月披羊裘而負薪豈拾遺金者邪卒還金梁武帝布衣而聞之及踐阼以西昌侯藻為益州刺史乃以彬為府録事參軍帶郫縣令將行同列五人帝誡以廉慎至彬獨曰卿昔有還金之美故不復以此言相屬由此名德益彰及在蜀藻禮之甚厚云南史卷七十循吏甄法崇傳附甄彬傳侯景逼梁簡文帝起舞上梁簡文帝聞絲竹淒然下泣侯景起謝曰陛下何不樂上為笑曰丞相言索超世聞此以為何聲景曰臣且不知豈獨超世上乃命景起舞景即下席應弦而歌上顧命淑妃淑妃固辭乃止景又上禮遂逼上起舞酒闌坐散上抱景於床曰我念丞相景曰陛下如不念臣臣何至此上索筌蹄曰我為公講命景離席使其唱經景問超世何經最小超世曰唯觀世音小景即唱爾時無盡意菩薩上大笑夜乃罷侯景立簡文升重雲殿禮佛為盟曰臣乞自今兩無疑二臣固不負陛下陛下亦不得負臣南史卷八十賊臣侯景傳寶志曰掘尾狗子自發狂天監中沙門釋寶志曰掘尾狗子自發狂當死未死嚙人傷須臾之間自滅亡起自汝陰死三湘又曰山家小兒果攘臂太極殿前作虎視狗子景小字山家小兒猴狀景遂覆陷都邑毒害皇家起自懸瓠即昔之汝南巴陵有地名三湘景奔敗處其言皆驗及景將敗有僧通道人者意性若狂飲酒啖肉不異凡等世間遊行已數十載姓名鄉里人莫能知初言隱伏久乃方驗人並呼為闍梨景甚信敬之景嘗於後堂與其徒共射時僧通在坐奪景弓射景陽山大呼云得奴已景後又宴集其黨又召僧通僧通取肉搵鹽以進景問曰好不景答所恨大鹹僧通曰不鹹而爛及景死僧辨截其二手送齊文宣傳首江陵果以鹽五斗置腹中送於建康暴之於市南史卷八十賊臣侯景傳沙門惠臻負璽持千牛刀以從孝武永熙三年七月丙午孝武帝率南陽王寶炬清河王亶廣陽王湛斛斯椿以五千騎宿於瀍西楊王別舍沙門都維那惠臻負璽持千牛刀以從有牛百頭盡殺以食軍士衆知帝將出其夜亡者過半北史卷五魏本紀第五盧光造浮圖盧光性崇佛道至誠信敬常從周文狩於檀台山時獵圍既合帝遙指山上謂群公曰公等有所見不咸曰無所見光獨曰見一桑門帝曰是也既解圍而還令光於桑門立處造浮圖掘基一丈得瓦鉢錫杖各一帝稱歎因立寺焉及為京兆而郡舍先是數有妖怪前後郡將無敢居者光曰吉凶由人妖不妄作遂入居之未幾光所乘馬忽升廳事登床南首而立食器無故自破光並不以介懷其精誠守正如此注道德經章句行於世北史卷三十廬同傳附廬光傳崔暹令沙門明藏著佛性論而署己名崔暹然好大言調戲無節嘗密令沙門明藏著佛性論而署己名傳諸江表北史卷三十二崔挺傳附崔暹傳爾朱榮見沙彌重騎一馬爾朱榮曾見沙彌重騎一馬榮即令相觸力窮不復能動遂使傍人以頭相擊死而後已北史卷四十八爾朱榮傳術士言亡高者黑衣初術士言亡高者黑衣由是自神武後每出行不欲見桑門為黑衣故也是時文宣幸晉陽以所忌問左右曰何物最黑對曰莫過漆帝以上黨剛肅王渙第七子為當之乃使庫真都督破六韓伯升之鄴征渙渙至紫陌橋殺伯升以逃憑河而度土人執以送帝鐵籠盛之與永安王浚同置地牢下杜按北史本傳同故不録北齊書卷十上黨剛肅王高渙傳高孝琬得佛牙時河間王高孝琬得佛牙置於第內夜有神光昭玄都法順請以奏聞不從帝聞使搜之得鎮庫槊幡數百帝聞之以為反杜按北史本傳同故不録北齊書卷十一河間王高孝琬傳鄭氏以頸珠施佛及蘭陵王死妃鄭氏以頸珠施佛廣寧王使贖之延宗手書以諫而淚滿紙杜按北史本傳同故不録北齊書卷十一安德王高延宗傳若動此浮圖北城失主琅邪王儼之未獲罪也鄴北城有白馬佛塔是石季龍為澄公所作儼將修之巫曰若動此浮圖北城失主不從破至第二級得白蛇長數丈回旋失之數旬而敗杜按北史本傳同故不録北齊書卷十二琅邪王高儼傳彼沙門乃真盜耳有賈人持金二十斤詣京師交易寄人停止每欲出行常自執管鑰無何緘閉不異而失之謂主人所竊郡縣訊問主人遂自誣服柳慶聞而歎之乃召問賈人曰卿鑰恆置何處對曰恆自帶之慶曰頗與人同宿乎曰無與同飲乎曰日者曾與一沙門再度酣宴醉而晝寢慶曰主人特以痛自誣非盜也彼沙門乃真盜耳即遣吏逮捕沙門乃懷金逃匿後捕得盡獲所失之金杜按北史本傳大同故不録周書卷二十二柳慶傳沙門學相初魏正始前有沙門學相遊懷朔舉目見人皆有富貴之表以為必無此理燔其書而後皆如言乃知相法不虛也杜按北齊書本傳不載此事北史卷八十九藝術上皇甫玉傳此人別有異算術綦母懷文每云昔在晉陽為監館館中有一蠕蠕客同館胡沙門指語懷文云此人別有異算術仍指庭中一棗樹云令其布算子即知其實數乃試之並辨若干純赤若干赤白相半於是剝數之唯少一子算者曰必不少但更撼之果落一實北史卷八十九藝術上綦母懷文傳沙門相王顯始王顯布衣為諸生有沙門相顯後當富貴誡其勿為吏為吏必敗北史卷九十藝術下王顯傳都民僧道歡呼感應興元元年七月壬午至自興元時渾瑊韓遊環戴休顏以其衆扈從李晟駱元光尚可孤以其衆奉迎步騎十餘萬旌旗連亙數十里都民僧道歡呼感泣舊唐書卷十二德宗紀上僧惟真道士趙歸真等並配流嶺南寶歷二年十二月甲辰僧惟真齊賢正簡道士趙歸真並配流嶺南庚申又昭妖妄僧惟貞道士趙歸真等或假於卜筮或托以醫方疑衆挾邪並已從流竄其情非姦惡迹涉詿誤者一切不問舊唐書卷十七文宗紀上南蠻放先虜百姓工巧僧道四千人大和五年五月戊午西川李德裕奏南蠻放還先虜掠百姓工巧僧道約四千人還本道舊唐書卷十七下文宗紀下穎州僧道百姓奉留刺史家回咸通十三年六月義成軍節度使檢校左工部尚書杜慆奏當管穎州僧道百姓舉留刺史宗回敕曰回清幹臨人自有月限方藉綏輯未議替移舊唐書卷十九懿宗紀天竺國王子為沙門來遊後魏有曹婆羅門受龜茲琵琶於商人世傳其業至孫妙達尤為北齊高洋所重常自擊胡鼓和之周武帝聘虜女為后西域諸國來媵於是龜茲疏勒安國康國之樂大聚長安胡兒令羯人白智通教習頗雜以新聲張重華時天竺重譯貢樂伎後其國王子為沙門來遊又傳其方音舊唐書卷二十九音樂志二涼州昌松奇石有文貞觀十七年八月四日涼州昌松縣鴻池谷有石五青質白文成字曰高皇海出多子李元王八十年太平天子李世民千年太子李治書燕山人士樂太國主尚汪談獎文仁邁千古大王五王六王七王十風毛才子七佛八菩薩及上果佛田天子文武貞觀昌大聖延四方上下治示孝仙戈人為善涼州奏其年十一月三日遣使祭之曰嗣天子某祚繼鴻業君臨宇縣夙興旰食無忘於政導德齊禮愧於前修天有成命表瑞貞石文字昭然歷數唯永既旌高廟之業又錫眇身之祚逮於皇太子治亦降貞符具紀姓氏列於石言仰瞻睿漢空銘大造甫惟寡薄彌增寅懼敢因大禮重薦玉帛上謝明靈之貺以申祗栗之誠舊唐書卷三十七五行志涼州昌松奇石有文貞觀十七年八月涼州昌松縣鴻池谷有石五青質白文成字曰高皇海出多子李元王八十年太平天子李世民千年太子李治書燕山人士樂太國主尚汪譂獎文仁邁千古大王五王六王七王十風毛才子七佛八菩薩及上果佛田天子文武貞觀昌大聖延四方上不治示孝仙戈八為善太宗遣使祭之曰天有成命表瑞貞石文字昭然歷數惟永既旌高廟之業又錫眇身之祚逮於皇太子治亦降貞符具紀姓氏甫惟寡薄彌增寅懼昔魏以土德代漢涼州石有文石金類以五勝推之故時人謂為魏氏之妖而晉室之瑞唐亦土德王石有文事頗相類然其文初不可曉而後人因推已事以驗之蓋武氏革命自以為金德王杜按德應為輪其佛菩薩者慈氏金輪之號也樂太國主則鎮國太平公主安樂公主皆以女亂國其五王六王七王者唐世十八之數新唐書卷三十五五行志二白馬寺鐵像頭無故自落玄宗初即位東都白馬寺鐵像頭無故自落於殿門外後姚崇秉政以僧惠范附太平亂政謀汰僧尼令拜父母午後不出院其法頗峻大歷十三年二月太僕寺廨有佛堂堂內小脫空金剛左臂上忽有黑汗滴下以紙承之色即血也明年五月代宗崩舊唐書卷三十七五行志白馬寺鐵像頭無故自落神龍中東都白馬寺鐵像頭無故自落於殿門外新唐書卷三十五五行志二胡僧婆陀請夜開門燃百千燈睿宗好樂聽之忘倦玄宗又善音律先天二年正月望胡僧婆陀請夜開門燃百千燈睿宗御延喜門觀樂凡經四日嚴挺之上疏諫曰恐無益於聖朝杜按新唐書本傳文略意同故不録舊唐書卷九十九嚴挺之傳及安祿山反於范陽兩京倉庫盈溢而不可名楊國忠設計稱不可耗正庫之物乃使御史崔衆於河東納錢度僧尼道士旬日間得錢百萬舊唐書卷四十八食貨志上裴冕度尼僧道士以儲積為務裴冕性忠勤悉心奉公稍得人心然不識大體以聚人曰財乃下令賣官鬻爵度尼僧道士以儲積為務人不願者科令就之其價益賤事轉為弊杜按新唐書本傳無度尼僧道士句舊唐書卷一百一十三裴冕傳鄭延祚殯母於僧舍垣地二十九年有鄭延祚者母卒二十九年殯僧舍垣地顏真卿劾奏之兄弟三十年不齒天下聳動杜按新唐書本傳作劾奏朔方令鄭延祚母死不葬三十年有詔終身不齒聞者聳然無殯僧舍垣地五字舊唐書卷一百二十八顏真卿傳皇太子獻佛像德宗載誕日皇太子獻佛像德宗命韋執誼為畫像贊上令太子賜執誼縑帛以酬之執誼至東宮謝太子卒然無以籍言太子因曰學士知王叔文乎彼偉才也執誼因是與叔文交甚密杜按新唐書本傳文稍異意同故不録舊唐書卷一百三十五韋執誼傳文宗出宮人送兩街寺觀文宗以旱放繫囚出宮人劉好奴等五百餘人送兩街寺觀任歸親戚舊唐書卷一百七十三鄭覃傳尼奉仙自言通神廣明元年九月畢師鐸出城戰敗慮高駢為賊內應又有尼奉仙自言通神謂師鐸曰揚府災當有大人死應之自此善也秦彥曰大人非高令公耶即令師鐸以兵攻道院侍者白駢曰有賊攻門曰此秦彥來整衣候之俄而亂卒升階曳駢數之曰公上負天子恩下陷揚州民淮南塗炭公之罪也駢未暇言首已墮地矣杜按新唐書本傳尼奉仙作女巫王奉仙意同餘文大同故不録舊唐書卷一百八十二高駢傳尼曰走為上計也光啓三年九月畢師鐸出戰又敗自是日與秦彥相對嗟惋問神尼奉仙何以獲濟尼曰走為上計也十月彥與師鐸突圍投孫儒並為所殺杜按新唐書本傳尼奉仙作奉仙舊唐書卷一百八十二三高駢傳附秦彥傳兩街乘車道與內官相善者二十餘人並笞死於京兆府天復三年正月是日諸司宦官百餘人及隨駕鳳翔群小又二百餘人一時斬首於內侍省血流塗地及宮人宋柔等十一人兩街僧道與內官相善者二十餘人並笞死於京兆府舊唐書卷一百八十四宦官楊復恭傳恆州鹿泉寺僧淨滿為弟子所謀時恆州鹿泉寺僧淨滿為弟子所謀密畫女人居高樓仍作淨滿引弓射之藏於經笥已而詣闕上言僧咒詛大逆不道則天命懷古按問誅之懷古究其辭狀釋淨滿以聞則天大怒懷古奏曰陛下法無親疏當與天下畫一豈使臣誅無辜之人以希聖旨向使淨滿有不臣之狀臣復何顏能寬之乎臣今慎守平典雖死無恨也則天意乃解舊唐書卷一百八十五良吏下裴懷古恆州浮屠為其徒誣告裴懷古壽州壽春人儀鳳中恆州浮屠為其徒誣告祝詛不道武后怒命按誅之懷古得其枉為后申析不聽因曰陛下法與天下畫一豈使臣殺無辜以希盛旨哉即其人有不臣狀臣何情寬之后意解得不誅新唐書卷一百九十七循吏裴懷古傳楊元琰奏請削髮出家俄而張柬之敬暉等為武三思所構元琰覺變奏請削髮出家仍辭官爵實封中宗不許敬暉聞而笑曰向不知奏請出家合贊成其事剃卻胡頭豈不妙也元琰多須類胡暉以此言戲之元琰曰功成名遂不退將危此由衷之請不徒然也暉知其意瞿然不悅舊唐書卷一百八十五下良吏下楊元琰傳楊元琰請祝髮事浮屠敬暉等為武三思所構元琰知禍未已乃詭計請祝髮事浮屠悉還官封中宗不許暉聞尚戲曰胡頭應祝以多鬣似胡云元琰曰功成不退懼亡我不空言暉感之然已不及計暉等死獨元琰全新唐書卷一百二桓彥范傳附楊元琰傳郭霸請僧專經設齋郭霸嘗推芳州刺史李思征榜捶考禁不勝而死聖歷中屢見思征甚惡之嘗因退朝遽歸命家人曰速請僧轉經設齋須臾見思征從數十騎上其廷曰汝枉陷我我今取汝霸周章惶怖援刀自刳其腹斯須蛆爛矣是日閭里亦見兵馬數十騎駐於門少頃不復見矣杜按新唐書本傳無速請僧轉經設齋事舊唐書卷一百八十六上酷吏上郭霸傳李憕二子為僧李憕有子十餘人二子為僧與憕同遇害二子彭源存焉舊唐書卷一百八十七下李憕傳杜元琰誦婆羅門咒時中宗數引近臣及修文學士與之宴集嘗令各效伎藝以為笑樂工部尚書張錫為談容娘舞將作大匠宗晉卿舞渾脫左衛將軍張洽舞黃獐左金吾衛將軍杜元琰誦婆羅門咒給事中李行言唱駕車西河中書舍人盧藏用效道士上章郭山惲獨奏曰臣無所解請誦古詩兩篇帝從之於是誦鹿鳴蟋蟀之詩杜按新唐書本傳無杜元琰誦婆羅門咒事舊唐書卷一百八十九下儒學下郭山惲傳天下寺觀多求李雍作頌文初李雍早擅才名尤長碑頌雖貶職在外中朝衣冠及天下寺觀多賫持金帛往求其文前後所制凡數百首受納饋遺亦至巨萬時議以為自古鬻文獲財未有如雍者有文集七十卷其張韓公行狀洪州放生池碑批韋巨源諡議文士推重之杜按新唐書本傳無天下寺觀等與佛教有關語舊唐書卷一百九十中文苑中李雍傳李華與蕭穎士李華乃為祭古戰場文熏污之如故物置於佛書之閣華與蕭穎士因閲佛書得之華謂之曰此文何如穎士曰可矣華曰當代秉筆者誰及於此穎士曰君稍精思便可及此華愕然舊唐書卷一百九十下文苑下李華傳李華與蕭穎士李華晚事浮圖法不甚著書惟天下士大夫家傳墓版漢州縣碑頌時時賚金帛往請乃強為應因著弔古戰場文極思研榷已成污為故書雜置梵書之庋它日與穎士讀之稱工華問今誰可及穎士曰君加精思便能至矣華愕然而服新唐書卷二百三十文藝下李華傳蕭穎士李華與陸據蕭穎士嘗與李華陸據同遊洛南龍門三人共讀路側古碑穎士一閲即能誦之華再閲據三閲方能記之議者以三人才格高下亦如此杜按新唐書本傳文稍異意同故不録舊唐書卷一百九十下文苑下蕭穎士傳元德秀刺血畫像寫佛經元德秀者河南人字紫芝開元二十一年登進士第登第後母亡廬於墓所食無鹽酪藉無茵席刺血畫像寫佛經杜按新唐書本傳無刺血畫像寫佛經句舊唐書卷一百九十下文苑下元德秀傳寶志謂曇選生子當為神仙宗伯也王遠知母梁駕部郎中丁超女也嘗晝寢夢靈鳳集其身因而有娠又聞腹中啼聲沙門寶志謂曇選曰生子當為神仙之宗伯也遠知少聰敏博綜群書初入茅山師事陶弘景傳其道法後又師事宗道先生臧兢杜按新唐書本傳文稍異意同故不録舊唐書卷一百九十二隱逸王知遠傳地藏菩薩李光弼使為地道至賊陳前驍賊方戲弄城中人地道中人出擒之敵以為神呼為地藏菩薩舊唐書卷二百上史思明傳僧法堅有巧思西明寺僧法堅有巧思為朱泚造雲梯十五日辰時梯臨城東北隅城內震駭杜按新唐書本傳不載此事舊唐書二百下朱泚傳神策軍浮屠像沒地四尺咸通五年十月貞陵隧道摧陷神策軍有浮屠像懿宗嘗跪禮之像沒地四尺新唐書卷三十五五行志二胡僧無畏咒蛇死天寶中洛陽有巨蛇高丈餘長百尺出芒山下胡僧無畏見之曰此欲決水瀦洛城即以天竺法咒之數日蛇死新唐書卷三十六五行志三太原尼志覺死十日而復蘇武德四年太原尼志覺死十日而蘇新唐書卷三十六五行志三左道僧明悟為王后後祭南北斗玄宗王皇后兄王守一以后無子常懼有廢立導以符厭之事有左道僧明悟為祭南北斗刻霹靂木書天地字及上諱合而佩之且祝曰佩此有子當與則天皇后為比事發上親究之皆驗開元十二年秋七月己卯下制曰皇后王氏可廢為庶人守一賜死其年十月庶人卒以一品禮葬於無相寺舊唐書卷五十一后妃上浮屠明悟教王守一祭北斗玄宗帝密欲廢王皇后以語薑蛟蛟漏言即死后兄守一懼為求壓勝浮屠明悟教祭北斗取霹靂木刻天地文及帝諱合佩之曰后有子與則天比開元十二年事覺帝自臨劾有狀乃制詔有司皇后天命不佑華而不實有無將之心不可以承宗廟母儀天下其廢為庶人賜守一死新唐書卷七十六后妃上太原舊俗僧徒習禪為業及死不殮以尸飼鳥獸太原舊俗有僧徒以習禪為業及死不殮但以尸送近郊以飼鳥獸如是積年土人號其地為黃坑側有俄狗千數食死人肉因侵害幼弱遠近患之前後官吏不能禁止皓到官申明禮憲期不再犯發兵捕殺群狗其風遂革舊唐書卷一百一十二李皓傳太原俗為浮屠法者死不葬以尸飼鳥獸太原俗為浮屠法者死不葬以尸棄郊飼鳥獸號其地曰黃坑有狗數百頭習食胔頗為人患吏不敢禁皓至遣捕群狗殺之申歷禁條約不再犯遂革其風新唐書卷七十八宗室淮安王神通傳附李皓傳群浮屠疾史崇玄史崇玄本寒人事太平公主得出入禁中拜鴻臚卿聲勢光重觀始興詔崇玄護作日萬人群浮屠疾之以錢數十萬賂狂人段謙冒入承天門升太極殿自稱天子有司執之辭曰崇玄使我來詔流嶺南且敕浮屠方士無兩競太平敗崇玄伏誅新唐書卷八十三諸帝公主傳金仙公主高陽公主與浮屠辨機亂房玄齡次子遺愛誕率無學有武力尚高陽公主為右衛將軍公主帝所愛故禮與它壻絶主驕蹇疾遺直任嫡遺直懼讓爵帝不許主稍失愛意怏怏與浮屠辨機亂帝怒斬浮屠殺奴婢數十人主怨望帝崩哭不哀高宗時出遺直汴州刺史遺愛房州刺史主又誣遺直罪帝敕長孫無忌鞫治乃得主與遺愛反狀遺愛伏誅主賜死遺直以先勳免貶銅陵尉詔停配享杜按舊唐書本傳不記高陽公主浮屠辨機亂帝怒斬浮屠殺奴婢數十人事新唐書卷九十六房玄齡傳百濟僧道琛等立扶餘王百濟為僧道琛舊將福信率衆復叛立故王子扶餘豐為國王引兵圍仁願於府城詔仁軌檢校帶方州刺史代文度統衆便道發新羅兵合勢以救仁願轉鬥而前仁軌軍容整肅所向皆下道琛等乃釋仁願之圍退保任存城尋而福信殺道琛並其兵馬招誘亡叛其勢益張仁軌乃與仁願合軍休息舊唐書卷八十四劉仁軌傳百濟僧道琛立扶餘王初蘇定方既平百濟留郎將劉仁願守其城左衛中郎將王文度為熊津都督撫納殘黨文度死百濟故將福信及浮屠道琛迎故王子扶餘豐立之引兵圍仁願詔仁軌檢校帶方州刺史統文度之衆并發新羅兵為援仁軌將兵嚴整轉鬥陷陳所向無前信等釋仁願圍退保任存城既而福信殺道琛並其衆招還叛亡勢張甚仁軌與仁願合則解甲休士新唐書卷一百八劉仁軌傳僧與徒放飲醉而延火大歷初魏少遊鎮江西奏署判官州理有開應寺僧與徒夜飲醉而延火歸罪於守門瘖奴軍候亦受財同上其狀少遊信焉人知奴冤莫肯言柳渾與崔祐甫遽入白少遊驚問醉僧首伏舊唐書卷一百二十五柳渾傳巫曰為浮屠道緩死柳渾字夷曠一字惟深本名載梁僕射惔六世孫後籍襄州早孤方十餘歲有巫告曰兒相夭且賤為浮屠道可緩死諸父欲從其言渾曰去聖教為異術不若速死學愈篤與遊者皆有名士天寶初擢進士第調單父尉纍除衢州司馬棄官隱武寧山大歷初江西魏少遊表為判官州僧有夜飲火其廬者歸罪瘖奴軍候受財不詰獄具渾與其僚崔祜甫白奴冤少遊趣訊僧僧首伏因厚謝二人新唐書卷一百四十四柳渾傳田季安以五千縑助營開業佛祠魏博田季安以五千縑助營開業佛祠崔群以為無名之獻不當受有詔卻之進戶部侍郎新唐書卷一百六十五崔群傳方士柳泌浮屠大通為長年藥皇甫鎛罷度支進門下侍郎平章事嘗與金吾將軍李道古共薦方士柳泌浮屠大通為長年藥帝惑之穆宗在東宮聞其姦妄始聽政集群臣於月華門貶鎛崖州司戶參軍死其所泌者本楊仁晝也習方伎道古薦於鎛召入禁中自云能致藥為不死者因言天臺山靈仙所舍多異草願官天臺求采之起徒步拜台州刺史賜金紫諫臣固爭以為列聖亦有寵方士未嘗使牧民帝曰煩一州而致長年於君父何愛哉後不敢言泌驅吏民採藥山谷間鞭笞苛急歲餘無所獲懼詐窮舉族遁去浙東觀察使捕得鎛與道古營解乃復待詔翰林帝餌泌藥浸躁怒不常宦侍懼以弒崩大通自言百五十歲鎛敗與泌皆誅初吏責泌妄答曰皆道古教我解衣即刑卒無它異新唐書卷一百六十七皇甫鎛傳浮屠大通自言壽百五十歲方憲宗喜方士説詔天下求其人宰相皇甫鎛左金吾將軍李道古等白見楊仁晝浮屠大通仁晝更姓名曰柳泌大通自言壽百五十歲有不死藥並待詔翰林虢人田元佐言有祕方能化瓦礫為黃金詔除虢令與董景珍李元戢皆介泌大通薦於天子天子惑其説泌以金石進帝餌之躁甚數暴怒恚責左右踵得罪禁中纍息帝自是不豫新唐書卷二百八宦者下王守澄傳僧亡命多趣幽州後除浮屠法僧亡命多趣幽州李德裕召邸吏戒曰為我謝張仲武劉從諫招納亡命今視之何益仲武懼以刀授居庸關吏曰僧敢入者斬新唐書卷一百八十李德裕傳鄭虔於慈恩寺貯柿葉數屋作詩畫初鄭虔追紬故書可志者得四十餘篇國子司業蘇源名其書為會稡虔善圖山水好書常苦無紙於是慈恩寺貯柿葉數屋遂往日取葉肄書歲久殆遍嘗自寫其詩並畫以獻帝大署其尾曰鄭虔三絶遷著作郎新唐書卷二百二文藝傳中附鄭虔傳山陽女願毀服依浮屠法以報父罪山陽女趙者父盜鹽當論死女詣官訴曰迫飢而盜救死爾情有可原能原之邪否則請俱死有司義之許減父死女曰身今為官所賜願毀服依浮屠法以報即截耳自信侍父疾卒不嫁新唐書卷二百五列女傳劉仁恭招浮屠講法是時中原方多故劉仁恭得倚燕強且遠無所憚意自滿從方士王若納學長年築館大安山掠子女充之又招浮屠與講法以堇土為錢斂真錢穴山藏之殺匠滅口禁南方茶自擷山為茶號山曰大恩以邀利杜按舊五代史本傳無招浮屠三字與講法作講求法要又新五代史本傳無與佛教有關事餘文稍異意大同新唐書卷二百一十二藩鎮廬龍劉仁恭傳太祖召釋道二教封御談論開平元年十月庚午大明節內外臣僚各以奇貨良馬上壽故事內殿開宴太祖召釋道二教封御談論宣旨罷之命閣門使以香合賜宰臣佛寺行香舊五代史卷三太祖紀三陳州里俗之人喜習左道自立一宗號曰上乘貞明元年冬十月陳州妖賊毋乙董乙伏誅陳州里俗之人喜習左道依浮圖氏之教自立一宗號曰上乘不食葷茹誘化庸民揉雜淫穢宵聚晝散州縣因循遂致滋蔓毋乙數輩漸及千人次掠鄉社長吏不能詰是歲秋其衆益盛南通淮夷朝廷纍發州兵討捕反為賊所敗陳穎蔡三州大被其毒舊五代史卷十末帝紀下陳州俗好淫祠左道自立一法號曰上乘而陳州俗好淫祠左道其學佛者自立一法號曰上乘晝夜伏聚男女雜亂妖人毋一董乙聚衆稱天子建置官屬友能初縱之乙等攻劫州縣末帝發兵擊滅之新五代史卷十三廣王全顯傳朱友貞尸殯於佛寺案通鑒後唐紀辛巳詔王瓚收朱友貞尸殯於佛寺漆其首函之藏於太社薛史作張全義當別有據舊五代史卷十末帝紀下曹唐館開元寺衆僧見二青衣緩步而至曹唐郴州人少好道為大小遊仙詩各百篇又著紫府玄珠一卷皆敘三清十極紀勝之事其遊仙之句則有漢武帝宴西王母詩云花影暗回三殿月樹聲深鎖九門霜又云樹底有天春寂寂人間無路月茫茫皆為士林所稱其後遊信州館於開元寺三學院一旦臥疾衆僧忽見二青衣緩步而至且四向顧視相謂曰只此便是樹底有天春寂寂人間無路月茫茫言訖直入唐之臥室衆僧驚異亦隨之而入逾閾而青衣不復見但見唐已殂矣舊五代史卷二十四羅隱傳附注新城北有毗沙天王祠武皇即獻祖之第三子也年十三見雙鳧翔於空射之連中衆皆臣伏新城北有毗沙天王祠祠前井一日沸溢武皇因持卮酒而奠曰豫有尊主濟民之志無何井溢故未察其禍福惟天王若有神奇可與僕交談奠酒未已有神人被金甲持戈有神人被金甲持戈北夢瑣言作有龍形出於壁間蓋傳聞之異今附識於此影庫本粘簽隱然出於壁間見者大驚走唯武皇從容而退繇是益自負舊五代史卷二十五武皇紀上魏州開元寺僧傳真獲傳國寶天祐十八年春正月魏州開元寺僧傅真獲傳國寶獻於行台驗其文即受命於天子孫寶之八字也群僚稱賀案自開元寺至此三十三字原本闕佚今從册府元龜增入傳真師於廣明中遇京師喪亂得之祕藏已四十年矣篆文古體人不之識至是獻之舊五代史卷二十九莊宗紀三魏州僧傳真獻唐受命寶一天祐十八年正月魏州僧傳真唐受命寶一新五代史卷五莊宗紀下五臺台僧獻銅鼎三莊宗同光元年春正月丙子五臺山僧獻銅鼎三言於山中石崖間得之舊五代史卷二十九莊宗紀三宦者數百人竄匿山谷落髮為僧初莊宗遇內難宦者數百人竄匿山谷落髮為僧奔至太原七十餘人至是盡誅於都亭驛舊五代史卷三十六明宗紀二宦者亡竄山谷落髮為浮屠明宗入立又詔天下悉捕宦者而殺之宦者亡竄山谷多削髮為浮圖其亡至太原者七十餘人悉捕而殺之都亭驛新五代史卷三十八宦者傳劉遂清薦泰山僧一人長興四年秋七月己卯東嶽三郎神贈威雄大將軍初帝不豫前淄州刺史劉遂清薦泰山僧一人劉遂清原本作隊請今從册府元龜改正影庫本粘簽云善醫及召見乃庸僧耳問方藥僧曰不工醫嘗於泰山中親睹嶽神謂僧曰吾第三子威靈可愛而未有爵秩師為我請之宮中神其事故有是命識者嫉遂清之妖佞焉詔應台官出行須令人訶引使軍巡職掌等規避舊五代史卷四十四明宗紀十北方天王同光二年時有王安節者昭宗朝相杜讓能之宅吏也安節少善賈得相術於奇士因事見帝於私邸退謂人曰真北方天王相也位當為天子終則我莫知也舊五代史卷四十六末帝紀上李克讓為山僧所害黃巢犯闕僖宗幸蜀李克讓時守潼關為賊所敗以部下六七騎伏於南山佛寺夜為為山僧所害克讓既死紀綱渾進通冒刃獲免歸於黃巢中和二年冬武皇入關討賊屯沙苑黃巢遣使米重威賚賂修好因送渾進通至兼擒送害克讓僧十人武皇燔偽詔還其使盡誅諸僧為克讓發哀行服悲慟久之永樂大典卷一萬三百八十八舊五代史卷五十宗室李克讓傳李克讓為寺僧所獲黃巢犯長安李克讓守潼關為賊所敗奔於南山匿佛寺為寺僧所殺新五代史卷十四李克讓傳李存霸削髮僧服通鑒云李存霸至晉陽從兵逃散俱盡存霸削髮僧服謁李彥超願為山僧幸垂庇護軍士爭欲殺之彥超曰六相公來當奏取進止軍士不聽殺之於府門之碑下舊五代史卷五十宗室永王李存霸傳李存霸剪髮僧衣李存霸聞京師亂亦自河中奔太原比至麾下皆散走惟使下康從辨不去存霸乃剪髮衣僧衣謁符彥超曰願為山僧冀公庇護彥超欲留之為軍衆所殺新五代史卷十四李存霸傳莊宗諸兒削髮為苾芻案清異録唐福慶公主下降孟知祥長興四年明宗晏駕唐室亂莊宗諸兒削髮為苾芻間道走蜀時知祥新稱帝為公主厚待猶子賜豫千計舊五代史考異舊五代史卷五十一宗室魏王李繼岌傳注高輦落髮為僧五代史補秦王從榮明宗之愛子好為詩判河南府辟高輦為推官輦尤能為詩賓主相遇甚歡初從榮之敗也高輦竄於民家且落髮為僧舊五代史卷五十一宗室秦王從榮傳注郵亭佛寺多有烏震題詩烏震冀州信都人也少孤自勤於鄉校弱冠從軍初為鎮州隊長以功漸升部將與符習從征於河上頗得士心震略涉書史尤嗜左氏傳好為詩善筆札凡郵亭佛寺多有留題之迹及其遇禍燕趙之士皆歎惜之永樂大典卷一萬八千一百二十九杜按新五代史本傳無凡郵亭佛寺等語舊五代史卷五十九烏震傳佛牙大如拳趙鳳幽州人也少為儒唐天祐中燕師劉守光盡率部內丁夫為軍伍而黥其面為儒者患之多為僧以避之鳳亦落髮至太原明年天成二年春有僧自西國取經回得佛牙大如拳褐漬皴裂進於明宗鳳揚言曰曾聞佛牙錘鍛不壞請試之隨斧而碎時宮中所施已逾數千緡聞毀乃止舊五代史卷六十七趙鳳傳斧闢佛開應手而碎燕王劉守光時悉黥燕人以為兵趙鳳懼因髡為僧有僧遊西域得佛牙以獻明宗以示大臣趙鳳言世傳佛牙水火不能傷請驗其真偽因以斧斫之應手而碎是時宮中施物已及數千因鳳碎之乃止新五代史卷二十八趙鳳傳古剎佛像忽搖動不已後唐末帝真定常山人也有先人舊廬其側有古佛剎剎有石像忽搖動不已人皆異之晉陽有北宮宮城之上有祠曰毗沙門天王後晉帝石敬唐曾焚修默而禱之經數日城西北闉正受敵處軍候報稱夜來有一人長丈餘介金執殳行於城上久方不見帝心異之又牙城有僧坊曰崇福崇福原本作從福今從册府元龜改正影庫本粘簽坊之廡下西北隅有泥神神之首忽一日有煙生其騰郁如曲突之狀坊僧奔赴以為人火所延及俯而視之無所有焉事尋達帝帝召僧之臘高者問焉僧曰貧道見莊宗將得天下曾有此煙觀此噴湧甚於當時兆可知矣自此日旁多有五色雲氣如蓮芰之狀舊五代史卷七十五高祖紀一東都人士僧道請車駕復奉東京天福八年春正月辛巳盜發唐坤陵莊宗母曹太后之陵也時州郡蝗旱百姓流亡餓死者千萬計東都人士僧道請車駕復幸東京舊五代史卷八十一少帝紀一尼説𨫼腳潘環歷六部兩鎮所至以聚斂為務在宿州時有牙將因微過見怒環紿言笞之牙校因托一尼嘗熟於環者獻白金兩鋌尼詣環白牙校餉𨫼腳兩枚兩枚原本作兩枝今從册府元龜改正影庫本粘簽求免其責環曰𨫼本幾腳尼曰三腳環復曰今兩腳能成𨫼乎尼則以三數致之當時號環為潘𨫼腳舊五代史卷九十四潘環傳僧聚髑髏二十萬乾佑三年正月丙寅分命使臣赴永興鳳翔河中收葬用兵已來所在骸骨時已有僧聚髑髏二十萬矣舊五代史卷一百三隱帝紀下壘浮圖須與合卻尖時李嵩最在下翌日晉祖既受太原之命使心腹達意於嵩云壘浮圖須與合卻尖蓋感之深也舊五代史卷一百八李嵩傳為浮者必合其尖契丹入雁門明宗選將以捍太原晉高祖欲之李嵩獨曰太原國之北門宜得重臣非石敬瑭不可也由是從嵩議晉高祖深德之陰遣人謝嵩曰為浮屠者必合其尖蓋欲使嵩終始成己事也新五代史卷五十七李嵩傳此時百姓佛再出救不得唯皇帝救得晉少帝即位加守太尉進封燕國公馮道嘗問朝中熟客曰道之在政事堂人有何説客曰是非相半道曰凡人同者為是不同為非而非道者十恐有九昔仲尼聖人也猶為叔孫武叔所毀況道之虛薄者乎然道之所持始終不易後有人間道於少帝曰道好平時宰相無以濟其艱難如禪僧不可呼鷹耳由是出道為同州節度使歲餘移鎮南陽加中書令契丹入汴道自襄鄧如人戎王因從容問曰天下百姓如何可救道曰此時百姓佛再出救不得唯皇帝救得其後衣冠不至傷夷皆道與趙延壽陰護之所至也是歲三月隨契丹北行與晉室公卿俱抵常山道在常山見有中國士女為契丹所俘者出橐裝以贖之皆寄於高尼精舍後相次訪其家以歸之舊五代史卷一百二十六馮道傳此時佛出救不得惟皇帝救得耶律德光嘗問馮道曰天下百姓如何救得道為俳語以對曰此時佛出救不得惟皇帝救得新五代史卷五十四馮道傳楊凝式詩洛川寺觀藍壁之上題記殆遍楊凝式長於歌詩案別傳云楊然凝式詩句自佳其題壁有院似禪心靜花如覺性圓清麗可喜舊五代史考異善於筆札洛川寺觀藍牆粉壁之上題紀殆遍案別傳云凝式雖仕歷五代以心疾間居故時人目以風子其筆迹遒放宗師歐陽詢與顏真卿而加以縱逸既久居洛多遨遊佛道祠遇山水勝概流連賞詠有垣牆圭缺處顧視引筆且吟且書若與神會率寶護之其號或以姓名或稱癸巳人或稱楊虛白或稱希維居士或稱關西老農嘗迫冬家人未挾纊會有故人過洛贈以綿五十兩絹百端凝式悉留之修行尼舍俾造襪以施崇德普明兩寺飯僧其家雖號寒啼飢而凝式不屑屑也留守聞其事乃自製衣給米遺之凝式笑謂家人曰我固知留守必見周也每旦起將出僕請所之楊曰宜東遊廣愛寺僕曰不若西遊石壁寺凝式舉鞭曰姑遊廣愛僕又以石壁為請凝式乃曰姑遊石壁聞者拊掌舊五代史考異時人以其縱誕有風子之號焉永樂大典卷六千五十二案遊宦紀聞載楊凝式年譜家譜傳與正史多異同今附録以備參考其年譜云唐咸通十四年癸巳是年凝式生故題識多自稱癸巳人唐天祐四年丁卯是年夏朱全忠篡唐凝式諫其父唐相涉宜辭押寶使涉懼事匯凝式自此遂佯狂時年三十五五代史補言時年方弱冠誤也晉天福四年己亥三月有洛陽風景四絶句詩年六十七據詩云到此今經三紀春蓋自丁卯至己亥實三十年則自全忠之篡凝式即居洛矣真迹今在西都唐故大聖善寺勝果院東壁字畫尚完説有石刻書側有畫像亦當時畫又廣愛寺西律院有壁題云後歲六十九亦當是此年所題此書凡兩壁行草大小甚多真迹今存但多漫暗故無石刻天福六年辛丑是年六月有天宮寺題名稱太子賓客時年六十九真迹今在此寺東序題維摩詰後天福七年壬寅是年有真定智大師詩二首時年七十開運二年乙巳是年五月於天宮寺題壁論維摩經等語八月再題太子少保時年七十三真迹今在此寺東序開運四年丁未是年二月並七月有寄惠才大師左郎中詩三首稱會同丁未歲會同即契丹入晉改元之號也時年七十五稱太子少傅真迹在文潞公家刻石在蘇太寧家周廣順三年癸丑是年於長壽寺華嚴東壁題名時年八十一後又題院似禪心靜等二詩稱太子少師亦應此年真迹今為人移去石刻亦不存人或得舊本耳楊凝式本名家既不遇時而唐梁之際以節義自立襟量宏廓竟免五季之禍以壽考終洛陽諸佛宮畫迹至多本朝興國中三川大寺剎率多頽圮翰墨所存無幾今有數壁存焉士大夫家亦有愛其書帖皆藏弆以為清玩世以凝式行書頗類顏魯公故謂之顏楊云舊五代史卷一百二十八楊凝式傳慕容彥超致祭於開元寺慕容彥超進呈鄆州節度使高行周來書其書意即行周毀讟太祖結連彥超之意帝覽之笑曰此必是彥超之詐也試令驗之果然其鄆州印元有缺文不相接其為印即無闕處帝尋令賚書示諭行周行周上表謝恩永樂大典卷一萬八千四百十七先是填星初至角亢占者曰角鄭分兗州屬焉彥超即率軍府賓佐步出州西門三十里致祭迎於開元寺塑像以事之謂之菩薩日至祈禱又令民家豎黃幡以禳之及城陷彥超方在土星院燃香急乃馳去杜按新五代史本傳作超即率軍府將吏出西門三十里致祭迎於開元寺塑像以事之日常一至又使民家立典幡祉之舊五代史卷一百三十慕容彥超傳張沆好釋氏張沆性儒雅好釋氏雖久居祿位家無餘財死之日圖書之外唯使鄆之資耳漢隱帝末年楊史遇害翼日沆方知之聽猶未審忽問同僚曰竊聞盜殺史公其盜獲否是時京師恟懼之次聞者笑之有士人申光遜者與沆友善沆未病時夢沆手出小佛塔示光遜視其上詩十四字云今生不見故人面明月高高上翠樓光遜既寤心惡之俄聞沆卒舊五代史卷一百三十一張沆傳僧問彭氏夫人誰家婦女五代史補文昭王夫人彭氏封秦國夫人常往城北報恩寺燒香時僧魁謂之長老問曰夫人誰家婦女彭氏大怒索簷子疾驅而歸文昭驚曰何歸之速也夫人曰今日好沒興被個老禿賊問妾是誰家婦女且大凡婦女皆不善之辭安得對妾而發文昭笑曰此所謂禪機也夫人宜答弟子是彭家女馬家婦是則通其理矣何怒之有乎夫人素負才智恥不能對乃曰如此則妾所謂無見性也於是慚赧數日舊五代史卷一百三十三世襲馬希范傳注僧上藍曰不怕羊入屋只怕錢入腹初王潮嘗假道於洪州時鐘傳為洪州節度使以王潮若得福建境土相接必為己患陰欲誅之有僧上藍者通於術數動皆先知大為鍾所重因入謁察傳詞氣驚曰令公何故起惡意是欲殺王潮否傳不敢隱盡以告之上藍曰老僧觀王潮與福建有緣必變彼時作一好世界令公宜加禮厚待若必殺之令公之福去矣於是傳加以援送及審知之嗣位也楊行密方盛常有吞東南之志氣審知居常憂之因其先人嘗為上藍所知乃使人賚金帛往遺之號曰送供且問國之休咎使回上藍以十字為報其詞曰不怕羊入屋只怕錢入腹審知得之歎曰羊者楊也腹者福也得非福州之患不在楊行密而在錢氏乎今內外將吏無姓錢者必為子孫後世之憂矣至延義為連重遇所殺諸將爭立江南乘其時命查文徽領兵伐之經年不能下會兩浙救兵至文徽腹背受敵遂大敗自是福州果為錢氏所有入腹之讖始應蓋國之興衰皆冥數先定矣舊五代史卷一百三十四僭偽王延鈞傳注廣州法性寺有菩提樹高一百四十尺先是廣州法性寺有菩提樹一株高一百四十尺大十圍傳云蕭梁時西域僧真諦之所手植蓋四百餘年矣皇朝乾德五年夏為大風所拔是歲秋劉鋹之寢室屢為雷震識者知其必亡舊五代史卷一百三十五僭偽劉鋹傳涼州僧至京師唐長興四年涼州留後孫超遣大將拓拔承謙及僧道士耆老楊通信等至京師明宗拜孫超節度使舊五代一百三十八吐蕃傳涼州僧至京師唐長興四年涼州留後孫超遣大將拓拔承謙及僧道士耆老楊通信等至京師求旌節新五代史卷七十四四夷附録三高尼辭郡人此地當有兵難晉開運二年正月汴州封丘門外壕水東北隅水有文若大樹花葉芬敷之狀相連數十株宛若圖畫傾都觀之識者云唐景福中盧彥威浮陽壕水有樹文亦如此時有高尼辭郡人曰此地當有兵難至光化中其郡果為燕帥劉仁恭所陷舊五代史卷一百四十一五行志吾嘗於此飯僧數萬今日豈不相憫邪開運四年正月丁亥朔耶律德光入京師晉出帝與太后肩輿至郊外德光不見館於封禪寺遣其將崔延勳以兵守之是時雨雪寒凍皆苦餓太后使人謂寺僧曰吾嘗於此飯僧數萬今日豈不相憫邪寺僧辭以虜意難測不敢獻食帝陰祈守者乃稍得食新五代史卷十七高祖皇后李氏傳樊其骨送范陽佛寺晉李太后八月疾亟謂帝曰我死焚其骨送范陽佛寺無使我為虜地鬼也遂卒帝與皇后宮人宦者東西班皆被髮徒跣扶舁其柩至賜地焚其骨穿地而葬焉新五代史卷十七高祖皇后李氏傳皇太后如尼誦佛書後漢隱帝時天下旱蝗黃河決溢京師大風拔木壞城門宮中數見怪物投瓦石撼門扉漢皇太后乃召尼誦佛書以禳之一尼如廁既還悲泣不知人者數日及醒訊之莫知其然新五代史卷三十李業傳廢帝亦謂李愚等無所事常目宰相曰此粥飯僧爾以謂飽食終日而無所用心也新五代史卷五十四李愚傳楚僧善占算之術劉陟之季年有梵僧善占算之術謂陟不利名龑他年慮有此姓敗事陟又改名龑龑讀為儼古文無此字蓋妄撰也舊五代史卷一百三十五劉陟傳乾享九年南漢劉龑又更名龔以應龍見之祥有胡僧言讖書滅劉氏者龔也龑乃采周易飛龍在天之義為龑字音儼以名焉新五代史卷六十五劉隱傳附劉龔傳洪杲死前佛前作祝劉晟大怒使使者夜召洪杲洪杲知不免乃留使者入具沐浴詣佛前祝曰洪杲誤念來生王宮今見殺矣後世當生民家以免屠害涕泣與家人訣別然後赴召至則殺之新五代史卷六十五劉隱傳附劉晟傳上京僧尼道士多中國人契丹上京又謂西樓有邑屋市肆交易無錢而用布有綾錦諸工作宦者翰林伎術教坊角抵秀才僧尼道士等皆中國人而並汾幽薊之人尤多新五代史卷七十三四夷附録三襄陽僧寺老僧説趙匡胤漢初趙匡胤漫遊無所遇舍襄陽僧寺有老僧善術數顧曰吾厚贐汝北往則有遇矣會周祖以樞密使征李守真應募居帳下宋史卷一太祖紀一西僧你尾尼來朝咸平元年春辛巳僧你尾尼等自西天來朝稱七年始達宋史卷六真宗紀一王承衍下令市中及佛寺燃燈設樂雍熙中王承衍出知天雄軍府兼都部署時契丹擾鎮陽候騎至冀州去魏二百餘里鄰境戒嚴城中大恐屬上元節承衍下令市中及佛寺燃燈設樂與賓佐宴遊達旦人賴以安宋史卷二百五十王審琦傳附王承衍傳貯黍稻寺觀中符昭壽以貴家子日事遊宴簡倨自恣常紗帽素氅衣偃息後圃不理戎務有所裁決即令家人傳道多集錦工就廨舍織纖麗綺帛每有所須取給於市餘半歲方給其直又令部曲私邀取之廣糴黍稻未及成熟者亦取之悉貯寺觀中久之損敗即勒道釋償之宋史卷二百五十一符彥卿傳附符昭壽傳僧與吏同誣嫗乾佑中時禁鹽入城犯者法至死告者給厚賞洛陽民家嫗將入城鬻蔬俄有僧從嫗買蔬就筥翻視密置鹽筥中少答其直不買而去嫗持入城抱關者搜得鹽擒以詣府武行德見盛鹽襆非村嫗所有疑而詰之嫗言適有僧自城外買蔬取視久之而去即捕僧訊治之具伏與關吏同誣嫗以希賞行德釋嫗斬僧及抱關吏數輩人畏之若神明部下凜然宋史卷二百五十二武德行傳僧道筷留劉蟠連任太平興國初劉蟠就遷倉部員外郎改轉運使歲漕江東米四百萬斛以給京師頗為稱職秩滿部內僧道乞留詔許再任賜金紫改駕部員外郎宋史卷二百七十六劉蟠傳調廂兵繕葺五臺山寺五臺山寺調廂兵義勇繕葺為除和糴谷三萬馮行己謂不可捐歲入之儲以事不急之務宋史卷二百八十五馮拯傳附馮行己傳盜殺寺奴取財隰州民常聚博僧舍一日盜殺寺奴取財去博者適至血偶涴衣邏卒捕送州考訊誣伏薛奎獨疑之白州緩其獄後果得殺人者宋史卷二百八十六薛奎傳薑遵造浮屠毀漢唐碑碣薑遵在永興太后嘗詔營浮屠遵毀漢唐碑碣代磚甓既成得召用宋史卷二百八十八薑遵傳張知白殯父於佛寺張知白知白九歲其父終邢州殯於佛寺及契丹寇河北寺宇多頽廢殯不可辨知白既登第徒行訪之得佛寺殿基恍然識其處既發其衣衾皆可驗衆歎其誠孝宋史卷三百一十張知白傳瞎征自髡為僧先是熙河將王贍下邈川有功帥孫路不樂贍奪其兵與王愍朝廷知之以宗回代路加直學士時青唐瞎征內附而心牟欽氈勒兵立別酋隴拶還其地勢復張瞎征大懼自髡為僧以祈免宋史卷三百一十八胡宿傳附胡宗回傳王廣廉奏筷度僧牒會河北轉運判官王廣廉奏乞度僧牒數千為本錢於陝西漕司私行青苗法春散秋斂與安石意合於是青苗法遂行安石因遣八使之四方訪求遺利中外知其必迎合生事皆莫敢言宋史卷三百三十九蘇轍傳洪彥升處僧舍洪彥升字仲達饒州樂平人登第調常熟尉奉母之官既至前尉欲申期三月以規薦而中分奉入彥升處僧舍卻奉不納如約始交印論呂惠卿與張懷素厚善序其所注般若心經云我遇公為黃石之師且張良師黃石之策為漢祖定天下惠卿安得輒以為比右僕射張商英與給事中劉嗣明爭曲直事下御史彥升蔽罪商英商英去又纍疏抨郭天信以談命進用交結竄斥因請禁士大夫毋語命術毋習釋教宋史卷三百四十八洪彥升傳老僧欲住烏寺哲宗初為開封府推官屢詣執政求進朝廷稍更新法之不便於民者張商英上書言三年無改於父之道可謂孝矣今先帝陵土未干即議變更得為孝乎且移書蘇軾求入台其廋詞有老僧欲住烏寺呵佛罵祖之語呂公著聞之不悅宋史卷三百五十一張商英傳囊山浮屠與郡學爭水利囊山浮屠與郡學爭水利久不決陳仲微按法曰曲在浮屠它日沿檄過寺其徒久揭其事鍾上以為冤旦暮祝詛然莫省為仲微也仲微見之曰吾何心哉吾何心哉質明首僧無疾而死宋史卷四百二十二陳仲微傳程珦宴客開元僧舍程珦嘗宴客開元僧舍酒方行人歡言佛光見觀者相騰踐不可禁珦安坐不動頃之遂定宋史卷四百二十七道學一程皓傳長壽寺僧廣惠常食人肉長壽寺僧廣惠常與王繼勳同食人肉令折其脛而斬之洛民稱快宋史卷四百六十三外戚上王繼勳傳僧録澄遠黥配郴州右街僧録澄遠以預聞妖詐決杖黥配郴州宋史卷四百六十六宦者一周懷政傳劉鋹作刀山劍樹等刑南漢劉鋹時目百官為門外人群臣小過及士人釋道有才略可備問者皆下蠶室令得出入宮闈作燒煮剝剔刀山劍樹之刑或令罪人鬥虎抵象宋史卷四百八十一南漢劉氏世家五臺山僧繼顒為鴻臚卿初劉鈞自李筠敗狼狽而歸旦夕懼宋師之至以趙文度為相召抱腹山人郭無為參議中書事以五臺山僧繼顒為鴻臚卿參議國事宋史卷四百八十二北漢劉氏世家二僧賚蠟書使西夏嘉定七年夏左樞密使萬慶義勇遣二僧賚蠟書來西邊欲與共圖金人復侵地制置使黃誼不報宋史卷四百八十六夏國傳佛謂唃兒子為廝羅河州人謂佛唃謂兒子廝羅自此名唃廝羅於是宗哥僧李立遵邈川大酋溫逋奇略取廝羅如廓州尊立之部族浸韁乃徙居宗哥城立遵為論逋佐之宋史卷四百九十二唃廝羅傳以白金為浮圖聖宗仁德皇后蕭氏小字菩薩哥睿智皇后弟隗因之女年十二美而才選入掖庭統和十九年册為齊天皇后嘗以草莛為殿式密付有司令造清風天祥八方三殿既成益寵異所乘車置龍首鴟尾飾以黃金又造九龍輅諸子車以白金為浮圖各有巧思夏秋從行山谷間花木如繡車服相錯人望之以為神仙遼史卷七十一后妃聖宗仁德皇后蕭氏傳蕭氏小字觀音道宗宣懿皇后蕭氏小字觀音欽哀皇后弟樞密使惠之女遼史卷七十一后妃道宗宣懿皇后蕭氏傳宗義倍後明宗養子李從珂弒其君自立宗義倍密報太宗曰從珂弒君盍討之從珂欲自焚召倍與俱倍不從遣壯士李彥紳害之時年三十八有一僧為收瘞之倍初市書至萬卷藏於醫巫閭絶頂之望海堂通陰陽知音律精醫藥砭爇之術工遼漢文章嘗譯陰符經善畫本國人物如射騎獵雪騎千鹿圖皆入宋祕府然性刻急好殺婢妾微過常加刲灼夏氏懼而求削髮為尼遼史卷七十二宗室宗義倍傳道隱道隱生於唐人皇王遭李從珂之害時年尚幼洛陽僧匿而養之因名道穩遼史卷七十二宗室晉王道隱傳孩里素信浮圖孩里回鶻人素信浮圖清寧初從上獵墮馬憒而復蘇言始見二人引至一城宮室宏敞有衣絳袍人坐殿上左右列侍導孩里升階持牘者示之曰本取大腹骨欲誤執汝牘上書官至使相壽七十七須臾還擠之大壑而寤道宗聞之命書其事後皆驗遼史卷九十七孩里傳張孝傑詣佛寺張孝傑久在相位貪貨無厭時與親戚會飲嘗曰無百萬兩黃金不足為宰相家初孝傑及第詣佛寺忽迅風吹孝傑帕頭與浮圖齊墜地而碎有老僧曰此人必驟貴然亦不得其死竟如其言遼史卷一百十姦臣上張孝傑傳阿古乃好佛金之始祖諱函普初從高麗來年已六十餘矣兄阿古乃好佛留高麗不肯從曰後世子孫必有能相聚者吾不能去也金史卷一世紀西夏人犯積石羌界寺族多陷沒秋七月壬寅朔夏人犯積石州羌界寺族多陷沒惟桑逋寺僧看逋昭逋廝沒及答那寺僧奔鞠等拒而不從詔賞諸僧鈐轄正將等官而給以廩祿金史卷十六宣宗紀下憫忠寺舊有雙塔憫忠寺舊有雙塔進士入院之夜半聞東塔上有聲如音樂西入宮考試官侍御史完顏蒲涅等曰文路始開而有此得賢之祥也金史卷五十一選舉志一皇后王氏佛像前自縊死天興元年冬哀宗遷歸德二年正月遣近侍徒單四喜術甲答失不奉迎兩宮后御仁安殿出鋌金及七寶金洗分賜從行忠孝軍是夜兩宮及柔妃裴滿氏等乘馬出宮行至陳留城左右火起疑有兵不敢進惟寶符李氏從至宣德州居摩訶院李氏自入院止寢佛殿中作為幡旆會當同后妃北行將發皇后王氏佛像前自縊死且自書門紙曰寶符御侍此處身故金史卷六十四后妃宣宗皇后王氏傳南方無賴之徒假托釋道時民間往往造作妖言相為黨與謀不軌事覺伏誅上問宰臣曰南方尚多反側何也琚對曰南方無賴之徒假托釋道以妖幻惑人愚民無知遂至犯法上曰如僧智究是也此輩不足恤但軍士討捕利取民財害及良民不若杜之以漸也智究大名府僧同寺僧苑智義與智究言蓮華經中載五濁惡世佛出魏地心經有夢想究竟涅槃之語汝法名智究正應經文先師藏瓶和尚知汝有是福分亦作頌子付汝智究信其言遂謀作亂歷大名東平州郡假托抄化誘惑愚民潛結姦黨議以十一年十二月十七日先取兗州會徒嶧山以應天時三字為號分取東平諸州府及期向夜使逆黨胡智愛等劫旁近軍寨掠取甲仗軍士擊敗之會傅戩劉宣亦於陽谷東平上變皆伏誅連坐者四百五十餘人金史卷八十八石琚傳大懷貞飯僧破案大懷貞嘗以私忌飯僧數人就中一僧異常懷貞問曰汝何許人也對曰山西人復問曾為盜殺人否對曰無之後三日詰盜果引此僧皆服其明察金史卷九十二大懷貞傳洪輝印無量壽經一萬卷洪輝本名訛論承安二年五月生彌月封壽王閏六月壬午病急風募能醫者加宣武將軍賜錢五百萬甲申疾愈印無量壽經一萬卷報謝衍慶宮作普天大醮七日無奏刑名仍禁屠宰金史卷九十三章宗諸子傳僧道度牒三千忒鄰泰和二年八月生十二月癸酉生滿百日放僧道度牒三千道設醮玄真觀宴於慶和殿百官用天壽節禮儀進酒稱賀三品以上進禮物金史卷九十三章宗諸子傳李晏釋放寺奴初錦州龍宮寺遼主撥賜戶民俾輸稅於寺歲久皆以為奴有欲訴者害之島中李晏乃具奏在律僧不殺生況人命乎遼以良民為二稅戶此不道之甚也今幸遇聖朝乞盡釋為良世宗納其言於是獲免者六百餘人金史卷九十六李晏傳父老僧道獻食天興二年正月朔上次黃陵岡就歸德餫船北渡是時在所父老僧道獻食及牛酒犒軍者相屬上親為拊慰人人為之感泣金史卷一百十四白華傳妖言彌勒佛當有天下泰定二年六月丁酉息州民趙丑廝郭菩薩妖言彌勒佛當有天下有司以聞命宗正府刑部樞密院御史台及河南行省官雜鞫之元史卷二十九泰定帝紀一賜僧鈔千錠泰定二年十一月丙辰郭菩薩等伏誅杖流其黨丁巳幸大承華普慶寺祀昭獻元聖皇后於影堂賜僧鈔千錠元史卷二十九泰定帝紀一順帝造龍船設西方三聖殿至正十四年帝於內苑造龍船委內官供奉少監塔思不花監工帝自製其樣船首尾長一百二十尺廣二十尺前瓦簾棚穿廊兩暖閣後吾殿樓子龍身並殿宇用五彩金妝前有兩爪上用水手二十四人身衣紫衫金荔枝帶四帶頭巾於船兩旁下各執篙一自後宮至前宮山下海子內往來遊戲行時其龍首眼口爪尾皆動又自製宮漏約高六七尺廣半之造木為匱陰藏諸壺其中運水上下匱上設西方三聖殿匱腰立玉女捧時刻籌時至輒浮水而上左右列二金甲神人一懸鐘一懸鉦夜則神人自能按更而擊無分毫差當鍾鉦之鳴獅鳳在側者皆翔舞匱之西東有日月宮飛仙六人立宮前遇子午時飛仙自能耦進度仙橋達三聖殿已而復退立如前其精巧絶出人謂前代所鮮有時帝怠于政事荒于遊宴以宮女三對奴妙樂奴文殊奴等一十六人按舞名為十六天魔首垂髮數辮戴象牙佛冠身被纓絡大紅綃金長短裙金雜襖雲肩合袖天衣綬帶鞋襪各執加巴剌般之器內一人執鈴杵奏樂又宮女一十一人練槌髻勒帕常服或用唐帽窄衫所奏樂用龍笛頭管小鼓箏蓁琵琶笙胡琴響板拍板以宦者長安迭不花管領遇宮中讚佛則按舞奏樂宮官受祕密戒者得入餘不得預元史卷四十三順帝紀六天寧寺塔忽變紅色至正二十八年六月壬寅彰德路天寧寺塔忽變紅色自頂至踵表裏透徹如鍛鐵初出於爐頂上有光焰迸發自二更至五更乃止癸卯甲辰亦如之先是河北有童謠云塔兒黑北人作主南人客塔兒紅朱衣人作主人公七月癸酉京師赤氣滿天如火照人自寅至辰氣焰方息元史卷五十一五行志二西天咒語帝師所制火輪竿制以白鐵為小車輪建於白鐵竿首輪及竿皆金塗之上書西天咒語帝師所制常行為親衛中道正行在劈正斧之前以法佛衛以祛邪僻以鎮轟雷焉蓋辟惡車之意也元史卷七十九輿服志傘蓋上加金浮屠大傘赤質正方四角銅螭首塗以黃金紫羅表緋絹裹諸傘蓋宋以前皆平頂今加金浮屠元史卷七十九輿服志二孔雀蓋上施金浮屠孔雀蓋朱漆竿首建小蓋蓋頂以孔雀毛徑尺許下垂孔雀尾簷下以青黃紅瀝水轉之上施金浮屠蓋居竿三之一竿塗以黃金書西天咒語與火輪竿義同元史卷七十九輿服志二京師創建萬寧寺中塑祕密佛像卜魯罕皇后伯嶽吾氏駙馬脫里思之女元貞初立為皇后大德三年十月授册寶成宗多疾后居中用事信任相臣哈剌哈孫大德之政人稱平允皆后處決京師創建萬寧寺中塑祕密佛像其形醜怪后以手帕蒙覆其面尋傳旨毀之元史卷一百一十四后妃一卜魯罕皇后傳日本僧俄有日本僧告其國遣人刺探國事者鐵木兒塔識曰刺探在敵國固有之今六合一家何以刺探為設果有之正可令睹中國之盛歸告其主使知響化元史卷一百四十鐵木爾塔識傳二月迎佛費財蠹俗廉惠山海牙歷祕書丞會福總管府治中上疏言二月迎佛費財蠹俗時論韙之元史卷一百四十五廉惠山海牙傳西蕃僧二人至中書省言建佛寺事至元十八年三月十七日觿宿衛宮中西蕃僧二人至中書省言今夕皇太子與國師來建佛事省中疑之俾堂出入東宮者雜識視之觿等皆莫識也乃作西蕃語詢二僧曰皇太子及國師今至何處二僧失色又以漢語詰之倉皇莫能對遂執二僧屬吏訊之皆不伏觿恐有變乃與尚書忙兀兒張九思集衛士及官兵各執弓矢以備頃之樞密副使張易亦領兵駐宮外觿問果何為易曰夜後當自見觿固問乃附耳語曰皇太子來誅阿合馬也夜二鼓忽聞人馬聲遙見燭籠儀仗將至宮門其一人前呼啓關觿謂九思曰他時殿下還宮必以完澤賽羊二人先請得見二人然後啓關觿呼二人不應即語之曰皇太子平日未嘗行此門今何來此也賊計窮趨南門觿留張子政等守西門亟走南門伺之但聞傳呼省官姓名燭影下遙見阿合馬及左丞郝禎已被殺觿乃與九思大呼曰此賊也叱衛士急捕之高和尚等皆潰去惟王著就擒黎明中丞也先帖木兒與觿等馳驛往上都以其事聞帝以中外未安當益嚴武備遂勞使遣亟還高和尚等尋皆伏誅元史卷一百六十九高觿傳平江僧賄其徒告判官皇慶五年鄧文原出僉江南浙西道肅政廉訪司事平江僧有憾其府判官理熙者賄其徒告熙贓熙誣服文原行部按問得實杖僧而釋熙元史卷一百七十二鄧文原傳浮屠妙總統有寵仁宗即位浮屠妙總統有寵敕中書官其弟五品張思明執不可帝大怒召見切責之對曰選法天下公器徑路一開求者雜遝故寧違旨獲戾不忍隳祖宗成憲使四方得窺陛下淺深也帝心然其言而業已許之曰卿可姑與之後勿為例乃為萬億庫提舉不與散官元史卷一百七十七張思明傳歐陽玄文與釋老宮海內名山大川釋老之宮王公貴人墓隧之碑得歐陽玄文辭以為榮元史卷一百八十二歐陽玄傳僧欲私人妻常德民盧甲莫乙汪丙同出傭而甲誤墜水死甲弟之為僧者欲私甲妻不得訴甲妻與乙通而殺其夫乙不能明誣服擊之死斷其首棄草間尸與仗棄談氏家溝中吏往索果得髑髏然尸與仗皆無有而談誣證曾見一尸水漂去天爵曰尸與仗縱存今已八年未有不腐者召談詰之則甲未死時目已瞽其言曾見一尸水漂去妄也天爵語吏曰此乃疑獄況不止三年俱釋之元史卷一百八十三蘇天爵傳僧淨廣被弟子殺害有僧淨廣與他僧有憾久絶往來一日邀廣飲廣弟子急欲得師財且苦其箠楚潛往它僧所殺之明日訴官它僧不勝考掠乃誣服三經審録詞無異結案待報汪澤民取行凶刀視之刀上有鐵工姓名召工問之乃其弟子刀也一訊吐實即械之而出他僧人驚以為神元史卷一百八十五汪澤民傳群嫗聚浮屠庵群嫗聚浮屠庵誦佛書為禳祈一嫗失其衣適胡長孺出鄉嫗訟之長孺以牟麥置群嫗合掌中命繞佛誦書如初長孺閉目叩齒作集神狀且曰吾使神監之矣盜衣者行數周麥當芽一嫗屢開掌視長孺指縛之還所竊衣元史卷一百九十胡長孺傳汝稽顙拜佛庶保我無恙也至正二十七年大明以騎兵出杉關取邵武以舟師由海道趣閩奄至城下柏帖穆樂知城不可守引妻妾坐樓上慷慨謂曰丈夫死國婦人死夫義也今城且陷吾必死於是若等能吾從乎皆泣曰有死而已無他志也縊而死者六人有十歲女度其不能自死則紿之曰汝稽顙拜佛庶保我無恙也甫拜即挈米囊壓之死元史卷一百九十六忠義柏帖穆爾傳鄭大和不奉浮屠鄭大和方正不奉浮屠老子教冠昏喪葬必稽朱熹家禮而行執元史卷一百九十七鄭文嗣傳妖僧高和尚以祕術行軍中十九年三月世祖在上都皇太子從有益都千戶王著者素志疾惡因人心憤怨密鑄大銅鎚自誓願擊阿合馬首會妖僧高和尚以祕術行軍中無驗而歸詐稱死殺其徒以尸欺衆逃去人亦莫知著乃與合謀以戊寅日詐稱皇太子還都作佛事結八十餘人夜入京城旦遣二僧詣中書省令市齋物省中疑而訊之不伏及午著又遣崔總管矯傳令旨俾樞密副使張易發兵若干以是夜會東宮前易莫察其偽即令指揮使顏義領兵俱往著自馳見阿合馬詭言太子將至令省官悉候於宮前阿合馬遣右司郎中脫歡察兒等數騎出關北行十餘里遇其衆偽太子者責以無禮盡殺之奪其馬南入健德門夜二鼓莫敢何問至東宮前其徒皆下馬獨偽太子者立馬指揮呼省官至前責阿合馬數語著即牽去以所袖銅鎚碎其腦立斃繼呼左丞郝禎至殺之囚右丞張惠樞密院御史台留守司官皆遙望莫測其故尚書張九思自宮中大呼以為詐留守司達魯花赤博敦遂持梃前擊立馬者墜地弓矢亂髮衆奔潰多就禽高和尚等逃去著挺身請囚元史卷九十二姦臣傳有僧自雲南至廣西詭稱建文帝或云恭閔帝由地道出亡正統五年有僧自雲南至廣西詭稱建文皇帝思恩知府岑瑛聞於朝按問乃鈞州人楊行祥年已九十餘下獄閲四月死同謀僧十二人皆戍遼東自後滇黔巴蜀間相傳有帝為僧時往來迹明史卷四恭閔帝紀白蓮教燒香惑衆韓林兒欒城人或言李氏子也其先世以白蓮會燒香惑衆謫徙永年元末林兒父山童鼓妖言謂天下當大亂彌勒佛下生河南江淮間愚民多信之穎州人劉福通與其黨杜遵道羅文素盛文郁等復言山童宋徽宗八世孫當主中國乃殺白馬黑牛誓告天地謀起兵以紅巾為號明史卷一百二十二韓林兒傳江南僧道多腴田建文帝時江南僧道多腴田陳繼之請人限五畝餘以賦民從之明史卷一百四十一戴德彝傳附僧奇于謙于謙字廷益錢塘人生七歲有僧奇之曰他日救時宰相也明史卷一百七十于謙傳妖僧趙才興景泰三年春林聰疏言臣職在糾察刑獄妖僧趙才興之疏族百口律不當坐而抄提至京明史卷一百七十七林聰傳僧夜殺人沉之塘下黃紱字用章其先封丘人成化九年遷四川左參議久之進左參政按部崇慶旋風起輿前不得行紱曰此必有冤吾當為理風遂散至州禱城隍神夢若有言州西寺者寺去州四十里倚山為巢後臨巨塘僧夜殺人沉之塘下分其資且多藏婦女於窟中黃紱發吏兵圍之窮詰得其狀誅僧毀其寺倉吏倚皇親乾沒官糧巨萬紱追論如法威行部中明史卷一百八十五黃紱傳河南白蓮賊趙景隆自稱宋王河南白蓮賊趙景隆自稱宋王掠歸德叢蘭遣指揮石堅知州張思齊等擊斬之九月賊平論功賚金幣增俸一級召還理部事明史卷一百八十五叢蘭傳姦僧潛行誘愚民彌勒之教錦衣革職旗校王邦奇屢乞復職安磐言邦奇等在正德世貪叨搏噬有若虎狼其捕姦盜也或以一人而牽十餘人或以一家而連數十家鍛煉獄詞付之司寇謂之鑄銅板其緝妖言也或用番役四出搜愚民詭異之書或購姦僧潛行誘愚民彌勒之教然後從而掩之無有解脫謂之種妖言數十年內死者填獄生者冤號今不追正其罪使得保首領亦已幸矣尚敢肆然無忌屢瀆天聽何為者哉且陛下收已渙之人心奠將危之國脈實在登極一詔若使此輩攘臂一朝壞之則姦人環立蜂起堤防潰決不知所紀極矣宜嚴究治絶禍源帝不能從其後邦奇卒為大歷如磐言明史卷一百九十二安磐傳偏頭結賽雅善天竺僧偏頭結賽雅善天竺僧僧言歲在雞犬番有厄偏頭信之預匿山谷中逸賊以為神迹而拜求之故偏頭為之請是役也焚碉房千六百有奇生擒賊魁三十餘人俘馘以千餘計自是群番震驚不敢為患邊人樹碑記李應祥績焉明史卷二百四十七李應祥傳峨嵋僧預言初湯紹恩之生也有峨嵋僧過其門曰他日地有稱紹者將承是兒恩乎因名紹恩字汝承其後果驗明史卷二百八十一湯紹恩傳築浮屠名曰鎮南危素居房山者四年明師將抵燕淮王貼木兒不花監國起為承旨如故素甫至而師入乃趨所居報恩寺入井寺僧大梓力挽起之曰國史非公莫知公死是死國史也素遂止兵追史庫往告鎮撫吳勉輩出之元實録得無失先是至元間西僧嗣古妙高欲毀宋會稽諸陵夏人楊輦真珈為江南總攝悉掘徽宗以下諸陵攫取金寶裒帝后遺骨瘞於杭之故宮築浮屠其上名曰鎮南以示厭勝又截理宗顱骨為飲器真珈敗其資皆籍於官顱骨亦入宣政院以賜所謂帝師者危素在翰林時宴見備言始末帝歎息良久命北平守將購得顱骨於西僧汝納所諭有司厝於高坐寺西北其明年紹興以永穆陵圖來獻遂敕葬故陵實自素發之云明史卷二百八十五危素傳布政使吳印布政使吳印者僧也太祖驟貴之寵眷甚張孟兼易之印謁孟兼由中門入孟兼杖守門卒已又以他事與相拄太祖先入印言逮笞孟兼孟兼憤捕為印書奏者欲論以罪印復上書言狀太祖大怒曰豎儒與我抗邪械至闕下命棄市明史卷二百八十五文苑張孟謙傳史五常寺址尋父櫬史五常內黃人父萱官廣東僉事卒葬南海和光寺側五常方七歲母攜以歸比長奉母至孝常恨父不得歸葬母語之曰爾父杉木櫬內置大錢十爾謹志之母歿廬墓致毀既終喪往迎父櫬時相去已五十年寺沒於水久矣五常泣禱有老人以杖指示寺址發地果得父櫬內置錢如母言乃扶歸與母合葬復廬墓側正統六年旌表明史卷二百九十七孝義史五常傳王原尋父於寺正德中王原父王珣以家貧重役逃去王原外出尋父一日渡海至田橫島假寐神祠中夢至一寺當午炊莎和肉羹食之一老父至驚覺原告之夢請占之老父曰若何為者曰尋父老父曰午者正南位也莎根附子肉和之附子膾也求諸南方父子其會乎原喜謝去而南逾洺漳至輝縣帶山有寺曰夢覺原心動天雨雪寒甚臥寺門外及曙一僧啓門出駭曰汝何人曰文安人尋父而來曰識之乎曰不識也引入禪堂憐而豫之粥珣方執爨灶下僧素知為文安人謂之曰若同里有少年來尋父者若倘識其人珣出見原皆不相識問其父姓名則王珣也珣亦呼原乳名相抱持慟哭寺僧莫不感動珣曰歸告汝母我無顏復歸故鄉矣原曰父不歸兒有死耳牽衣哭不止寺僧力勸之父子相持歸夫妻子母復聚後原子孫多仕宦者明史卷二百九十七孝義王原傳孝肅皇太后夢伽藍神知弟所在先是孝肅皇太后有弟吉祥兒時出遊去為僧家人莫知所在孝肅亦若忘之一夕夢伽藍神來言后弟今在某所英宗亦同時夢旦遣小黃門以夢中言物色得之報國寺伽藍殿中召入見后且喜且泣欲爵之不可厚賜遣還憲宗立為建大慈仁寺賜莊田數百頃其後周氏衰落而慈仁寺莊田久猶存明史卷三百外戚周能傳項貞女持齋烯香燈禮佛項貞女秀水人國子生道亨女字吳江周應祁精女工解琴瑟通列女傳事祖母及母極孝年十九聞周病瘵即持齋烯香燈禮佛默有所祝侍女輩竊聽微聞以身代語一日謂乳媼曰未嫁而夫亡當奈何曰未成婦改字無害女正容曰昔賢以一劍許人猶不忍負況身乎及訃聞父母祕其事然傳吳江人來女已喻祖母屬其母入視女留母坐色甚溫母釋然去夜伺諸婢熟睡猶起以素絲約髮衣內外悉易以縞而紉其下裳檢衣物當勞諸婢者名標之列諸床上大書於几曰上告父母兒不得奉一日歡今為周郎死矣遂自縊兩家父母從其志竟合葬焉明史卷三百二列女二項貞女傳僧治急病李孝婦臨武人名中姑適江西桂廷鳳姑鄧患痰疾將不起婦涕泣憂悼聞有言乳肉可療者心識之一日煮藥爇香禱灶神自割一乳昏仆於地氣已絶廷鳳呼藥不至出視見血流滿地大驚呼救傾駭城市邑長佐皆詣其廬命亟治俄有僧踵門曰以室中蘄艾傅之即愈如其言果蘇比求僧不復見矣乃取乳和藥奉姑姑竟獲全明史卷三百二列女二李孝婦傳劉允迎烏斯藏僧先是又有劉允者以正德十年奉敕往迎烏斯藏僧所賚金寶以百餘萬計廷臣交章諫不聽允至成都治裝歲餘費又數十萬公私匱竭既至為番人所襲允走免將士死者數百人盡亡其所賚及歸武宗已崩世宗用御史王鈞等言張忠吳經發孝陵衛充軍張雄張鋭下都察院鞫治允亦得罪明史卷三百四宦官一張忠傳李自成獨白鬃大纛銀浮屠標營白幟黑纛李自成獨白鬃大纛銀浮屠左營幟白右緋前黑後黃纛隨其色明史卷三百九李自成傳
