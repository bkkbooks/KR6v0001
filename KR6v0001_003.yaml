body:
  text: 三塔寺蘇塗馬韓又置別邑名曰蘇塗立大木懸鈴鼓其蘇塗之義有似西域浮屠也而所行善惡有異晉書卷九十七四夷傳馬韓傳宿於佛精舍時沙門吳進言於季龍曰胡運將衰晉當復興宜苦役晉人以厭其氣季龍於是使尚書張群發近郡男女十六萬車十萬乘運土築華林苑及長牆於鄴北廣長數十里石韜燕其僚屬於東明觀樂奏酒酣愀然長歎曰人居世無常別易會難各付一杯開意為吾飲令必醉知後會復何其而不飲乎因泫然流涕左右莫不歔欷因宿於佛精舍等緣獼猴梯而入殺韜置其刀箭而去晉書卷一百七石季龍載記下龍翔佛寺時有黑龍白龍各一見於龍山皝親率群僚觀之去龍二百餘步祭以太牢二龍交首嬉翔解角而去皝大悅還宮赦其境內號新宮曰和龍立龍翔佛寺於山上晉書卷一百九慕容皝載記唐嵫希景興經始精舍唐嵫入太平水路上有瀑布數百丈漫石在唐嵫下郗景興經始精舍亦是名山之流崒嵊與分界去山八十里故曰遠南前嶺鳥道正當五十里高左右所無就下地形高乃當不稱遠望釐山甚奇謂白爍尖者最高下有良田王敬弘經始精舍曇濟道人住孟山名曰孟埭芋薯之疁田敬承聖誥恭窺前經山野昭曠聚落羶腥故大慈之弘誓拯群物之淪傾豈寓地而空言必有貸以善成欽鹿野之華苑羨靈鷲之名山企堅固之貞林希菴羅之芳園雖綷容之緬邈謂哀音之恆存建招提於幽峰冀振錫之息肩庶鐙王之贈席想香積之惠餐事在微而思通理匪絕而可溫賈誼弔屈云恭承嘉惠敬承亦此之流聚落是墟邑謂歌哭諍訟有諸諠譁不及山野為僧居止也經教欲令在山中皆有成文老子云善貸且善成此道惠物也鹿苑說四真諦處靈鷲山說般若法華處堅固林說泥洹處菴羅園說不思議處今旁林藝園制苑仿佛在昔依然託想雖綷容緬邈哀音若存也招提謂僧不能常住者可持作坐處也所謂息肩鐙王香積事出維摩經論語云溫故知新理既不絕更宜復溫則可待為己之日用也宋書卷六十七謝靈運傳瓦官寺經日乃水陸出軍劭自登朱雀門督戰軍至瓦官寺與義軍游邏相逢游邏退走賊遂薄壘宋書卷七十七柳元景傳保林寺永明八年四月六日雷震會稽山陰恆山保林寺剎上四破電火燒塔下佛面窗戶不異也南齊書卷十九五行志太子與竟陵王子良俱好釋氏多立樓觀塔宇太子與竟陵王子良俱好釋氏立六疾館以養窮民風韻甚和而性頗奢麗宮內殿堂皆雕飾精綺過於上宮開拓玄圃園與台城北塹等其中樓觀塔宇多聚石頭妙極山水慮上宮望見乃傍門列修竹內施高鄣造游壯數百間施諸機巧宜須鄣蔽須臾成立若應毀撤應手遷徙善制珍玩之物織孔雀毛為裘光彩金翠過於雉頭矣以晉明帝為太子時立西池乃啟世祖引前例求東田起小苑上許之永明中二宮兵力全實太子使宮中將吏更番役築宮城苑巷制度之盛觀者傾京師上性雖嚴多布耳目太子所為無敢啟者後上幸豫章王宅還過太子東田見其彌亙華遠壯麗極目於是大怒收監作主帥太子懼皆藏匿之由是見責杜按其中二字後南史本傳作起出土山池閣樓觀塔宇窮奇極麗費以千萬餘大同故不贅錄南齊書卷二十一文惠太子傳湘宮寺帝以故宅起湘宮寺費極奢侈以孝武莊嚴剎七層帝欲起十層不可立分為兩剎各五層新安太守巢向尚之罷郡還見帝曰卿至湘宮寺未我起此寺是大功德願在側曰陛下起此寺皆是百姓賣兒貼婦錢佛若有知嘗悲哭哀愍罪高佛圖有何功德尚書令袁粲在坐為之失色帝乃怒使人驅下殿願徐去無異容以舊恩少日中已復召入杜按南史本傳大同故不贅錄南齊書卷五十三良政虞願傳禪靈寺上使造禪靈寺新成車駕臨視甚悅敞喜要呂文顯私登寺南門樓上知之繫敞上方而出文顯為南譙郡久之乃復杜按南史本傳不記此事南齊書卷五十六倖臣呂文顯傳太清二年十一月辛酉賊攻陷東府城害南浦侯蕭推中軍司馬楊暾庚辰邵陵王綸帥武州刺史蕭弄璋前譙州刺史趙伯超等入援京師頓鍾山愛敬寺杜按南史本傳無屯鍾山愛敬寺句梁書卷三武帝本紀下高祖於鍾山造大愛敬寺時高祖於鍾山造大愛敬寺王騫舊墅在寺側有良田八十餘頃即晉丞相王導賜田也高祖遣主書宣旨就騫求市欲以施寺騫答旨云此田不賣若是敕取所不敢言酬對又脫略高祖怒遂付市評田價以直逼還之由是忤旨出為吳興太守杜按南史本傳不記此事梁書卷七太宗王皇后傳江陵瓦官寺世祖徐妃諱昭佩東海郯人也太清三年五月被譴死葬江陵瓦官寺杜按南史本傳較梁書記事甚多見本書事跡篇梁書卷七世祖徐妃傳白馬寺既至仍遣張纘向襄陽前刺史岳陽王察推遷未去鎮但以城西白馬寺處之杜按南史本傳襄陽作雍州餘大同故不錄梁書卷三十四張緬傳附張纘傳顯靈寺太清二年侯景寇逼子雲逃民間三年三月宮城失守東奔晉陵餒卒於顯靈寺僧房年六十三所著晉書一百一十卷東宮新記二十卷杜按南史本傳顯靈寺作顯雲寺餘大同故不錄梁書卷三十五蕭子恪傳附蕭子雲傳眾造寺何氏自晉司空充宋司空尚之世奉佛法並建立塔寺至敬容又舍宅東為伽藍趨勢者因助財造構敬容並不拒故此寺堂宇校飾頗為宏麗時輕薄者因呼為眾造寺焉及敬容免職出宅止有常用器物及囊衣而已竟無餘財貨時亦以此稱之杜按南史本傳大同惟後接敬容特為從史胤所愛胤在若邪山嘗疾焉有書云田疇館宇悉奉眾僧書經並歸從弟敬容其見知如此等語梁書卷三十七何敬容傳莊嚴寺侯景舉兵襲京師王移入台內留琛與司馬楊曒守東府賊尋攻陷城放兵殺害琛被槍未至死賊求得之轝至闕下求見僕射王克領軍朱異勸開城納賊克等讓之涕泣而止賊復轝送莊嚴寺療治之杜按南史本傳大同故不錄梁書卷三十八賀琛傳蔣山有延賢寺溉家門雍睦兄弟特相友愛初與弟洽常共居一齋洽卒後便捨為寺因斷腥羶終身蔬食別營小室朝夕從僧徒禮誦高祖每月三置淨饌恩禮甚篤蔣山有延賢寺者溉家世創立故生平公俸咸以供焉略無所取杜按南史本傳終身蔬食後有別營小室朝夕從僧徒禮誦武帝每月三致淨饌思禮甚篤等語餘大同梁書卷四十到溉傳鍾山宋熙寺中大通二年王立為皇太子仍為吳郡太守主書芮珍宗家在吳前守宰皆傾意附之是時珍宗假還規遇之甚薄珍宗還都密奏規云不理郡事俄徵為左民尚書郡吏民千餘人詣闕請留表三奏上不許尋以本官領右軍將軍未拜復為散騎常侍太子中庶子領步兵校尉規辭疾不拜於鍾山宋熙寺築室居焉杜按南史本傳文略異意同故不錄梁書卷四十一王規傳同泰大愛敬二寺蕭洽少有才思高祖令制同泰大愛敬二寺剎下銘其文甚美杜按南史本傳不記此事梁書卷四十一蕭介傳附蕭洽傳雍州平等寺劉潛字孝儀秘書監孝綽弟也起家鎮右始興王法曹行參軍隨府益州兼記室王入為中撫軍轉主簿遷尚書殿中郎敕令制雍州平等寺金像碑文甚宏麗杜按南史本傳文稍異意同故不錄梁書卷四十一劉潛傳中興寺禪靈寺次新亭賊列陣於中興寺相持至晚各解歸侯景登禪靈寺門閤望粲營未立便率銳卒來攻杜按南史本傳同故不錄梁書卷四十三韋粲傳北寺天居寺侯景帥船艦並集北寺王僧辯旋於江陵因被詔會眾軍西討督舟師二萬輿駕出天居寺餞行梁書卷四十五王僧辯傳藥王寺劉曇淨字元光彭城呂人也母喪權瘞藥王寺時天寒曇淨身衣單布廬於瘞所晝夜哭泣不絕聲哀感行路未及期而卒杜按南史謂劉曇淨為劉慧斐子並附其傳見本書人物篇梁書卷四十七孝行劉曇淨傳賀革還鄉造寺賀革在荊州歷為郡縣所得俸秩不及妻孥專擬還鄉造寺以申感思杜按南史本傳大同故不錄梁書卷四十八儒林賀瑒傳附賀革傳居士何胤築室若耶山時居士何胤築室若邪山山發洪水漂拔樹石此室獨存元簡命嶸作瑞室頌以旌表之辭甚典麗杜按南史本傳同故不錄梁書卷四十九文學上鍾嶸傳梁高祖以三橋舊宅為光宅寺是時高祖以三橋舊宅為光宅寺敕興嗣與陸倕各制寺碑及成俱奏高祖用興嗣所制者杜按南史本傳大同故不錄梁書卷四十九周興嗣傳益州立九層佛寺河南王者其先出自鮮卑慕容氏國中有佛法梁興進休留代為征西將軍代死子伏連籌襲爵位天監十三年遣使獻金裝馬腦鍾二口又表於益州立九層佛寺詔許焉杜按南史夷貊下同故不錄梁書卷五十四諸夷傳石槨寺泉軍於石槨寺梁書卷五十五河東王譽傳又燒南岸民居營寺材官將軍宋嶷降賊因為立計引玄武湖水灌台城城外水起數尺闕前御街並為洪波矣又燒南岸民居營寺莫不咸盡禪靈寺司州刺史柳仲禮衡州刺史韋粲南陵太守陳文徹宣猛將軍李孝欽等皆來赴援乃登禪靈寺門樓望之見韋粲營壘未合先渡兵擊之是月百濟使至見城邑丘墟於端門外號泣行路見者莫不灑淚景聞之大怒送小莊嚴寺禁止不聽出入僧辯進軍次張公洲景以盧暉略守石頭紇奚斤守捍國城悉逼百姓及軍士家累入台城內僧辯焚景水柵入淮至禪靈寺渚景大驚乃緣淮立柵自石頭至朱雀航使王偉索超世呂季略守台城宋長貴守延祚寺杜按南史本傳文稍簡意同故不贅錄梁書卷五十六侯景傳大皇寺莊嚴寺太建十年閏六月丁卯大雨震大皇寺剎莊嚴寺露盤重陽閣東樓千秋門內槐樹鴻臚府門杜按南史本紀同故不錄陳書卷五宣帝本紀五耆闍寺寶田寺至是隋軍南北道並進陳後主遣驃騎大將軍司徒豫章王叔英屯朝室堂蕭摩訶屯樂游苑樊毅屯耆闍寺魯廣達屯白土岡忠武將軍孔范屯寶田寺杜按南史本紀不載上兩寺院名陳書卷六後主本紀六香巖寺及世祖為張彪所襲文育時頓城北香巖寺世祖夜往趨之因共立柵陳書卷八周文育傳香巖寺及文帝為彪所襲文育時頓城北香巖寺文帝夜往趨之彪又來攻文育苦戰遂破平彪南史卷六十六周文育傳報德佛寺太和四年正月丁巳罷畜鷹鷂之所以其地為報德佛寺杜按北史本紀同故不錄魏書卷七上高祖紀七上建明佛寺承明元年冬十月丁巳起七寶永安行殿辛未輿駕幸建明佛寺杜按北史本紀同故不錄魏書卷七上高祖紀七報德佛寺思燕佛圖承明元年尊曰太皇太后復臨朝聽政高祖詔曰朕以虛寡幼纂寶歷仰恃慈明緝寧四海欲報之德正覺是憑諸鷙鳥傷生之類宜放之山林其以此地為太皇太后經始靈塔於是罷鷹師曹以其地為報德佛寺太后與高祖遊于方山顧瞻川阜有終焉之志因謂群臣曰舜葬蒼梧二妃不從豈必遠祔山陵然後為貴哉吾百年之後神其安此高祖乃詔有司營建壽陵於方山又起永固石室將終為清廟焉太和五年起作八年而成刊石立碑頌太后功德太后以高祖富於春秋乃作勸戒歌三百餘章又作皇誥十八篇文多不載太后立文宣王廟於長安又立思燕佛圖於龍城皆刊石立碑杜按北史本紀文稍簡意同故不錄魏書卷十三皇后列傳一嵩山閒居寺正光五年秋靈太后對肅宗謂群臣曰隔絕我母子不聽我往來兒間復何用我為放我出家我當永絕人間修道於嵩高閒居寺先帝聖鑒鑒於未然本營此寺者正為我今日欲自下髮肅宗與群臣大懼叩頭泣涕慇勤苦請靈太后聲色甚厲意殊不回肅宗乃宿於嘉福殿積數日遂與太后密謀圖叉肅宗內雖圖之外形彌密靈太后瞋忿之言欲得往來顯陽之意皆以告叉又對叉流涕敘太后欲出家憂怖之心如此密言日有數四叉殊不為疑乃勸肅宗從太后意於是太后數御顯陽二宮無復禁礙杜按北史本紀文稍簡意同故不錄魏書卷十六京兆王傳附元叉傳永寧太上公等佛寺澄又表曰今墉雉素修廄庫崇列雖府寺膠塾少有未周大抵省府粗得庇憩理務諸寺靈塔俱足致虔講道唯明堂辟雍國禮之大來冬司徒兵至講籌量滅徹專力經營務令早就靈太后銳於繕興在京師則起永寧太上公等佛寺功費不少外州各造五級佛圖又數為一切齋會施物動至萬計百姓疲於土木之功金銀之價為之踴上削奪百官事力費損庫藏兼曲賚左右日有數千澄故有此表杜按北史本傳略元澄上表餘大同魏書卷十九中任城王元雲傳附元澄傳元鸞繕起佛寺鸞愛樂佛道修持五戒不飲酒食肉積歲長齋繕起佛寺勸率百姓共為土木之勞公私費擾頗為民患世宗聞而詔曰鸞親唯宗懿作牧大州民物殷繁綏寧所屬宜克己厲誠崇清樹惠而乃驟相征發專為煩擾編戶嗷嗷家懷嗟怨北州土廣奸亂是由准法尋愆應加肅黜以鸞戚屬情有未忍可遣使者以義督責奪祿一周微示威罰也魏書卷十九下城陽王元長壽傳附元鸞傳元鸞繕起佛寺元鸞愛樂佛道繕起佛寺勸率百姓大為土木之勞公私費擾頗為民患宣武聞之詔奪祿一周北史卷十八城陽王元長壽傳附元鸞傳沙門寺僧淵卒年七十餘伯麟雖往奔赴不敢入家哭沙門寺魏書卷二十四崔玄伯傳永寧寺塔永寧寺塔大興經營務廣靈太后曾幸作所凡有顧問張熠敷陳指畫無所遺闕太后善之久之除冠軍將軍中散大夫杜按北史本傳熠作耀所錄與佛教有關事與魏書同故不錄魏書卷七十九張熠傳永寧寺九層佛圖世宗肅宗時豫州人柳儉殿中將軍關文備郭安興並機巧洛中制永寧寺九層佛圖安興為匠也杜按北史本傳同故不錄魏書卷九十一術藝蔣少游傳附雀離佛院高叡出至永巷遇兵被執送華林園於雀離佛院令劉桃枝拉而殺之時年三十六大霧三日朝野冤惜之杜按北史本傳同故不錄北齊書卷十三趙郡王高深傳附高叡傳白馬寺韓賢字普賢天平初為洛州刺史民韓木蘭等率土民作逆賢擊破之親自按檢欲收甲仗有一賊窘迫藏於死屍之間見賢將至忽起斫之斷其脛而卒韓賢雖武將性和直不甚貪暴所歷雖無善政不為吏民所苦昔漢明帝時西域以白馬負佛經送洛因立白馬寺其經函傳在此寺形制淳樸世以為古物歷代藏寶賢無故斫破之未幾而死論者或謂賢因此至禍杜按北史文稍簡意同故不錄北齊書卷十九韓賢傳白馬寺始漢明帝時西域以白馬負佛經送洛因立白馬寺其經函傳於此寺形制厚樸世以古物歷代寶之韓賢知故斫破之未幾而死論者謂因此致禍北史卷五十三韓賢傳童子佛寺顯祖嘗登童子佛寺望并州城曰此是何等城或曰此是金城湯池天府之國帝云我謂唐邕是金城此非金城也其見重如此杜按北史本傳大同故不錄北齊書卷四十唐邕傳五臺山河清三年突厥入境代忻二牧悉是細馬合數萬匹在五臺山北柏谷中避賊賊退後敕白建就彼檢校續使人詣建間領馬送定州付民養飼杜按北史本傳大同故不錄北齊書卷四十白建傳韓使君佛寺前過浮圖三層有鳴鐸焉初長孫紹遠為太常廣召工人創造樂器土木絲竹各得其宜為黃鐘不調紹遠每以為意嘗因退朝經韓使君佛寺前過浮圖三層之上有鳴鐸焉忽聞其音雅合宮調取而配奏方始克諧紹遠乃啟世宗行之杜按北史本傳大同故不錄周書卷二十六長孫紹遠天統中大修佛寺至天統中又毀東宮造修文偃武隆基嬪嬙諸院起玳瑁樓又於遊豫園穿池周以列館中起三山構台以象滄海並大修佛寺勞役鉅萬計財用不給乃滅朝士之祿斷諸曹糧膳及九州軍人常賜以供之隋書卷二十四食貨志蘇威屏居山寺大塚宰宇文護見而禮之以其女新興主妻焉蘇威見護專權恐禍及己逃入山中為叔父所逼卒不獲免然威每屏居山寺以諷讀為娛未幾授使持節車騎大將軍儀同三司改封懷道縣公杜按北史本傳大同故不錄隋書卷四十一蘇威傳辛彥於潞州城內立浮圖二所辛彥之又崇信佛道於潞州城內立浮圖二所並十五層開皇十一年州人張元暴死數日乃蘇云遊天上見新構一堂制極崇麗元問其故人云潞州刺史辛彥之有功德造此堂以待之彥之聞而不悅其年卒官杜按北史本傳大同故不錄隋書卷七十五儒林辛彥之傳李士謙舍宅為伽藍李士謙服闋舍宅為伽藍脫身而出杜按北史本傳同故不錄隋書卷七十七隱逸李士謙傳中興寺侯景之亂僧鼎兄昂卒於京城鼎負屍出寄於中興寺求棺無所得鼎哀憤慟哭忽見江中有物流至鼎所鼎切異之往見乃新棺也因以充殮元帝聞之以為精誠所感至德初鼎盡質貨田宅寓居僧寺友人大匠卿毛彪問其故答曰江東王氣盡於此矣吾與爾當葬長安期運將及故破產耳杜按南史本傳大同故不錄隋書卷七十七藝術韋鼎傳禪靈寺先是武帝立禪靈寺於都下當世以為壯觀天意若曰禪者禪也靈者神明之目也武帝晏駕而鼎業傾移也杜按北齊書本紀不載此事南史卷五齊本紀五下禪崗寺禪鄉寺禪亭寺禪封寺蕭惠開丁父艱居喪有孝性家素事佛凡為父起四寺南岸南崗下名曰禪崗寺曲阿舊鄉宅名曰禪鄉寺京口墓亭名曰禪亭寺所封封陽縣名曰禪封寺謂國僚曰封秩蓋鮮而兄弟甚多若使全關一人則在我讓若人人等分又事可悲恥寺眾既立自宜悉供僧眾由此國秩不復下均惠開素剛至是益不得志寺內所住齋前有向種花草甚美惠開悉劃除列種白楊樹每謂人曰人生不得行胸懷雖壽百歲猶為夭也宋書卷八十七蕭惠開傳禪崗寺禪鄉寺禪亭寺禪封寺蕭惠開丁父艱居喪有孝性家素事佛凡為父起四寺南崗下名曰禪崗寺曲阿舊鄉宅名曰禪鄉寺京口墓亭名曰禪亭寺所封封陽縣名曰禪封寺謂國僚曰封秩鮮而兄弟甚多若全關一人則在我所讓若人人等分又事可悲恥寺眾既立自宜悉供僧眾惠開素有大志至蜀欲廣樹經略善於敘述聞其言者皆以為大功可立明識過人嘗供三千沙門一閱其名退無所失寺內所住齋前向種花草其美惠開悉劃除別種白楊每謂人曰人生不得行胸懷雖壽百歲猶為夭也南史卷十八蕭思話傳附蕭惠開傳招提寺彥回薨澄以錢一萬一千就招提寺贖高帝所賜彥回白貂坐褥壞作裘及纓又贖彥回介幘犀導及彥回常所乘黃牛南史卷二十八褚裕之傳附襯澄傳平等寺金像碑孝綽弟潛字孝儀幼孤與諸兄弟相勖以學並工屬文孝綽嘗云三筆六詩三即孝儀六謂孝威也舉秀才累遷尚殿中郎敕令制雍州平等寺金像碑文甚宏麗南史卷三十九劉勉傳附劉孝潛傳瓦官寺時明帝不重儒術伏曼容宅在瓦官寺東施高坐於聽事有賓客輒升高坐為講說生徒常數十百人杜按南史本傳同故不錄梁書卷四十八儒林伏曼容傳白馬寺德基少遊學京邑積年不歸衣資罄乏又恥服故弊盛冬止衣夾襦褲嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂曰君方為重器不久貧寒故以此相遺耳德基問嫗姓名不答而去德基於禮記稱為精明居以傳授累遷尚書祠部郎德基雖不至大官而三世儒學俱為祠部時論美其不墜焉杜按南史本傳大同故不錄陳書卷三十三儒林賀德基傳永寧寺孝莊帝出雲龍門爾朱兆逼帝幸永寧佛寺殺皇子甲子帝崩於晉陽城內三級佛寺杜按北史本紀謂帝遇弒於城內三級佛寺餘大同不贅錄魏書卷十孝莊帝紀龍花寺王既絕言垂將一紀居於龍花寺無所交通杜按北史本紀同魏書卷十一前廢帝元恭紀崇訓佛寺魏蘭根忌帝雅德還致譭謗竟從崔㥄議廢帝於崇訓佛寺而立平陽王修為孝武帝杜按北史本紀同故不錄魏書卷十一前廢帝元恭紀靈巖寺永熙二年春正月己亥車駕幸崧高石窟靈巖寺魏書卷十一出帝元修紀草堂佛寺須臾帝飲酒遇鴆而崩時年二十五謚曰孝武殯於草堂佛寺十餘年乃葬雲陵杜按魏書本紀不載殯於草堂佛寺事北史卷五魏本紀五孝武帝元修紀晉陽西山大佛像大慈寺寶林寺北齊幼主鑿晉陽西山為大佛像一夜燃油萬盆光照宮內又為胡昭儀起大慈寺未成改為穆皇后大寶林寺窮極工巧運石填泉勞費億計人牛死者不可勝紀杜按北史本紀同故不錄北齊書卷八幼主齊本紀永寧寺靈太后尋幸永寧寺親建剎於九級之基僧尼士女赴者數萬人及改葬文昭高后太后不欲令肅宗王事乃自為喪主杜按北史本傳親見作觀餘同故不錄魏書卷十三皇后列傳一宣武靈皇后胡氏傳立寺追福隋文獻皇后雅好讀書識達今古凡言事皆與上意合宮中稱為二聖嘗夢周阿史那后言受罪辛苦求營功德明日言之上為立寺追福焉杜按隋書本傳不記此事北史卷十四后妃下隋文獻皇后傳江南多以僧寺停客李概為副使聘於江南江南多以僧寺停客出入常袒露還坐事解北史卷三十三李靈傳附李概傳張彝造寺名曰興皇秦州刺史張彝敷政隴右多所制立宣布新風革其舊俗民庶愛仰之為國造佛寺名曰興皇諸有罪咎者隨其輕重謫為土木之功無復鞭杖之罰雖年向六十加之風疾而自強人事孜孜無怠公私法集衣冠從事延請道俗修營齋講好善欽賢愛獎人物南北新舊莫不多之後住京城因後變其子始均被投火中彝僅有餘命沙門寺與其比鄰輿致於寺遠近聞見莫不惋駭魏書卷六十四張彝傳永寧佛寺莊帝步出雲龍門外為爾朱兆騎所縶幽於永寧佛寺兆撲殺皇子污辱妃嬪縱兵虜掠停洛旬餘先命衛送莊帝於晉陽兆後於河梁監閱財貨遂害帝於三級寺杜按北史本傳大同故不錄魏書卷七十五爾朱兆傳康寺三少李伯卿子師上聰敏好學雅有詞致外祖魏收無子惟有一女生師上甚愛重之童亂便自教屬文有名於世後與范陽廬公順俱為符璽郎待詔文林館與博陵崔君洽同志友善從駕晉陽寓居僧寺朝士謂之康寺三少為物論推許若此北史卷一百序傳李伯卿傳感業寺初武皇后貞觀末隨太宗嬪御居於感業寺后及左右數為之言高宗由是復召入宮立為昭儀舊唐書卷五十一后妃傳上德業寺崇敬寺麟德元年三月辛亥展大射禮丁卯長女追封安定公主謚曰思其鹵簿鼓吹及供葬所須並如親王之制於德業寺遷於崇敬寺舊唐書卷四高宗本紀四大雲寺載初元年秋七月有沙門十人偽撰大雲經表上之盛言神皇受命之事制頒於天下令諸州各置大雲寺總度僧千人杜按新唐書本紀此僅有頒大雲經於天下七字舊唐書卷六則天皇后本紀六大雲寺天授元年辛未貶邢文偉為珍州刺史置大雲寺新唐書卷四則天皇后紀明堂至則天始毀東都乾元殿以其地立明堂其制淫侈無復可觀皆不足記其後火焚之既而又復立開元五年復以為乾元殿而不毀初則天以木為瓦夾紵漆之二十五年玄宗遣將作大匠康言素毀之新唐書卷十三禮樂志三明堂火東都宮佛寺火證聖元年正月丙申夜明堂火武太后欲避正殿徹樂開元十八年二月丙寅大雨雪俄而雷震左飛龍廄災占曰天火燒廄兵大起十月乙丑東都宮佛光寺火新唐書卷三十四五行志一玉泉寺則天嘗幸萬安山玉泉寺以山逕危懸欲御腰輿而上王方慶諫曰昔漢元帝嘗祭廟出便門御樓船光祿勳張猛奏曰乘船危就橋安元帝乃從橋即前代舊事今山徑危險石路曲狹上瞻駭目下視寒心比於樓船安危不等陛下蒸人父母奈何踐此畏途伏望停輿駐蹕則天納其言而止是歲改封石泉子舊唐書卷八十九王方慶傳張易之定州私置寺是時張易之請移京城大德僧十人配定州私置寺僧等苦訴元之斷停易之屢以為言元之終不納由是為易之所譖改為司僕卿知政事如故使充靈武道大總官舊唐書卷九十六姚宗傳中興寺龍興寺神龍三年二月庚寅改中興寺觀為龍興內外不得言中興夏四月辛巳以嗣雍王守禮女為金城公主出降吐蕃贊普庚寅幸薦福寺曲赦雍州舊唐書卷七中宗本紀七天竺寺奉先寺開元十年二月四日伊水泛漲毀都城南龍門天竺奉先寺壞羅郭東南角平地水深六尺已上入漕河水次屋舍樹木蕩盡舊唐書卷三十七五行志普門佛寺開元十四年八月八日澠池縣夜有暴雨澗水谷水漲合毀郭邑百餘家及普門佛寺舊唐書卷三十七五行志興聖寺景龍二年八月乙卯詔以興聖寺是高祖舊宅有柿樹天授中枯死至是重生大赦天下舊唐書卷七睿宗本紀七寶昌寺景龍四年至六月中宗暴崩韋后臨朝稱制韋溫宗楚客紀處訥等謀傾宗社以睿宗介弟之重先謀不利道士馮道力處士劉承祖皆善於占兆詣上布誠款上所居里名隆慶時人語訛以隆為龍韋庶人稱制改元又為唐隆皆符御名上益自負乃與太平公主謀之公主喜以子崇簡從上乃與崇簡朝邑尉劉幽求長上折衝麻嗣宗押萬騎果毅葛福順李仙鳧寶昌寺僧普潤等定策誅之舊唐書卷八玄宗本紀八積香寺至德二載九月壬寅與賊將安守忠李歸仁等戰於香積寺西北賊軍大敗斬首六萬級賊帥張通儒棄京城東走舊唐書卷十肅宗本紀十安福寺薦福寺廣德二年十一月乙未懷恩與蕃軍自潰京師解嚴丁未子儀自涇陽入覲詔宰臣百僚迎之於開遠門上御安福寺待之九月庚申京兆尹黎幹以京城薪炭不給奏開漕渠自南山谷口入京城至薦福寺東街北抵景風延喜門入苑闊八尺深一丈渠成是日上幸安福門以觀之舊唐書卷十一代宗本紀十一摩尼寺元和二年正月庚子回紇請於河南府太原府置摩尼寺許之舊唐書卷十四憲宗本紀十四安國寺慈恩寺千福寺開業寺章敬寺元和十五年七月甲寅是日上幸安國寺觀於蘭盆壬戌盛飾安國慈恩千福開業章敬等寺縱吐蕃使者觀之舊唐書卷十六穆宗本紀十六章敬寺長慶元年七月辛酉太和長公主發赴回紇上以半仗御通化門臨送群臣班於章敬寺前舊唐書卷十六穆宗本紀十六禪智寺寶歷二年春正月丙申鹽鐵使王播奏揚州城內舊漕河水淺舟船澀滯輸不及期程今從閶門外古七里港開河向東屈曲取禪智寺橋東通舊官河計長一十九里其功役所費當使自方圓支遣從之舊唐書卷十七上敬宗紀上昭德寺大和二年十一月甲辰禁中巳時昭德寺火直宣政殿之東至午未間北風起火勢益甚至暮稍息舊唐書卷十七上文宗紀上昭德寺太和二年十一月宮中昭德寺火寺在宣政殿東隔垣火勢將及宰臣兩省京兆尹中尉樞密皆環立於日華門外令神策兵士救之晡後稍息舊唐書卷一百六十五溫造傳章敬寺神龍寺會昌三年三月太和公主至京師百官班於章敬寺迎謁仍令所司告憲宗穆宗二室六月西內神龍寺災舊唐書卷十八上武宗紀龍興寺文德元年四月魏博衙軍殺其帥樂彥禎於龍興寺又擊樂從訓敗之舊唐書卷二十上昭宗紀陟屺寺光化元年四月庚子上幸陟屺寺宴從官於韓建所獻御莊舊唐書卷二十上昭宗紀昭明寺天祐二年六月丙午全忠奏得宰相柳璨記事欲拆北邙山下玄元觀移入都內於清化坊取舊昭明寺基建置太微宮準備十月九日南郊行事緣延資庫鹽鐵並無物力令臣商量者臣已牒判六軍諸衛張全義指揮工作訖優詔嘉之舊唐書卷二十下哀帝紀寺觀鍾像盜鑄為錢乾元二年三月琦入為相乾元二年長安城中競為盜鑄寺觀鍾及銅像多壞為錢奸人豪族犯禁者不絕舊唐書卷四十八食貨志上就城宮寺廬舍多壞上元二年京師自七月霖雨八月盡方止京城宮寺廬舍多壞街市溝渠中漉得小魚永泰二年夏洛陽大雨水壞二十餘坊及寺觀廨舍舊唐書卷三十七五行志莊嚴寺佛圖家令寺大歷十年二月莊嚴寺佛圖災初有疾風震雷薄擊俄而火從佛圖中出寺僧數百人急救之乃止棟宇無損貞元七年蘇州火十九年四月家令寺火二十年四月開業寺火舊唐書卷三十七五行志經行寺塔太和八年六月癸未暴風雷雨壞長安縣廨及經行寺塔舊唐書卷三十七五行志慈善寺佛舍開成元年夏六月鳳翔麟游縣暴風雨飄害九成宮正殿及慈善寺佛舍壞百姓屋三百間死者百餘人牛馬不知其數舊唐書卷三十七五行志胡國寺大順二年七月汴州相國寺佛閣災是日晚微雨震電寺僧見赤塊在三門樓籐網中周繞一匝而火作良久赤塊北飛越前殿飛入佛閣網中如三門周繞轉而火作如是三日不息訖為灰燼舊唐書卷三十七五行志楊貴妃縊死於佛室及潼關失守楊貴妃從幸至馬嵬禁軍大將陳玄禮密啟太子誅國忠父子既而四軍不散玄宗遣力士宣問對曰賊本尚在蓋指貴妃也力士復奏帝不獲已與妃訣遂縊死於佛室時年三十八瘞於驛西道側舊唐書卷五十一后妃傳上石甕寺太后嘗幸驪山登石甕寺上命景王率禁軍侍從帝自於昭應奉迎遊豫行樂數日方還敬宗即位尊為太皇太后舊唐書卷五十二后妃傳下佛堂路天寶六載八月高仙芝虜勃律王及公主趣赤佛堂路班師舊唐書卷一百四高仙芝傳僧寺中椎牛釃酒嘗有賊剽掠涇陽縣界於僧寺中椎牛釃酒連夜酣飲去光遠營四十里崔光遠偵知之率馬步二千乙夜趨其所賊徒多醉光遠領百餘騎持滿扼其要分命驍勇持陌刀呼而斬之殺賊徒二千餘人虜馬千疋俘其渠酋一人賊中以光遠勇勁常避其鋒舊唐書卷一百一十一崔光遠傳香積寺郭晞子儀第三子從廣平王收復兩京晞力戰於香積寺陝西皆出奇兵克捷以功加銀青光祿大夫鴻臚卿舊唐書卷一百二十郭子儀傳附郭晞傳龍興寺後其大將周曾等謀襲汝州因回兵殺希烈奉真卿為節度事泄希烈殺曾等遂送真卿於龍興寺真卿度必死乃作遺表自為墓誌祭文常指寢室西壁下云吾殯所也舊唐書卷一百二十八顏真卿傳韓滉毀撤上元縣佛寺道觀四十餘所然自關中多難韓滉即於所部閉關梁築石頭五城自京口至玉山禁馬牛出境造樓船戰艦三十餘艘以舟師五千人由海門揚威武至申浦而還毀撤上元縣佛寺道觀四十餘所修塢壁建業抵京峴樓雉相屬以佛殿材於石頭城繕置館第數十時滉以國家多難恐有永嘉渡江之事以為備預以迎鑾駕亦申儆自守也以其所親吏盧復為宣州刺史採石軍使增營壘教習長兵以佛寺銅鐘鑄弩牙兵器陳少游時鎮揚州以甲士三千人臨江大閱滉亦以兵三千人臨金山與少游相應樓船於江中以金銀繒彩互相聘賚舊唐書卷一百二十九韓滉傳襄州佛寺被焚是時承宗師道之盜所在竊發焚襄州佛寺斬建陵門戟燒獻陵寢宮欲伏甲屠洛陽舊唐書卷一百四十二王武俊傳佛堂原高崇文其先渤海人貞元中隨韓全義鎮長武城治軍有聲五年夏吐蕃三萬寇寧州崇文率甲士三千救之戰於佛堂原大破之死者過半舊唐書卷一百五十一高崇文傳佛堂原吐蕃三萬寇寧州高崇文率兵三千往救戰佛堂原大破之封渤海郡王新唐書卷一百七十高崇文傳安國寺可及善音律尤能轉喉為新聲音辭曲折聽者忘倦嘗於安國寺作菩薩蠻舞如佛降生帝益憐之舊唐書卷一百七十七曹確傳大明寺光啟三年四月畢師鐸趨廣陵營於大明寺揚州大駭舊唐書卷一百八十二高駢傳寶壽佛寺高力士資產殷厚非王侯能擬於來庭坊造寶壽佛寺興寧坊造華封道士觀寶殿珍台侔於國力於京城西北截澧水作碾並轉五輪日碾麥三百斛初寶壽寺鍾成力士齋慶之舉朝畢至凡擊鍾者一擊百千有規其意者擊至二十杵少尚十杵舊唐書卷一百八十四宦官傳章敬寺興唐寺大歷二年朝恩獻通化門外賜莊為寺以資章敬太后冥福仍請以章敬為名復加興造窮極壯麗以城中材木不足充費乃奏壞曲江亭館華清宮觀樓及百司行廨將相沒官宅給其用土木之役僅逾萬億三年讓判國子監事加韓國公章敬太后忌日百僚於興唐寺行香朝恩置齋饌於寺外之車坊延宰臣百僚就食朝思恣口談時政公卿惕息舊唐書卷一百八十四宦官傳聖善寺許景先常州義興人後徙家洛陽少舉進士授夏陽尉神龍初東都起聖善寺報慈閣景先詣闕獻大像閣賦詞甚美麗擢拜左拾遺舊唐書卷一百九十中文苑中香積寺至德二載九月關內行營節度使王思禮為後軍屯於香積寺新唐書卷六代宗紀興唐寺永泰元年三月吐蕃請和遣宰相元載杜鴻漸等於興唐寺與之盟而罷舊唐書卷一百九十六上吐蕃傳上神龍寺會昌三年六月西內神龍寺火辛酉李德裕為司徒新唐書卷八武宗紀莊嚴寺浮圖家令寺大歷十年二月莊嚴寺浮圖災初有疾風震電俄而火從浮圖中出十九年四月家令寺火新唐書卷三十四五行志一昭德寺大和二年內昭德寺火延禁中野狐落野狐落者宮人所居也死者數百人新唐書卷九十一溫大雅傳唐安寺玄法寺開成元年閏五月丙戌烏集唐安寺逾月散雀集玄法寺燕集蕭望之塚新唐書卷三十四五行志一相國寺大順二年六月乙酉幽州市樓災延及數百步七月癸丑甲夜汴州相國寺佛閣災是日暮微雨震電或見有赤塊轉門譙籐網中周而火作頃之赤塊北飛轉佛閣籐網中亦周而火作新唐書卷三十四五行志一安國寺於時歲犯左執法術家又言竇懷貞且有禍大懼表請為安國寺奴不許逾年復同中書門下三品兼太子詹事監修國史新唐書卷一百九竇懷貞傳香積寺李嗣業為前軍元帥為中軍子儀副之王思禮為後軍陣香積寺之北距灃水臨大川彌亙一捨新唐書卷一百三十七郭子儀傳章敬寺明日孟涉屯白華尚可孤屯望仙門駱元光屯章敬寺李晟屯安國寺新唐書卷一百五十四李晟傳神龍佛祠帝又造神龍佛祠須材五十尺者延齡妄秦同州得大谷木數千章度皆八十尺帝曰吾聞開元時近山無巨木求之嵐勝間今何地之近材之良邪延齡曰異材瑰產處處有之待聖主乃出今生近輔豈開元所當得也帝悅新唐書卷一百六十七裴延齡傳福先寺留守裴度闢為判官度修福先寺將立碑求文於白居易湜怒曰近捨湜而遠取居易請從此辭度謝之湜即請鬥酒飲酣援筆立就度贈以車馬繒彩甚厚湜大怒曰自吾為顧況集序未常許人今碑字三千字三縑何遇我薄邪度笑曰不羈之才也從而酬之新唐書卷一百七十六韓愈傳慈恩寺懿宗誕日宴慈恩寺趙隱侍母以安輿臨觀宰相方率百官拜恩於廷即回班候夫人起居搢紳以為榮新唐書卷一百八十二趙隱傳惠琳佛祠李源八歲家覆俘為奴轉側民間及史朝義敗故吏識源於洛陽者贖出之歸其宗屬代宗聞授河南府參軍遷司農主簿以父死賊手常悲憤不仕不娶絕酒葷惠林佛祠者憕舊墅也源依祠居闔戶日一食祠殿其先寢也每過必趨未始踐階自營墓為終制時時偃臥埏中新唐書一百九十一忠義傳上附李源傳霽雲矢射佛寺浮圖霽雲抽矢回射佛寺浮圖矢著磚曰吾破賊還必滅賀蘭此矢所以志也新唐書卷一百九十二忠義傳中附霽雲傳瑤台佛寺會昭陵寢宮為原火延燔而客祭瑤台佛寺又故宮在山上乏水泉作者憚勞欲即行宮作寢詔宰相百官議新唐書卷二百儒學傳下相國寺汴有相國寺或傳佛軀汗流劉玄佐自往大施金帛於是將吏商賈奔走輸金錢惟恐後十日玄佐敕止籍所入得巨萬因以贍軍其權譎類若此新唐書卷二百一十四劉玄佐傳香積寺帝乃詔廣平王為元帥使懷恩統回紇兵從王戰香積寺北新唐書卷二百二十四上判臣傳上附僕固懷恩傳改耀州報恩禪院為興國寺開平元年六月改耀州報恩禪院為興國寺舊五代史卷三太祖本紀三大梁萬歲之寺開平三年十二月乙丑臘福建節度使王審知奏捨錢造寺一所請賜寺額敕名大梁萬歲之寺仍許度僧四十九人舊五代史卷五太祖本紀五湖南開元寺開平四年正月壬辰朔壬寅幸保寧球場錫宴宰臣及文武百官賜湖南開元寺禪長老可復號惠光大師仍賜紫衣舊五代史卷五太祖本紀五封禪寺中和四年五月是月班師過汴汴帥迎勞於封禪寺請武皇休於府第乃以從官三百人及監軍使陳景思館於上源驛舊五代史卷二十五武皇紀上龍興寺光啟末彥貞子從訓驕盈太橫招聚兵甲欲誅牙軍牙軍怒聚噪攻之從訓出據相州牙軍廢彥貞囚於龍興寺逼令為僧尋殺之推小校趙文建為留後舊五代史卷卷十四列傳四敬愛寺光啟二年明年冬時經保敬愛寺罕之保苑中飛龍廄罕之激勵其眾攻敬愛寺數日因風縱火盡燔之經眾奔竄追斬殆盡舊五代史十五列傳五開元寺天祐十九年春正月甲午莊宗帝至定州王都迎謁是夜宿於開元寺舊五代史卷二十九莊宗紀三廣化寺乾化元年四月丁卯太祖幸龍虎門召宰臣學士金吾上將軍大將軍待宴廣化寺舊五代史卷六太祖本紀六天宮佛寺廣化寺乾化元年六月乙卯太祖詔修天宮佛寺又湖南奏潭州僧法思桂州僧歸真並乞賜紫衣從之乾化元年八月庚申丙子閱四蕃將軍屯衛兵士於天津橋南至龍門廣化寺舊五代史卷六太祖本紀六封禪寺太祖擊蔡賊於板橋赤缸酸棗門封禪寺枯河北牛存節皆預其行舊五代史卷二十二牛存節傳封禪寺明宗帝先至汴州攻封丘門汴將王瓚開門迎降帝至建國門聞梁主已殂乃號令安撫回軍於封禪寺舊五代史卷三十五明宗紀一寶壽佛寺景福二年春匡威帥精騎數萬再來赴援會匡威弟匡儔奪據兄位匡威退無歸路鎔乃延入府第館於寶壽佛寺舊五代史卷五十四列傳六梁主屍權厝於佛寺及王師襲汴時王瓚為開封府尹梁主聞王師將至自登建國門樓日夜垂泣時持國寶謂瓚曰吾終保有此者繫卿耳令瓚閱市人散徒登城為備洎明宗至封丘門瓚開門迎降翌日莊宗御玄德殿瓚與百官待罪及進幣馬詔釋之仍令收梁主屍備槥櫝權厝於佛寺漆首函送於郊社舊五代史卷五十九列傳十一聖善寺無畏師塔龍門廣化寺光啟初諸葛爽爽卒其子仲方為留後部將劉經與李罕之爭據洛陽罕之敗經於聖善寺乘勝欲攻河陽營於洛口案洛陽搢紳舊聞記齊王張令公王誠信每水旱祈祭必具湯沐素食別寢至祠祭所儼然若對至尊容如不足遇旱祈禱未雨左右必曰王可開塔即無畏師塔也在龍門廣化寺王即依言而開塔未嘗不澍雨故當時俚諺云王禱雨買雨具舊五代史卷六十三列傳十五塔廟封舜卿從子翹於梁貞明中亦為翰林學士冊府元龜卷七百七十一天成中為給事中因轉對上言以星辰合度風雨應時請御前香一合帝親爇一炷餘令於塔廟中焚之貴表精至議者以翹時推名族而忽有此請乃近諸妖佞耳物望由是減之舊五代史卷六十八列傳二十晉陽千佛院同光四年四月六日翌日符彥超誅呂鄭軍城大亂燔剽達曙憲初聞有變出奔沂州既而有司糾其委城之罪四月二十四日賜死於晉陽之千佛院舊五代史卷六十九列傳二十一封禪寺長興八年劉處讓從駕歸汴寄居於封禪寺遇疾而卒年六十三贈太尉再贈太師舊五代史卷九十四列傳九附劉處讓傳龍門廣化寺清泰二年及晉高祖入洛劉延皓逃匿龍門廣化寺數日自經而死舊五代史卷六十九列傳二十一開晉禪院廣法禪院天福三年十二月甲戌朔戊子以河陽潛龍舊宅為開晉禪院邢州潛龍舊宅為廣法禪院舊五代史卷七十七高祖本紀三斛律寺武皇偽戮罪人首級以奉詔張匿承業於斛律寺昭宗遇弒乃復請為監軍舊五代史卷七十二列傳二十四封禪寺天福十二年春正月癸巳晉少帝蒙塵於封禪寺舊五代史卷九十九高祖紀上龍興寺韓惲字子重太原晉陽人天福七年夏車駕在鄴惲病腳氣卒於龍興寺時年六十餘舊五代史卷九十二列傳七封禪寺崔廷勳不知何許人也形貌魁偉美鬚髯幼陷契丹歷偽命雲州節度使官至待中契丹入汴遷少帝於封禪寺遣廷勳以兵防守尋授河陽節度使甚得民情舊五代史卷九十八列傳十三附崔廷勳傳柏谷寺顯德元年夏四月丁巳世宗幸柏谷寺舊五代史卷一百一十四世宗紀一皇建禪院顯德元年九月壬申朔以東京舊宅皇建禪院舊五代史卷一百一十四世宗紀一天清寺天壽寺顯靜寺顯寧寺顯德四年冬十月丙辰賜京城內新修四寺額以天清天壽顯靜顯寧為名舊五代史卷一百一十七世宗紀四孝先寺碑顯德五年九月江南進奉使商崇儀代李景捧壽觴以獻案宋類苑云湯悅父殷舉唐末有才名本名崇義建隆初避宣祖諱改姓湯初在吳為舍人受詔撰揚州孝先寺碑世宗親征駐蹕此寺讀其文賞歎及畫江議定後主遣悅入貢世宗為之加禮舊五代史卷一百一十八世宗紀五皇建寺貴妃張氏恆州真定人也漢隱帝末蕭牆變起屠害大臣太祖在鄴都被讒妃與諸皇屬同日遇害於東京舊第太祖踐祚追冊為貴妃發哀故世宗有起復之命世宗嗣位以太祖舊宅即妃遇禍之地因施為僧院以皇建為名焉舊五代史卷一百二十一后妃列傳一開元寺王殷瀛州人殷自言生於魏州之開元寺既長從軍漸為偏將舊五代史卷一百二十四列傳四附王殷傳鄴城寺廣順三年是歲春末鄴城寺鍾懸絕而落又火光出幡竿之上殷之入覲也都人餞於離亭上馬失鐙翻墜於地