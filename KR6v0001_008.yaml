body:
  text: 八經籍法寶連璧太宗幼而敏睿識悟過人六歲便屬文博綜儒書善言玄理所著昭明太子傳五卷諸王傳三十卷禮大義二十卷老子義二十卷莊子義二十卷長春義記一百卷法寶連璧三百卷並行於世焉梁書卷四簡文帝紀佛性論七經論蘇綽又著佛性論七經論並行於世周書卷二十三蘇綽傳華林園總集釋典元微元年祕書丞王儉又造目録儉又別撰七志一曰經典志紀六藝小學史記雜傳二曰諸子志紀今古諸子三曰文翰志紀詩賦四曰軍書志紀兵書五曰陰陽志紀陰陽圖緯六曰術藝志紀方技七曰圖譜志紀地域及圖書其道佛附見合九條然亦不述作者之意但於書名之下每立一傳而又作九篇條例編乎首卷之中文義淺近未為典則齊永明中祕書丞王亮監謝朏又造四部書目大凡一萬八千一十卷齊末兵火延燒祕閣經籍遺散梁初祕書監任昉躬加部集又於文德殿內列藏衆書華林園中總集釋典大凡二萬三千一百六卷而釋氏不豫焉梁有祕書監任昉殷鈞四部目録又文德殿目録其術數之書更為一部使奉朝請祖暅撰其名故梁有五部目録普通中有處士阮孝緒沉靜寡欲篤好墳史博采宋齊已來王公之家凡有書記參校官簿更為七録一曰經典録紀六藝二曰記傳録紀史傳三曰子兵録紀子書兵書四曰文集録紀詩賦五曰技術録紀數術六曰佛録七曰道録其分部題目頗有次序割析辭義淺薄不經梁武敦悅詩書下化其上四境之內家有文史元帝克平侯景收文德之書及公私經籍歸於江陵大凡七萬餘卷周師入郢咸自焚之陳天嘉中又更鳩集考其篇目遺闕尚多隋書卷三十二經籍志一道佛經目録煬帝即位又於內道場集道佛經別撰目録隋書卷三十二經籍志一梁釋法通乾坤義周易乾坤義一卷齊步兵校尉劉瓛撰梁又有齊臨沂令李玉之梁釋法通等乾坤義各一卷亡隋書卷三十二經籍志一陳沙門智匠撰古今樂録古今樂録十二卷陳沙門智匠撰樂元一卷魏僧撰當管七聲二卷魏僧撰隋書卷三十二經籍志一釋慧始注孝經釋慧始注孝經一卷隋書卷三十二經籍志一釋僧智論語略解釋僧智論語略解隋書卷三十二經籍志一釋靜洪撰韻英韻英三卷釋靜洪撰隋書卷三十二經籍志一釋正度撰雜體書雜體書九卷釋正度撰隋書卷三十二經籍志一婆羅門書自後漢佛法行於中國又得西域胡書能以十四字貫一切音文省而義廣謂之婆羅門書與八體六文之義殊別今取以附體勢之下隋書卷三十二經籍志一釋撰天正舊事天正舊事三卷釋撰亡名隋書卷三十三經籍志二僧家書儀僧家書儀五卷釋曇瑗撰隋書卷三十三經籍志二虞孝敬高僧傳高僧傳六卷虞孝敬撰隋書卷三十三經籍志二釋寶唱名僧傳等十一種名僧傳三十卷釋寶唱撰高僧傳十四卷釋慧皎撰江東名德傳三卷釋法進撰法師傳十卷王巾撰衆僧傳二十卷裴子野撰薩婆多部傳五卷釋僧佑撰梁故草堂法師傳一卷尼傳二卷釋寶唱撰法顯傳二卷法顯行傳一卷梁武皇帝大捨三卷嚴皓撰隋書卷三十三經籍志二王琰冥祥記等四種冥祥記十卷王琰撰續齊諧記一卷吳均撰幽明録二十卷劉義度撰舍利感應記三卷王劭撰隋書卷三十三經籍志二法顯佛國記等十種佛國記一卷沙門釋法顯撰遊行外國傳一卷沙門釋智猛撰隋書卷三十三經籍志二廬山南陵雲精舍記一卷洛陽伽藍記五卷後魏楊衒之撰四海百川水源記一卷釋道安撰京師寺塔記十卷録一卷劉璆撰京師寺塔記二卷釋曇宗撰外國傳五卷釋曇景撰歷國傳二卷釋法盛撰慧生行傳一卷隋書卷三十三經籍志二釋僧祐世界記世界記五卷釋僧祐撰大隋翻經婆羅門法師外國傳五卷隋書卷三十三經籍志二釋惠琳釋惠嚴注老子道德經老子道德經二卷劉仲融注老子道德經二卷釋惠琳注老子道德經二卷釋惠嚴注隋書卷三十四經籍志三釋慧觀撰老子義疏老子義疏一卷顧歡撰梁有老子義疏一卷釋慧觀撰亡隋書卷三十四經籍志三釋氏譜等六種釋氏譜十五卷內典博要三十卷淨住子二十卷齊竟陵王蕭子良撰因果記十卷歷代三寶記三卷費長房撰真言要集十卷隋書卷三十四經籍志三蕭子良義記等七種義記二十卷蕭子良撰感應傳八卷宋尚書郎王延秀撰衆僧傳二十卷裴子野撰高僧傳六卷虞孝敬撰皇帝菩薩清淨大捨記三卷謝吳撰亡寶台四法藏目録一百卷大業中撰玄門寶海一百二十卷大業中撰隋書卷三十四經籍志三摩登伽經說星圖摩登伽經說星圖一卷隋書卷三十四經籍志三婆羅門算法等三種婆羅門算法三卷婆羅門陰陽算歷一卷婆羅門算經三卷隋書卷三十四經籍志三釋智海撰陽遁甲陽遁甲九卷釋智海撰隋書卷三十四經籍志三釋道洪寒食散對療等六種寒食散對療一卷釋道洪撰解寒食散方二卷釋智斌撰梁解散論二卷解寒食散論二卷釋慧義寒食解雜論七卷亡雜散方八卷解釋慧義解散方一卷亡隋書卷三十四經籍志三釋僧舉世藥方范東陽方一百五卷録一卷范汪撰梁一百七十六卷梁又有釋僧深藥方三十卷陶氏效驗方六卷梁又有摩訶出胡國方十卷摩訶胡沙門撰隋書卷三十四經籍志三沙門行矩撰諸藥異名諸藥異名八卷沙門行矩撰本十卷今闕隋書卷三十四經籍志三釋莫滿撰單復要驗方單復要驗方二卷釋莫滿撰釋道洪方一卷療百病雜丸方三卷釋曇鸞撰論氣治療方一卷釋曇鸞撰釋僧匡針灸經一卷龍樹菩薩藥方四卷隋書卷三十四經籍志三婆羅門藥方等四種婆羅門藥方五卷耆婆所述仙人命論方二卷乾陀利治鬼方十卷新録乾陀利治鬼方四卷本五卷闕隋書卷三十四經籍志三釋道騫傳楚辭後漢校書郎王逸集屈原已下迄於劉向逸又自為一篇並敘而注之今行於世隋時有釋道騫善讀之能為楚聲音韻清切至今傳楚辭者皆祖騫公之音隋書卷三十五經籍志四支遁集晉沙門支遁集八卷梁十三卷又有劉彧集十六卷亡隋書卷三十五經籍志四支曇集等四種晉沙門支曇諦集六卷晉沙門釋惠遠集十二卷晉姚萇沙門釋僧肇集一卷隋書卷三十五經籍志四宋沙門釋惠琳集五卷梁九卷録一卷隋書卷三十五經籍志四梁武帝淨業賦梁武帝淨業賦三卷隋書卷三十五經籍志四釋亡名集釋標集等七種後周沙門釋亡名集十卷陳沙門釋標集二卷陳沙門釋洪偃集八卷陳沙門釋瑗集六卷陳沙門釋靈裕集四卷陳沙門策上人集五卷陳沙門釋皓集六卷隋書卷三十五經籍志四陸少玄撰借像雜銘僧祐撰針器雜銘古今針銘集十四卷張湛撰録一卷又陸少玄撰佛像雜銘十三卷釋僧祐撰針器雜銘五卷亡隋書卷三十五經籍志四謝莊撰釋氏碑文等雜碑集二十二卷梁有碑集十卷謝莊撰釋氏碑文三十卷梁元帝撰雜碑二十二卷碑文十五卷晉將作大匠陳協撰諸寺碑文四十六卷釋僧祐撰雜祭文六卷衆僧行狀四十卷釋僧佑撰亡隋書卷三十五經籍志四釋寶唱撰法集法集百七卷梁沙門釋寶唱撰隋書卷三十五經籍志四道經說天地論壞等略與佛經同道經者云有元始天尊生於太元之先稟自然之氣沖虛凝遠莫知其極所以說天地淪壞劫數終盡略與佛經同以為天尊之體常存不滅隋書卷三十五經籍志四隋書經籍志論佛籍始末後周承魏崇奉道法每帝受菉如魏之舊尋與佛法俱滅開皇初又興高祖雅信佛法於道士蔑如也大乘經六百一十七部二千七十六卷五百五十八部一千六百九十七卷經五十九部三百七十九卷疏小乘經四百八十七部八百五十二卷雜經三百八十部七百一十六卷雜經目殘缺甚見數如此雜疑經一百七十二部三百三十六卷大乘律五十二部九十一卷小乘律八十部四百七十二卷七十七部四百九十卷律二部二十三卷講疏雜律二十七部四十六卷大乘論三十五部一百四十一卷三十部九十四卷論十五部四十七卷疏小乘論四十一部五百六十七卷二十一部四百九十一卷論十部七十六卷講疏雜論五十一部四百三十七卷三十二部二百九十九卷論九部一百三十八卷講疏記二十部四百六十四卷右一千九百五十部六千一百九十八卷佛經者西域天竺之迦維衛國淨飯王太子釋迦牟尼所說釋迦當周莊王之九年四月八日自母右脅而生姿貌奇異有三十二相八十二好捨太子位出家學道勤行精進覺悟一切種智而謂之佛亦曰佛陀亦曰浮屠皆胡言也華言譯之為淨覺其所說云人身雖有生死之異至於精神則恆不滅此身之前則經無量身矣積而修習精神清淨則成佛道天地之外四維上下更有天地亦無終極然皆有成有敗一成一敗謂之一劫自此天地已前則有無量劫矣每劫必有諸佛得道出世教化其數不同今此劫中當有千佛自初至於釋迦已七佛矣其次當有彌勒出世必經三會演說法藏開度衆生由其道者有四等之果一曰須阤洹二曰斯阤含三曰阿那含四曰阿羅漢至羅漢者則出入生死去來隱顯而不為纍阿羅漢已上至菩薩者深見佛性以至成道每佛滅度遺法相傳有正象末三等淳醨之異年歲遠近亦各不同末法已後衆生愚鈍無復佛教而業行轉惡年壽漸短經數百千載間乃至朝生夕死然後有大水大火大風之災一切除去之而更立生人又歸淳朴謂之小劫每一小劫則一佛出世初天竺中多諸外道並事水火毒龍而善諸變幻釋迦之苦行也是諸邪道並來嬲惱以亂其心而不能得及佛道成盡皆摧伏並為弟子弟子男曰桑門譯言息心而總曰僧譯言行乞女曰比丘尼皆剃落鬚髮釋纍辭家相與和居治心修淨行乞以自資而防心攝行僧至二百五十戒尼五百戒俗人信憑佛法者男曰優婆塞女曰優婆夷皆去殺盜淫妄言飲酒是為五誡釋迦在世教化四十九年乃至天龍人鬼並來聽法弟子得道以百千萬億數然後於拘尸那城娑羅雙樹間以二月十五日入般涅槃涅槃亦曰泥洹譯言滅度亦言常樂我淨初釋迦說法以人之性識根業各差故有大乘小乘之說至是謝世弟子大迦葉與阿難等五百人追共撰述綴以文字集載為十二部後數百年有羅漢菩薩相繼著論贊明其義然佛所說我滅度後正法五百年像法一千年未法三千年其義如此推尋典籍自漢已上中國未傳或云久以流布遭秦之世所以堙滅其後張騫使西域蓋聞有浮屠之教哀帝時博士弟子秦景使伊存口授浮屠經中土聞之未之信也後漢明帝夜夢金人飛行殿庭以問於朝而傅毅以佛對帝遣郎中蔡愔及秦景使天竺求之得佛經四十二章及釋迦立像並與沙門攝摩騰竺法蘭東還愔之來也以白馬負經因立白馬寺於洛城雍門西以處之其經緘於蘭台石室而又畫像於清涼台及顯節陵上章帝時楚王英以崇敬佛法聞西域沙門繼佛經而至者甚衆永平中法蘭又譯十住經其餘傳譯多未能通至桓帝時有安息國沙門安靜繼經至洛翻譯最為通解靈帝時有月支沙門支讖天竺沙門竺佛朔等並翻佛經而支讖所譯泥洹經二卷學者以為大得本旨漢末太守竺融亦崇佛法三國時有西域沙門康僧會繼佛經至吳譯之吳主孫權甚大敬信魏黃初中中國人始依佛戒剃髮為僧先是西域沙門來此譯小品經首尾乖舛未能通解甘露中有朱仕行者往西域至於闐國得經九十章晉元康中至鄴譯之題曰放光般若經太始中有月支沙門竺法護西遊諸國大得佛經至洛翻譯部數甚多佛教東流自此而盛石勒時常山沙門衛道安性聰敏誦經日至萬餘言以胡僧所譯維摩法華未盡深旨精思十年心了神悟乃正其乖舛宣揚解釋時中國紛擾四方隔絶道安乃率門徒南遊新野欲令玄宗所在流布分遣弟子各趨諸方法性詣揚州法和入蜀道安與慧遠之襄陽後至長安苻堅甚敬之道安素聞天竺沙門鳩摩羅什思通法門勸堅致之什亦聞安令問遙拜致敬姚萇弘始二年羅什至長安時道安卒後已二十載矣什深慨恨什之來也大譯經論道安所正與什所譯義如一初無乖舛初晉元熙中新豐沙門智猛策杖西行至華氏城得泥洹經及僧祗律東至高昌譯泥洹為二十卷後有天竺沙門曇摩羅讖復繼胡本來至河西沮渠蒙遜遣使至高昌取猛本欲相參驗未還而蒙遜破滅姚萇弘始十年猛本始至長安譯為三十卷曇摩羅讖又譯金光明等經時胡僧至長安者數十輩惟鳩摩羅什才德最優其所譯則維摩法華成實論等諸經及曇無懺所譯金光明曇摩羅懺所譯泥洹等經並為大乘之學而什又譯十誦律天竺沙門佛陀耶舍譯長阿含經及四方律兜佉勒沙門曇摩難提譯增一阿含經曇摩耶舍譯阿毗曇論並為小乘之學其餘經論不可勝記自是佛法流通極於四海矣東晉隆安中又有罽賓沙門僧伽提婆譯增一阿含經及中阿含經義熙中沙門支法領從于闐國得華嚴經三萬六千偈至金陵宣譯又有沙門法顯自長安游天竺經三十餘國隨有經律之處學其書語譯而寫之還至金陵與天竺禪師跋羅參共辨定謂僧祇律學者傳之齊梁及陳並有外國沙門然所宣譯無大名部可為法門者梁武大崇佛法於華林園中總集釋氏經典凡五千四百卷沙門寶唱撰經目録又後魏時太武帝西征長安以沙門多違佛律群聚穢亂乃詔有司盡坑殺之焚破佛像長安僧徒一時殲滅自餘征鎮豫聞詔書亡匿得免者十一二文成之世又使修復熙平中遣沙門慧生使西域采諸經律得一百七十部永平中又有天竺沙門菩提留支大譯佛經與羅什相埒其地持十地論並為大乘學者所重後齊遷鄴佛法不改至周武帝時蜀郡沙門衛元嵩上書稱僧徒猥濫武帝出詔一切廢毀開皇元年高祖普詔天下任聽出家仍令計口出錢營造經像而京師及并州相州洛州等諸大都邑之處並官寫一切經置於寺內而又別寫藏于祕閣天下之人從風而靡竟相景慕民間佛經多於六經數十百倍大業時又令沙門智果於東都內道場撰諸經目分別條貫以佛所說經為三部一曰大乘二曰小乘三曰雜經其餘似後人假托為之者別為一部謂之疑經又有菩薩及諸深解奧義贊明佛理者名之為論及戒律並有大小及中三部之別又所學者録其當時行事名之為記凡十一種今舉其大數列於此篇右道佛經二千三百二十九部七千四百一十四卷道佛者方外之教聖人之遠致也俗士為之不通其指多離以迂怪假托變幻亂於世斯所以為弊也故中庸之教是所罕言然亦不可誣也故録其大綱附於四部之末大凡經傳存亡及道佛六千五百二十部五萬六千八百八十一卷隋書卷三十五經籍志四明克讓著續名僧記明克讓著孝經義疏一部古今帝代記一卷文類四卷續名僧記一卷集二十卷隋書卷五十八明克讓傳柳䛒撰法華玄宗以其好內典令撰法華玄宗為二十卷奏之太子覽而大悅賞賜優洽儕輩莫與為比隋書卷五十八柳䛒傳蕭綱著內典博要梁帝蕭綱著孝德傳忠臣傳各三十卷周易講疏十卷內典博要百卷南史卷八梁本紀下八源賀作祇洹精舍圖偈隴西王源賀采佛經幽旨作祇洹精舍圖偈六卷趙柔為之注解為當時俊僧所欽味又憑立銘贊頗行於世杜按北史趙柔傳大同故不録北史卷三十四趙柔傳魏收釋老志一卷十一月復奏十志天象四卷地形三卷律歷二卷禮樂四卷食貨一卷刑罰一卷靈征二卷官氏二卷釋老一卷凡二十卷北史卷五十六魏收傳蕭俯等譯大乘本生心地觀音經六年春正月丙寅朔敕諫議大夫孟簡給事中劉伯芻工部侍郎歸登右補闕蕭俯等於豐泉寺翻譯大乘本生心地觀音經舊唐書卷十四憲宗紀上改三教珠英為海內珠英冬十月辛卯朔詔改天后所撰三教珠英為海內珠英舊唐書卷十七下文宗紀下帝王政纂內容下至僧道是非太子詹事姚康獻帝王政纂十卷又撰統史三百卷上自開闢下盡隋朝帝王美政詔令制置銅鹽錢谷損益用兵利害下至僧道是非無不備載編年為之舊唐書卷十八下宣宗紀僧曇延進大乘百法門明論七月沙州節度使張義潮進甘峻山青骹鷹四聯延慶節馬二匹吐蕃女子二人僧曇延進大乘百法門明論等舊唐書卷十九上懿宗紀開元內外經録其外有釋氏經律論疏道家經戒符菉凡二千五百餘部九千五百餘卷亦具翻譯名氏序述指歸又勒成目録十卷名曰開元內外經録若夫先王祕傳列代奧文自古之粹籍靈符絶域之神經怪牒盡載於此二書矣舊唐書卷四十六經籍志上釋道録目煚等四部目及釋道目並有小序及注撰人姓氏卷軸繁多今並略之但紀篇部以表我朝文物之大共釋道録目附本書今亦不取據開元經籍為之志舊唐書卷四十六經籍志上虞孝敬撰高僧傳等十八種高僧傳六卷虞孝敬撰名僧傳三十卷釋寶唱撰比丘尼傳四卷釋寶唱撰高僧傳十四卷釋惠皎撰續高僧傳二十卷釋道宣撰續高僧傳三十卷釋道宣撰西域求法高僧傳二卷釋義淨撰名僧録十五卷裴子野撰薩婆多部傳四卷釋僧佑撰草堂法師傳一卷陶弘景撰又一卷蕭理撰稠禪師傳一卷幽明録三十卷劉義慶撰感應傳八卷王延秀撰冥祥記十卷王琰撰續冥祥記十一卷王曼穎撰繫應驗記一卷陸果撰神録五卷劉之遴撰冥報記二卷唐臨撰舊唐書卷四十六經籍志上洛陽伽藍記洛陽伽藍記五卷楊衒之撰舊唐書卷四十六經籍志上中天竺國行記中天竺國行記十卷王玄策撰舊唐書卷四十六經籍志上鳩摩羅什注老