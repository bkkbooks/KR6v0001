body:
  text: 四議論漢桓帝設華蓋以祠浮圖前史稱桓帝好音樂善琴笙飾芳林而考濯龍之宮設華蓋以祠浮圖老子斯將所謂聽於神乎及誅梁冀奮威怒天下猶企其休息而五邪嗣虐流衍四方自非忠賢力爭屢折姦鋒雖原依斟流彘亦不可得已後漢書卷七孝桓帝紀總論宮中立黃老浮屠之祠臣又聞宮中立黃老浮屠之祠此道清虛貴尚無為好生惡殺省欲去奢今陛下嗜欲不去殺罰過理既乖其道豈獲其祚哉或言老子入夷狄為浮屠浮屠不三宿桑下不欲久生恩愛精之至也天神遺以好女浮屠曰此但革囊盛血遂不眄之其守一如此乃能成道今陛下淫女艷婦極天下之麗甘肥飲美單天下之味奈何欲如黃老乎後漢書卷三十下襄楷傳佛道神化興自身毒西域風土之載前古未聞也漢世張騫懷致遠之略班超奮封侯之志終能立功西遐羈服外域自兵威之所肅服財賂之所懷誘莫不獻方奇納愛質露頂肘行東向而朝天子故設戊己之官分任其事建都護之帥總領其權先馴則賞籯金而賜龜綬後服則繫頭顙而釁北闕立屯田於膏腴之野列郵置於要害之路馳命走驛不絶於時月商胡販客日款於塞下其後甘英乃抵條支而歷安息臨西海以望大秦拒玉門陽關者四萬餘里靡不周盡焉若其境俗性智之優薄産載物類之區品川河領障之基源氣節涼暑之通隔梯山棧谷繩行沙度之道身熱首痛風災鬼難之域莫不備寫情形審求根實至於佛道神化興自身毒而二漢方志莫有稱焉張騫但著地多暑濕乘象而戰班勇雖列其奉浮圖不殺伐而精文善法導達之功靡所傳述余聞之後説也其國則殷乎中土玉燭和氣靈聖之所降集賢懿之所挺生神迹詭怪則理絶人區感驗明顯則事出天外而騫超無聞者豈其道閉往運數開叔葉乎不然何誣異之甚也漢自楚英始盛齋戒之祀桓帝又修華蓋之飾將微義未譯而但神明之邪詳其清心釋纍之訓空有兼遣之宗道書之流也且好仁惡殺蠲敝崇善所以賢達君子多愛其法焉然好大不經奇譎無已雖鄒衍談天之辨莊周蝸角之論尚未足以概其萬一又精靈起滅因報相尋若曉而昧者故通人多惑焉蓋導俗無方適物異會取諸同歸措夫疑説則大道通矣後漢書卷八十八西域傳後論先帝手畫佛像彭城王紘上言樂賢堂有先帝手畫佛像經歷寇難而此堂猶存宜敕作頌帝下其議蔡謨曰佛者夷狄之俗非經典之制先帝量同天地多才多藝聊因臨時而畫此象至於雅好佛道所未承聞也盜賊奔突王都隳敗而此堂塊然獨存斯誠神靈保祚之征然未是大晉盛德之形容歌頌之所先也人臣睹物興義私作賦頌可也今欲發王命敕史官上稱先帝好佛之志下為夷狄作一象之頌於義有疑焉於是遂寢晉書卷七十七蔡謨傳佛神去之胡必亡矣呂光又進攻龜茲城夜夢金象飛越城外呂光曰此謂佛神去之胡必亡矣晉書卷一百二十二呂光載記呂纂與羅會奕棋道士句摩羅耆婆言於纂曰潛龍屢出豕犬見妖將有下人謀上之禍宜增修德政以答天戒纂納之耆婆即羅什之別名也初纂嘗與鳩摩羅什棋殺羅什子曰斫胡奴頭羅什曰不斫胡奴頭胡奴斫人頭超小字胡奴竟以殺纂纂在位三年以元興元年死晉書卷一百二十二呂纂載記釋氏流教其來有源自釋氏流教其來有源淵檢精測固非深矣舒引容潤既亦廣矣然習慧者日替其修束誡者月繁其過遂至糜散錦帛侈飾車從復假精醫術托雜卜數延姝滿室置酒浹堂寄夫托妻者不無殺子乞兒者繼有而猶倚靈假像背親傲君欺費疾老震損宮邑是乃外刑之所不容戮內教之所不悔罪而橫天地之間莫之糾察人不得然豈其鬼歟今宜申嚴佛律裨重國令其疵惡顯著者悉皆罷遣餘則隨其藝行各為之條使禪義經誦人能其一食不過蔬衣不出布若應更度者則令先習義行本其神心必能草腐人天竦精以往者雖侯王家子亦不宜拘宋書卷八十二周朗傳寺衆既立自宣悉供僧衆蕭慧開丁父艱居喪有孝性家素事佛凡為父起四寺南岸南岡下名曰禪岡寺曲阿舊鄉宅名曰禪鄉寺京口墓亭名曰禪亭寺所封封陽縣名曰禪封寺謂國僚曰封秩蓋鮮而兄弟甚多若使全關一人則在我所讓若使人人等分又事可悲恥寺衆既立自宜悉供僧衆由此國秩不復下均宋書卷八十七蕭慧開傳國王月愛遣使奉表天竺迦毗黎國元嘉五年國王月愛遣使奉表曰伏聞彼國據江傍海山川周固衆妙悉備莊嚴清淨猶如化城宮殿莊嚴街巷平坦人民充滿歡娛安樂聖王出遊四海隨從聖明仁愛不害衆生萬邦歸仰國富如海國中衆生奉順正法大王仁聖化之以道慈施群生無所遺惜帝修淨戒軌道不及無上法船濟諸沈溺群僚百官受樂無怨諸天擁護萬神侍衛天魔降伏莫不歸化王身端嚴如日初出仁澤普潤猶如大雲聖賢承業如日月天於彼真丹最為殊勝臣之所住名迦毗河東附於海其城四邊悉紫紺石首羅天護令國安隱國王相承未嘗斷絶國中人民率皆修善諸國來集共遵道法諸寺舍中皆七寶形像衆妙供具如先王法臣自修檢不犯道禁臣名月愛棄世王種惟願大王聖體和善群臣百官悉自安隱今以此國群臣吏民山川珍寶一切歸屬五體歸誠大王足下山海遐隔無由朝覲宗仰之至遣使下承使主父名天魔悉達使主名尼陀達此人由來良善忠信是故今遣奉使表誠大王若有所須珍奇異物悉當奉送此之境土便是王國王之法令治國善道悉當承用願二國信使往來不絶此反使還願賜一使具宣聖命備敕所宜款至之誠望不空反所白如是願加哀憫奉獻金剛指環摩勒金環諸寶物赤白鸚鵡各一頭太宗泰始二年又遣使貢獻以其使主竺扶大竺阿彌並為建威將軍元嘉十八年蘇摩黎國王那鄰那羅跋摩遣使獻方物世祖孝建二年斤陀利國王釋婆羅那鄰陀遣長史竺留陀及多獻金銀寶器後廢帝元徽元年婆黎國遣使貢獻凡此諸國皆事佛道佛道自後漢明帝法始東流自此以來其教稍廣自帝王至於民庶莫不歸心經誥充積訓義深遠別為一家之學焉元嘉十二年丹陽尹蕭摹之奏曰佛化被於中國已歷四代形像塔寺所在千數進可以繫心退足以招勸而自頃以來情敬浮末不以精誠為至更以奢競為重舊宇頽弛曾莫之修而各務造新以相姱尚甲第顯宅於茲殆盡材竹銅彩糜損無極無關神祇有纍人事建中越制宜加裁檢不為之防流遁未息請自今以後有欲鑄銅像者悉詣台自聞興造塔寺精舍皆先詣在所二千石通辭郡依事列言本州須許報然後就功其有輒造寺舍者皆依不承用詔書律銅宅林苑悉沒入官詔可又沙汰沙門罷道者數百人世祖大明二年有曇標道人與羌人高闍謀反上因是下詔曰佛法訛替沙門混雜未足扶濟鴻教而專成逋藪如姦心頻發凶關屢聞敗亂風俗人神交怨可付所在精加沙汰後有違犯嚴加誅坐於是設諸條禁自非戒行精苦並使還俗而諸寺尼出入宮掖交關妃后此制竟不能行先是晉世庾冰始創議俗使沙門敬王者後桓玄復述其義並不果行大明六年世祖使有司奏曰臣聞邃宇崇居非期宏峻拳跪槃伏非止敬恭將以施張四維締制八宇故雖儒法枝派名墨條分至於崇親嚴上厥繇靡爽唯浮圖為教逖自龍堆反經提傳訓遐事遠練生瑩識恆俗稱難宗旨緬謝微言淪隔拘文蔽道在末彌扇遂乃陵越典度偃倨尊戚失隨方之眇迹迷制化之淵義夫佛法以謙儉自牧忠虔為道不輕比丘遭人斯拜目連桑門遇長則禮寧有屈膝四輩而簡禮二親稽顙耆臘而直體萬乘者哉故咸康創議元興載述而事屈偏黨道挫餘分今鴻源遙洗群流仰鏡九仙盡寶百神聳職而畿輦之內舍弗臣之氓陛席之間延抗禮之客懼非所以澄一風範詳示景則者也臣等參議以為沙門接見比當盡虔禮敬之容依其本俗則朝徽有序乘方兼遂矣詔可前廢帝初復舊世祖寵姬殷貴妃薨為之立寺貴妃子子鸞封新安王故以新安為寺號前廢帝殺子鸞乃毀廢新安寺驅斥僧徒尋又毀中興天寶諸寺太宗定亂下令曰先帝建中興及新安諸寺所以長世垂范弘宣盛化頃遇昏虐法像殘毀師徒奔進甚以矜懷妙訓淵謨有扶名教可招集舊僧普各還本並使材官隨宜修復宋世名僧有道生道生彭城人也父為廣戚令生出家為沙門法大弟子幼而聰悟年十五便能講經及長有異解立頓悟義時人推服之元嘉十一年卒於廬山沙門慧琳為之誄慧琳者秦郡秦縣人姓劉氏少出家住冶城寺有才章兼外內之學為廣陵王義真所知嘗著均善論其詞曰有白學先生以為中國聖人經綸百世其德弘矣智周萬變天人之理盡矣道無隱旨教罔遺筌聰睿迪哲何負於殊論哉有黑學道士陋之謂不照幽冥之途弗及來生之化雖尚虛心未能虛事不逮西域之深也於是白學訪其所以不逮云爾白曰釋氏所論之空與老氏所言之空無同異乎黑曰異釋氏即物為空空物為一老氏有無兩行空有為異安得同乎白曰釋氏空物物信空邪黑曰然空又空不翅於空矣白曰三儀靈長於宇宙萬品盈生於天地孰是空哉黑曰空其自性之有不害因假之體也今構群材以成大廈罔專寢之實積一豪以致合抱無檀木之體有生莫俄頃之留泰山蔑纍息之固興滅無常因緣無主所空在於性理所難據於事用吾以為誤矣白曰所言實相空者其如是乎黑曰然白曰浮變之理交於目前視聽者之所同了邪解之以登道場重之以輕異學誠未見其淵深黑曰斯理若近求之實遠夫情之所重者虛事之可重者實今虛其真實離其浮偽愛欲之惑不得不去愛去而道場不登者吾不知所以相曉也白曰今析豪空樹無垂蔭之茂離材虛室不損輪奐之美明無常增其愒蔭之情陳若偏篤其競辰之慮貝錦以繁采發輝和羹以鹽梅致旨齊侯追爽鳩之樂燕王無延年之術恐和合之辨危脆之教正足戀其嗜好之欲無以傾其愛競之惑也黑曰斯固理絶於諸華墳素莫之及也白曰山高纍卑之辭川樹積小之詠舟壑火傳之談堅白唐肆之論蓋盈於中國矣非理之奧故不舉以為教本耳子固以遺情遺纍虛心為道而據事剖析者更由指掌之間乎黑曰周孔為教正及一世不見來生無窮之緣積善不過子孫之慶纍惡不過餘殃之罰報效止於榮祿誅責極於窮賤視聽之外冥然不知良可悲矣釋迦關無窮之業拔重關之險陶方寸之慮宇宙不足盈其明設一慈之救群生不足勝其化敘地獄則民懼其罪敷天堂則物歡其福指泥洹以長歸乘法身以遐覽神變無不周靈澤靡不覃先覺翻翔於上世後悟騰翥而不紹坎井之局何以識大方之家乎白曰固能大其言矣今效神光無徑寸之明驗靈變罔纖介之異勤誠者不睹善救之貌篤學者弗剋陵虛之實徒稱無量之壽孰見期頤之叟咨嗟金剛之固安覿不朽之質苟於事不符宜尋立言之指遺其所寄之説也且要天堂以就善曷若服義而蹈道懼地獄以敕身孰與從理以端心禮拜以求免罪不由祗肅之意施一以徼百倍弗乘無吝之情美泥洹之樂生耽逸之慮贊法身之妙肇好奇之心近欲未弭遠利又興雖言菩薩無欲群生固以有欲矣甫救交敝之氓永開利競之谷澄神反道其可得乎黑曰不然若不示以來生之欲何以權其當生之滯物情不能頓至故積漸以誘之奪此俄頃要彼無窮若弗勤春稼秋穡何期端坐井底而息意庶慮者長淪於九泉之下矣白曰異哉何所務之乖也道在無欲而以有欲要之北行求郢西征索越方長迷於幽都永謬滯於昧谷遼遼閩楚其可見乎所謂積漸者日損之謂也當先遺其所輕然後忘其所重使利欲日去淳白自生耳豈得以少要多以粗易妙俯仰之間非利不動利之所蕩其有極哉乃丹青眩媚綵之目土木誇好壯之心興糜費之道單九服之財樹無用之事割群生之急致營造之計成私樹之權務勸化之業結師黨之勢苦節以要厲精之譽護法以展陵競之情悲矣夫道其安寄乎是以周孔敦俗弗關視聽之外老莊陶風謹守性分而已黑曰三遊本於仁義盜跖資於五善聖迹之敝豈有內外且黃老之家符章之偽水祝之誣不可勝論子安於彼駭於此玩於濁水違於清淵耳白曰有迹不能不敝有術不能無偽此乃聖人所以桎梏也今所惜在作法於貪遂以成俗不正其敝反以為高耳至若淫妄之徒世自近鄙源流蔑然固不足論黑曰釋氏之教專救夷俗便無取於諸華邪白曰曷為其然為則開端宜懷屬緒愛物去殺尚施周人息心遺榮華之願大士布兼濟之念仁義玄一者何以尚之惜乎幽旨不亮末流為纍耳黑曰子之論善殆同矣便事盡於生乎白曰幽冥之理固不極於人事矣周孔疑而不辨釋迦辨而不實將宜廢其顯晦之迹存其所要之旨請嘗言之夫道之以仁義者服理以從化帥之以勸戒者循利而遷善故甘辭興於有欲而滅於悟理淡説行於天解而息於貪偽是以示來生者蔽虧於道釋不得已杜幽暗者冥符於姬孔閉其兌由斯論之言之者未必遠知之者未必得不知者未必失但知六度與五教並行信順與慈悲齊立耳殊塗而同歸者不得守其發輪之轍也論行於世舊僧謂其貶黜釋氏欲加擯斥太祖見論賞之元嘉中遂參權要朝廷大事皆與議焉賓客輻湊門車常有數十兩四方贈賂相係勢傾一時注孝經及莊子逍遙篇文論傳於世又有慧嚴慧議道人並住東安寺學行精整為道俗所推時鬥場寺多禪僧京師為之語曰鬥場禪師窟東安談義林世祖大明四年於中興寺設齋有一異僧衆莫之識問其名答言名明慧從天安寺來忽然不見天下無此寺名乃改中興曰天安寺大明中外國沙門摩訶衍苦節有精理於京都多出新經勝鬘經尤見重內學宋書卷九十七夷蠻傳佛法言有福生帝王家帝謂豫章王妃庾氏曰阿婆佛法言有福生帝王家今見作天王便是大罪左右主帥動見拘執不如市邊屠酤富兒百倍南史卷五齊本紀上顧歡著夷夏論論佛老顧歡晚節服食不與人通每旦出戶山鳥集其掌取食事黃老道解陰陽書為數術多效驗初元嘉末出都寄住東府忽題柱云三十年二月二十一日因東歸後太初弒逆果是此年月自知將終賦詩言志云精氣因天行遊魂隨物化剋死日卒於剡山身體柔軟時年六十四還葬舊墓木連理出墓側縣令江山圖表狀世祖詔歡諸子撰歡文議三十卷佛道二家立教既異學者相互非毀歡著夷夏論曰夫辨是與非宜據聖典尋二教之源故兩標經句道經云老子入關之天竺維衛國國王夫人名曰淨妙老子因其晝寢乘日入精淨妙口中後年四月八日夜半時剖左腋而生墜地即行七步於是佛道興焉此出玄妙內篇佛經云釋迦成佛有塵劫之數出法花無量壽或為國師道士儒林之宗出瑞應本起歡論之曰五帝三皇莫不有師國師道士無過老莊儒林之宗孰出周孔若孔老非佛誰則當之然二經所説如合符契道則佛也佛則道也其聖則符其迹則反或和光以明近或曜靈以示遠道濟天下故無方而不入智周萬物故無物而不為其入不同其為必異各成其性不易其事是以端委搢紳諸華之容翦髮曠衣群夷之服擎跽磬折侯甸之恭狐蹲狗踞荒流之肅棺殯槨葬中夏之制火焚水沈西戎之俗全形守體繼善之教毀貌易性絶惡之學豈伊同人爰及異物鳥王獸長往往是佛無窮世界聖人代興或昭五典或布三乘在鳥而鳥鳴在獸而獸吼教華而華言化夷而夷語耳雖舟車均於致遠而有川陸之節佛道齊乎達化而有夷夏之別若謂其致既均其法可換者而車可涉川舟可行陸乎今以中夏之性效西戎之法既不全同又不全異下育妻孥上廢宗祀嗜欲之物皆以禮伸孝敬之典獨以法屈悖禮犯順曾莫之覺弱喪忘歸熟識其舊且理之可貴者道也事之可賤者俗也拾華效夷義將安取若以道邪道固符合矣若以俗邪俗則大乖矣屢見刻舷沙門守株道士交諍小大互相彈射或域道以為兩或混俗以為一是牽異以為同破同以為異則乖爭之由淆亂之本也尋聖道雖同而法有左右始乎無端終乎無末泥洹仙化各是一術佛號正真道稱正一一歸無死真會無生在名則反在實則合但無生之教賒無死之化切切法可以進謙弱賒法可以退誇強佛教文而博道教質而精精非粗人所信博非精人所能佛言華而引道言實而抑抑則明者獨進引則昧者竟前佛經繁而顯道經簡而幽幽則妙門難見顯則正路易遵此二法之辨也聖匠無心方圓有體器既殊用教亦異施佛是破惡之方道是興善之術興善則自然為高破惡則勇猛為貴佛迹光大宜以化物道迹密微利用為己優劣之分大略在茲夫蹲夷之儀婁羅之辨各出彼俗自相聆解猶蟲嚾鳥聒何足術效歡雖同二法而意黨道教宋司徒袁粲托為道人通公駮之其略曰白日停光恆星隱照誕降之應事在老先似非入關方炳斯瑞又老莊周孔有可存者依日末光憑釋遺法盜牛竊善反以成蠹檢究源流終異吾黨之為道耳西域之記佛經之説俗以膝行為禮不慕蹲坐為恭道以三繞為虔不尚踞傲為肅豈專戎土爰亦茲方襄童謁帝膝行而進趙王見周三環而止今佛法在華乘者常安戒善行交蹈者恆通文王造周大伯創吳革化戎夷不因舊俗豈若舟車理無代用佛法垂化或因或革清信之士容衣不改息心之人服貌必變變本從道不遵彼俗教風自殊無患其亂孔老釋迦其人或同觀方設教其道必異孔老治世為本釋氏出世為宗發軫既殊其歸亦異符合之唱自由臆説又仙化以變形為上泥洹以陶神為先變形者白首還緇而未能無死陶神者使塵惑日損湛然常存泥洹之道無死之作地乖詭若此何謂其同歡答曰案道經之作著自西周佛經之來始乎東漢年逾八百代懸數十若謂黃老雖久而濫在釋前是呂尚盜陳恆之齊劉季竊王莽之漢也經云戎氣強獷乃復略人頰車邪又夷俗長跽法與華異翹左跂右全是蹲踞故周公禁之於前仲尼戒之於後又舟以濟川車以征陸佛起於戎豈非戎俗素惡邪道出於華豈非華風本善邪今華風既變惡同戎狄佛來破之良有以矣佛道實貴故戒業可遵戎俗實賤故言貌可棄今諸華士女民族弗革而露首編偏踞濫用夷禮云於翦落之徒全是胡人國有舊風法不可變又若觀風流教其道必異佛非東華之道道非西戎之法魚鳥異淵永不相關安得老釋二教交行八表今佛既東流道亦西邁故知世有精粗教有文質然則道教執本以領末佛教救末以存本請問所異歸在何許若以翦落為異則胥靡翦落矣若以立像為異則俗巫立像矣此非所歸歸在常住常住之象常道孰異神仙有死權便之説神仙是大化之總稱非窮妙之至名至名無名其有名者二十七品仙變成真真變成神或謂之聖各有九品品極則入空寂無為無名若服食茹芝延壽萬億壽盡則死藥極則枯此修考之士非神仙之流也明僧紹正二教論以為佛明其宗老全其生守生者蔽明宗者通今道家稱長生不死名補天曹大乖老莊立言本理文惠太子竟陵王子良並好釋法吳興孟景翼為道士太子召入玄圃園衆僧大會子良使景翼禮佛景翼不肯子良送十地經與之景翼造正一論大略曰寶積云佛以一音廣説法老子云聖人抱一以為天下式一之為妙空玄絶於有景境神化贍於無窮為萬物而無為處一數而無數莫之能名強號為一在佛曰實相在道曰玄牝道之大象即佛之法身以不守之守守法身以不執之執執大象便物有八萬四千行説有八萬四千法法乃至於無數行亦達於無央等級隨緣須導歸一歸一曰回向向正即無邪邪觀既遣億善日新三五四六隨用而施獨立不改絶學無憂曠劫諸聖共遵斯一老釋未始於嘗分迷者分之而未合億善遍修修遍成聖雖十號千稱終不能盡終不能盡豈可思議司徒從事中郎張融作門律云道之與佛逗極無二吾見道士與道人戰儒墨道人與道士獄是非昔有鴻飛天首積遠難亮越人以為鳧楚人以為乙人自楚越鴻常一耳以示太子僕周顒顒難之曰虛無法性其寂雖同位寂之方其旨則別論所謂逗極無二者為逗極於虛無當無二於法性耶足下所宗之本一物為鴻乙耳驅馳佛道無免二末未知高鑒緣何識本輕而宗之其有旨乎往覆文多不載歡口不辨善於著筆著三名論甚工鍾會四本之流也又注王弼易二繫學者傳之南齊書卷五十四高逸顧歡傳顧歡著夷夏論論佛老初顧歡以佛道二家教異學者互相非毀乃著夷夏論曰夫辨是與非宜據聖典道經云老子入關之天竺維衛國國王夫人名曰淨妙老子因其晝寢乘日精入淨妙口中後年四月八日夜半時剖右腋而生墜地即行七步於是佛道興焉此出玄妙內篇佛經云釋迦成佛有塵劫之數出法華無量壽或為國師道士儒林之宗出瑞應本起歡論之曰五帝三皇不聞有佛國師道士無過老莊儒林之宗孰出周孔若孔老非聖誰則當之然二經所説如合符契道則佛也佛則道也其聖則符其迹則反或和光以明近或曜靈以示遠道濟天下故無方而不入智周萬物故無物而不為其入不同其為必異各成其性不易其事是以端委搢紳諸華之容剪髮曠衣群夷之服擎跽罄折侯甸之恭狐蹲狗踞荒流之肅棺殯槨葬中夏之風火焚水沉西戎之俗全形守禮繼善之教毀貌易性絶惡之學豈伊同人爰及異物鳥王獸長往往是佛無窮世界聖人代興或昭五典或布三乘在鳥而鳥鳴在獸而獸吼教華而華言化夷而夷語耳雖舟車均於致遠而有川陸之節佛道齊乎達化而有夷夏之別若謂其致既均其法可換者而車可涉川舟可行陸乎今以中夏之性效西戎之法既不全同又不全異下棄妻孥上絶宗祀嗜欲之物皆以禮伸孝敬之典獨以法屈悖禮犯順曾莫之覺弱喪忘歸孰識其舊且理之可貴者道也事之可賤者俗也捨華效夷義將安取若以道邪道固符合矣若以俗邪俗則大乖矣屢見刻舷沙門守株道士交諍小大互相彈射或域道以為兩或混俗以為一是牽異以為同破同以為異則乖爭之由淆亂之本也尋聖道雖同而法有左右始乎無端終乎無末泥洹仙化各是一術佛號正真道稱正一一歸無死真會無生在名則反在實則合但無生之教賒無死之化切切法可以進謙弱賒法可以退誇強佛教文而博道教質而精精非粗人所信博非精人所能佛言華而引道言實而抑抑則明者獨進引則昧者競前佛經繁而顯道經簡而幽幽則妙門難見顯則正路易遵此二法之辨也聖匠無心方圓有體器既殊用教亦易施佛是破惡之方道是興善之術興善則自然為高破惡則勇猛為貴佛迹光大宜以化物道迹密微利用為己優劣之分大略在茲夫蹲夷之儀婁羅之辨各出彼俗自相聆解猶蟲躍鳥聒何足述效歡雖同二法而意黨道教宋司徒袁粲托為道人通公駁之其略曰白日停光恆星隱照誕降之應事在老先似非入關方昭斯瑞又西域之記佛經之説俗之膝行為禮不慕蹲坐為恭道以三繞為虔不尚踞傲為肅豈專戎土爰亦茲方襄童謁帝膝行而進趙王見周三環而止今佛法垂化或因或革清信之士容衣不改息心之人服貌必變變本從道不遵彼俗俗鳳自殊無患其亂孔老釋迦其人或同觀方設教其道必異孔老教俗為本釋氏出世為宗發軫既殊其歸亦異又仙化以變形為上泥洹以陶神為先變形者白首還緇而未能無死陶神者使塵惑日損湛然常存泥洹之道無死之地乖詭若此何謂其同歡答曰案道經之作著自西周佛經之來始乎東漢年逾八百代懸數十若謂黃老雖久而濫在釋前是呂尚盜陳恆之齊劉季竊王莽之漢也又夷俗長跽法與華異翹左跋右全是蹲踞故周公禁之於前仲尼誡之於後又佛起於戎豈非戎俗素惡邪道出於華豈非華風本善邪今華風既變惡同戎狄佛來破之良有以矣佛道實貴故戒業可遵戎俗實賤故言貌可棄今諸華士女氏族弗革而露首偏踞濫用夷禮又若觀鳳流教其道必異佛非東華之道道非西夷之法魚鳥異川永不相關安得老釋二教交行八表今佛既東流道亦西邁故知俗有精粗教有文質然則道教執本以領末佛教救末以存本請問所歸異在何許若以翦落為異則胥靡翦落矣若以立像為異則俗巫立像矣此非所歸歸在常住常住之象常道孰異神仙有死權便之説神仙是大化之總稱非窮妙之至名至名無名其有名者二十七品仙變成真真變成神或謂之聖各有九品品極則入空寂無為無名若服食茹芝延壽萬億壽盡則死藥極則枯此修考之士非神仙之流也明僧紹正二教論以為佛明其宗老全其生守生者蔽明宗者通今道家稱長生不死名補天曹大乖老莊立言本理文惠太子竟陵王子良並好釋法吳興孟景翼為道士太子召入玄圃衆僧大會子良使景翼禮佛景翼不肯子良送十地經與之景翼造正一論大略曰寶積云佛以一音廣説法老子云聖抱一以為天下式一之為妙空玄絶於有境神化贍於無窮為萬物而無為處一數而無數莫之能名強號為一在佛曰實相在道曰玄牝道之大象即佛之法身以不守之守守法身以不執之執執大象但物有八萬四千行説有入萬四千法法乃至於無數行亦達於無央等級隨緣須導歸一歸一曰回向向正即無邪邪觀既遣億善日新三五四六隨用而施獨立不改絶學無憂曠劫諸聖共遵斯一老釋未始於嘗分迷者分之而未合億善遍修修遍成聖雖十號千稱終不能盡終不能盡豈可思議司徒從事中郎張融作門律云道之與佛逗極無二吾見道士與道人戰儒墨道人與道士辨是非昔有鴻飛天首積遠難亮越人以為鳧楚人以為乙人自楚越鴻常一耳以示太子僕周顒顒歎之曰虛無法性其寂雖同位寂之方其旨則別論所謂逗極無二者為逗極於虛無當無二於法性邪足下所宗之本一物為鴻乙耳驅馳佛道無免二末未知高鑒緣何識本輕而宗之其有旨乎往覆文多不載歡口不辨善於著論又注王弼易二繫學者傳之知將終賦詩言志曰五塗無恆宅三清有常舍精氣因天行遊魂隨物化鵬鵾適大海蜩鳩之桑柘達生任去留善死均日夜委命安所乘何方不可駕翹心企前覺融然從此謝自剋死日自擇葬時卒於剡山時年六十四身體香軟道家謂之尸解仙化焉還葬舊墓木連理生墓側縣令江山圖表狀武帝詔歡諸子撰歡文議三十卷南史卷七十五隱逸上顧歡傳顧歡優老而劣釋史臣曰顧歡論夷夏優老而劣釋佛法者理寂乎萬古迹兆乎中世淵源浩博無始無邊宇宙之所不知數量之所不盡盛乎哉真大士之立言也探機扣寂有感必應以大苞小無細不容若乃儒家之教仁義禮樂仁愛義宜禮從樂和而已今則慈悲為本常樂為宗施捨惟機低舉成敬儒家之教憲章祖述引古證之於學易悟今樹以前因報以後果業行交酬連璅相襲陰陽之教占氣步景授民以時知其利害今則耳眼洞達心智他通身為奎井豈俟甘石法家之教出自刑理禁姦止邪明用賞罰今則十惡所墜五及無間刀樹劍山焦湯猛火造受自貽罔或差二墨家之教遵上儉薄磨踵滅頂且猶非吝今則膚同斷瓠目如井星授子捐妻在鷹庇鴿從橫之教所貴權謀天日連環歸乎適變今則一音萬解無待戶説四辨三會咸得吾師雜家之教兼有儒墨今則五時所宣於何不盡晨家之教播植耕耘善相五事以藝九榖今則郁單梗稻已異閻浮生天果報自然飲食道家之教執一虛無得性亡情凝神勿擾今則波若無照萬法皆空豈有道之可名寧餘一之可得道俗對校真假將讎釋理奧藏無往而不有也能善用之即真是俗九流之設用藉世教刑名道墨乖心異言儒者不學無傷為儒佛理玄曠實智妙有一物不知不成圓聖若夫神道應現之力感會變化之奇不可思議難用言象而諸張米道符水先驗相傳師法祖自伯陽世情去就有此二學僧尼道士矛盾相非非唯重道兼亦殉利詳尋兩教理歸一極但迹有左右故教成先後廣略為言自生優劣道本虛無非由學至絶聖棄智已成有為有為之無終非道本若使本末同無曾何等級佛則不然具縛為種轉暗成明梯愚入聖途雖遠而可踐業雖曠而有期勸慕之道物我無隔而局情淺智鮮能勝受世途揆度因果二門雞鳴為善未必餘慶膾肉東陵曾無厄禍身才高妙鬱滯而靡達器思庸鹵富厚以終生忠反見遺詭乃獲用觀此而論近無罪福而業有不定著自經文三報開宗斯疑頓曉史臣服膺釋氏深信冥緣謂斯道之莫貴也贊曰含貞抱朴履道敦學惟茲潛隱棄鱗養角南齊書卷五十四高逸傳天竺道人釋那伽仙上表永明二年闍耶跋摩遣天竺道人釋那伽仙上表稱扶南國王臣僑陳如闍耶跋摩叩頭啓曰天化撫育感動靈祇四氣調適伏願聖主尊體起居康御皇太子萬福六宮清休諸王妃主內外朝臣普同和睦鄰境士庶萬國歸心五榖豐熟災害不生土清民泰一切安穩臣及人民國土豐樂四氣調和道俗濟濟並蒙陛下光化所被咸荷安泰又曰臣前遣使繼雜物行廣州貨易天竺道人釋那伽仙於廣州因附臣舶欲來扶南海中風漂到林邑國王奪臣貨易並那伽仙私財具陳其從中國來此仰序陛下聖德仁治詳議風化佛法興顯衆僧殷集法事日盛王威嚴整朝望國軌慈憫蒼生八方六合莫不歸仗如聽其所説則化鄰諸天非可為喻臣聞之下情踴悅若暫奉見尊足仰慕慈恩澤流小國天垂所感率土之民並得皆蒙恩佑是以臣今遣此道人釋那伽仙為使上表問訊奉貢微獻呈臣等赤心並別陳下情但所獻輕陋愧懼唯深伏願天慈曲照鑒其丹款賜不垂責謹附那伽仙並其伴口具啓聞伏願憫所啓並獻金鏤龍王坐像一軀白檀像一軀牙塔二軀古貝二雙琉璃蘇鉝二口玳瑁檳榔柈一枚那伽仙詣京師言其國俗事摩醯首羅天神神常降於摩耽山土氣恆暖草木不落其上書曰吉祥利世間感攝於群生所以其然者天感化緣明仙山名摩耽吉樹敷嘉榮摩醯首羅天依此降尊靈國王悉蒙佑人民皆安寧由斯恩被故是以臣歸情菩薩行忍慈本迹起凡基一發菩提心二乘非所期歷生積功業六度行大悲勇猛超劫數財命捨無遺生死不為厭六道化有緣具修於十地遺果度人天功業既已定行滿登正覺萬善智圓備惠日照塵俗衆生感緣應隨機授法藥佛化遍十方無不蒙濟擢皇帝聖弘道興降於三寶垂心覽萬機威恩振八表國土及城邑仁風化清皎亦如釋提洹衆天中最超陛下臨萬民四海共歸心聖慈流無疆被臣小國深詔報曰具摩醯降靈流施彼土雖殊俗異化遙深欣贊知鳩酬羅於彼背叛竊據林邑聚凶肆掠殊宜剪討彼雖介遐休陬舊修蕃貢自宋季多難海譯致壅皇化惟新習迷未革朕方以文德來遠人未欲便興干戈王既款列忠到遠請軍威今詔交部隨宜應接伐叛柔服實惟國典勉立殊效以副所期那伽仙屢銜邊譯頗悉中土闊狹今其具宣上報以絳紫地黃碧緑紋綾各五匹南齊書卷五十八東南夷傳徐勉嘗為書誡其子徐勉嘗為書誡其子嵩曰慧日十住皆徐勉子等既應營婚又須住止吾清明門宅無相容處所以爾者亦復有以前割西邊施宣武寺既失西廂不復方幅意亦謂此逆旅舍耳何事須華常恨時人謂是我宅且釋氏之教以財物謂之外命儒典亦稱何以聚人曰財況汝曹常情安得忘此以孔釋二教殊途同歸撰會林五下卷梁書卷二十五徐勉傳王褒著幼訓以誡諸子王褒著幼訓以誡諸子其一章云儒家則尊卑等差吉凶降殺君南面而臣北面天地之義也鼎俎奇而籩豆偶陰陽之義也道家則墮支體黜聰明棄義絶仁離形去智釋氏之義見苦斷習證滅循道明因辨果偶凡成聖斯雖為教等差而義歸汲引吾始乎幼學及於知命既崇周孔之教兼循老釋之談江左以來斯業不墜汝能修之吾之志也梁書卷四十一王規傳范縝與蕭子良論因果初縝在齊世嘗侍竟陵王蕭子良子良精信釋教而縝盛稱無佛子良問曰君不信因果世間何得有富貴何得有賤貧縝答曰人之生譬如一樹花同發一枝俱開一蒂隨風而墜自有拂簾幌墜於茵席之上自有關籬牆落於糞溷之側墜茵席者殿下是也落溷糞者下官是也貴賤雖復殊途因果竟在何處子良不能屈深怪之縝退論其理著神滅論曰或問豫云神滅何以知其滅也答曰神即形也形即神也是以形存則神存形謝則神滅也問曰形者無知之稱神者有知之名知與無知即事有異神之與形理不容一形神相即非所聞也答曰形者神之質神者形之用是則形稱其質神言其用形之與神不得相異也問曰神故非用不得為異其義安在答曰名殊而體一也問曰名既已殊體何得一答曰神之於質猶利之於刀形之於用猶刀之於利利之名非刀也刀之名非利也然而捨利無刀捨刀無利未聞刀沒而利存豈容形亡而神在問曰刀之與利或如來説形之與神其義不然何以言之木之質無知也人之質有知也人既如木之質而有異木之知豈非木有其一人有其二邪答曰異哉言乎人若有如木之質以為形又有異木之知以為神則可如來論也今人之質質有知也木之質質無知也人之質非木質也木之質非人質也安有如木之質而復有異木之知哉問曰人之質所以異木質者以其有知耳人而無知與木何異答曰人無無知之質猶木無有知之形問曰死者之形骸豈非無知之質邪答曰是無人質問曰若然者人果有如木之質而有異木之知矣答曰死者如木而無異木之知生者有異木之知而無如木之質也問曰死者之骨骼非生者之形骸邪答曰生形之非死形死形之非生形區已革矣安有生人之形骸而有死人之骨骼哉問曰若生者之形骸非死者之骨骼非死者之骨骼則應不由生者之形骸不由生者之形骸則此骨骼從何而至此邪答曰是生者之形骸變為死者之骨骼也問曰生者之形骸雖變為死者之骨骼豈不從生而有死則知死體猶生體也答曰如因榮木變為枯木枯木之質寧是榮木之體問曰榮體變為枯體枯體即是榮體絲體變為縷體縷體即是絲體有何別焉答曰若枯即是榮榮即是枯應榮時凋零枯時結實也又榮木不應變為枯木以榮即枯無所復變也榮枯是一何不先枯後榮要先榮後枯何也絲縷之義亦同此破問曰生形之謝便應豁然都盡何故方受死形綿歷未已邪答曰生滅之體要有其次故也夫欻而生者必欻而滅漸而生者必漸而滅欻而生者飄驟是也漸而生者動植是也有欻有漸物之理也問曰形即是神者手等亦是邪答曰皆是神之分也問曰若皆是神之分神既能慮手等亦應能慮也答曰手等亦應能有痛癢之知而無是非之慮問曰慮為一為異答曰知即是慮淺則為知深則為慮問曰若爾應有二乎答曰人體惟一神何得二問曰若不得二安有痛癢之知復有是非之慮答曰如手足雖異總為一人是非痛癢雖復有異亦總為一神矣問曰是非之慮不關手足當關何處答曰是非之意心器所主問曰心器是五藏之心非邪答曰是也問曰五藏有何殊別而心獨有是非之慮乎答曰七竅亦復何殊而司用不均問曰慮思無方何以知是心器所主答曰五藏各有所司無有能慮者是以心為慮本問曰何不寄在眼等分中答曰若慮可寄於眼分眼何故不寄於耳分邪問曰慮體無本故可寄之於眼分眼自有本不假寄於他分也答曰眼何故有本而慮無本苟無本於我形而可遍寄於異地亦可張甲之情寄王乙之軀李丙之性托趙丁之體然乎哉不然也問曰聖人形猶凡人之形而有凡聖之殊故知形神異矣答曰不然金之精者能昭穢者不能昭有能昭之精金寧有不昭之穢質又豈有聖人之神而寄凡人之器亦無凡人之神而托聖人之體是以八采重瞳勳華之容龍顏馬口軒皞之狀形表之異也比干之心七竅列角伯約之膽其大若拳此心器之殊也是知聖人定分每絶常區非惟道革群生乃亦形超萬有凡聖均體所未敢安問曰子云聖人之形必異於凡者敢問陽貨類仲尼項籍似大舜舜項孔陽智革形同其故何邪答曰珉似玉而非玉雞類鳳而非鳳物誠有之人故宜爾項陽貌似而非實似心器不均雖貌無益問曰凡聖之殊形器不一可也員極理無有二而丘旦殊姿湯文異狀神不侔色於此益明矣答曰聖同於心器形不必同也猶馬殊毛而齊逸玉異色而均美是以晉棘荊和等價連城驊騮騄驪俱致千里問曰形神不二既聞之矣形謝神滅理固宜然敢問經云為之宗廟以鬼餉之何謂也答曰聖人之教然也所以弭孝子之心而歷偷薄之意神而明之此之謂矣問曰伯有被甲彭生豕見墳素著其事寧是設教而已邪答曰妖怪茫茫或存或亡強死者衆不皆為鬼彭生伯有何獨能然乍為人豕未必齊鄭之公子也問曰易稱故知鬼神之情狀與天地相似而不違又曰載鬼一車其義云何答曰有禽焉有獸焉飛走之別也有人焉有鬼焉幽明之別也人滅而為鬼鬼滅而為人則未之知也問曰知此神滅有何利用邪答曰浮屠害政桑門蠹俗風驚霧起馳蕩不休吾哀其弊思拯其溺夫竭財以赴僧破産以趨佛而不恤親戚不憐窮匱者何良由厚我之情深濟物之意淺是以圭撮涉於貧友吝情動於顏色千鍾委於富僧歡意暢於容發豈不以僧有多餘之期友無遺秉之報務施闕於周急歸德必於在己又惑以茫昧之言懼以阿鼻之苦誘以虛誕之辭欣以兜率之樂故捨逢掖襲橫衣廢俎豆列瓶鉢家家棄其親愛人人絶其嗣續致使兵挫於行間吏空於官府粟罄於惰遊貨殫於泥木所以姦宄弗勝頌聲尚擁惟此之故其流莫已其病無限若陶甄稟於自然森羅均於獨化忽焉自有恍爾而無來也不御去也不追乘夫天理各安其性小人甘其壟畝君子保其恬素耕而食食不可窮也蠶而衣衣不可盡也下有餘以奉其上上無為以待其下可以全生可以匡國可以霸君用此道也此論出朝野喧譁子良集僧難之而不能屈梁書卷四十八列傳第四十二儒林范縝與蕭子良論因果時竟陵王子良盛招賓客縝亦預焉嘗侍子良子良精信釋教而范縝盛稱無佛子良問君不信因果何得富貴貧賤縝答曰人生如樹花同發隨風而墮自有拂簾幌墜於茵席之上自有關籬牆落於糞溷之中墜茵席者殿下是也落糞溷者下官是也貴賤雖復殊途因果竟在何處子良不能屈然深怪之退論其理著神滅論以為神即形也形即神也形存則神存形謝則神滅形者神之質神者形之用是則形稱其質神言其用形之與神不得相異神之於質猶利之於刀形之於用猶刀之於利利之名非刀也刀之名非利也然而捨利無刀捨刀無利未聞刀沒而利存豈容形亡而神在此論出朝野喧譁子良集僧難之而不能屈太原王琰乃著論譏縝曰嗚呼范子曾不知其先祖神靈所在欲杜縝後對縝又對曰嗚呼王子知其祖先神靈所在而不能殺身以從之其險詣皆此類也子良使王融謂之曰神滅既自非理而卿堅執之恐傷名教以卿之大美何患不至中書郎而故乖剌為此可便毀棄之縝大笑曰使范縝賣論取官已至令僕矣何但中書郎邪南史卷五十七范雲傳附范縝傳劉歊著革終論劉歊字士光訏族兄也歊幼有識慧四歲喪父與群兒同處獨不戲弄六歲誦論語毛詩意所不解便能問難十一讀莊子逍遙篇曰此可解耳客因問之隨問而答皆有情理家人每異之及長博學有文才不娶不仕與族弟訏並隱居求志遨遊林澤以山水書籍相娛而已常欲避人世以母老不忍違離每隨兄霽杳從宦少時好施務周人之急人或遺之亦不距也久而歎曰受人者必報不則有愧於人吾固無以報人豈可常有愧乎天監十七年無何而著革終論其辭曰死生之事聖人罕言之矣孔子曰精氣為物遊魂為變知鬼神之情狀與天地相似而不違其言約其旨妙其事隱其意深未可以臆斷難得而精核聊肆狂瞽請試言之夫形慮合而為生魂質離而稱死合則起動離則休寂當其動也人皆知其神及其寂也物莫測其所趣皆知則不言而義顯莫測則逾辨而理微是以勳華曠而莫陳姬孔抑而不説前達往賢互生異見季札云骨肉歸於土魂氣無不之莊周云生為徭役死為休息尋此二説如或相反何者氣無不之神有也死為休息神無也原憲云夏後氏用明器示民無知也殷人用祭器示民有知也周人兼用之示民疑也考之記籍驗之前志有無之辨不可歷言若稽諸內教判乎釋部則諸子之言可尋三代之禮無越何者神為生本形為生具死者神離此具而即非彼具也雖死者不可復反而精靈遞變未嘗滅絶當其離此之日識用廓然故夏後明器示其弗反即彼之時魂靈知滅故殷人祭器顯其猶存不反則合乎莊周猶存則同乎季札各得一隅無傷厥義設其實也則亦無故周人有兼用之禮尼父發遊魂之唱不其然乎若廢偏攜之論探中途之旨則不仁不智之譏於是乎可息夫形也者無知之質也神也者有知之性也有知不獨存依無知以自立故形之於神逆旅之館耳及其死也神去此而適彼也神已去此館何用存速朽得理也神已適彼祭何所祭祭則失理面姬孔之教不然者其有以乎蓋禮樂之興出於澆薄俎豆綴兆生於俗弊施靈筵陳棺槨設饋奠建丘隴蓋欲令孝子有追思之地耳夫何補於已遷之神乎故上古衣之以薪棄之中野可謂尊盧赫胥皇雄炎帝蹈於失理哉是以子羽沈川漢伯方壙文楚黃壤土安麻索此四子者得理也忘教也若從四子而遊則平生之志得矣然積習生常難卒改革一朝肆志儻不見從今欲翦截煩厚務存儉易進不裸尸退異常俗不傷存者之念有合至人之道孔子云斂首足形還葬而無槨斯亦貧者之禮也余何陋焉且張奐止用幅巾王肅唯盥手足范冉殮畢便葬奚珍無設筵几文度故舟為槨子廉牛車載柩叔起誡絶墳隴康成使無卜吉此數公者尚或如之況於吾人而尚華泰今欲仿佛景行以為軌則儻合中庸之道庶免徒費之譏氣絶不須復魄盥洗而斂以一千錢市治棺單故裙衫衣巾枕履此外送往之具棺中常物及餘閣之祭一不得有所施世多信李彭之言可謂惑矣余以孔釋為師差無此惑斂訖載以露車歸於舊山隨得一地地足為坎坎足容棺不須磚甓不勞封樹勿設祭饗勿置几筵無用茅君之虛座伯夷之杅水其蒸嘗繼嗣言象所絶事止余身無傷世教家人長幼內外姻戚凡厥友朋爰及寓所咸願成余之志幸勿奪之明年疾卒時年三十二歊幼時嘗獨坐空室有一老公至門謂歊曰心力勇猛能精死生但不得久滯一方耳因彈指而去歊既長精心學佛有道人釋寶志者時人莫測也遇歊於興皇寺驚起曰隱居學道清淨登佛如此三説歊未死之春有人為其庭中栽柿歊謂兄子弇曰吾不見此實爾其勿言至秋而亡人以為知命親故誄其行迹諡曰貞節處士梁書卷五十一處士劉歊傳劉歊著革終論劉歊天監十七年忽著革終論以為形者無知之質神者有知之性有知不獨存依無知以自立故形之於神逆旅之館耳及其死也神去此館速朽得理是以子羽沈川漢伯方壙文楚黃壤士安麻索此四子者得理也若從四子而遊則平生之志得矣然積習生常難卒改革一朝肆志儻不見從今欲翦截煩厚務存儉易進不裸尸退異常俗不傷存者之念有合至人之道且張奐止用幅巾王肅唯盥手足范冉斂畢便葬爰珍無設筵几文度故舟為棺子廉牛車載柩叔起誡絶墳隴康成使無卜吉此數公者尚或如之況為吾人而尚華泰今欲仿佛景行以為軌則氣絶不須復魂盥漱而斂以一千錢市成棺單故裙衫衣巾枕履此外送往之具棺中常物一不得有所施世多信李彭之言可謂惑矣余以孔釋為師差無此惑斂訖載以露車歸於舊山隨得一地地足為坎坎足容棺不須磚甓不勞封樹勿設祭饗勿置几筵其蒸嘗繼嗣言象所絶事止余身無傷世教始沙門釋寶志遇歊於興皇寺驚起曰隱居學道清淨登仙如此三説歊未死之春有人為其庭中栽柿歊謂兄子弇曰吾不見此實爾其勿言至秋而亡人以為知命親故誄其行迹諡曰貞節處士南史卷四十九劉懷珍傳附劉歊傳梁書曾鞏目録序梁書六本紀五十列傳合五十六篇唐貞觀三年詔右散騎常侍姚思廉撰思廉者梁史官察之子推其父意又頗采諸儒謝吳等所記以成此書臣等既校正其文字又集次為目録一篇而敘之曰自先王之道不明百家並起佛最晚出為中國之患而在梁為尤甚故不得而不論也蓋佛之徒自以謂吾之所得者內而世之論佛者皆外也故不可絀雖然彼惡睹聖人之內哉書曰思曰睿睿作聖蓋思者所以致其知也能致其知者察三才之道辨萬物之理小大精粗無不盡也此之謂窮理知之至也知至矣則在我者之足貴在彼者之不足玩未有不能明之者也有知之之明而不能好之未可也故加之誠心以好之有好之之心而不能樂之未可也故加之至意以樂之能樂之則能安之矣如是則萬物之自外至者安能纍我哉萬物之所不能纍故吾之所以盡其性也能盡其性則誠矣誠者成也不惑也既成矣必充之使可大焉既大矣必推之使可化焉能化矣則含智之民肖翹之物有待於我者莫不由之以至其性遂其宜而吾之用與天地參矣德如此其至也而應乎外者未嘗不與人同此吾之道所以為天下之達道也故與之為衣冠飲食冠昏喪祭之具而由之以教其為君臣父子兄弟夫婦者莫不一出乎人情與之同其吉凶而防其憂患者莫不一出乎人理故與之處而安且治之所集也危且亂之所去也與之所處者其具如此使之化者其德如彼可不謂聖矣乎既聖矣則無思也其至者循理而已無為也其動者應物而已是以覆露乎萬物鼓舞乎群衆而未有能測之者也可不謂神矣乎神也者至妙而不息者也此聖人之內也聖人者道之極也佛之説其有以易此乎求其有以易此者固其所以為失也夫得於內者未有不可行於外也有不可行於外者斯不得於內矣易曰智周乎萬物而道濟乎天下故不過此聖人所以兩得之也智足以知一偏而不足以盡萬事之理道足以為一方而不足以適天下之用此百家之所以兩失之也佛之失其不以此乎則佛之徒自以謂得諸內者亦可謂妄矣夫學史者將以明一代之得失也臣等故因梁之事而為著聖人之所以得及佛之所以失以傳之者使知君子之所以距佛者非外而有志於內者庶不以此而易彼也臣鞏等謹敘目録昧死上梁書卷末曾鞏目録序付縡著明道論難皓法師無諍論付縡篤信佛教從興皇惠朗法師受三論盡通其學時有大心皓法師著無諍論以詆之縡乃為明道論用釋其難其略曰無諍論言比有弘三論者雷同訶詆恣言罪狀歷毀諸師非斥衆學論中道而執偏心語忘懷而竟獨勝方學數論更為仇敵仇敵既勾諍鬥大生以此之心而成罪業罪業不止豈不重增生死大苦聚集答曰三論之興為日久矣龍樹創其源除內學之偏見提婆揚其旨蕩外道之邪執欲使大化流而不擁玄風闡而無墜其言曠其意遠其道博其流深斯固龍象之勝驤鯤鵬之搏運蹇乘決羽豈能觖望其間哉頃代澆薄時無曠士苟習小學以化蒙心漸染成俗遂迷正路唯竟穿鑿各肆營造枝葉徒繁本源日翳一師解釋復異一師更改舊宗各立新意同學之中取寤復別如是展轉添糅倍多總而用之心無的準擇而行之何者為正豈不渾沌傷竅嘉樹弊牙雖復人説非馬家握靈蛇以無當之卮同畫地之餅矣其於失道不亦宜乎攝山之學則不如是守一遵本無改作之過約文申意杜臆斷之情言無預説理非宿構睹緣爾乃應見敵然後動縱橫絡驛忽恍杳冥或彌綸而不窮或消散而無所煥乎有文章蹤朕不可得深乎不可量即事而非遠凡相酬對隨理詳核有何嫉詐干犯諸師且諸師所説為是可毀為不可毀若可毀者毀故為衰若不可毀毀自不及法師何獨蔽護不聽毀乎且教有大小備在聖誥大乘之文則指斥小道今弘大法寧得不言大乘之意耶斯則褒貶之事從弘放學與奪之辭依經議論何得見佛説而信順在我語而忤逆無諍平等心如是耶且忿恚煩惱凡夫恆性失理之徒率皆有此豈可以三修未愜六師懷恨而蘊涅槃妙法永不宣揚但冀其忿憤之心既極恬淡之寤自成耳人面不同其心亦異或有辭意相反或有心口相符豈得必謂他人説中道而心偏執己行無諍外不違而內平等仇敵鬥訟豈我事焉罪業聚集鬥諍者所畏耳無諍論言攝山大師誘進化導則不如此既習行於無諍者也導悟之德既往淳一之風已澆競勝之心呵毀之曲盛於茲矣吾願息諍以通道讓勝以忘德何必排拂異家生其恚怒者乎若以中道之心行於成實亦能不諍若以偏著之心説於中論亦得有諍固知諍與不諍偏在一法答曰攝山大師實無諍矣但法師所賞未衷其節彼靜守幽谷寂爾無為凡有訓勉莫匪同志從容語默物無間然故其意雖深其言甚約今之敷暢地勢不然處王城之隅居聚落之內呼吸顧望之客脣吻縱橫之士奮鋒穎勵羽翼明目張膽被堅執鋭騁異家衒別解窺伺間隙邀冀長短與相酬對捔其輕重豈得默默無言唯唯應命必須掎托同異發擲玼瑕忘身而弘道忤俗而通教以此為病益知未達若令大師當此之地亦何必默己而為法師所貴耶法師又言吾願息諍以通道讓勝以忘德道德之事不止在諍與不諍讓與不讓也此語直是人間所重法師慕而言之竟未知勝若為可讓也若他人道高則自勝不勞讓矣他人道劣則雖讓而無益矣欲讓之辭將非虛設中道之心無處不可成實三論何事致乖但須息守株之解除膠柱之意是事皆中也來旨言諍與不諍偏在一法何為獨褒無諍耶詎非矛盾無諍論言邪正得失勝負是非必生於心矣非謂所説之法而有定相論勝劣也若異論是非以偏著為失言無是無非消彼得失以此論為勝妙者他論所不及此亦為失也何者凡心所破豈無心於能破則勝負之心不忘寧不存勝者乎斯則矜我為得棄他之失即有取捨大生是非便是增諍答曰言為心使心受言詮和合根塵鼓動風氣故成語也事必由心實如來説至於心造偽以使口口行詐以應心外和而內險言隨而意逆求利養引聲名入道之人在家之士斯罪非一聖人所以曲陳教誡深致防杜説見在之殃咎敘將來之患害此文明著甚於日月猶有忘愛軀冒峻制蹈湯炭甘虀粉必行而不顧也豈能悅無諍之作而回首革音耶若弘道之人宣化之士心知勝也口言勝也心知劣也口言劣也亦無所苞藏亦無所忌憚但直心而行之耳他道雖劣聖人之教也己德雖優亦聖人之教也我勝則聖人勝他劣則聖人劣聖人之優劣蓋根緣所宜爾於彼於此何所厚薄哉雖復終日按劍極夜擊柝瞋目以爭得失作氣以求勝負在誰處乎有心之與無心徒欲分別虛空耳何意不許我論説而使我謙退此謂鷦鵬已翔於寥廓而虞者猶窺藪澤而求之嗟乎丈夫當弘斯道矣無諍論言無諍之道通於內外子所言須諍者此用末而救本失本而營末者也今為子言之何則若依外典尋書契之前至淳之世朴質其心行不言之教當於此時民至老死不相往來而各得其所復有何諍乎固知本末不諍是物之真矣答曰諍與無諍不可偏執本之與末又安可知由來不諍寧知非末於今而諍何驗非本夫居後而望前則為前居前而望後則為後而前後之事猶如彼此彼呼此為彼此呼彼為彼彼此之名的居誰處以此言之萬事可知矣本末前後是非善惡可恆守邪何得自信聰明廢他耳目夫水泡生滅火輪旋轉入牢阱受羈紲生憂畏起煩惱其失何哉不與道相應而起諸見故也相應者則不然無為也無不為也善惡不能偕而未曾離善惡生死不能至亦終然在生死故得永離而任放焉是以聖人念繞桎之不脫愍黏膠之難離故殷勤教示備諸便巧希向之徒涉求有類雖驎角難成象形易失寧得不倣佛遐路勉勵短晨且當念己身之善惡莫揣他物而欲分別而言我聰明我知見我計校我思惟以此而言亦為疏矣他人者實難測或可是凡夫真爾亦可是聖人俯同時俗所宜見果報所應睹安得肆胸襟盡情性而生譏誚乎正應虛己而遊乎世俯仰於電露之間耳明月在天衆水咸見清風至林群籟畢響吾豈逆物哉不入鮑魚不甘腐鼠吾豈同物哉誰能知我共行斯路浩浩乎堂堂乎豈復見有諍為非無諍為是此則諍者自諍無諍者自無諍吾俱取而用之寧勞法師費功夫點筆紙但申於無諍弟子疲唇舌消晷漏唯對於明道戲論哉糟粕哉必欲且考真偽暫觀得失無過依賢聖之言檢行藏之理始終研究表裏綜核使浮辭無所用詐道自然消請待後筵以觀其妙矣陳書卷三十傅縡傳元懌表諫時有沙門惠憐者自云咒水飲人能差諸病病人就之者日有千數靈太后詔給衣食事力優重使於城西之南治療百姓病懌表諫曰臣聞律深惑衆之科禮絶妖淫之禁皆所以大明居正防遏姦邪昔在漢末有張角者亦以此術熒惑當時論其所行與今不異遂能幻誘生人致黃巾之禍天下塗炭數十年間角之由也昔新垣姦不登於明堂五利僥終嬰於顯戮魏書卷二十二清河王元懌傳元懌表諫孝明熙平初時有沙門惠憐者自云咒水飲人能差諸病病人就之者日有千數靈太后詔給衣食事力優重使於城西之南治療百姓病懌表諫曰臣聞律深惑衆之科禮絶妖淫之禁皆所以大明居正防遏姦邪昔在漢末有張角者亦以此術熒惑當時論其所行與今不異遂能詃誘生人致黃巾之禍天下塗炭數十年間角之由也昔新垣姦不登於明堂五利僥終嬰於顯戮此事可為至鑒靈太后深納之北史卷十九清河王元懌傳李瑒上言於時民多絶戶而為沙門李瑒上言禮以教世法導將來迹用既殊區流亦別故三千之罪莫大不孝不孝之大無過於絶祀然則絶祀之罪重莫甚焉安得輕縱背禮之情而肆其向法之意也正使佛道亦不應然假令聽然猶須裁之以禮一身親老棄家絶養既非人理尤乖禮情堙滅大倫且闕王貫交缺當世之禮而求將來之益孔子云未知生焉知死斯言之至亦為備矣安有棄堂堂之政而從鬼教乎又今南服未靜衆役仍煩百姓之情方多避役若復聽之恐捐棄孝慈比屋而是沙門都統僧暹等忿瑒鬼教之言以瑒為謗毀佛法泣訴靈太后太后責之瑒自理曰竊欲清明佛法使道俗兼通非敢排棄真學妄為訾毀且鬼神之名皆通靈達稱自百代正典敘三皇五帝皆號為鬼天地曰神祇人死曰鬼易曰知鬼神之情狀周公自美亦云能事鬼神禮曰明則有禮樂幽則有鬼神是以明者為堂堂幽者為鬼教佛非天非地本出於人應世導俗其道幽隱名之為鬼愚謂非謗且心無不善以佛道為教者正可未達衆妙之門耳靈太后雖知瑒言為允然不免暹等之意猶罰瑒金一兩魏書卷五十三素孝伯傳附李瑒傳程駿上表沙門法秀謀反伏誅駿表曰臣聞詩之作也蓋以言志邇之事父遠之事君闕諸風俗靡不備焉上可以頌美聖德下可以申厚風化言之者無罪聞之者足以誡此古人用詩之本意臣以垂沒之年得逢盛明之運雖復昏耄將及猶慕廉頗強飯之風伏惟陛下太皇太后道合天地明侔日月則天與唐風斯穆順帝與周道通靈是以狂妖懷逆無隱謀之地冥靈潛翦伏發覺之誅用能七廟幽贊人神扶助者已臣不勝喜踴謹竭老鈍之思上慶國頌十六章並序巡狩甘雨之德焉其頌曰忽有狂豎謀逆聖都明靈幽告發覺伏誅羿浞為亂祖龍千紀狂華冬茂有自來矣美哉皇度道固千祀百靈潛翦姦不遑起姦不遑起罪人得情憲章刑律五秩猶輕於穆二聖仁等春生除棄周漢遐軌犧庭周流奚棄忿彼苛刻犧庭曷軌希仁尚德徽音一振聲教四塞豈惟京甸化播萬國魏書卷六十程駿傳崔光上表諫靈太后神龜二年八月靈太后幸永寧寺躬登九層佛圖崔光表諫曰伏見親升上級佇蹕表剎之下祗心圖構誠為福善聖躬玉趾非所踐陟臣庶恇惶竊謂未可按禮記為人子者不登高不臨深古賢有言策畫失於廟堂大人蹶於中野漢書上欲西馳下峻阪爰盎攬轡停輿曰臣聞千金之子不垂堂百金之子不倚衡如有車敗馬驚奈高廟太后何又云上酎祭宗廟出欲御樓船薛廣德免冠頓首曰宜從橋陛下不聽臣臣以血污車輪樂正子春曾參弟子亦稱至孝固自謹慎堂基不過一尺猶有傷足之愧永寧纍級閣道回隘以柔懦之寶體乘至峻之重峭萬一差跌千悔何追禮將祭宗廟必散齋七日致齋三日然後入祀神明可得而通今雖容像未建已為神明之宅方加雕繢飾麗丹青人心所祗鋭觀滋甚登者既衆異懷若面縱一人之身恆盡誠潔豈左右臣妾各竭虔仰不可獨升必有扈侍懼或忘慎非飲酒茹葷而已昨風霾暴興紅塵四塞白日晝昏特可敬畏春秋宋衛陳鄭同日而災伯姬待姆致焚如之禍內經寶塔高華堪室千萬唯盛言香花禮拜豈有登上之義獨稱三寶階從上而下人天交接兩得相見超世奇絶莫可而擬恭敬拜跽悉在下級遠存矚眺周見山河因其所眄增發嬉笑未能級級加虔步步崇慎徒使京邑士女公私湊集上行下從理勢以然迄於無窮豈長世競慕一登而可抑斷哉蓋心信為本形敬乃末重實輕根靖實躁君恭己正南面者豈月乘峻極旬御層階今經始既就子來自勸基構已興雕絢漸起紫山華台即其宮也伏願息躬親之勞廣風靡之化因立制防班之條限以遏囂污永歸清寂下竭肅穆之誠上展瞻仰之敬勿踐勿履顯固億齡融教闡悟不其博歟九月靈太后幸嵩高光又上表諫曰魏書卷六十七崔光傳崔光上表諫靈太后二年八月靈太后幸永寧寺躬登九層佛圖光表諫曰伏見親升上級佇蹕表剎之下祗心圖構誠為福善聖躬玉趾非所踐陟臣庶恇惶竊謂未可九月靈太后幸嵩山佛寺光上表諫不從北史卷四十四崔光傳尼高皇太后崩於瑤光寺神龜元年九月尼高皇太后崩於瑤光寺有司奏案舊事皇太后崩儀自復魄斂葬百官哭臨其禮甚多今尼太后既存委俗尊憑居道法凶事簡速不依配極之典庭局狹隘非容百官之位但昔徑奉接義成君臣終始情禮理無廢絶輒準故式立儀如別內外群官權改常服單衣邪巾奉送至墓列位哭拜事訖而除止在説師更不宣下詔可魏書卷一百八十四禮志四樊遜論釋道兩教詔又問釋道兩教樊遜對曰臣聞天道性命聖人所不言蓋以理絶涉求難為稱謂伯陽道德之論莊周逍遙之旨遺言取意猶有可尋至若玉簡金書神經祕録三尺九轉之奇絳雪玄霜之異淮南成道犬吠雲中子喬得仙劍飛天上皆是憑虛之説海棗之談求之如係風學之如捕影而燕君齊后秦皇漢帝信彼方士冀遇其真徐福去而不歸欒大往而無獲猶謂升遐倒影抵掌可期祭鬼求神庶或不死江璧既返還入驪山之墓龍媒已至終下茂陵之墳方知劉向之信洪寶沒有餘責王充之非黃帝比為不相又末葉已來大存佛教寫經西土畫像南宮昆池地黑以為劫燒之灰春秋夜明謂是降神之日法王自在變化無窮置世界於微塵納須彌於黍米蓋理本虛無示諸方便而妖妄之輩苟求出家藥王燔軀波論灑血假未能然猶當克命寧有改形易貌有異生人恣意放情還同俗物龍宮餘論鹿野前言此而得容道風前墜伏惟陛下受天明命屈己濟民山鬼效靈海神率職湘中石燕沐時雨而群飛台上銅鳥朔和風而杓轉以周都洛邑治在鎬京漢宅咸陽魂歸豐沛汾晉之地王迹維始眷言巡幸且勞經略猶復降情文苑斟酌百家想執玉於瑤池念求珠於赤水竊以王母獻環由感周德上天錫珮實報禹功二班勒史兩馬制書未見三世之辭無聞一乘之旨帝樂王禮尚有時而沿革左道怪民亦何疑於沙汰北齊卷四十五文苑樊遜傳北周武帝時辨釋三教先後建德二年十二月癸巳集群臣及沙門道士等帝升高座辨釋三教先後以儒教為先道教為次佛教為後周書卷五武帝紀上韋敻著三教序武帝又以佛道儒三教不同詔敻辨其優劣敻以三教雖殊同歸於善其迹似有深淺其致理殆無等級乃著三教序奏之帝覽而稱善周書卷三十一韋敻傳梁武降號伽藍五事愆違則天地見異況於日月星辰乎況於水火金木土乎若梁武之降號伽藍齊文宣之盤遊市里陳則蔣山之鳥呼曰奈何周則陽武之魚乘空而鬥隋則鵲巢黼帳火炎門闕豈唯天道亦曰人妖則祥眚呈形於何不至亦有脫略政教張羅樽糈崇信巫史重增愆罰隋書卷二十二五行上梁武帝淫於佛道中大通元年朱雀航華表災明年同泰寺災大同三年朱雀門災水沴火也是時帝崇尚佛道宗廟牲牷皆以面代之又委萬乘之重數詣同泰寺捨身為奴令王公已下贖之初陽為不許後為默許方始還宮天誡若曰梁武為國主不遵先王之法而淫於佛道橫多糜費將使其社稷不得血食也天數見變而帝不悟後竟以亡及江陵之敗闔城為賤隸焉即捨身為奴之應也隋書卷二十二五行上李士謙論三教李士謙善談玄理嘗有一客在坐不信佛家應報之義以為外典無聞焉士謙喻之曰積善餘慶積惡餘殃高門待封掃墓望喪豈非休咎之應邪佛經云輪轉五道無復窮已此則賈誼所言千變萬化未始有極忽然為人之謂也佛道未東而賢者已知其然矣至若鯀為黃熊杜宇為鶗鴂褒君為龍牛哀為獸君子為鵠小人為猿彭生為豕如意為犬黃母為黿宣武為鱉鄧艾為牛徐伯為魚鈴下為鳥書生為蛇羊祜前身李氏之子此非佛家變受異形之謂邪客曰邢子才云豈有松柏後身化為樗櫟僕以為然士謙曰此不類之談也變化皆由心而作木豈有心乎客又問三教優劣士謙曰佛日也道月也儒五星也客亦不能難而止隋書卷七十七隱逸李士謙傳李士謙論三教李士謙善談玄理嘗有客在坐不信佛家應報義士謙喻之曰積善餘慶積惡餘殃豈非休咎邪佛經云轉輪五道無復窮已此則賈誼所言千變萬化未始有極忽然為人之謂也佛道未來而賢者已知其然矣至若鯀為黃熊杜宇為鶗鴂褒君為龍牛哀為猛獸君子為鵠小人為猿彭生為豕如意為犬黃母為黿宣武為鱉鄧艾為牛徐伯為魚鈴下為鳥書生為蛇羊祜前身李氏之子此非佛家變受異形之謂邪客曰邢子才云豈有松柏後身化為樗櫟僕以為然士謙曰此不類之談也變化皆由心作木豈有心乎客又問三教優劣士謙曰佛日也道月也儒五星也客亦不能難而止北史卷三魏本紀三孝文帝紀胡僧所傳乃是四夷之樂又太子洗馬蘇夔以鍾律自命尤忌萬寶常夔父威方用事凡言樂者皆附之而短寶常數詣公卿怨望蘇威因詰寶常所為何所傳受有一沙門謂寶常曰上雅好符瑞有言征祥者上皆悅之先生當言就胡僧受學云是佛家菩薩所傳音律則上必悅先生所為可以行矣寶常然之遂如其言以答威威怒曰胡僧所傳乃是四夷之樂非中國所宜行也其事竟寢杜按北史卷九十文稍異意同故不録隋書卷七十八藝術萬寶常傳何尚之於宅設八關齋先是何尚之致仕復膺朝命於宅設八關齋大集朝士自行香次至僧達曰願郎且放鷹犬勿復遊獵僧達答曰家養一老狗放無處去已復還尚之失色南史卷二十一王弘傳附王僧達傳郭祖深論佛教梁武帝溺情內教朝政縱弛郭祖深輿櫬詣闕上封事其略曰臣聞人為國本食為人命故禮曰國無六年之儲謂非其國也推此而言農為急務而郡縣苛暴不加勸獎今年豐歲稔猶人有飢色設遇水旱何以救之陛下昔歲尚學置立五館行吟坐詠誦聲溢境比來慕法普天信向家家齋戒人人懺禮不務百桑空談彼岸夫農桑者今日濟育功德者將來勝因豐可墮本勤末置邇效賒也今商旅轉繁遊食轉衆耕夫日少杼軸日空陛下若廣興屯田賤金貴粟勤農桑者擢以階級惰耕織者告以明刑如此數年則家給人足廉讓可生夫君子小人智計不同君子志於道小人謀於利志於道者安國濟人志於利者損物圖己道人者害國小人也忠良者捍國君子也臣見疾者詣道士則勸奏章僧尼則令齋講俗師則鬼禍須解醫診則湯尉散丸皆先自為也臣謂為國之本與療病相類療病當去巫鬼尋華扁為國當黜佞邪用管晏今之所任腹背之毛耳論外則有勉捨説內則有雲旻雲旻所議則傷俗盛法勉捨之志唯原安枕江東主慈臣恇息謀外甸使中國士女南望懷冤若賈誼重生豈不慟哭臣今直言犯顏罪或容宥而乖忤貴臣則禍在不測所以不憚鼎鑊區區必聞者正以社稷計重而螻蟻命輕使臣言入身滅臣何所恨時帝大弘釋典將以易俗故祖深尤言其事條以為都下佛寺五百餘所窮極宏麗僧尼十餘萬資産豐沃所在郡縣不可勝言道人又有白徒尼則皆畜養女皆不貫人籍天下戶口幾亡其半而僧尼多非法養女皆服羅紈其蠹俗傷法抑由於此請精加檢括若無道行四十已下皆使還俗附農罷白徒養女聽畜奴婢婢唯著青布衣僧尼皆令蔬食如此則法興俗盛國富人殷不然恐方來處處成寺家家剃落尺土一人非復國有杜按梁書不見郭祖深傳南史卷七十循吏郭祖深傳張普惠上疏論佛教張普惠又表乞朝直之日時聽奉見自此之後月一陛見又以肅宗不親視朝過崇佛法郊廟之事多委有司上疏曰臣聞明德恤祀成湯光六百之祚嚴父配天孔子稱周公其人也故能馨香上聞福傳遐世伏惟陛下重暉纂統欽明文思天地屬心百神佇望故宜敦崇祀禮咸秩無文而告朔朝廟不親於明堂嘗禘郊社多委於有司觀射遊苑躍馬騁中危而非典豈清蹕之意殖不思之冥業損巨費於生民減祿削力近供無事之僧崇飾雲殿遠邀未然之報昧爽之臣稽首於外玄寂之衆遨遊於內愆禮忤時人靈未穆愚謂從朝夕之因求秖劫之果未若先萬國之欣心以事其親使天下和平災害不生者也伏願淑慎威儀萬邦作式躬致郊廟之虔親紆朔望之禮釋奠成均竭心千畝明發不寐潔誠禋祼孝悌可以通神明德教可以光四海則一人有喜兆民賴之然後精進三寶信心如來道由禮深故諸漏可盡法隨禮積故彼岸可登量撤僧寺不急之華還復百官久折之秩已興之構務從簡成將來之造權令停息仍舊亦可何必改作庶節用愛人法俗俱賴臣學不經遠言多孟浪忝職其憂不敢默爾尋別敕付外議釋奠之禮魏書卷七十八張普惠傳張普惠上疏論佛教張普惠又表乞朝直之日時聽奉見自此之後月一陛見又以孝明不親視朝過崇佛法郊廟之事多委有司上疏曰伏惟陛下重暉纂統欽明文思天地屬心百神佇望伏願躬致郊廟之虔親紆朔望之澤釋奠成均竭心千畝明發不寐潔誠禋祼孝弟可以通神明德教可以光四海然後精進三寶信心如求道由化深故諸漏可盡法隨禮積故彼岸可登量撤僧寺不急之華還復百官久折之秩已興之構務從簡成將來之造權令停息但仍舊貫亦何必改作庶節用愛人法俗俱賴尋別敕付外議釋奠之禮北史卷四十六張普惠傳杜弼論佛性杜弼奉使詣闕魏帝見之於九龍殿曰朕始讀莊子便值奏名定是體道得真玄同齊物聞卿精學聊有所問經中佛性法性為一為異弼對曰佛性法性止是一理詔又問曰佛性即非法性何得為一對曰性無不在故不説二詔又問曰説者皆言法性寬佛性狹寬狹既別非二如何弼又對曰在寬成寬在狹成狹若論性體非寬非狹詔問曰既言成寬成狹何得非狹非寬若定是狹亦不能成寬對曰以非寬狹故能成寬狹寬狹所成雖異能成恆一上悅稱善乃引入經書庫賜地持經一部帛一百匹弼性好名理探味玄宗自在軍旅帶經從役注老子道行經二卷表上之曰詔答云李君遊神冥窅獨觀恍惚玄同造化宗極群有從中被外周應可以裁成自己及物運行可以資用隆家寧國義屬斯文卿才思優洽業尚通遠息棲儒門馳騁玄肆既啓專家之學且暢釋老之言戶列門張途通徑達理事兼申能用俱表彼賢所未悟遺老所未聞旨極精微言窮深妙朕有味二經倦於舊説歷覽新注所得已多嘉尚之來良非一緒已敕殺青編藏之延閣又上一本於高祖一本於世宗六年四月八日魏帝集名僧於顯陽殿講説佛理弼與吏部尚書楊愔中書邢邵祕書監魏收等並侍法筵敕弼升師子座當從敷演昭玄都僧達及僧道順並緇林之英問難鋒至往復數十番莫有能屈帝曰此賢若生孔門則何如也常與邢邵扈從東山共論名理邢以為人死還生恐為蛇畫足弼答曰蓋謂人死歸無非有能生之力然物之未生本亦無也無而能有不以為疑因前生後何獨致怪邢云聖人設教本由勸獎故懼以將來理望各遂其性弼曰聖人合德天地齊信四時言則為經行則為法而云以虛示物以詭勸民將同魚腹之書有異鑿楹之誥安得使北辰降光龍宮韞櫝既如所論福果可以鎔鑄性靈弘獎風教為益之大莫極於斯此即真教何謂非實邢云死之言澌精神盡也弼曰此所言澌如射箭盡手中盡也小雅曰無草不死月令又云靡草死動植雖殊亦此之類無性之卉尚得還生含靈之物何妨再造若云草死猶有種在則復人死亦有識識種不見謂以為無者神之在形亦非自矚離朱之明不能睹雖蔣濟觀眸賢愚可察鍾生聽曲山水呈狀乃神之工豈神之質鋒玉帛之非禮鐘鼓之非樂以此而推義斯見矣邢云季札言無不之亦言散盡若復聚而為物不得言無不之也弼曰骨肉下歸於土魂氣則無不之此乃形墜魂遊往而非盡如鳥出巢如蛇出穴由其尚有故無所不之若令無也之將焉適延陵有察微之識知其不隨於形仲尼發習禮之歎美其斯與形別若許以廓然然則人皆季子不謂高論執此為無邢云神之在人猶光之在燭燭盡則光窮人死則神滅弼曰舊學前儒每有斯語群疑衆惑咸由此起蓋辨之者未精思之者不篤竊有末見可以核諸燭則因質生光質大光亦大人則神不係形形小神不小故仲尼之智必不短於長狄孟德之雄乃遠奇於崔琰神之於形亦猶君之有國國實君之所統君非國之所生不與同生孰云俱滅邢云捨此適彼生生恆在周孔自應同莊周之鼓缶和桑扈之循歌弼曰共陰而息尚有將別之悲窮轍以遊亦興中途之歎況曰聯體同氣化為異物稱情之服何害於聖邢云鷹化為鳩鼠變為鴽黃母為鱉皆是生之類也類化而相生猶光去此燭復然彼燭弼曰鷹未化為鳩鳩則非有鼠既非二有何可兩立光去此燭得燃彼燭神去此形亦托彼形又何惑哉邢云欲使土化為人木生眼鼻造化神明不應如此弼曰腐草為螢老木為蠍造化不能誰其然也其後別與邢書云夫建言明理宜出典證而違孔背釋獨為君子若不師聖物各有心馬首欲東誰其能御奚取於適衷何貴於得一逸韻雖高管見未喻前後往復再三邢邵理屈而止文多不載北齊書卷二十四杜弼傳杜弼論佛性杜弼奉使詣闕魏帝見之九龍殿曰聞卿精學聊有所問經中佛性法性為一為異弼曰正是一理又問曰説者妄皆言法性寬佛性狹如何弼曰在寬成寬在狹成狹若論性體非狹非寬詔曰既言成寬成狹何得非狹非寬弼曰若定是寬則不能為狹若定是狹亦不能為寬以非寬非狹所成雖異能成恆一上稱善引入經庫賜地持經一部帛百匹弼性好名理探味玄宗在軍恆帶經行注老子道行經二卷表上之遷廷尉卿後魏帝集名僧於顯陽殿講説佛理敕弼升師子座莫有能屈帝歎曰此賢若生孔門則何如也常與邢邵扈從東山共論名理邢以為人死還生恐是為蛇畫足弼曰物之未生本亦無也無而能有不以為疑因前生後何獨致怪邢云聖人設教本由勸獎故懼以有來望各遂其性弼曰聖人合德天地齊信四時言則為經行則為法而云以虛示物以詭勸人安得使北辰降光龍宮韞櫝既如所論福果可以鎔鑄性靈弘獎風教為益之大莫極於斯此即真教何謂非實邢云季札言無不之亦言散盡若復聚而為物不得言無不之也弼曰骨肉下歸於土魂氣則無不之此乃形墜魂遊往而非盡由其尚有故云無所不之若也全無之將焉適邢云神之在人猶光之在燭燭盡則光窮人死則神滅弼曰燭則因質生光質大光亦大人則神不係形形小神不小故仲尼之智必不短於長狄孟德之雄乃遠奇於崔琰其後別與邢書前後往復再三邢理屈而止北史卷五十五杜弼傳元和六年中書門下奏元和六年六月中書門下奏國家自天寶已後中原宿兵見在軍士可使者八十餘萬其餘浮為商販度為僧道雜入色役不歸農桑者又十有五六則是天下常以三分勞筋苦骨之人奉七分坐衣待食之輩今內外官給俸料者不下一萬餘員其間有職出異名奉離本局府寺曠廢簪組因循者甚衆舊唐書卷十四憲宗紀上殷侑擅制戒壇寶歷二年三月辛未江西觀察使殷侑請於洪州寶歷寺置僧尼戒壇敕殷侑故違制令擅置戒壇罰一季俸料舊唐書卷十七上敬宗紀上沈傅奏請起方等戒壇太和三年冬十月戊申朔己酉江西沈傅師奏皇帝誕月請為僧尼起方等戒壇詔曰不度僧尼纍有敕命傅師忝為藩守合奉詔條誘致愚妄庸非理道宜罰一月俸料舊唐書卷十七上文宗紀上僧徒道士講論於麟德殿太和七年冬十月癸未朔揚州江都等七縣水害稼壬辰上降誕日僧徒道士講論於麟德殿翌日御延英上謂宰臣曰降誕日設齋起自近代朕緣相承已久未可便革雖置齋會唯對王源中等暫入殿至僧道講論都不臨聽宰相路隨等奏誕日設齋會誠資景福本非中國教法臣伏見開元十七年張説源乾曜請以誕日為千秋節內外宴樂以慶昌期頗為得禮上深然之宰臣因請十月十日為慶成節上誕日也從之舊唐書卷十七下文宗紀下會昌四年敕會昌四年春正月乙酉朔以澤潞用兵罷元會其日楊辨逐太原節度使李石敕齋月斷屠出於釋氏國家創業猶近梁隋卿相大臣或沿茲弊鼓刀者既獲厚利糾察者潛受請求正月以萬物生植之初宜斷三日列聖忌斷一日仍準開元二十二年敕三元日各斷三日餘月不禁壬子河東監軍使呂義忠收復太原生擒楊辨盡斬其亂卒百僚稱賀舊唐書卷十八上武宗紀史臣論唐武宗削浮圖之法史臣曰武宗於是削浮圖之法懲遊惰之民志欲矯步丹梯求珠赤水徒見蕭衍姚興之謬學不悟秦王漢武之非求盡惑於左道之言偏斥異方之説況身毒西來之教向欲千祀蚩蚩之民習以成俗畏其教甚於國法樂其徒不異登仙如文身祝髮之鄉久習而莫知其醜以吐火吞刀之戲乍觀而便以為神安可正之以咸韶律之以章甫加以笮融何充之佞代不乏人非荀卿孟子之賢誰與正論一朝隳殘金狄燔棄胡書結怨於膜拜之流犯怒於鄙夫之口哲王之舉不駭物情前代存而勿論實為中道欲革斯弊以俟河清昭肅明照聽斯弊矣舊唐書卷十八上武宗紀陳商議廢弘敬寺為太廟事會昌五年留守李石因太微宮正殿圮墮以廢弘敬寺為太廟迎神主祔之又下百僚議皆言準故事無兩都俱置之禮唯禮部侍郎陳商議云周之文武有鎬洛二廟令兩都異廟可也然不宜置主於廟主宜依禮瘞於廟之北墉下事未行而武宗崩宣宗即位因詔有司迎太微宮寓主祔廢寺之新廟而知禮者非之舊唐書卷十八下宣宗紀史臣曰報應必無史臣曰臣常接咸通耆老言恭惠皇帝故事然器本中庸流於近習所親者巷伯所昵者桑門以蠱惑之侈言亂驕淫之方寸欲無怠忽其可得乎然猶削軍賦而飾伽藍因民財而修淨業以諛佞為愛己謂忠諫為妖言是以干戈布野蟲旱彌年佛骨才入於應門龍輴已泣於蒼野報應無必斯其驗歟土德凌夷禍階於此舊唐書卷十九上懿宗紀蕭昕又奏及永泰二年二月朔上丁釋奠蕭昕又奏諸宰相元載杜鴻漸李抱玉及常參官六軍軍將就國子學聽講論賜錢五百貫令京兆尹黎幹造食集諸儒道僧質問竟日此禮久廢一朝能舉舊唐書卷二十四禮儀四長孫皇后論佛教貞觀八年長孫皇后從幸九成宮染疾危惙太子承乾入侍密啓后曰醫藥備盡尊體不療請奏赦囚徒並度人入道冀蒙福助后曰死生有命非人力所加若修福可延吾素非為惡若行善無效何福可求赦者國之大事佛道者示存異方之教耳非惟政體靡弊又是上所不為豈以吾一婦人而亂天下法承乾不敢奏以告左僕射房玄齡玄齡以聞太宗及侍臣莫不歔欷朝臣咸請肆赦太宗從之后聞之固爭乃止舊唐書卷五十一后妃上長孫皇后論佛教長孫皇后從幸九成宮方屬疾會柴紹等急變聞帝甲而起后輿疾以從宮司諫止后曰上震驚吾可自安疾稍亟太子欲請大赦泛度道人祓塞災會后曰死生有命非人力所支若修福可延吾不為惡使善無效我尚何求且赦令國大事佛老異方教耳皆上所不為豈宜以吾亂天下法太子不敢奏以告房玄齡玄齡以聞帝嗟美新唐書卷七十六后妃傳上懿宗喜佛道蕭倣諫之咸通初為左散騎常侍懿宗怠政事喜佛道引桑門入禁中為禱祠事數幸佛廬廣施豫蕭倣諫以為天竺法割愛取滅非帝王所尚慕今筆梵言口佛音不若懲謬賞濫罰振殃祈福況佛者可以悟取不可以相求帝雖昏從猶嘉歎其言後官數遷拜義成軍節度使新唐書卷一百一蕭瑀傳附蕭倣傳孫令問論殺生令問雖特承恩寵未嘗干預時政深為物論所稱然厚於自奉食饌豐侈廣畜芻豢躬臨宰殺時方奉佛其篤信之士或譏之令問曰此物畜生與果菜何異胡為強生分別不亦遠於道乎略不以恩眄自恃間適郊野縱禽自娛舊唐書卷六十七李靖傳附李令瓿傳韋嗣立上疏景龍三年韋嗣立轉兵部尚書同中書門下三品時中宗崇飾寺觀又濫食封邑者衆國用虛竭韋嗣立上疏諫曰臣竊見比者營造寺觀其數極多皆務取宏博競崇環麗大則費耗百十萬小則尚用三五萬餘略計都用資財動至千萬已上轉運木石人牛不停廢人功害農務事既非急時多怨咨故書曰不作無益害有益功乃成不貴異物賤用物民乃足誠哉此言非虛談也且玄旨祕妙歸於空寂苟非修心定慧諸法皆涉有為至如土木雕刻等功唯是殫竭人力但學相誇壯麗豈關降伏身心且凡所興功皆須掘鑿蟄蟲在土種類實多每日殺傷動盈萬計連年如此損害可知聖人慈悲為心豈有須行此事不然之理皎在目前世俗衆僧未通其旨不慮府庫空竭不思聖人憂勞謂廣樹福田即是增修法教倘水旱為災人至飢餒夷狄作梗兵無資糧陛下雖有龍象如雲伽藍概日豈能裨萬分之一救元元之苦哉於道法既有乖在生人極為損陛下豈可不深思之舊唐書卷八十八韋恩謙傳附韋嗣立傳韋嗣立建言韋嗣立建言伏見營立寺觀纍年不絶鴻侈繁麗務相矜勝大抵費常千萬以上轉徒木石廢功害農地藏開發蟄蟲傷露上聖至慈理必不然準之道法則乖質之生人則損陛下豈不是思新唐書卷一百一十六韋恩謙傳附韋嗣立傳狄仁傑上疏諫武則天造大像武則天又將造大像用功數百萬令天下僧尼每日人出一錢以助成之狄仁傑上疏諫曰臣聞為政之本必先人事陛下矜群生迷謬溺喪無歸欲令像教兼行睹相生善非為塔廟必欲崇奢豈令僧此皆須檀施得筏尚捨而況其餘今之伽藍制過宮闕窮奢極壯畫繢盡工寶珠殫於綴飾環材竭於輪奐工不使鬼止在役人物不天來終須地出不損百姓將何以求生之有時用之無度編戶所奉常若不充痛切肌膚不辭箠楚遊僧一説矯陳禍福翦髮解衣仍慚其少亦有離間骨肉事均路人身自納妻謂無彼我皆托佛法詿誤生人里陌動有經坊闤闠亦立精舍化誘倍急切於宮征法事所須嚴於制敕膏腴美業倍取其多水碾莊園數亦非少逃丁避罪並集法門無名之僧凡有幾萬都下檢括已得數千且一夫不耕猶受其弊浮食者衆又劫人財臣每思惟實所悲痛往在江表像法盛興梁武簡文捨施無限其三淮沸浪五嶺騰煙列剎盈衢無救危亡之禍緇衣蔽路豈有勤王之師比年已來風塵屢擾水旱不節征役稍繁家業先空瘡痍未復此時興役力所未堪伏惟聖朝功德無量何必要營大像而以勞費為名雖斂僧錢百未支一尊容既廣不可露居覆以百層尚憂未遍自餘廊廡不得全無又云不損國財不傷百姓以此事主可謂盡忠臣今思惟兼采衆議咸以為如來設教以慈悲為主下濟群品應是本心豈欲勞人以存虛飾當今有事邊境未寧宜寬征鎮之徭省不急之費設令雇作皆以利趨既失田時自然棄本今不樹稼來歲必飢役在其中難以取給況無官助義無得成若費官財又盡人力一隅有難將何救之則天乃罷其役是歲九月病卒則天為之舉哀廢朝三日贈文昌右相諡曰文惠舊唐書卷八十九狄仁傑傳狄仁傑上疏諫武則天造大像武則天后將造浮屠大像度費數百萬官不能足更詔天下僧日施一錢助之狄仁傑諫曰工不役鬼必在役人物不天降終由地出不損百姓且將何求今邊垂未寧宜寬征鎮之徭省不急之務就令顧作以濟窮人既失農時是為棄本且無官助理不得成既費官財又竭人力一方有難何以救之后由是罷役新唐書卷一百一十五狄仁傑傳姚璹論明堂火時武三思率蕃夷酋長請造天樞於端門外刻字紀功以頌周德璹為督作使證聖初姚璹加秋官尚書同平章事是歲明堂災則天欲責躬避正殿璹奏曰此實人火非曰天災至如成周宣榭卜代愈隆漢武建章盛德彌永臣又見彌勒下生經云當彌勒成佛之時七寶台須臾散壞睹此無常之相便成正覺之因故知聖人之道隨緣示化方便之利博濟良多可使由之義存於此況今明堂乃是布政之所非宗廟之地陛下若避正殿於禮未為得也左拾遺劉承慶廷奏云明堂宗祀之所今既被焚陛下宜輟朝思過璹又持前議以爭之則天乃依璹奏先令璹監造天樞至是以功當賜爵一等璹表請回贈父一官乃追贈其父豫州司戶參軍處平為博州刺史天后將封嵩嶽命璹總知撰儀注並充封禪副使及重造明堂又令璹充使督作以功加銀青光祿大夫舊唐書卷八十九姚璹傳姚璹論明堂火證聖初加秋官尚書明堂火后欲避正殿應天變姚璹奏此人火非天災也昔宣榭火周世延建章焚漢業昌且彌勒成佛七寶台須臾散壞聖人之道隨物示化況明堂布政之宮非宗廟不宜避正殿貶常禮左拾遺劉承慶曰明堂所以宗祀為天所焚當側身思過振除前犯璹挾前語以傾後意后乃更御端門大酺燕群臣與相娛樂遂造天樞著己功德命璹為使董督之功費浩廣見金不足乃斂天下農器並鑄以功賜爵一級后封嵩山詔璹總知儀注為封禪副使更造明堂又以使護作加銀青光祿大夫大食使者獻師子璹曰是獸非肉不食自碎葉至都所費廣矣陛下鷹犬且不蓄而厚資養猛獸哉有詔大食停獻時九鼎成后欲用黃金塗之璹奏鼎者神器貴質朴不待外飾臣觀其上先有五采雜昈豈待塗金為符曜耶后乃止新唐書卷一百二姚思廉傳附姚璹傳桓彥范表論時政桓彥范嘗表論時政數條其大略曰臣聞京師喧喧道路籍籍皆云胡僧慧范矯托佛教詭惑后妃故得出入禁闈撓亂時政陛下又輕騎微行數幸其室上下媟黷有虧尊嚴臣抑嘗聞興化致理必由進善康國寧人莫大棄惡故孔子曰執左道以亂政者殺假鬼神以危人者殺今慧范之罪不殊於此也若不急誅必生變亂除惡務本去邪勿疑實願天聰早加裁貶疏奏不納時有墨敕授方術人鄭普思祕書監葉淨能國子祭酒彥范苦言其不可帝曰既要用之無容便止彥范又對曰陛下自龍飛寶位遽下制云軍國政化皆依貞觀故事昔貞觀中嘗以魏征虞世南顏師古為祕書監孔穎達為國子祭酒至如普思等是方伎庸流豈足以比蹤前烈臣恐物議謂陛下官不擇才濫以天秩加於私愛惟陛下少加慎擇帝竟不納舊唐書卷九十一桓彥范傳郭霸表稱武則天是彌勒佛身時有御史郭霸上表稱則天是彌勒佛身鳳閣舍人張嘉福與洛州人王慶之等請立武承嗣為皇太子皆請張仁願連名署表仁願正色拒之甚為有識所重舊唐書卷九十三張仁願傳李嶠上疏諫武則天於白司馬阪建大像長安末則天將建大像於白司馬阪李嶠上疏諫之其略曰臣以法王慈敏菩薩護持唯擬饒益衆生非要營修土木伏聞造像稅非戶口錢出僧尼不得州縣祗承必是不能濟辦終須科率豈免勞擾天下編戶貧弱者衆亦有傭力客作以濟餱糧亦有賣舍貼田以供王役造像錢見有一十七萬餘貫若將散施廣濟貧窮人與一千濟得一十七萬餘戶拯飢寒之弊省勞役之勤順諸佛慈悲之心沾聖君亭育之意人神胥悅功德無窮疏奏不納舊唐書卷九十四李嶠傳李嶠上疏諫武則天於白司馬阪建大像武后將建大像於白司馬阪李嶠諫造像雖俾浮屠輸錢然非州縣承辦不能濟是名雖不稅而實稅之臣計天下編戶貧弱者衆有賣舍帖田供王役者今造像錢積十七萬緡若頒之窮人家給千錢則紓十七萬戶飢寒之苦德無窮矣不納新唐書卷一百二十三李嶠傳姚崇論佛教先是中宗時公主外戚皆奏請度人為僧尼亦有出私財造寺者富戶強丁皆經營避役遠近充滿至是姚崇奏曰佛不在外求之於心佛圖澄最賢無益於全趙羅什多藝不救於亡秦何充苻融皆遭敗滅齊襄梁武未免災殃但發心慈悲行事利益使蒼生安樂既是佛身何用妄度姦人令壞正法上納其言令有司隱括僧徒以偽濫還俗者萬二千餘人舊唐書卷九十六姚崇傳姚崇論佛教崇先分其田園令諸子侄各守其分仍為遺令以誡子孫其略曰今之佛經羅什所譯姚興執本與什對翻姚興造浮屠於永貴里傾竭府庫廣事莊嚴而興命不得延國亦隨滅又齊跨山東周據關右周則多除佛法而修繕兵威齊則廣置僧徒而依憑佛力及至交戰齊氏滅亡國既不存寺復何有修福之報何其蔑如梁武帝以萬乘為奴胡太后以六宮入道豈特身戮名辱皆以亡國破家近日孝和皇帝發使贖生傾國造寺太平公主武三思悖逆庶人張夫人等皆度人造寺竟術彌街咸不免受戮破家為天下所笑經云求長命得長命求富貴得富貴刀尋段段壞火坑變成池比來緣精進得富貴長命者為誰生前易知尚覺無應身後難究誰見有征且五帝之時父不葬子兄不哭弟言其致仁壽無夭橫也三王之代國祚延長人用休息其人臣則彭祖老聃之類皆享遐齡當此之時未有佛教豈抄經鑄像之力設齋施物之功耶宋書西域傳有名僧為白黑論理證明白足解沈疑宜觀而行之且佛者覺也在乎方寸假有萬像之廣不出五蘊之中但平等慈悲行善不行惡則佛道備矣何必溺於小説惑於凡僧仍將喻品用為實録抄經寫像破業傾家乃至施身亦無所吝可謂大惑也亦有緣亡人造像名為追福方便之教雖則多端功德須自發心旁助寧應獲報遞相欺誑浸成風俗損耗生人無益亡者假有通才達識亦為時俗所拘如來普慈意存利物損衆生之不足厚豪僧之有餘必不然矣且死者是常古來不免所造經像何所施為夫釋伽之本法為蒼生之大弊汝等名宜警策正法在心勿效兒女子曹終身不悟也吾亡後必不得為此弊法若未能全依正道須順俗情從初七至終七任設七僧齋若隨齋須布施宜以吾緣身衣物充不得輒用餘財為無益之枉事亦不得妄出私物徇追福之虛談道士者本以玄牝為宗初無趨競之教而無識者慕僧家之有利約佛教而為業敬尋老君之説亦無過齋之文抑同僧例失之彌遠汝等勿拘鄙俗輒屈於家汝等身沒之後亦教子孫依吾此法云舊唐書卷九十六姚崇傳姚崇論佛教姚崇因跪奏臣願以十事聞陛下度不可行臣敢辭帝曰試為朕言之崇曰垂拱以來以峻法繩下臣願政先仁恕可乎武后造福先寺上皇造金仙玉真二觀費巨百萬臣請絶道佛營造可乎中宗時近戚奏度僧尼溫戶強丁因避賦役至是姚崇建言佛不在外悟之於心行事利益使蒼生安穩是謂佛理烏用姦人以汩真教帝善之詔天下汰僧偽濫發而農者餘萬二千人新唐書卷一百二十四姚崇傳姚崇論佛教姚崇析資産令諸子各有定分治令曰今之佛經羅什所譯姚興與之對翻而興命不延國亦隨滅梁武帝身為寺奴齊胡太后以六宮入道皆亡國殄家近孝和皇帝發使贖生太平公主武三思等度人造寺身嬰夷戮為天下笑五帝之時父不喪子兄不哭弟致仁壽無凶短也下逮三王國祚延久其臣則彭祖老聃皆得長齡此時無佛豈抄經鑄像力邪緣死喪造經像以為追福夫死者生之常古所不免彼經與像何所施為兒曹慎不得為此新唐書卷一百二十四姚崇傳張廷圭論佛教張廷圭河南濟源人其先自常州徙焉廷圭少以文學知名性慷慨有志尚弱冠應制舉長安中纍遷監察御史則天稅天下僧尼出錢欲於白司馬阪營建大像廷圭上疏諫曰夫佛者以覺知為義因心而成不可以諸相見也經云若以色見我以音聲求我是人行邪道不能見如來此真如之果不外求也陛下信心歸依發宏誓願壯其塔廟廣其尊容已遍於天下久矣蓋有住於相而行布施非最上第一希有之法何以言之經云若人滿三千大千世界七寶以用布施及恆河沙等身命布施其福甚多若人於此經中受持及四句偈等為人演説其福勝彼如佛所言則陛下傾四海之財殫萬人之力窮山之木以為塔極冶之金以為像雖勞則甚矣費則多矣而所獲福不愈於一禪房之匹夫菩薩作福德不應貪著蓋有為之法不足高也況此營建事殷木土或開發盤礡峻築基階或塞穴洞通轉采斫輾壓蟲蟻動盈巨億豈佛標坐夏之義憫蠢動而不忍害其生哉又役鬼不可唯人是營通計工匠率多貧窶朝驅暮役勞筋苦骨簞食瓢飲晨炊星飯飢渴所致疾疹交集豈佛標徒行之義憫畜獸而不忍殘其力哉又營築之資僧尼是稅雖乞丐所致而貧闕猶多州縣征輸星火逼迫或謀計靡所或鬻賣以充怨聲載路和氣未洽豈佛標隨喜之義憫愚蒙而不忍奪其産哉且邊朔未寧軍裝日給天下虛竭海內勞弊伏惟陛下慎之重之思菩薩之行為利益一切衆生應如是布施則其福德若南西北方四維上下虛空不可思量矣何必勤於住相凋蒼生之業崇不急之務乎臣以時政論之則宜先邊境蓄府庫養人力臣以釋教論之則宜救苦厄滅諸相崇無為伏願陛下察臣之愚行佛之意務以理為上不以人廢言幸甚幸甚則天從其言即停所作仍於長生殿召見深賞慰之景龍末為中書舍人再轉洪州都督仍為江南西道按察使舊唐書卷一百一張廷圭傳張廷圭論佛教張廷圭河南濟源人武后稅天下浮屠錢營佛祠於白司馬阪作大象廷圭諫以為傾四海之財殫萬民之力窮山之木為塔極冶之金為象然猶有為之法不足高也填塞澗穴覆壓蟲蟻且巨億計工員窮窶驅役為勞飢渴所致疾疹方作又僧尼乞丐自贍而州縣督輸星火迫切鬻賣以充非浮屠所謂隨喜者今天下虛竭蒼生凋弊謂宜先邊境實府庫養人力后善之召見長生殿賞慰良厚因是罷役神龍初詔白司馬阪復營佛祠廷圭方奉詔抵河北道出其所見營築勞亟懷不能已上書切爭且言自中興之初下詔書弛不急斥少監楊務廉以示中外今土木復興不稱前詔掘壤伐木浸害生氣願罷之以紓窮乏帝不省尋為中書舍人再遷禮部侍郎新唐書卷一百一十八張廷圭傳辛替否論佛教當今疆場危駭倉廩空虛揭竿守禦之士賞不及肝腦塗地之卒輸不充而方大起寺舍廣造第宅伐木空山不足充梁棟運土塞路不足充牆壁誇古躍今逾章越制百僚鉗口四海傷心夫釋教者以清淨為基慈悲為主故當體道以濟物不欲利己以損人故常去己以全真不為榮身以害教三時之月掘山穿池損命也殫府虛帑損人也廣殿長廊榮身也損命則不慈悲損人則不濟物榮身則不清淨豈大聖神之心乎臣以為非真教非佛意違時行違人欲自像王西下佛教東傳青螺不入於周前白馬方行於漢後風流雨散千帝百王飾彌盛而國彌空役彌重而禍彌大覆車繼軌曾不改途晉臣以佞佛取譏梁主以捨身構隙若以造寺必為其理體養人不足以經邦則殷周已往皆暗亂漢魏已降皆聖明殷周已往為不長漢魏已降為不短臣聞夏為天子二十餘代而殷受之殷為天子二十餘代而周受之周為天子三十餘代而秦受之自漢已後歷代可知也何者有道之長無道之短豈因其窮金玉修塔廟方得久長之祚乎臣聞於經曰菩薩心住於法而行布施如人入暗既無所見又曰一切有為法如夢幻泡影如露亦如電臣以減雕琢之費以賑貧下是有如來之德息穿掘之苦以全昆蟲是有如來之仁罷營構之直以給邊陲是有湯武之功回不急之祿以購廉清是有唐虞之理陛下緩其所急急其所緩親未來而疏見在失真實而冀虛無重俗人之所為而輕天子之功業臣竊痛之矣當今出財依勢者盡度為沙門避役姦訛者盡度為沙門其所未度唯貧窮與善人將何以作范乎將何以役力乎臣以為出家者捨塵俗離朋黨無私愛今殖貨營生非捨塵俗拔親樹知非離朋黨畜妻養孥非無私愛是致人以毀道非廣道以求人伏見今之宮觀台榭京師之與洛陽不增修飾猶恐奢麗陛下尚欲填池塹損苑囿以賑貧人無産業者今天下之寺蓋無其數一寺當陛下一宮壯麗之甚矣用度過之矣是十分天下之財而佛有七八陛下何有之矣百姓何食之矣雖以陰陽為炭萬物為銅役不食之人使不衣之士猶尚不給況資於天生地養風動雨潤而後得之乎臣聞國無九年之儲國非其國伏計倉廩度府庫百僚供給百事用度臣恐卒歲不充況九年之積乎一旦風塵再擾霜雹荐臻沙門不可擐干戈寺塔不足攘飢饉臣竊痛之矣疏奏不納歲餘安樂公主被誅睿宗即位又為金仙玉真公主廣營二觀先是中宗時斜封受官人一切停任凡數百千人又有敕放令卻上替否時為左補闕又上疏陳時政曰伏以太宗文武聖皇帝陛下之祖撥亂反正開階立極得至理之體設簡要之方省其官清其吏舉天下職司無一虛授用天下財帛無一枉費賞必俟功官必得俊所為無不成所征無不伏不多造寺觀而福德自至不多度僧尼而殃咎自滅道合乎天地德通乎神明故天地憐之神明佑之使陰陽不愆風雨合度四人樂其業五穀逐其成腐粟爛帛填街委巷千里萬里貢賦於郊九夷百蠻歸款於闕自有帝皇已來未有若斯之神聖者也故得享國久長多歷年所陛下何不取而則之中宗孝和皇帝陛下之兄居先人之業忽先人之化不取賢良之言而恣子女之意官爵非擇虛食祿者數千人封建無功妄食土者百餘戶造寺不止枉費財者數百億度人不休免租庸者數十萬是使國家所出加數倍所入減數倍倉不停卒歲之儲庫不貯一時之帛所惡者逐逐多忠良所愛者賞賞多讒慝朋佞喋喋交相傾動容身不為於朝廷保位皆由於黨附奪百姓之食以養殘凶剝萬人之衣以塗土木於是人怨神怒親忿衆離水旱不調疾疫屢起遠近殊論公私罄然五六年間再三禍變享國不永受終於凶婦人寺舍不能保其身僧尼不能護妻子取譏萬代見笑四夷此陛下之所眼見也何不除而改之依太宗之理國則百官以理百姓無憂故太山之安立可致矣依中宗之理國則萬人以怨百事不寧故纍卵之危立可致矣頃自夏已來霪雨不解谷荒於壟麥爛於場入秋已來亢旱成災苗而不實霜損蟲暴草葉枯黃下人咨嗟未知周賑而營寺造觀日繼於時檢校試官充台溢署伏惟陛下愛兩女為造兩觀燒瓦運木載土填坑道路流言皆云計用錢百餘萬貫惟陛下聖人也無所不知陛下明君也無所不見既知且見知倉有幾年之儲庫有幾歲之帛知百姓之間可存活乎三邊之上可轉輸乎當今發一卒以御邊陲遣一兵以衛社稷多無衣食皆帶飢寒賞賜之間迥無所出軍旅驟敗莫不由斯而乃以百萬貫錢造無用之觀以受六合之怨乎以違萬人之心乎伏惟陛下續阿韋之醜迹而不改阿韋之亂政忍棄太宗之理本不忍棄中宗之亂階忍棄太宗久長之謀不忍棄中宗短促之計陛下又何以繼祖宗觀萬國昔陛下為皇太子在阿韋之時危亡是懼常切齒於群凶今貴為天子富有海內而不改群凶之事臣恐復有切齒於陛下者也陛下又何以非群凶而誅之臣往見明敕自今已後一依貞觀故事且貞觀之時豈有今日之造寺營觀加僧尼道士益無用之官行不急之務而亂政者也臣以為棄其言而不行其信慕其善而不遷其惡陛下又何以刑於四海往者和帝之憐悖逆也為姦人之所誤宗晉卿勸為第宅趙履溫觀為園亭損數百家之居侵數百家之地工徒斫而未息義兵紛以交馳卒使亭不得遊宅不得坐信邪佞之説成骨肉之刑此陛下之所眼見也今茲造觀臣必知非陛下公主之本意得無趙履溫之徒將勸為之冀誤其骨肉不可不明察也臣聞出家修道者不預人事專清其身心以虛泊為高以無為為妙依兩卷老子視一軀天尊無欲無營不損不害何必璇台玉榭寶像珍龕使人困窮然後為道哉且舊觀足可歸依無造無營以取窮竭若此行之三年國不富人不安朝廷不清陛下不樂則臣請殺身於朝以令天下言事者伏惟陛下行非常之惠權停兩觀以俟豐年以兩觀之財為公主施貧窮填府庫則公主福德無窮矣不然臣恐下人怨望不減於前朝之時前朝之時賢愚知敗人雖有口而不敢言言未發聲禍將及矣韋月將受誅於丹徼燕欽融見殺於紫庭此人皆不惜其身而納忠於主身既死矣朝亦危矣故先朝誅之陛下賞之是陛下知直言之士有裨於國臣今直言亦先代之直惟陛下察之疏奏睿宗嘉其公直稍遷為右台殿中侍御史開元中纍轉穎王府長史天寶初卒年八十餘舊唐書卷一百一辛替否傳辛替否論佛教辛替否字協時京兆萬年人武崇訓死主棄故宅別築第侈費過度又盛興佛寺公私疲匱替否上疏曰古之建宮不必備九卿有位而闕其選故賞不僭官不濫士有完行家有廉節朝廷餘奉百姓餘食下忠於上上禮於下委裘無倉卒之危垂拱無顛沛之患夫事有惕耳目動心慮作不師古以行於今臣得言之陛下倍百行賞倍十增官金銀不供於印束帛不充於錫何所愧於無用之臣無力之士哉今疆場危駭倉廩空虛卒輸不充士賞不及而大建寺宇廣造第宅伐木空山不給棟梁運土塞路不充牆壁所謂佛者清淨慈悲體道以濟物不欲利以損人不榮身以害教今三時之月掘山穿地損命也殫府虛帑損人也廣殿長廊榮身也損命則不慈悲損人則不愛物榮身則不清淨寧佛者之心乎昔夏為天子二十餘世而商受之商二十餘世而周受之周三十餘世而漢受之由漢而後歷代可知已咸有道之長無道之短豈窮金玉修塔廟享久長之祚乎臣以為減凋琢之費以貝周不足是有佛之德息穿掘之苦以全昆蟲是有佛之仁罷營構之直以給邊垂是有湯武之功回不急之祿以購廉清是有唐虞之治陛下緩其所急急其所緩親未來疏見在失真實冀虛無重俗人之所為而輕天子之業臣竊痛之今出財依勢避役亡命類度為沙門其未度者窮民善人耳拔親樹知豈離朋黨畜妻養孥非無私愛是致毀道非廣道求人也陛下常欲填池塹捐苑囿以賑貧人今天下之寺無數一寺當陛下一宮壯麗用度尚或過之十分天下之財而佛有七八陛下何有之矣雖役不食之人不衣之士猶尚不給況必待天生地養風動雨潤而後得之乎臣聞國無九年之儲曰非其國今計倉廩度府庫百僚共給萬事用度臣恐不能卒歲假如兵旱相乘則沙門不能擐甲胄寺塔不足穰飢饉矣帝不省睿宗立罷斜封官千餘人俄詔復之方營金仙玉真觀替否以左補闕上疏曰臣謂古之用度不時爵賞不當國破家亡者口説不若身逢耳聞不若目見臣請以有唐治道得失陛下所及見者言之太宗陛下之祖撥亂立極得至治之體省官清吏舉天下職司無虛授用天下財帛無枉費賞必待功官必得才為無不成征無不服不多寺觀而福祿至不度僧尼而咎殃滅陰陽不愆五穀遂成粟腐帛爛萬里貢賦百蠻歸款享國久長多歷年所陛下何憚而不法之中宗陛下之兄居先帝之業忽先帝之化不聽賢臣之言而悅子女之意虛食祿者數千人妄食土者百餘戶造寺蠹財數百億度人免租庸數十萬是故國家所出日加所入日減倉乏半歲之儲庫無一時之帛所惡者逐逐必忠良所愛者賞賞皆讒慝朋佞喋喋交相傾動奪百姓之食以養殘凶剝萬人之衣以塗土木人怨神怒親忿衆離水旱疾疫六年之間三禍為變享國不永受終於凶婦取譏萬代詒笑四夷陛下所見也若法太宗治國太山之安可致也法中宗治國纍卵之危亦可致也頃淫雨不解谷荒於壟麥爛於場入秋亢旱霜損蟲暴草木枯黃下人咨嗟未知所濟而營寺造觀日繼於時道路流言計用緡錢百餘萬陛下知倉有錢幾儲庫有幾歲帛百姓何所活三邊何所輸民散兵亂職此由也而以百萬構無用之觀受天下之怨陛下忍棄太宗之治本不忍棄中宗之亂階忍棄太宗久長之謀不忍棄中宗短促之計何以繼祖宗觀萬國耶陛下在韋氏時切齒群凶今貴為天子不改其事恐復有切齒於陛下者往見明敕一用貞觀故事且貞觀有營寺觀加浮屠黃老益無用之官行不急之務者乎往者和帝之憐悖逆也宗晉卿勸為第宅趙履溫勸為園亭工徒未息義兵交馳亭不得遊宅不得息信邪僻之説成骨肉之刑陛下所見也今茲二觀得無晉卿之徒陰勸為之冀誤骨肉不可不察也惟陛下停二觀以須豐年以所費之財給貧窮填府庫則公主福無窮矣疏奏帝不能用然嘉切直新唐書卷一百一十八辛替否傳食去葷血心依定惠維上元元年太歲庚子六月己未朔二十六日甲申皇第十二子持節鳳翔等四州節度觀察大使興王紹薨於中京內邸殯於寢之西階愛詔有司恭宣懿德其辭曰惟天祚唐五經在口六律諧心才優藝洽絶古超今蛇豕猶梗寰區未父滌慮祈真焚香演偈食去葷血心依定惠庶福邦家俾清凶穢霧露嬰疾聰明害神沉痾始遘彌曠盈旬止慮無擾發言有倫舊唐書卷一百一十六肅宗代宗諸子恭懿太子李紹傳彭偃論佛道彭偃少負俊才鋭於進取為當塗者所抑形於言色大歷末為都官員外郎時劍南東川觀察使李叔明上言以佛道二教無益於時請粗加澄汰其東川寺觀請定為二等上等寺留僧二十一人上觀留道士十四人降殺以七皆精選有道行者餘悉令返初蘭若道場無名者皆廢德宗曰叔明此奏可為天下通制不唯劍南一道下尚書集議彭偃獻議曰王者之政變人心為上因人心次之不變不因循常守固者為下故非有獨見之明不能行非常之事今陛下以惟新之政為萬代法若不革舊風令歸正道者非也當今道士有名無實時俗鮮重亂政猶輕唯有僧尼頗為穢雜自西方之教被於中國去聖日遠空門不行五濁比丘但行粗法爰自後漢至於陳隋僧之廢滅其亦數乎或至坑殺殆無遺餘前代帝王豈惡僧道之善如此之深耶蓋其亂人亦已甚矣且佛之立教清淨無為若以色見即是邪法開示悟人唯有一門所以三乘之人比之外道況今出家者皆是無識下劣之流縱其戒行高潔在於王者已無用矣況是苟避征徭於殺盜淫穢無所不犯者乎今叔明之心甚善然臣恐其姦吏詆欺而去者未必非留者不必是無益於國不能息姦既不變人心亦不因人心強制力持難致遠耳臣聞天生蒸人必將有職遊行浮食王制所禁故有才者受爵祿不肖者出租征此古之常道也今天下僧道不耕而食不織而衣廣作危言險語以惑愚者一僧衣食歲計約三萬有餘五丁所出不能致此舉一僧以計天下其費可知陛下日旰憂勤將去人害此而不救奚其為政臣伏請僧道未滿五十者每年輸絹四匹尼及女道士未滿五十者每年輸絹二匹其雜色役與百姓同有才智者令入仕請還俗為平人者聽但令就役輸課為僧何傷臣竊料其所出不下今之租賦三分之一然則陛下之國富矣蒼生之害除矣其年過五十者請皆免之夫子曰五十而知天命列子曰不班白不知道人年五十嗜欲已衰縱不出家心已近道況戒律檢其情性哉臣以為此令既行僧道規避還俗者固已太半其年老精修者必盡為人師則道釋二教益重明矣議者是之上頗善其言大臣以二教行之已久列聖奉之不宜頓擾宜去其太甚其議不行偃以才地當掌文誥以躁求為時論所抑鬱鬱不得志涇師之亂從駕不及匿於田家為賊所得朱泚素知之得偃甚喜偽署中書舍人僭號辭令皆偃為之賊敗與偽中丞崔宣賊將杜如江吳希光等十三人李晟收之俱斬於安國寺前舊唐書卷一百二十七彭偃傳姚南仲諫代宗於章敬寺北起陵廟大歷十三年貞懿皇后獨孤氏崩代宗悼惜不已令於近城為陵墓冀朝夕臨望於目前姚南仲上疏諫曰伏聞貞懿皇后今於城東章敬寺北以起陵廟臣不知有司之請乎陛下之意乎陰陽家流希旨乎臣愚以為非所宜也謹具疏陳論伏願暫留天眷而省察焉臣聞人臣宅於家君上宅於國長安城是陛下皇居也其可穿鑿興動建陵墓於其側乎此非宜一也夫葬者藏也欲人之不得見也是以古帝前王葬后妃莫不憑丘原遠郊郭如骨肉歸土魂無不之章敬之北竟何所益視之兆庶則彰溺愛垂之萬代則纍明德此非所宜二也舊唐書卷一百五十三姚南仲傳韓愈諫唐憲宗迎佛骨鳳翔法門寺有護國真身塔塔內有釋伽文佛指骨一節其書本傳法三十年一開開則歲豐人泰元和十四年正月上令中使杜英奇押宮人三十人持香花赴臨皋驛迎佛骨自光順門入大內留禁中三日乃送諸寺王公士庶奔走捨施唯恐在後百姓有廢業破産燒頂灼臂而求供養者韓愈素不喜佛上疏諫曰伏以佛者夷狄之一法耳自後漢時始流入中國上古未嘗有也昔黃帝在位百年年百一十歲少昊在位八十年年百歲顓頊在位七十九年年九十八歲帝嚳在位七十年年百五歲帝堯在位九十八年年百一十八歲帝舜及禹年皆百歲此時天下太平百姓安樂壽考然而中國未有佛也其後殷湯奕年百歲湯孫太戊在位七十五年武丁在位五十年書史不言其壽推其年數蓋亦俱不減百歲周文王年九十七歲武王年九十三歲穆王在位百年此時佛法亦未至中國非因事佛而致此也漢明帝時始有佛法明帝在位才十八年耳其後亂亡相繼運祚不長宋齊梁陳元魏已下事佛漸謹年代尤促唯梁武帝在位四十八年前後三度捨身施佛宗廟之祭不用牲牢晝日一食止於菜果其後竟為侯景所逼餓死台城國亦尋滅事佛求福乃更得禍由此觀之佛不足信亦可知矣高祖始受隋禪則議除之當時群臣識見不遠不能深究先王之道古今之宜推闡聖明以救斯弊其事遂止臣嘗恨焉伏惟皇帝陛下神聖英武數千百年以來未有倫比即位之初即不許度人為僧尼道士又不許別立寺觀臣當時以為高祖之志必行於陛下之手今縱未能即行豈可恣之轉令盛也今聞陛下令群僧迎佛骨於鳳翔御樓以觀舁入大內令諸寺遞迎供養臣雖至愚必知陛下不惑於佛作此崇奉以祈福祥也直以年豐人樂徇人之心為京都士庶設詭異之觀戲玩之具耳安有聖明若此而肯信此等事哉然百姓愚冥易惑難曉苟見陛下如此將謂真心信佛皆云天子大聖猶一心敬信百姓微賤於佛豈合惜身命所以灼頂燔指百十為群解衣散錢自朝至暮轉相倣效唯恐後時老幼奔波棄其生業若不即加禁遏更歷諸寺必有斷臂臠身以為供養者傷風敗俗傳笑四方非細事也佛本夷狄之人與中國言語不通衣服殊制口不道先王之法言身不服先王之法服不知君臣之義父子之情假如其身尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賓一設賜衣一襲衛而出之於境不令惑於衆也況其身死已久枯朽之骨凶穢之餘豈宜以入宮禁孔子曰敬鬼神而遠之古之諸侯行弔於國尚令巫祝先以桃茢祓除不祥然後進弔今無故取朽穢之物親臨觀之巫祝不先桃茢不用群臣不言其非御史不舉其失臣實恥之乞以此骨付之水火永絶根本斷天下之疑絶後代之惑使天下之人知大聖人之所作為出於尋常萬萬也豈不盛哉豈不快哉佛如有靈能作禍祟凡有殃咎宜加臣身上天鑒臨臣不怨悔疏奏憲宗怒甚間一日出疏以示宰臣將加極法裴度崔群奏曰韓愈上忤尊聽誠宜得罪然而非內懷忠懇不避黜責豈能至此伏乞稍賜寬容以來諫者上曰愈言我奉佛太過我猶為容之至謂東漢奉佛之後帝王咸致夭促何言之乖剌也愈為人臣敢爾狂妄固不可赦於是人情驚惋乃至國戚諸貴亦以罪愈太重因事言之乃貶為潮州刺史舊唐書卷一百六十韓愈傳唐憲宗評韓愈憲宗謂宰臣曰昨得韓愈到潮州表因思其所諫佛骨事大是愛我我豈不知然愈為人臣不當言人主事佛乃年促也我以是惡其容易上欲復用愈故先語及觀宰臣之奏對舊唐書卷一百六十韓愈傳韓愈諫唐憲宗迎佛骨憲宗遣使者往鳳翔迎佛骨入禁中三日乃送佛祠王公士人奔走膜唄至為夷法灼體膚委珍貝騰沓係路愈聞惡之乃上表曰佛者夷狄之一法耳自後漢時始入中國上古未嘗有也昔黃帝在位百年年百一十歲少昊在位八十年年百歲顓頊在位七十九年年九十歲帝嚳在位七十年年百五歲堯在位九十八年年百一十八歲帝舜在位及禹年皆百歲此時天下太平百姓安樂壽考然而中國未有佛也其後湯亦年百歲湯孫太戊在位七十五年武丁在位五十年書史不言其壽推其年數盡不減百歲周文王年九十七歲武王年九十三歲穆王在位百年此時佛法亦未至中國非因事佛而致然也漢明帝時始有佛法明帝在位才十八年其後亂亡相繼運祚不長宋齊梁陳元魏以下事佛漸謹年代尤促唯梁武帝在位四十八年前後三捨身施佛宗廟祭不用牲牢晝日一食止於菜果後為侯景所逼餓死台城國亦尋滅事佛求福乃更得禍由此觀之佛不足信亦可知矣高祖始受隋禪則議除之當時群臣識見不遠不能深究先王之道古今之宜推闡聖明以救斯弊其事遂止臣常恨焉伏惟睿聖文武皇帝陛下神聖英武數千百年以來未有倫比即位之初即不許度人為僧尼道士又不許別立寺觀臣當時以為高祖之志必行於陛下今縱未能即行豈可恣之令盛也今陛下令群僧迎佛骨於鳳翔御樓以觀舁入大內又令諸寺遞加供養臣雖至愚必知陛下不惑於佛作此崇奉以祈福祥也直以豐年之樂徇人之心為京都士庶設詭異之觀戲玩之具耳安有聖明若此而肯信此等事哉然百姓愚冥易惑難曉苟見陛下如此將謂真心信佛皆云天子大聖猶一心信向百姓微賤於佛豈合更惜身命以至灼頂燔指十百為群解衣散錢自朝至暮轉相放效唯恐後時老幼奔波棄其生業若不即加禁遏更歷諸寺必有斷臂臠身以為供養者傷風敗俗傳笑四方非細事也佛本夷狄之人與中國言語不通衣服殊制口不道先王之法言身不服先王之法服不知君臣之義父子之情假如其身尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賓一設賜衣一襲衛而出之於境不令二於衆也況其身死已久枯朽之骨凶穢之餘豈宜以入宮禁孔子曰敬鬼神而遠之古之諸侯弔於其國必令巫祝先以桃茢祓除不祥然後進弔今無故取朽穢之物親臨觀之巫祝不先桃茢不用群臣不言其非御史不舉其失臣實恥之乞以此骨會之水火永絶根本斷天下之疑絶前代之惑使天下之人知大聖人之所作為出於尋常萬萬也佛如有靈能作禍祟凡有殃咎宜加臣身上天鑒臨臣不怨悔表入帝大怒持示宰相將抵以死裴度崔群曰愈言訐牾罪之誠宜然非內懷至忠安能及此願少寬假以來諫爭帝曰愈言我奉佛太過猶可容至謂東漢奉佛以後天子咸夭促言何乖剌邪愈人臣狂妄敢爾固不可赦於是中外駭懼雖戚里諸貴亦為愈言乃貶潮州刺史既至潮以表哀謝曰臣以狂妄戇愚不識禮度陳佛骨事言涉不恭正名定罪萬死莫塞陛下哀臣愚忠恕臣狂直謂言雖可罪心亦無它特屈刑章以臣為潮州刺史既免刑誅又獲祿食聖恩寬大天地莫量破腦刳心豈足為謝新唐書卷一百七十六韓愈傳張籍論韓愈張籍者字文昌和州烏江人當時有名士皆與遊而愈賢重之籍性狷直嘗責韓愈喜博塞及為駁雜之説論議好勝人其排釋老不能著書若孟軻楊雄以垂世者愈最後答書曰新唐書卷一百七十六韓愈傳附張籍傳史臣贊韓愈贊曰唐興承五代剖分王政不綱文弊質窮圭黽俚混並天下已定治荒剔蠹討究儒術以興典憲薰醲涵浸殆百餘年其後文章稍稍可述至貞元元和間愈遂以六經之文為諸儒倡障隄末流反刓以朴剷偽以真然愈之才自視司馬遷楊雄至班固以下不論也當其所得粹然一出於正刊落陳言橫騖別驅汪洋大肆要之無抵捂聖人者其道盡自比孟軻以荀況楊雄為未淳寧不信然至進諫陳謀排難恤孤矯拂偷末皇皇於仁義可謂篤道君子矣自晉汔隋老佛顯行聖道不斷如帶諸儒倚天下正議助為怪神愈獨喟然引聖爭四海之惑雖蒙訕笑跲而復奮始若未之信卒大顯於時昔孟軻拒楊墨去孔子才二百年愈排二家乃去千餘歲撥衰反正功與齊而力倍之所以過況雄為不少矣自愈沒其言大行學者仰之如泰山北斗云新唐書卷一百七十六韓愈傳蕭倣論佛教懿宗怠臨朝政僻於奉佛內結道場聚僧念誦又數幸諸寺施與過當蕭倣上疏論之曰臣聞玄祖之道由慈儉為先而素王之風以仁義為首相沿百代作則千年至聖至明不可易也如佛者生於天竺去彼王宮割愛中之至難取滅後之殊勝名歸象外理絶塵中非為帝王之所能慕也昔貞觀中高宗在東宮以長孫皇后疾亟嘗上言曰欲請度僧以資福事后曰為善有征吾未為惡善或無報求福非宜且佛者異方之教所可存而勿論豈以一女子而紊王道乎故諡為文德且母后之論尚能如斯哲王之謨安可反是伏睹陛下留神天竺屬意桑門內設道場中開講會或手録梵策或口揚佛音雖時啓於延英從容四輔慮稍稀於聽政廢失萬機居安思危不可忽也夫從容者君也必疇咨於臣盡忠匡救外逆其耳內沃其心陳皋陶之謨述仲虺之誥發揮王道恢益帝圖非賜對之間徒侍坐而已夫廢失者上拒其諫下希其旨言則狎玩意在順從漢重神仙東方朔著十洲之記梁崇佛法劉孝儀詠七覺之詩致祠禱無休講誦不已以至大空海內中輟江東以此言之是廢失也然佛者當可以悟取不可以相求漢晉已來互興寶剎姚石之際亦有高僧或問以苦空究其不滅止聞有性多曰忘言執著貪緣非其旨也必乞陛下力求民瘼虔奉宗祧思繆賞與濫刑其殃立至俟勝殘而去殺得福甚多幸罷講筵頻親政事昔年韓愈已得罪於憲宗今日微臣固甘心於遐徼疏奏帝甚嘉之舊唐書卷一百七十二蕭俯傳附蕭倣傳蕭瑀好浮屠法蕭瑀好浮屠法間請捨家為桑門帝許之矣復奏自度不能為又足疾不入謁帝曰瑀豈不得其所邪乃詔奪爵下除商州刺史未幾復其封加特進卒年七十四遺命斂以單衣無卜日詔贈司空荊州都督陪葬昭陵新唐書卷一百一蕭瑀傳附蕭倣傳李德裕論泗州置僧尼戒壇元和已來纍敕天下州府不得私度僧尼徐州節度使王智興聚貨無厭以敬宗誕月請於泗州置僧壇度人資福以邀厚利江淮之民皆群黨渡淮李德裕奏論曰王智興於所屬泗州置僧尼戒壇自去冬於江淮已南所在懸榜招置江淮自元和二年後不敢私度自聞泗州有壇戶有三丁必令一丁落髮意在規避王徭影庇資産自正月已來落髮者無算臣今於蒜山渡點其過者一日一百餘人勘問唯十四人是舊日沙彌餘是蘇常百姓亦無本州文憑尋已勒還本貫訪聞泗州置壇次第凡僧徒到者人納二緡給牒即回別無法事若不特行禁止比到誕節計江淮已南失卻六十萬丁壯此事非細繫於朝廷法度狀奏即日詔徐州罷之舊唐書卷一百七十四李德裕傳李德裕論亳州聖水寶歷二年亳州言出聖水飲之者愈疾德裕奏曰臣訪聞此水本因妖僧誑惑狡計丐錢數月已來江南之人奔走塞路每三二十家都顧一人取水擬取之時疾者斷食葷血既飲之後又二七日蔬餐危疾之人俟之愈病其水斗價三貫而取者益之他水沿路轉以市人老疾飲之多至危篤昨點兩浙福建百姓渡江者日三五十人臣於蒜山渡已加捉搦若不絶其根本終無益黎氓西川承蠻寇剽虜之後郭釗撫理無術人不聊生德裕乃復葺關防繕完兵守又遣人入南詔求其所俘工匠得僧道工巧四千餘人復歸成都舊唐書卷一百七十四李德裕傳李德裕論亳州聖水寶歷二年亳州言出聖水飲之者愈疾德裕奏曰臣訪聞此水本因妖僧誑惑狡計丐錢數月已來江南之人奔走塞路每三二十家都顧一人取水擬取之時疾者斷食葷血既飲之後又二七日蔬餐危疾之人俟之愈病其水斗價三貫而取者益之他水沿路轉以市人老疾飲之多至危篤昨點兩浙福建百姓渡江者日三五十人臣於蒜山渡已加捉搦若不絶其根本終無益黎氓昔吳時有聖水宋齊有聖火事皆妖妄古人所非乞下本道觀察使令狐楚速令填塞以絶妖源從之敬宗為兩街道士趙歸真説以神仙之術宜訪求異人以師其道僧惟真齊賢正簡説以祠禱修福以致長年四人皆出入禁中日進邪説山人杜景先進狀請於江南求訪異人至浙西言有隱士周息元壽數百歲帝即令高品薛季稜往潤州迎之仍詔德裕給公乘遣之德裕因中使還獻疏曰臣聞道之高者莫若廣成玄元人之聖者莫若軒黃孔子昔軒黃問廣成子理身之要何以長久對曰無視無聽抱神以靜形將自正神必自清無勞子形無搖子精乃可長生慎守其一以處其和故我修身千二百歲矣吾形未嘗衰又云得吾道者上為皇而下為王玄元語孔子曰去子之驕氣與多欲態色與淫志是皆無益於子之身吾所告子者是已故軒黃發謂天子歎孔子興猶龍之感前聖於道不其至乎伏惟文武大聖廣孝皇帝陛下用玄祖之訓修軒黃之術凝神間館物色異人將以覿冰雪之姿屈順風之請恭惟聖感必降真仙若使廣成玄元混迹而至語陛下之道授陛下之言以臣度思無出於此臣所慮赴召者必迂怪之士苟合之徒使物淖冰以為小術衒耀邪僻蔽欺聰明如文成五利一無可驗臣所以三年之內四奉詔書未敢以一人塞詔實有所懼臣又聞前代帝王雖好方士未有服其藥者故漢書稱黃金可成以為飲食器則益壽又高宗朝劉道合玄宗朝孫甑生皆成黃金二祖竟不敢服豈不以宗廟社稷之重不可輕易此事炳然載於國史以臣微見倘陛下睿慮精求必致真隱唯問保和之術不求餌藥之功縱使必成黃金止可充於玩好則九廟靈鑒必當慰悅寰海兆庶誰不歡心臣思竭愚衷以裨玄化無任兢憂之至舊唐書卷一百七十四李德裕傳李德裕論聖水時亳州浮屠詭言水可愈疾號曰聖水轉相流聞南方之人率十戶僦一人使往汲既行若飲病者不敢近葷血危老之人率多死而水斗三十千取者益它汲轉鬻於道互相欺訹往者日數十百人李德裕嚴勒津邏捕絶之且言昔吳有聖水宋齊有聖火皆本妖祥古人所禁請下觀察使令狐楚填塞以絶妄源從之帝方惑佛老禱福祈年浮屠方士並出入禁中狂人杜景先上言其友周息元壽數百歲帝遣宦者至浙西迎之詔在所馳馹敦遣德裕上疏曰道之高者莫若廣成玄元人之聖者莫若軒轅孔子又前世天子雖好方士未有御其藥者故漢人稱黃金可成以為飲食器則壽高宗時劉道合玄宗時孫甑生皆能作黃金二祖不之服豈非以宗廟為重乎儻必致真隱願止師保和之術慎毋及藥則九廟尉悅矣息元果誕譎不情自言與張果葉靜能遊帝詔畫工肖狀為圖以觀之終帝世無它驗文宗即位乃逐之新唐書卷一百八十李德裕傳李瞻論佛教咸通十一年八月同昌公主薨懿宗尤嗟惜之以翰林醫官韓宗召康仲殷等用藥無效收之下獄兩家宗族枝蔓盡捕三百餘人狴牢皆滿劉瞻召諫官令上疏無敢極言瞻自上疏曰臣聞修短之期人之定分賢愚共一今古攸同陛下信崇釋典留意生天大要不過喜捨慈悲方便布施不生惡念所謂福田則業纍盡消往生忉利比居濁惡未可同年伏望陛下盡釋繫囚易怒為喜虔奉空王之教以資愛主之靈中外臣僚同深懇激帝閲疏大怒即日罷瞻相位檢校刑部尚書同平章事江陵尹充荊南節度等使杜按新唐書本傳不載與佛教有關文舊唐書卷一百七十七劉瞻傳李蔚論佛教懿宗奉佛太過常於禁中飯僧親為贊唄以旃檀為二高座賜安國寺僧徹逢八飯萬僧李蔚上疏諫曰臣聞孔丘聖者也言則引周任之言苻融賢者也諫必稱王猛之議誠以事求師古詞貴達情陛下自纘帝圖克崇佛事止當修外未甚得中臣略采本朝名臣啓奏之言以證奉佛初終之要天后時曾營大像功費百萬狄仁傑諫曰夫寶鉸殫於綴飾環材竭於輪奐功不使鬼必在役人物不天來皆從地出非苦百姓物何以求物生有時用之無度臣每思惟實所悲痛至如往在江表像法盛興梁武簡文施捨無限及乎三淮沸浪五嶺騰煙列剎盈衢無救危亡之禍緇衣蔽路豈益勤王之師況近年以來風塵屢擾水旱失節征役稍繁必若多費官財又苦人力一隅有難將何以救此切當之言一也中宗時公主外戚奏度僧尼姚崇諫曰佛不在外求之於心佛圖澄最賢無益於後趙羅什多藝不救於姚秦何充苻融皆遭敗滅齊襄梁武未免災殃但志發慈悲心行利益若蒼生安樂即是佛身此切當之言二也睿宗為金仙玉真二公主造二道宮辛替否諫曰自夏已來淫雨不解谷荒於壠麥爛於場入秋已來亢旱為災苗而不實霜損蟲暴草菜枯黃下人咨嗟未加賑貸陛下愛兩女而造兩觀燒瓦運木載土填沙道路流言皆云用錢百萬陛下聖人也遠無不知陛下明君也細無不見既知且見知倉有幾年之儲庫有幾年之帛知百姓之間可存活乎三邊之士可轉輸乎今發一卒以擀邊陲追一兵以衛社稷多無衣食皆帶飢寒賞賜之間迥無所出軍旅驟敗莫不由斯而陛下破百萬貫錢造不急之觀以賈六合之怨以違萬人之心此切當之言三也替否又諫造寺曰釋教以清淨為基慈悲為主常體道以濟物不利己而害人每去己以全真不營身以害教今三時之月築山穿池損命也殫府虛藏損人也廣殿長廊營身也損命則不慈悲損人則不濟物營身則不清淨豈大聖至神之心乎佛書曰一切有為法如夢幻泡影如露亦如電臣以為減雕琢之費以賑貧人是有如來之德息穿掘之苦以全昆蟲是有如來之仁罷營葺之直以給邊陲是有湯武之功回不急之祿以購清廉是有唐虞之治陛下緩其所急急其所緩親未來而疏見在失真實而冀虛無重俗人之所為輕天子之功業臣實痛之此切當之言四也臣觀仁傑天后時上公也姚崇開元時賢相也替否睿宗之直臣也臣每覽斯言未嘗不廢卷而太息痛其言之不行也伏以陛下深重緇流妙崇佛事其為樂善實邁前蹤但細詳時代之安危渺鑒昔賢之敷奏則思過半矣道遠乎哉臣過忝渥恩言虧匡諫但舉從繩之義少裨負扆之明營繕之間稍宜停減優詔嘉之尋拜京兆尹太常卿杜按新唐書本傳李蔚此疏舊唐書卷一百七十八李蔚傳張士衡論佛教承乾又問曰布施營功德有果報不張士衡對曰事佛在於清淨無欲仁恕為心如其貪婪無厭驕虐是務雖復傾財事佛無救目前之禍且善惡之報若影隨形此是儒書之言豈徒佛經所説是為人君父當須仁慈為人臣子宜盡忠孝仁慈忠孝則福祚攸永如或反此則殃禍斯及此理昭然願殿下勿為憂慮舊唐書卷一百八十九上儒學上張士衡傳張士衡論佛教張士衡瀛州樂壽人父文慶北齊國子助教太子以士衡齊人也問高氏何以亡士衡曰高阿那環之凶險駱提婆之佞韓長鸞之虐皆奴隸才是信是使忠良外誅骨肉內離剝喪黎元故周師臨郊人莫為之用此所以亡復問事佛營福其應奈何對曰事佛在清靜仁恕爾如貪婪驕虐雖傾財事之無損於禍且善惡必報若影赴形聖人言之備矣為君仁為臣忠為子孝則福祚永反是而殃禍至矣時太子以過失聞士衡因是規之然不能用也太子廢給傳罷歸鄉里卒新唐書卷一百九十八張士衡傳突厥人暾欲谷論造寺觀毗伽可汗以開元四年即位本番號為小殺小殺又欲修築城壁造立寺觀暾欲谷曰不可突厥人戶寡少不敵唐家百分之一所以常能抗拒者正以隨逐水草居處無常射獵為業又皆習武強則進兵抄掠弱則竄伏山林唐兵雖多無所施用若築城而居改變舊俗一朝失利必將為唐所並且寺觀之法教人仁弱本非用武爭強之道不可置也小殺等深然其策舊唐書卷一百九十四上突厥傳上傅奕論佛教武德七年傅奕上疏請除去釋教曰佛在西域易服以逃租賦演其妖書述其邪法偽啓三塗謬張六道恐嚇愚夫詐欺庸品凡百黎庶通識者稀不察根源信其矯詐乃追既往之罪虛規將來之福布施一錢希萬倍之報持齋一日冀百日之糧遂使愚迷妄求功德不憚科禁輕犯憲章其有造作惡逆身墜刑綱方乃獄中禮佛口誦佛經晝夜忘疲規免其罪且生死壽夭由於自然刑德威福關之人主乃謂貧富貴賤功業所招而愚僧矯詐皆云由佛竊人主之權擅造化之力其為害政良可悲矣案書云惟闢作福威惟辟玉食臣有作福作威玉食害於而家凶於而國人用側頗僻降自犧農至於漢魏皆無佛法君明臣忠祚長年久漢明帝假托夢想始立胡神西域桑門自傳其法西晉以上國有嚴科不許中國之人輒行髡髮之事洎於苻石羌胡亂華主庸臣佞政虐祚短皆由佛教致災也梁武齊襄足為明鏡昔褒姒一女妖惑幽王尚至亡國況天下僧尼數盈十萬翦刻繒彩裝束泥人而為厭魅迷惑萬姓者乎今之僧尼請令匹配即成十萬餘戶産育男女十年長養一紀教訓自然益國可以足兵四海免蠶食之殃百姓知威福所在則妖惑之風自革淳朴之化還興且古今忠諫鮮不及禍竊見齊朝章仇子他上表言僧尼徒衆糜損國家寺塔奢侈虛費金帛為諸僧附會宰相對朝讒毀諸尼依托妃主潛行謗讟子他竟被囚執刑於都市及周武平齊制封其墓臣雖不敏竊慕其蹤又上疏十一首詞甚切直高祖付群官詳議唯太僕卿張道源稱奕奏合理中書令蕭瑀與之爭論曰佛聖人也奕為此議非聖人者無法請置嚴刑奕曰禮本於事親終於奉上此則忠孝之理著臣子之行成而佛逾城出家逃背其父以匹夫而抗天子以繼體而悖所親蕭瑀非出於空桑乃遵無父之教臣聞非孝者無親其瑀之謂矣瑀不能答但合掌曰地獄所設正為是人高祖將從奕言會傳位而止奕武德九年五月密奏太白見秦分秦王當有天下高祖以狀授太宗及太宗嗣位召奕賜之食謂曰汝前所奏幾纍於我然今後但須盡言無以前事為慮也太宗常臨朝謂奕曰佛道玄妙聖迹可師且報應顯然屢有征驗卿獨不悟其理何也奕對曰佛是胡中桀黠欺誑夷狄初止西域漸流中國遵尚其教皆是邪僻小人模寫莊老玄言文飾妖幻之教耳於百姓無補於國家有害太宗頗然之貞觀十三年卒年八十五臨終誡其子曰老莊玄一之篇周孔六經之説是為名教汝宜習之妖胡亂華舉時皆惑唯獨竊歎衆不我從悲夫汝等勿學也古人裸葬汝宜行之奕生平遇患未嘗請醫服藥雖究陰陽數術之書而並不之信又嘗醉臥蹶然起曰吾其死矣因自為墓志曰傅奕青山白雲人也因酒醉死嗚呼哀哉其從達皆此類注老子並撰音義又集魏晉以來駁佛教者為高識傳十卷行於世舊唐書卷七十九傅奕傳傅奕論佛教武德七年傅奕上疏極詆浮圖法曰西域之法無君臣父子以三塗六道嚇愚欺庸追既往之罪窺將來之福至有身陷惡逆獄中禮佛口誦梵言以圖偷免且生死壽夭本諸自然刑德威福繫之人主今其徒矯托皆云由佛攘天理竊主權書曰惟闢作福惟闢作威惟辟玉食臣有作福作威玉食害於而家凶於而國五帝三王未有佛法君明臣忠年祚長久至漢明帝始立胡祠然惟西域桑門自傳其教西晉以上不許中國髡髮事胡至石苻亂華乃弛厥禁主庸臣佞政虐祚短事佛致然梁武齊襄尤足為戒昔褒姒一女營惑幽王能亡其國況今僧尼十萬刻繒泥像以惑天下有不亡乎陛下以十萬之衆自相夫婦十年滋産十年教訓兵農兩足利可勝既邪昔高齊章仇子他言僧尼塔廟外見毀宰臣內見疾妃嬙陽讒陰謗卒死都市周武帝入齊封寵其墓臣竊賢之又上十二論言益痛切帝下奕議有司唯道源佐其請中書令蕭瑀曰佛聖人也非聖人者無法請誅之奕曰禮始事親終事君而佛逃父出家以匹夫抗天子以繼體悖所親瑀非出空桑乃尊其言蓋所謂非孝者無親瑀不答但合爪曰地獄正為是人設矣帝善奕對未及行會傳位止初九年太白躔秦分奕奏秦王當有天下帝以奏付王及太宗即位召賜食謂曰向所奏幾敗我雖然自今毋有所諱而不盡言又嘗問卿拒佛法奈何奕曰佛西胡黠人爾欺訹夷狄以自神至入中國而姦兒幻夫摸象莊老以文飾之有害國家而無補百姓也帝異之貞觀十三年卒年八十五奕病未嘗問醫忽酣臥蹶然悟曰吾死矣乎即自志曰傅奕青山白雲人也以醉死嗚乎遺言戒子六經名教言若可習也妖胡之法慎勿為吾死當裸葬奕雖善數然嘗自言其學不可以傳又注老子並集晉魏以來與佛議駁者為高識篇新唐書卷一百七傅奕傳陳子昂論建明堂垂拱初詔問群臣調元氣當以何道陳子昂因是勸后興明堂大學即上言陛下含天地之德日月之明眇然遠思欲求太和此伏羲氏所以為三皇首也昔者天皇大帝攬元符東封太山然未建明堂享上帝使萬世鴻業闕而不照殆留此盛德以發揮陛下哉臣謂和元氣睦人倫捨此則無以為也臣願陛下為唐恢萬世之業相國南郊建明堂與天下更始按周禮月令而成之乃月孟春乘鸞輅駕蒼龍朝三公九卿大夫於青陽左個負斧扆馮玉几聽天下之政杜按武則天之明堂多於佛教有關故録此文新唐書卷一百七陳子昂傳道佛不懲而戒韓琬上言國安危在於政政以法暫安焉必危以德始不便焉終治夫法者智也德者道也智權宜也道可以久大也故以智治國國之賊不以智治國國之福貞觀永徽之間農不勸而耕者衆法施而犯者寡俗不偷薄器不行窳吏貪者士恥同列忠正清白者比肩而立罰雖輕而不犯賞雖薄而勸位尊不倨家富不奢學校不勵而勤道佛不懲而戒土木質厚裨販弗蚩其故奈何雜以皇道也自茲以來任巧智斥謇諤趨勢者進守道者退諧附者無黜剝之憂正直者有後時之歎人趨家競風俗淪替其故奈何行以霸道也新唐書卷一百一十二韓思彥傳附韓琬傳柳澤評太平公主事胡僧慧范柳澤上疏曰今海內咸稱太平公主令胡僧慧范曲引此輩將有誤於陛下矣謗議盈耳咨嗟滿衢故語曰姚宋為相邪不如正太平用事正不如邪書曰無偏無陂遵王之義無反無側王道正直臣恐因循流近至遠積小為大纍微起高勿謂何傷其禍將長勿謂何害其禍將大舊唐書卷七十七柳亨傳附柳澤傳柳澤評太平公主事胡僧慧范柳澤上疏曰今天下咸稱太平公主與胡僧慧范以此誤陛下故語曰姚宋為相邪不如正太平用事正不如邪臣恐流遁至遠積小為大纍微起高勿謂何傷其禍將長勿謂何害其禍將大新唐書卷一百一十二柳澤傳袁楚客論佛教陳州袁楚客曰今度人既多緇衣半道不本行業專以重寶附權門皆有定直昔之賣官錢入公府今之賣度錢入私家以茲入道徒為遊食此朝廷三失也杜按舊唐書同傳不載袁楚客上書事新唐書卷一百二十二魏元忠傳蘇環論佛教武后鑄浮屠立廟塔役無虛歲蘇環以為縻損浩廣雖不出國用要自民産日殫百姓不足君孰與足天下僧尼濫偽相半請並寺著僧常員數缺則補后善其言新唐書卷一百二十五蘇環傳裴漼諫睿宗造寺觀太極元年睿宗為金仙玉真公主造觀及寺等時屬春旱興役不止裴漼上疏諫曰臣謹案禮記春夏令曰無聚大衆無起大役不可興土功恐妨農事若號令乖度役使不時則人加疾疫之危國有水旱之災此五行之必應也今自春至夏時雨愆期下人憂心莫知所出陛下雖降哀矜之旨兩都仍有寺觀之作時旱之應實此之由且春令告期東作方始正是丁壯就功之日而土木方興臣恐所妨尤多所益尤少耕夫蠶妾飢寒之源故春秋莊公三十一年冬不雨五行傳以為歲三築台僖公二十一年夏大旱五行傳以時作南門勞人興役陛下每以萬方為念睿旨殷勤安國濟人防微慮遠伏願下明制發德音順天時副人望兩京公私營造及諸和市木石等並請且停則蒼生幸甚農桑失時戶口流散縱寺觀營構豈救黎元飢寒之敝哉疏奏不報尋轉兵部侍郎以銓敘平允特授一子為太子通事舍人舊唐書卷一百裴漼傳裴漼諫睿宗造寺觀睿宗造金仙玉真二觀時旱甚役不止漼上言春夏毋聚大衆起大役不可興土功妨農事若役使乖度則有疾疫水旱之災此天人常應也今自冬徂春雨不時降人心憔然莫知所出而土木方興時暵之孽職為此發今東作云始丁壯就功妨多益少飢寒有漸陛下以四方為念宜下明制令二京營作和市木石一切停止有如農桑失時戶口流散雖寺觀營立能救飢寒敝哉不報新唐書卷一百三十裴漼傳李叔明論道佛李叔明素惡道佛之弊上言曰佛空寂無為者也道清虛寡欲者也今迷其內而飾其外使農夫工女墮業以避役故農桑不勸兵賦日屈國用軍儲為斁耗臣請本道定寺為三等觀為二等上寺留僧二十一上觀道士十四每等降殺以七皆擇有行者餘還為民德宗善之以為不止本道可為天下法乃下尚書省雜議於是都官員外郎彭偃曰王者之政變人心為上因人心次之不變不因為下今道士有名亡實俗鮮歸重於亂政輕僧尼帤穢皆天下不逞苟避征役於亂人甚今叔明之請雖善然未能變人心亦非因人心者夫天生蒸人必將有職遊間浮食王制所禁故賢者受爵祿不肖者出租稅古常道也今僧道士不耕而食不織而衣一僧衣食歲無慮三萬五夫所不能致舉一僧以計天下其費不資臣謂僧道士年未滿五十可令歲輸絹四尼及女官輸絹二雜役與民同之過五十者免凡人年五十嗜欲已衰況有戒法以檢其性情哉刑部員外郎裴伯言曰衣者蠶桑也食者耕農也男女者繼祖之重也而二教悉禁國家著令又從而助之是以夷狄不經法反制中夏禮義之俗也傳曰女子十四有為人母之道四十九絶生育之理男子十六有為人父之道六十四絶陽化之理臣請僧道士一切限年六十四以上尼女官四十九以上許終身在道餘悉還為編人官為計口授地收廢寺觀以為廬舍議雖上罷之杜按舊唐書本傳不載此事新唐書卷一百四十七李叔明傳常袞論佛教常袞京兆人天寶末及進士第性狷潔不妄交遊袞建言今西蕃盤桓境上數入寇若相連結以乘無備其變不細請早圖之又天子誕日諸道爭以侈麗奉獻不則為老子浮屠解禱事袞以為漢文帝還千里馬不用晉武帝焚雉頭裘宋高祖碎琥珀枕是三主者非有聰明大聖以致治安謹身率下而已今諸道饋獻皆淫侈不急而節度使刺史非能男耕女織者類出於民是斂怨以媚上也請皆還之今軍旅未寧王畿戶口十不一在而諸祠寺寫經造像焚幣埋玉所以賞賚若比丘道士巫祝之流歲巨萬計陛下若以易芻粟減貧民之賦天下之福豈有量哉代宗嘉納杜按舊唐書本傳不載此事新唐書卷一百五十常袞傳李絳評安國寺立聖政碑時中官吐突承璀自藩邸承恩寵為神策護軍中尉乃於安國佛寺建立聖政碑大興功作仍請翰林為其文絳上言曰陛下布惟新之政劃積習之弊四海延頸日望德音今忽立聖政碑示天下以不廣易稱大人者與天地合德與日月合明執契垂拱勵精求理豈可以文字而盡聖德碑表而贊皇猷若可敘述是有分限虧損盛德豈謂敷揚至道哉故自堯舜禹湯文武並無建碑之事至秦始皇荒逸之君煩酷之政然後有罘嶧之碑揚誅伐之功紀巡幸之迹適足為百王所笑萬代所譏至今稱為失道亡國之主豈可擬議於此陛下嗣高祖太宗之業舉貞觀開元之政思理不遑食從諫如順流固可與堯舜禹湯文武方駕而行又安得追秦皇暴虐不經之事而自損聖政近者閻巨源請立紀聖功碑陛下詳盡事宜皆不允許今忽令立此與前事頗乖況此碑既在安國寺不得不敘載遊觀崇飾之事述遊觀且乖理要敘崇飾又匪政經固非哲王所宜行也其碑伏乞聖恩特令寢罷憲宗深然之其碑遂止舊唐書卷一百六十四李絳傳李絳評安國寺立聖政碑是時盛興安國佛祠幸臣吐突承璀請立石紀聖德焉營構華廣欲使李絳為之頌將遺錢千萬絳上言陛下蕩積習之弊四海延頸望德音忽自立碑示人以不廣易稱大人與天地合德謂非文字所能盡若令可述是陛下美有分限堯舜至文武皆不傳其事惟秦始刻嶧山揚暴誅伐巡幸之勞失道之君不足為法今安國有碑若敘遊觀即非治要述崇飾又非政宜請罷之帝怒絳伏奏愈切帝悟曰微絳我不自知命百牛倒石令使者勞諭絳襄陽裴均違詔書獻銀壺甕數百具絳請歸之度支示天下以信帝可奏仍赦均罪時議還盧從史昭義已而將復召之從史以軍無見儲為解李吉甫謂鄭絪漏其謀帝召絳議欲逐絪絳為開白乃免新唐書卷一百五十二李絳傳高郢論佛教寶應初高郢及進士第代宗為太后營章敬寺郢以白衣上書諫曰陛下大孝因心與天罔極蒸蒸之思要無以加臣謂悉力追孝誠為有益妨時剿人不得無損舍人就寺何福之為昔魯莊公丹桓公廟楹而刻其桷春秋書之為非禮漢孝惠孝景孝宣令郡國諸侯立高祖文武廟至元帝與博士議郎斟酌古禮一罷之夫廟猶不越禮而立況寺非宗祏所安神靈所宅乎殫萬人之力邀一切之報其為不可亦明矣間者昆吾孔熾薦食生人百姓懍懍無日不惕遣將攘卻亡尺寸功隴外壤地委諸豺狼太宗艱難之業傳之陛下一夫不獲尺土見侵告成之時猶恐有闕況用武以來十三年傷者不救死者不收繕卒補乘於今未已夫興師十萬日費千金計十三年舉百萬之衆資糧屝屨取足於人勞罷宛轉十不一在父子兄弟相視無聊延頸嗷嗷以役王命縱未能出禁財贍鰥寡猶當稍息勞弊以噢休之奈何戎虜未平侵地未復金革未戢疲人未撫太倉無終歲之儲大農有榷酤之敝欲以此時興力役哉比八月雨不潤下菽麥失時黔首狼顧憂在艱食若遂不給將何以救之無寺猶可無人其可乎然土木之勤功用之費不虛府庫將焉取之府庫既竭則又誅求若人不堪命盜賊相挻而興戎狄乘間以為風塵得不為陛下深憂乎臣聞聖人受命於天以人為主苟功濟於天天人同和則宗廟受福子孫蒙慶傳曰德教加於百姓刑於四海天子之孝也又曰無念爾祖聿修厥德既受帝祉施於孫子是知王者之孝在於承順天地嚴配宗考恭慎德教以臨兆民俾四海之內歡心助祭延福流祚永永無窮未聞崇樹梵宮雕琢金玉之為孝者夏禹卑宮室盡力溝洫人到於今稱之梁武帝窮土木飾塔廟人無稱焉陛下若節用愛人當與夏後齊美何必勞人動衆踵梁武遺風乎及製作之初伎費尚淺人貴量力不貴必成事貴相時不貴必遂陛下若回思慮從人心則聖德孝思格於天地千福萬祿先後受之曾是一寺較功德邪書奏未報復上言王者將有為也將有行也必稽於衆而順於人則自然之福不求而至未然之禍不除而絶臣聞神人無功者不為有功之功聖人無名者不為有名之名不為有功之功故功莫大不為有名之名故名莫厚古之明王積善以致福不費財以求福修德以銷禍不勞人以攘禍陛下之營作臣竊惑之若以為功則天覆地載陰施陽化未曾有為也若以為名則至德要道以順天下未曾有待也若以致福則通於神明光於四海不在費財若以攘禍則方務厥德罔有天災不在勞人今興造趣急人徒竭作土木並起日課萬工不遑食息搒笞愁痛盈於道路以此望福臣恐不然陛下戢定多難勵精思治務行寬仁以幸天下今固違群情徇左右過計臣竊為陛下惜之不納新唐書卷一百六十五高郢傳新唐書史臣贊論佛教贊曰人之惑怪神也甚哉若佛者特西域一稿人耳裸顛露足以乞食自資癯辱其身屏營山樊行一概之苦本無求於人徒屬稍稍從之然其言荒茫漫靡夷幻變現善推不驗無實之事以鬼神死生貫為一條據之不疑掊嗜欲棄親屬大抵與黃老相出入至漢十四葉書入中國迹夫生人之情以耳目不際為奇以不可知為神以物理之外為畏以變化無方為聖以生而死死復生回復償報歆艷其間為或然以賤近貴遠為鞮譯差殊不可研詰華人之譎誕者又攘莊周列禦寇之説佐其高層纍架騰直出其表以無上不可加為勝妄相誇協而倡其鳳於是自天子逮庶人皆震動而祠奉之初宰相王縉以緣業事佐代宗於是始作內道場晝夜梵唄冀禳寇戎大作盂蘭肖祖宗像分供塔廟為賊臣嘻笑至憲宗世遂迎佛骨於鳳翔內之宮中韓愈指言其弊帝怒竄愈瀕死憲亦弗獲天年幸福而禍無亦左乎懿宗不君精爽奪迷復陷前車而覆之興哀無知之場丐庇百解之胔以死自誓無有顧藉流淚拜伏雖事宗廟上帝無以進焉屈萬乘之貴自等太古胡數千載而遠以身為徇嗚呼運祚殫天告之矣懿不三月而徂唐德之不競厥有來哉悲夫新唐書卷一百八十一史臣贊史臣評天竺胡僧臣檢討先代圖籍今古歷書皆無蝕神首尾之文蓋天竺胡僧之妖説也舊五代卷一百四十歷志馮道曰佛救不得百姓契丹入汴道自襄鄧召入戎王因從容問曰天下百姓如何可救道曰此時百姓佛再出救不得唯皇帝救得其後衣冠不至傷夷皆道與趙延壽陰護之所至也舊五代史卷一百二十六馮道傳馮道曰佛救不得百姓耶律德光嘗問馮道曰天下百姓如何救得道為俳語以對曰此時佛出救不得惟皇帝救得人皆以謂契丹不夷滅中國之人者賴道一言之善也新五代卷五十四馮道傳宋庠論僧道宋庠疏曰今左藏無積年之鏹太倉無三歲之粟朝廷大有三冗小有三費以困天下之財財窮用褊而欲興師遠事誠無謀矣能去三冗節三費專備西北之屯可曠然高枕矣何謂三冗天下有定官無限員一冗也天下廂軍不任戰而耗衣食二冗也僧道日益多而無定數三冗也三冗不去不可為國請斷自今僧道已受戒具者姑如舊其他悉罷還為民可得耕夫織婦五十餘萬人一冗去矣何謂三費一曰道場齋醮無有虛日且百司供億至不可資計彼皆以祝帝壽奉先烈祈民福為名臣愚以為此主者為欺盜之計爾陛下事天地宗廟社稷百神犧牲玉帛使有司端委奉之歲時薦之足以竦明德介多福矣何必希屑屑之報哉則一費節矣二曰京師寺觀或多設徒卒添置官府衣糧率三倍他處居大屋高廡不徭不役坐蠹齊民其尤者也而又自募民財營建祠廟雖曰不費官帑然國與民一也捨國取民其傷一焉請罷去之則二費節矣三曰使相節度不隸藩要請自今地非邊要州無師屯者不得建節度已帶節度不得留近藩及京師則三費節矣宋史卷二百八十四宋庠傳賈昌朝評修佛寺太平興國寺災是夕大雨震雷朝廷議修復賈昌朝上言易震之象曰洊雷震君子以恐懼修省近年寺觀屢災此殆天示警告可勿繕治以示畏天愛人之意西域僧獻佛骨銅像賈昌朝請加賜遣還毋以所獻示中外悉行其言宋史卷二百八十五賈昌朝傳王禹稱上疏沙汰僧尼真宗即位遷秩刑部會詔求直言王禹稱上疏言五事一曰謹邊防通盟好使輦運之民有所休息二曰減冗兵並冗吏使山澤之饒稍流於下三曰艱難選舉使入官不濫四曰沙汰僧尼使疲民無耗夫古者惟有四民兵不在其數蓋古者井田之法農即兵也自秦以來戰士不服農業是四民之外又生一民故農益困然執干戈衛社稷理不可去漢明之後佛法流入中國度人修寺歷代增加不蠶而衣不耕而食是五民之外又益一而為六矣假使天下有萬僧日食米一升歲用絹一匹是至儉也猶月費三千斛歲用萬縑何況五七萬輩哉不曰民蠹得乎臣愚以為國家度人衆矣造寺多矣計其費耗何啻億萬先朝不豫捨施又多佛若有靈豈不蒙福事佛無效斷可知矣願陛下深鑒治本亟行沙汰如以嗣位之初未欲驚駭此輩且可以二十載不度人修寺使自銷鑠亦救弊之一端也五曰親大臣遠小人使忠良蹇諤之士知進而不疑姦憸傾巧之徒知退而有懼宋史卷二百九十三王禹稱傳張洞奏請評度僧之敝時天下戶口日蕃民去為僧者衆張洞奏至和元年敕增歲度僧舊敕諸路三百人度一人後率百人度一人又文武官內臣墳墓得置寺撥放近歲滋廣若以勳勞宜假之者當依古給戶守冢禁毋樵采而已今祠部帳至三十餘萬僧失不裁損後不勝其弊朝廷用其言始三分減一宋史卷二百九十九張洞傳余靖上疏言舍利入禁中開寶寺靈感塔災余靖復上疏言五行之占本是災變朝廷所宜誡懼以答天意聞嘗詔取舊瘞舍利入禁中閲視道路傳言舍利在內廷有光怪竊恐巧佞之人推為靈異惑亂視聽再圖營造臣聞帝王之道能勤儉厥德感動人心則雖有危難後必安濟今自西垂用兵國帑虛竭民亡儲蓄十室九空陛下若勤勞罪己憂人之憂則四民安居海內蒙福如不恤民病廣事浮費奉佛求福非天下所望也若以舍利經火不壞遽為神異即本在土中火所不及若言舍利皆能出光怪必有神靈憑之此妄言也且一塔不能自衛為火所毀況藉其福以庇民哉宋史卷三百二十余靖傳司馬光不喜釋老司馬光光於物淡然無所好於學無所不通惟不喜釋老曰其微言不能出吾書其誕吾不信也宋史卷三百三十六司馬光傳曹輔上疏言去浮屠曹輔字載德南劍州人第進士自政和後帝多微行乘小轎子數內臣導從輔上疏略曰況今革冗員斥濫奉去浮屠誅胥吏蚩愚之民豈能一一引咎安分萬一當乘輿不戒之初一夫不逞包藏禍心發蜂蠆之毒奮獸窮之計雖神靈垂護然亦損威傷重矣又況有臣子不忍言者可不戒哉宋史卷三百五十二曹輔傳尤袤奏請禁釋老台臣乞定喪制尤袤奏釋老之教矯誣褻瀆非所以嚴宮禁崇几筵宜一切禁止宋史卷三百八十九尤袤傳程大昌謂僧寺違法置田六和塔寺僧以鎮潮為功求內降給賜所置田産仍免科徭程大昌奏僧寺既違法置田又移科徭於民奈何許之況自修塔之後潮果不嚙岸乎寢其命宋史卷四百三十三儒林程大昌傳劉恕不信浮屠之説劉恕尤不信浮屠説以為必無是事曰人如居逆旅一物不可乏去則盡棄之矣豈得賚以自隨哉宋史卷四百四十四文苑劉恕傳松江漁翁觀釋氏書松江漁翁曰吾厭喧煩處間曠遁迹於此三十年矣幼喜誦經史百家之言後觀釋氏書今皆棄去唯飽食以嬉尚何所事潘裕曰先生澡身浴德如此今聖明在上盍出而仕乎笑曰君子之道或出或處吾雖不能棲隱巖穴追園綺之蹤竊慕老氏曲全之義且養志者忘形養形者忘利致道者忘心心形俱忘其視軒冕如糞土耳與子出處異趣子勉之裕曰裕也不才幸聞先生之高義敢問舍所在曰吾姓名且不欲人知況居室耶飲畢長揖使裕反其所鼓枻而去宋史卷四百五十八隱逸中松江漁翁傳劉豫不度僧道四月丙寅劉豫遷都汴是日暴風捲旗屋瓦皆震士民大恐豫曲赦汴人與民約曰自今不肆赦不用宦官不度僧道文武雜用不限資格宋史卷四百七十五叛臣上劉豫傳僧德詔語錢俶晉開運中錢俶為台州刺史數月有僧德詔語俶曰此地非君為治之所當速歸不然不利俶從其言即求歸國未幾有進思之變宋史卷四百八十吳越錢氏世家宗太祖曰佛非中國教義宗名倍小字圖欲太祖長子母淳欽皇后蕭氏幼聰敏好學外寬內摯神册元年春立為皇太子時太祖問侍臣曰受命之君當事天敬神有大功德者朕欲祀之何先皆以佛對太祖曰佛非中國教倍曰孔子大聖萬世所尊宜先太祖大悅即建孔子廟詔皇太子春秋釋奠遼史卷七十二宗室義宗傳室昉論寺院賜額初晉國公主建佛寺於南京上許賜額室昉奏曰詔書悉罪無名寺院今以主請賜額不惟違前詔恐此風愈熾上從之遼史卷七十九室昉傳金世宗至於佛法尤所未信大定八年正月甲子朔宋高麗夏遣使來賀辛未謂祕書監移剌子敬等曰昔唐虞之時未有華飾漢惟孝文務為純儉朕於宮室惟恐過度其或興修即損宮人歲費以充之今亦不復營建矣如宴飲之事近惟太子生日及歲元嘗飲酒往者亦止上元中秋飲之亦未嘗至醉至於佛法尤所未信梁武帝為同泰寺奴遼道宗以民戶賜寺僧復加以三公之官共惑深矣庚辰行皇太子册禮金史卷六世宗紀上金世宗言奉道崇佛大定二十七年十二月甲申上諭宰臣曰人皆以奉道崇佛設齋讀經為福朕使百姓無冤天下安樂不勝於彼乎爾等居輔相之任誠能匡益國家使百姓蒙利不惟身享其報亦將施及子孫矣左丞斡特剌曰臣等敢不盡心第才不逮不能稱職耳上曰人亦安能每事盡善但加勉勵可也戊子禁女直真人不得改稱漢姓學南人衣裝犯者抵罪金史卷八世宗紀下孔廟何以不如佛寺道觀明昌五年閏十月戊寅上問輔臣孔子廟諸處何如平章政事守貞曰諸縣見議建立上因曰僧徒修飾宇像甚嚴道流次之惟儒者於孔子廟最為滅裂守貞曰儒者不能長居學校非若僧道久處寺觀上曰僧道以佛老營利故務在莊嚴閎侈起人施利自多所以為觀美也金史卷十章宗紀二海陵王責卿臣奉佛會磁州僧法寶欲去張浩張暉欲留之不可得朝官又有欲留之者海陵聞其事詔三品以上官上殿責之曰聞卿等每到寺僧法寶正坐卿等皆坐其側朕甚不取佛者本一小國王子能輕捨富貴自苦修行由是成佛今人崇敬以希福利皆妄也況僧者往往不第秀才市井遊食生計不足乃去為僧較其貴賤未可與簿尉抗禮閭閻老婦迫於死期多歸信之卿等位為宰輔乃復效此失大臣體張司徒老成舊人三教該通足為儀表何不師之召法寶謂之曰汝既為僧去住在己何乃使人知之法寶戰懼不知所為海陵曰汝為長老當有定力今乃畏死耶遂於朝堂杖之二百張浩張暉杖二十金史卷八十三張通古傳完顏襄論放寺奴章宗初即政議罷僧道奴婢太尉克寧奏曰此蓋成俗日久若遽更之於人情不安陛下如惡其數多宜嚴立格法以防濫度則自少矣襄曰出家之人安用僕隸乞不問從初如何所得悉放為良若寺觀物力元係奴婢之數推定者併合除免詔從襄言由是二稅戶多為良者金史卷九十四完顏襄傳三君矯枉滅佛太過承安元年八月壬子上金章宗召張暐至內殿問曰僧道三年一試八十而取一不亦少乎對曰此輩浮食無益有損不宜滋益也上曰周武帝唐武宗後周世宗皆賢君其壽不永雖曰偶然似亦有因也對曰三君矯枉太過今不毀除不崇奉是為得中矣是歲郊見上帝焉金史卷一百六張暐傳元成宗以軍五千人供造寺工役至大元年十一月庚申太白晝見以軍五千人供造寺工役中書省臣言今銓選錢糧之法盡壞廩藏空虛中都建城大都建寺及為諸貴人營私第軍民不得休息邇者用度愈廣每賜一人輒至萬錠惟陛下矜察元史卷二十二武宗紀一三公之職濫假僧人泰定元年三月庚戌監察御史宋本李嘉賓傅嚴起言太尉司徒司空三公之職濫假僧人及會福殊祥二院並辱名爵請罷之不報元史卷二十九泰定帝紀中書省臣言建寺傷農泰定三年十月庚辰享太廟奉安顯宗御容於大天源延聖寺賜大天源延聖寺鈔二萬錠吉安臨江二路田千頃中書省臣言養給軍民必籍地利世祖建大宣文弘教等寺賜永業當時已號虛費而成宗復拘天壽萬寧寺較之世祖用增倍半若武宗之崇恩福元仁宗之承華普慶租榷所入益又甚焉英宗鑿山開寺損兵傷農而卒無益夫土地祖宗所有子孫當共惜之臣恐茲後藉為口實妄興工役徼福利以逞私欲惟陛下察之帝嘉納焉元史卷三十泰定帝紀二泰定帝命帝師修佛事御史建言泰定三年十二月己亥命帝師修佛事釋重囚三人置大承華普慶寺總管府罷規運提點所御史言比年營繕以衛軍供役廢武事不講請遵世祖舊制教習五衛親軍以備扈從不報元史卷三十泰定帝紀二楊倬奏請分僧道儲粟以濟民致和元年四月己酉御史楊倬等以民飢請分僧道儲粟濟之不報元史卷三十泰定帝紀二中書省臣言佛事歲費天歷二年正月丁丑中書省臣言朝廷賞賚不宜濫及罔功鷹鶻獅豹之食舊支肉價二百餘錠今增至萬三千八百錠控鶴舊止六百二十八戶今增二千四百戶又佛事歲費以今較舊增多金千一百五十兩銀六千二百兩鈔五萬六千二百錠幣帛三萬四千餘匹請悉揀汰從之元史卷三十三文宗紀二中書省臣言帑廩虛空五事至順元年七月己巳中書省臣言近歲帑廩虛空其費有五曰賞賜曰作佛事曰創置衙門曰濫冒支請曰續增衛士鷹坊請與樞密院御史台各怯薛官同加汰減從之元史卷三十四文宗紀三釋氏請以金銀幣帛祠其神釋氏請以金銀幣帛祠其神帝難之不忽木曰彼佛以去貪為寶遂弗與元史卷一百三十不忽木傳朵羅台上疏請減省供佛飯僧之費朵羅檯子之脫歡初直宿衛歷御史台譯史拜監察御史遷四川行省左右司員外郎四川廉訪司僉事樞密院都事升斷事官其在四川時嘗上疏曰內外修寺雖支官錢而一椽一瓦皆勞民力百姓嗟怨感傷和氣宜且停罷仍減省供佛飯僧之費以紓國用如此則上應天心下合民志不求福而福自至矣元史卷一百三十四朵羅台傳脫脫選寺並説地獄脫脫乃以私財造大壽元忠國寺於健德門外為皇太子祝釐其費為鈔十二萬二千錠至王四年閏月領宣政院事諸山主僧請復僧司且曰郡縣所苦如坐地獄脫脫曰若復僧司何異地獄中復置地獄邪元史卷一百三十八脫脫傳皇帝建佛塔董文用言非時役民至元二十二年有以帝命建佛塔於宋故宮者有司奉行甚急天大雨雪入山伐木死者數百人猶欲並建大寺文用謂其人曰非時役民民不堪矣少徐之如何長官者曰參政奈何格上命耶文用曰非敢格上命今日之困民力而失民心者豈上意耶其人意沮遂稍寬其期元史卷一百四十八董俊傳附董文用傳僧道畜妻子無異常人泰定元年六月張圭奏曰僧道出家屏絶妻孥蓋欲超出世表是以國家優視無所徭役且處之官寺宜清淨絶俗為心誦經祝壽比年僧道往往畜妻子無異常人如蔡道泰班講主之徒傷人逞欲壞教干刑者何可勝數俾奉祠典豈不褻天瀆神臣等議僧道之畜妻子者宜罪以舊制罷遣為民元史卷一百七十五張圭傳三公之位封拜釋老司空司徒太尉古之三公自大德以來封拜繁多釋老二教設官統治權抗有司撓亂政事僧道尤苦甚擾李孟言人君之柄在賞與刑賞一善而天下勸罰一惡而天下懲柄乃不失所施失當不足勸懲何以為治僧道士既為出世法何用官府繩治乃奏雪冤死者復其官蔭濫冒名爵者悉奪之罷僧道官天下稱快元史卷一百七十五李孟傳李元禮上書言建五臺山佛寺之敝李元禮字庭訓真定人資性莊重燕居不妄言笑歷易州大都路儒學教授遷太常太祝升博士元貞元年擢拜監察御史彈劾無所回撓二年有旨建五臺山佛寺皇太后將臨幸元禮上疏曰古人有言曰生民之利害社稷之大計惟所見聞而不係職司者獨宰相得行之諫官得言之今朝廷不設諫官御史職當言路即諫官也烏可坐視得失而無一言以裨益聖治萬分之一哉伏見五臺創建寺宇土木既興工匠伕役不下數萬附近數路州縣供億煩重男女廢耕織百物踴貴民有不聊生者矣伏聞太后親臨五臺布施金幣廣資福利其不可行者有五時當盛夏禾稼方茂百姓歲計全仰秋成扈從經過千乘萬騎不無蹂躪一也太后春秋已高親勞聖體往復暑途數千里山川險惡不避風日輕冒霧露萬一調養失宜悔將何及二也今上登寶位以來遵守祖宗成法正當兢業持盈之日上位舉動必書簡册以貽萬世之則書而不法將焉用之三也夫財不天降皆出於民今日支持調度方之曩時百倍而又勞民傷財以奉土木四也佛本西方聖人以慈悲方便為教不與物競雖窮天下珍玩奇寶供養不為喜雖無一物為獻而一心致敬亦不為怒今太后為國家為蒼生崇奉祈福福未獲昭受而先勞聖體聖天子曠定省之禮軫思親之懷五也伏願中路回轅端居深宮儉以養德靜以頤神上以循先皇后之懿範次以盡聖天子之孝心下以慰元元之望如此則不祈福而福至矣台臣不敢以聞大德元年侍御史萬僧與御史中丞崔彧不合詣架閣庫取前章封之入奏曰崔中丞私黨漢人李御史為大言謗佛不宜建寺帝大怒遣近臣賚其章敕右丞相完澤平章政事不忽木等鞫問不忽木以國語譯而讀之完澤曰其意正與吾同往吾嘗以此諫太后曰我非喜建此寺蓋以先皇帝在時嘗許為之非汝所知也彧與萬僧面質於完澤不忽木抗言曰他御史懼不肯言惟一御史敢言誠可賞也完澤等以章上聞帝沉思良久曰御史之言是也乃罷萬僧復元禮職元史卷一百七十六李元禮傳有詔起報嚴寺陳思謙諫之有詔起報嚴寺陳思謙曰兵荒之餘當罷土木以紓民力帝嘉之曰此正得祖宗立台憲之意繼此事有當言者無隱賜縑綺旌之元史卷一百八十四陳思謙傳元文宗建寺蓋苗諫之天歷初文宗昭以建康潛邸為佛寺務窮壯麗毀民居七十餘家仍以御史大夫督其役蓋苗上封事曰臣聞使民以時使臣以禮自古未有不由斯道而致隆平者陛下龍潛建業之時居民困於供給幸而獲睹今日之運百姓跂足舉首以望非常之恩今奪農時以創佛寺又廢民居使之家破産蕩豈聖人御天下之道乎昔漢高帝興於豐沛為復兩縣光武中興南陽免稅三年既不務此而隆重佛氏何以滿斯民之望哉且佛以慈悲為心方便為教今尊佛氏而害生民無乃違其方便之教乎台臣職專糾察表正百司今乃委以修繕之役豈其禮哉書奏御史大夫果免督役入為監察御史文宗幸護國仁王寺泛舟玉泉苗進曰今頻年不登邊隅不靖政當恐懼修省何暇逸遊以臨不測之淵乎帝嘉納之賜以對衣上尊即日還宮元史卷一百八十五蓋苗傳張楨上疏陳十禍及毛貴陷山東張楨上疏陳十禍根本之禍有六征討之禍有四歷數其弊曰陛下事佛求福飯僧消禍以天壽節而禁屠宰皆虛名也今天下殺人矣陛下泰然不理而曰吾將以是求福福何自而至哉穎上之寇始結白蓮以佛法誘衆終飾威權以兵抗拒視其所向駸駸可畏其勢不至於亡吾社稷燼吾國家不已也堂堂天朝不思靖亂而反為階亂其禍至慘其毒至深其關係至大有識者為之扼腕有志者為之痛心此征討之禍也疏奏不省權臣惡其訐直元史卷一百八十六張楨傳解縉言釋老之壯者驅之臣解縉見陛下好觀説苑韻府雜書與所謂道德經心經者臣竊謂甚非所宜也釋老之壯者驅之俾復於人倫經咒之妄者火之俾絶其欺誑絶鬼巫破淫祀省冗官減細縣痛懲法外之威刑永革京城之工役明史卷一百四十七解縉傳西域貢佛舍利永樂元年三月秋鄭賜代李至剛為禮部尚書四年正月西域貢佛舍利賜因請釋囚帝曰梁武元順溺佛教有罪者不刑紀綱大壞此豈可效明史卷一百五十一鄭賜傳鍾同上疏言禁僧道之蠹民景泰五年五月鍾同因上疏論時政遂及復儲事其略曰親庶政以總威權敦倫理以厚風俗辨邪正以專委任嚴賞罰以彰善惡崇風憲以正紀綱去浮費罷冗員禁僧道之蠹民擇賢將以訓士然後親率群臣謝過郊廟如成湯之六事自責唐太宗之十漸即改庶幾天意可回國勢可振明史卷一百六十二鍾同傳倪敬等上言罷桑門之供景泰六年七月以時多災異倪敬偕同官吳江盛昶江陰杜宥蕪湖黃讓安福羅俊固始汪清上言府庫之財不宜無故而豫遊觀之事不宜非時而行曩以齋僧屢出帑金易米不知櫛風沐雨之邊卒趨事急公之貧民又何以濟之近聞造龍舟作燕室營繕日增嬉遊不少非所以養聖躬也章綸鍾同直言見忤幽錮逾年非所以昭聖德也願罷桑門之供輟宴佚之娛止興作之役寬直臣之囚帝得疏不懌下之禮部明史卷一百六十二倪敬傳單宇上書言尊奉佛氏卒致禍亂初王振佞佛請帝歲一度僧其所修大興隆寺日役萬人糜帑數十萬閎麗冠京都英宗為賜號第一叢林命僧大作佛事躬自臨幸以故釋教益熾至是單宇上書言前代人君尊奉佛氏卒致禍亂近男女出家纍百千萬不耕不織蠶食民間營構寺宇遍滿京邑所費不可勝紀請撤木石以建軍營銷銅鐵以鑄兵仗罷遣僧尼歸之民俗庶皇風清穆異教不行疏入為廷議所格復知侯官而咸陽姚顯以鄉舉入國學亦上言曩者修治大興隆寺窮極壯麗又奉僧楊某為上師儀從侔王者食膏梁被組繡藐萬乘若弟子今上皇被留賊庭乞令前赴瓦剌化諭也先誠能奉駕南還庶見護國之力不然佛不足信彰彰矣當景泰時廷臣諫事佛者甚衆帝卒不能從而中官興安最用事佞佛甚於振請帝建大隆福寺嚴壯與興隆並四年三月寺成帝剋期臨幸河東鹽運判官濟寧楊浩切諫乃止明史卷一百六十四單宇傳林聰上言罷齋醮汰僧道等事景泰五年三月以災異偕同官條上八事雜引五行諸書纍數千言大略以絶玩好謹嗜欲為崇德之本而修人事在進賢退姦餘如罷齋醮汰僧道慎刑獄禁私役軍士省輪班工匠皆深中時弊帝多採納明史卷一百七十七林聰傳嶽弘等上書言西天佛子劄實巴占地多達數十百頃嶽弘字寬叔上杭人天順末進士授戶科給事中數陳時政成化四年春偕同官上言洪武永樂間以畿輔山東土曠人稀詔聽民開墾永不科稅邇者權豪怙勢率指為間田朦朧奏乞如嘉善長公主求文安諸縣地西天佛子劄實巴求靜海縣地多至數十百頃夫地逾百頃古者百家産也豈可徇一人之私情而奪百家恆産哉帝納其言詔自今請乞皆不許著為令劄實巴所乞地竟還之民京師歲歉米貴而四方遊僧萬數弘請驅逐以省冗食又請發太倉米減價以糶給貧民最甚者帝悉從之復言在京百獸房及清河寺諸處所育珍禽野獸日飼魚肉米菽乞並縱放以省冗費報聞明史卷一百八十丘弘傳都城佛剎迄無寧工當是時帝耽於燕樂群小亂政屢致災譴至成化二十一年正月朔申刻有星西流化白氣聲如雷帝頗懼詔求直言李俊率六科諸臣上疏曰夫爵以待有德賞以待有功也今或無故而爵一庸流或無功而賞一貴幸祈雨雪者得美官進金寶者射厚利方士獻煉服之書伶人奏曼延之戲掾史胥徒皆叨官祿俳優僧道亦玷班資一歲而傳奉或至千人數歲而數千人矣數千人之祿歲以數十萬計今都城佛剎迄無寧工京營軍士不復遺力如國師繼曉假術濟私糜耗特甚中外切齒願陛下內惜資財外惜人力不急之役姑賜停罷則工役不煩而天意可回矣陝西河南山西赤地千里尸骸枕籍流亡日多萑苻可慮願體天心之仁愛憫生民之因窮追録貴幸鹽課暫假造寺資財移振飢民俾苟存活則流亡復而天意可回矣帝優詔答之降孜省上林丞常恩本寺丞繼曉革國師為民令巡按御史追其誥敕制下舉朝大悅明史卷一百八十李俊傳催升蘇章言宦官妖僧罪催升蘇章言宦官妖僧罪請及誅竄而尚書王恕今伊傅不宜置南京彭綱斥李孜省繼曉請誅之以謝天下李旦陳十事且言神仙佛老外戚女謁聲色貨利奇技淫巧皆陛下素所惑溺而左右近習交相誘之言甚切帝以方修省皆不罪明史卷一百八十汪奎傳附林俊之下獄也王恕言天地止一壇祖宗止一廟而佛至千餘寺一寺立而移民居且數百家費內帑且數十萬此舛也俊言當不宜罪帝得疏不懌明史卷一百八十二王恕傳陳音方法王佛子真人宜一切罷遣陳音字師召莆田人天順末進士改庶吉士授編修成化六年三月以災異陳時政言講學莫先於好問陛下雖間御經筵然勢分嚴絶上有疑未嘗問下有見不敢陳願引儒臣賜坐便殿從容咨論仰發聖聽異端者正道之反法王佛子真人宜一切罷遣章下禮部明史卷一百八十四張元楨傳附陳音傳詔奪真人國師高士等三十餘人名號孝宗崩真人陳應䋸西番灌頂大國師那卜堅參等以祓除率其徒入乾清宮張升請置之法詔奪真人國師高士等三十餘人名號逐之升在部五年遇災異輒進直言亦數為言者所攻然自守謹飭明史卷一百八十四張升傳劉春奏不得濫營寺宇正德年間帝崇信西僧常襲其衣服演法內廠有綽吉我些兒者出入豹房封大德法王遣其徒二人還烏思藏請給國師誥命如大乘法王例歲時入貢且得繼茶以行春持不可帝命再議劉春執奏曰烏思藏遠在西方性極頑獷雖設四王撫化其來貢必有節制使不為邊患若許其繼茶給之誥敕萬一假上旨以誘羌人妄有請乞不從失異俗心從之則滋害奏上罷繼茶卒與誥命春又奏西番俗信佛教故祖宗承前代舊設立烏思藏諸司及陝西洮岷四川松潘諸寺令化導番人許之朝貢貢期人數皆有定制比緣諸番僻遠莫辨真偽中國逃亡罪人習其語言竄身在內又多創寺請額番項日增宴賞繁費乞嚴其期限酌定人數每寺給勘合十道緣邊兵備存勘合底簿比對相同方許起送並禁自後不得濫營寺宇報可明史卷一百八十四劉春傳侶仲上言停寺觀齋醮弘治十五年侶鍾上天下會計之數言今太倉無儲內府殫絀而冗食冗費日加於前願陛下惕然省憂力加損節且敕廷臣共求所以足用之術帝乃下廷臣議議上十二事其罷傳奉冗官汰內府濫收軍匠清騰驤四衛勇士停寺觀齋醮省內侍畫工番僧供應禁王府及織造濫乞鹽引令有司征莊田租皆權幸所不便者疏留數月不下鍾乃復言之他皆報可而事關權幸者終格不行明史卷一百八十五侶鍾傳周廣上言剌麻尤釋教所不齒周廣字克之崑山人弘治十八年進士歷知莆田吉永二縣正德中以治最征授御史疏陳四事略言三代以前未有佛法況剌麻尤釋教所不齒耳貫銅環身衣赭服殘破禮法肆為淫邪宜投四裔以御魑魅奈何令近君側為群盜興兵口實哉明史卷一百八十八周廣傳番僧處禁寺劉瑾敗大臣多以黨附見劾喬宇獨無所染拜南京禮部尚書乾清宮災率同列言視朝不勤經筵久輟國本未建義子猥多番僧處禁寺優伶侍起居立皇店留邊兵習戰鬥土木繁興織造不息凡十事帝不省明史卷一百九十四劉瑾傳西內創梵宇乾清宮災詔求直言楊一清上書言視朝太遲享祀太慢西內創梵宇禁中宿邊兵畿內皇店之害江南織造之擾因引疾乞歸帝慰留之明史卷一百九十八楊一清傳周用諫迎佛烏斯藏周用諫迎佛烏斯藏及以中旨遷黜尚書都給事中等官且請治鎮守江西中官黎安罪明史卷二百二周用傳鄭一鵬言僧道靡費帝用中官崔文言建醮乾清坤寧諸宮西天西番漢經諸廠五花宮兩暖閣東次閣莫不有之鄭一鵬言禱祀繁興必魏彬張鋭餘黨先帝已誤陛下豈容再誤臣巡視光祿見一齋醮蔬食之費為錢萬有八千陛下忍斂民怨而不忍傷佞幸之心況今天災頻降京師道殣相望邊境戍卒日夜荷戈不得飽食而為僧道靡費至此此臣所未解報聞明史卷二百六鄭一鵬傳敗俗妨農莫甚釋氏顧存仁字伯剛太倉人嘉靖十一年進士除餘姚知縣徵為禮科給事中十七年冬疏陳五事首言宜廣曠蕩恩赦楊慎馬録馮恩呂經等末云敗俗妨農莫甚釋氏葉凝秀何人而敢乞度帝方崇道家言凝秀道士也帝以為刺已且惡其欲釋楊慎等遂責存仁妄指凝秀為釋氏廷杖之六十編氓口外往來塞上幾三十年穆宗即位召為南京通政參議明史卷二百九顧存仁傳異言異服列於朝苑楊爵上書曰左道惑衆聖王必誅今異言異服列於朝苑金紫赤紱賞及方外夫保傅之職坐而論道今舉而畀之奇邪之徒流品之亂莫以加矣陛下誠與公卿賢士日論治道則心正身修天地鬼神莫不佑享安用此妖誕邪妄之術列諸清禁為聖躬纍耶臣聞上之所好下必有甚近者妖盜繁興誅之不息風聲所及人起異議貽四方之笑取百世之譏非細故也此信用方術足以失人心而致危亂者四也明史卷二百九楊爵傳白蓮結社萬曆二十五年五月呂坤疏陳天下安危其略曰一曰無聊之民飽溫無由身家俱困因懷逞亂之心冀緩須臾之死二曰無行之民氣高性悍玩法輕生居常愛玉帛子女而不得及有變則淫掠是圖三曰邪説之民白蓮結社遍及四方教主傳頭所在成聚倘有招呼之首此其歸附之人四曰不軌之民乘釁蹈機妄思雄長惟冀目前有變不樂天下太平陛下約己愛人損上益下則四民皆赤子否則悉為寇仇明史卷二百二十六呂坤傳稅寺産畢自嚴擇其可者先列上十二事日增鹽引議鼓鑄括雜稅核隱田稅寺産核牙行停修倉廒止葺公署南馬協濟崇文鋪稅京運撥兌板木折價明史卷二百五十六畢自嚴傳沈迅請以天下僧人配尼姑其年崇禎十一年冬畿輔被兵沈迅請於廣平河間定州蠡縣各設兵備一人又請以天下僧人配尼姑編入里甲三丁抽一可得兵數十萬他條奏甚多章下兵部嗣昌盛稱迅言可用乃命為兵科給事中明史卷二百六十七守玫傳附沈迅傳
